name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Validate JSON locales
        run: npm run validate-json

      - name: Validate CSP audit (Fase 1 — informativo, no falla)
        run: npm run validate-csp

      - name: Run tests
        run: npm test

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node --check on all JS
        run: |
          set -e
          for f in app.js core/*.js adapters/*.js platforms/*.js; do
            [ -f "$f" ] || continue
            echo "Checking $f"
            node --check "$f"
          done
