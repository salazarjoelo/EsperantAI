<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSP Fase 1 (TASK-105): script-src 'self' SIN unsafe-inline para scripts.
         style-src todavía con 'unsafe-inline' por compatibilidad con SVG inline
         (-webkit-background-clip en gradientes). Fase 2 eliminará también. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src 'self' https://id.twitch.tv https://accounts.google.com https://id.kick.com; style-src 'self'; frame-ancestors 'none';">
    <title>EsperantAI — OAuth Callback</title>
    <link rel="stylesheet" href="css/oauth-callback.css">
</head>
<body>
    <h1>EsperantAI</h1>
    <div class="spinner"></div>
    <p id="status">Procesando autorización…</p>
    <div class="manual" id="manual" hidden>
        Si esta ventana no se cierra automáticamente, copia el código de autorización y pégalo en EsperantAI.
        <br><br>
        <button id="btn-close-window">Cerrar ventana</button>
    </div>

    <script src="js/oauth-callback.js"></script>
</body>
</html>
