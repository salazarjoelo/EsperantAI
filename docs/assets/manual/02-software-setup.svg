<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Streaming software connection matrix</title>
  <desc id="desc">Compatibility cards for OBS Studio, Streamlabs Desktop, vMix, PRISM Live Studio, and XSplit Broadcaster.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1c1728"/>
    </linearGradient>
  </defs>
  <rect width="1120" height="620" fill="url(#bg)"/>
  <text x="52" y="76" fill="#f7fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="800">Streaming software setup</text>
  <text x="52" y="112" fill="#aeb9c9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Use the connection type shown by EsperantAI. Keep local ports private.</text>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <g transform="translate(52 160)">
      <rect width="320" height="150" rx="16" fill="#111827" stroke="#2e405e"/>
      <text x="26" y="42" fill="#62d9ff" font-size="23" font-weight="800">OBS Studio 28+</text>
      <text x="26" y="76" fill="#d9e5f2" font-size="16">obs-websocket included</text>
      <text x="26" y="104" fill="#d9e5f2" font-size="16">URL: ws://127.0.0.1:4455</text>
      <text x="26" y="132" fill="#d9e5f2" font-size="16">Password: from OBS settings</text>
    </g>
    <g transform="translate(400 160)">
      <rect width="320" height="150" rx="16" fill="#111827" stroke="#2e405e"/>
      <text x="26" y="42" fill="#62d9ff" font-size="23" font-weight="800">Streamlabs Desktop</text>
      <text x="26" y="76" fill="#d9e5f2" font-size="16">Settings -> Remote Control</text>
      <text x="26" y="104" fill="#d9e5f2" font-size="16">Token from Show Details</text>
      <text x="26" y="132" fill="#d9e5f2" font-size="16">Port: 59650</text>
    </g>
    <g transform="translate(748 160)">
      <rect width="320" height="150" rx="16" fill="#111827" stroke="#2e405e"/>
      <text x="26" y="42" fill="#62d9ff" font-size="23" font-weight="800">vMix</text>
      <text x="26" y="76" fill="#d9e5f2" font-size="16">Settings -> Web Controller</text>
      <text x="26" y="104" fill="#d9e5f2" font-size="16">Host: 127.0.0.1</text>
      <text x="26" y="132" fill="#d9e5f2" font-size="16">Port: 8088</text>
    </g>
    <g transform="translate(220 356)">
      <rect width="320" height="150" rx="16" fill="#111827" stroke="#4b4a72"/>
      <text x="26" y="42" fill="#8e7dff" font-size="23" font-weight="800">PRISM Live Studio</text>
      <text x="26" y="76" fill="#d9e5f2" font-size="16">Install OBS plugin support</text>
      <text x="26" y="104" fill="#d9e5f2" font-size="16">PRISM v4.0.5+ recommended</text>
      <text x="26" y="132" fill="#d9e5f2" font-size="16">Then use OBS WebSocket fields</text>
    </g>
    <g transform="translate(580 356)">
      <rect width="320" height="150" rx="16" fill="#111827" stroke="#71445b"/>
      <text x="26" y="42" fill="#ff8aa6" font-size="23" font-weight="800">XSplit Broadcaster</text>
      <text x="26" y="76" fill="#d9e5f2" font-size="16">Beta / advanced setup</text>
      <text x="26" y="104" fill="#d9e5f2" font-size="16">Requires local XJS bridge</text>
      <text x="26" y="132" fill="#d9e5f2" font-size="16">Default: ws://127.0.0.1:5555/xjs</text>
    </g>
  </g>
</svg>
