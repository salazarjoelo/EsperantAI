<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">EsperantAI local gesture control flow</title>
  <desc id="desc">Diagram showing webcam input, local AI detection, gesture mapping, platform events, and streaming software actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#141827"/>
      <stop offset="1" stop-color="#22162c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#62d9ff"/>
      <stop offset="0.55" stop-color="#8e7dff"/>
      <stop offset="1" stop-color="#ff6f91"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1120" height="560" fill="url(#bg)"/>
  <rect x="28" y="28" width="1064" height="504" rx="26" fill="none" stroke="#2b3852"/>
  <text x="56" y="78" fill="#f7fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="800">How EsperantAI works</text>
  <text x="56" y="112" fill="#aeb9c9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Camera video stays local. Gestures and stream events become actions only on your machine.</text>

  <g filter="url(#soft)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect x="64" y="178" width="185" height="148" rx="18" fill="#101827" stroke="#35445f"/>
    <text x="94" y="226" fill="#62d9ff" font-size="20" font-weight="800">1. Webcam</text>
    <text x="94" y="260" fill="#d8e1ef" font-size="16">Face, gaze, blink</text>
    <text x="94" y="284" fill="#d8e1ef" font-size="16">and hand gestures</text>

    <rect x="316" y="178" width="185" height="148" rx="18" fill="#101827" stroke="#35445f"/>
    <text x="346" y="226" fill="#62d9ff" font-size="20" font-weight="800">2. Local AI</text>
    <text x="346" y="260" fill="#d8e1ef" font-size="16">Human.js + WebGL</text>
    <text x="346" y="284" fill="#d8e1ef" font-size="16">No video upload</text>

    <rect x="568" y="178" width="185" height="148" rx="18" fill="#101827" stroke="#35445f"/>
    <text x="598" y="226" fill="#8e7dff" font-size="20" font-weight="800">3. Triggers</text>
    <text x="598" y="260" fill="#d8e1ef" font-size="16">Gesture or event</text>
    <text x="598" y="284" fill="#d8e1ef" font-size="16">maps to actions</text>

    <rect x="820" y="178" width="224" height="148" rx="18" fill="#101827" stroke="#35445f"/>
    <text x="850" y="226" fill="#ff6f91" font-size="20" font-weight="800">4. Stream action</text>
    <text x="850" y="260" fill="#d8e1ef" font-size="16">Switch scene, overlay,</text>
    <text x="850" y="284" fill="#d8e1ef" font-size="16">sound, chat, recording</text>
  </g>

  <g stroke="url(#accent)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M250 252H312"/>
    <path d="M502 252H564"/>
    <path d="M754 252H816"/>
  </g>
  <g fill="#ff6f91" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700">
    <text x="345" y="410">Platform events can also enter the trigger engine</text>
  </g>
  <g stroke="#ff6f91" stroke-width="3" fill="none" stroke-dasharray="8 8" stroke-linecap="round">
    <path d="M660 352C660 404 506 430 372 430"/>
    <path d="M372 430H216"/>
  </g>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect x="70" y="392" width="214" height="76" rx="14" fill="#171b2b" stroke="#4a3650"/>
    <text x="94" y="423" fill="#ffb6c8" font-size="18" font-weight="800">Events</text>
    <text x="94" y="449" fill="#d8e1ef" font-size="15">Twitch, YouTube, bridge</text>
  </g>
</svg>
