tudio**\n- **XSplit Broadcaster** (Beta)\n\nAußerdem kann EsperantAI Plattform-Events empfangen und mit Ihren Gesten kombinieren:\n\n- **Twitch**: direkte Unterstützung über EventSub WebSocket.\n- **YouTube Live**: direkte Unterstützung über YouTube Data API v3; erfordert einen aktiven Livestream und verfügbare API-Quota.\n- **Kick**: Beta/eingeschränkte Unterstützung im Browser. Für vollständige Kick-Events ist ein offizieller Backend/Webhook oder eine Bridge erforderlich.\n- **StreamElements**: plattformübergreifende Bridge mit Token/JWT Ihres Kontos.\n- **Trovo**: ein technischer Adapter existiert im Code, aber das öffentliche Verbindungspanel ist in der aktuellen Oberfläche noch nicht freigeschaltet.\n\n### Warum „ehrliche Gesten“?\n\nGrundlegende Gesichtsausdrücke und Kopfdrehungen sind **in allen menschlichen Kulturen universell** (Paul Ekman, 1972). Sie lügen nicht und ändern ihre Bedeutung nicht je nach Geografie. EsperantAI nennt diese Gesten „🌐 Universell“ und unterscheidet sie von „⚠️ Kulturell“ markierten Gesten (Handzeichen), deren Bedeutung je nach Land variieren kann.\n\nSie entscheiden, welche Gesten zu Ihrem Publikum passen.\n\n---\n\n## Mindestanforderungen\n\n### Hardware\n\n- **Beliebige USB-Webcam** (empfohlen: 1080p oder höher)\n- **CPU**: beliebiger Prozessor mit 4+ Kernen aus den letzten 5 Jahren\n- **RAM**: mindestens 8 GB. 16 GB empfohlen, wenn Sie gleichzeitig streamen.\n- **GPU**: jede GPU mit WebGL-Unterstützung; auch moderne integrierte GPUs funktionieren.\n\n### Software\n\n- **Betriebssystem**: Windows 10/11, macOS 12+ oder Linux mit aktuellem Kernel\n- **Browser**: Chrome 90+, Edge 90+ oder Firefox 100+\n- **Streaming-Software** (mindestens eine): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Internet\n\n- Erforderlich zur **Aktivierung Ihrer Lizenz** und danach alle **7 Tage** zur erneuten Validierung\n- Funktioniert **bis zu 7 Tage offline** (Karenzzeit)\n\n---\n\n## Kauf und Aktivierung\n\n1. Besuchen Sie **https://edugame.digital**\n2. Klicken Sie auf **„Lizenz kaufen“**\n3. Schließen Sie die Zahlung über LemonSqueezy ab (Karte, PayPal usw.)\n4. Sie erhalten eine E-Mail mit:\n   - Ihrem **Lizenzschlüssel** (Format: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - dem Link zur Nutzung von EsperantAI\n5. Öffnen Sie EsperantAI in Ihrem Browser\n6. Der Aktivierungsbildschirm erscheint. Fügen Sie Ihren Lizenzschlüssel ein\n7. Klicken Sie auf **„Lizenz aktivieren“**\n8. Fertig! 🎉\n\n### Wie viele Geräte?\n\nEine Lizenz kann auf **bis zu 3 Geräten** aktiviert werden. So übertragen Sie Ihre Lizenz auf ein anderes Gerät:\n\n1. Auf dem alten Gerät: Panel **Erweitert** → **Lizenz** → **Auf diesem Gerät deaktivieren**\n2. Auf dem neuen Gerät: normal aktivieren\n\n---\n\n## Erste Schritte\n\n### Schritt 1: Kamerazugriff erlauben\n\nWenn Sie EsperantAI zum ersten Mal öffnen, fragt Ihr Browser nach der Erlaubnis, auf die Kamera zuzugreifen. **Erlauben Sie den Zugriff**.\n\n> Wichtig: EsperantAI sendet Ihr Videobild niemals an einen Server. Die Verarbeitung erfolgt zu 100 % lokal auf Ihrem Gerät.\n\n### Schritt 2: Kamera auswählen\n\nWenn Sie mehr als eine Kamera haben, wählen Sie im Kamera-Dropdown die gewünschte Kamera aus.\n\n### Schritt 3: Erkennung prüfen\n\nSie sehen Ihr Gesicht im linken Panel. Sobald EsperantAI Ihr Gesicht erkennt, zeigen die Yaw-/Pitch-/Roll-Anzeigen Werte an.\n\n### Schritt 4: Kalibrierungsassistent (Pro+)\n\nWenn Sie eine Pro- oder Pro+-Lizenz haben, startet der **Kalibrierungsassistent** beim ersten Gebrauch automatisch. Er misst Ihren natürlichen Bewegungsbereich und stellt die passende Empfindlichkeit ein. Sie können ihn jederzeit über **Neu kalibrieren** erneut ausführen.\n\n---\n\n## Streaming-Software verbinden\n\n![Verbindungsmatrix für Streaming-Software](assets/manual/02-software-setup.svg)\n\nAlle Verbindungen in diesem Abschnitt sind lokal: EsperantAI kommuniziert mit dem Streaming-Programm auf demselben Computer über `127.0.0.1`.\n\n### OBS Studio\n\n1. In OBS: **Tools → WebSocket Server Settings**\n2. Aktivieren Sie den WebSocket-Server. OBS Studio 28+ enthält obs-websocket bereits.\n3. In EsperantAI: Panel **Verbindung**\n4. Streaming-Software: **OBS Studio**\n5. WebSocket-URL: `ws://127.0.0.1:4455` (Standard)\n6. Passwort: das Passwort aus OBS, falls Sie dort eines aktiviert haben\n7. Klicken Sie auf **Verbinden**\n\n### Streamlabs Desktop\n\n1. In Streamlabs Desktop: **Settings → Remote Control**\n2. Aktivieren Sie die lokale Fernsteuerung\n3. Kopieren Sie den **API Token** aus dem Remote-Control-Bildschirm\n4. In EsperantAI: Streaming-Software: **Streamlabs Desktop**\n5. API Token: einfügen\n6. Port: `59650` (Standard)\n7. Klicken Sie auf **Verbinden**\n\n### vMix\n\n1. In vMix: **Settings → Web Controller**\n2. Aktivieren Sie den Web Controller. Standard-Port: `8088`.\n3. In EsperantAI: Streaming-Software: **vMix**\n4. Host: `127.0.0.1`\n5. Port: `8088`\n6. Klicken Sie auf **Verbinden**\n\n> Hinweis: Der aktuelle EsperantAI-Adapter nutzt die lokale HTTP-API von vMix. Wenn Sie den Web Controller durch Netzwerkregeln oder Browser-inkompatible Zugangsdaten schützen, kann die Verbindung fehlschlagen.\n\n### PRISM Live Studio\n\n1. Verwenden Sie **PRISM Live Studio v4.0.5+**.\n2. Installieren Sie manuell das mit OBS/PRISM kompatible Plugin `obs-websocket`.\n3. Kopieren Sie es gemäß der offiziellen PRISM-Anleitung für OBS-Plugins in den Plugin-Ordner von PRISM.\n4. Starten Sie PRISM neu\n5. Aktivieren Sie WebSocket unter **Tools → WebSocket Server Settings**\n6. In EsperantAI: Streaming-Software: **PRISM Live Studio** (funktioniert wie OBS)\n\n> Wichtiger Unterschied: OBS 28+ enthält obs-websocket bereits. PRISM benötigt das manuell installierte Plugin.\n\n### XSplit Broadcaster (Beta)\n\n1. Installieren oder aktivieren Sie eine kompatible lokale Bridge für **XSplit XJS / Remote xjs**.\n2. Prüfen Sie, dass die Bridge eine lokale WebSocket-URL bereitstellt.\n3. In EsperantAI: Streaming-Software: **XSplit**\n4. Remote-xjs-Proxy-URL: `ws://127.0.0.1:5555/xjs` (Standard)\n5. Klicken Sie auf **Verbinden**\n\n> XSplit ist **Beta/Advanced**. Die Kompatibilität hängt von der installierten lokalen XJS-Remote-Bridge ab; erweiterte Funktionen können eingeschränkt sein.\n\n---\n\n## Gesten und Szenen konfigurieren\n\nNach dem Verbinden erscheinen die echten Szenen Ihrer Streaming-Software automatisch in den Dropdown-Menüs des Panels **Trigger**.\n\n### Grundlegende Zuordnung\n\n1. Wählen Sie für jede Geste (z. B. „Nach links schauen“) eine Szene aus dem Dropdown-Menü\n2. Wenn Sie die Geste ausführen und etwa 150 ms stabil halten, wechselt EsperantAI in Ihrer Streaming-Software zu dieser Szene\n3. Der Wechsel erfolgt automatisch und nahezu sofort\n\n### Mehrfachaktion (Pro+)\n\nMit einer Pro- oder Pro+-Lizenz kann eine Geste **mehrere Aktionen** gleichzeitig auslösen:\n- Szene wechseln + Ton abspielen + Overlay anzeigen + Chat-Nachricht senden\n\n### Kategorien aktivieren / deaktivieren\n\nJede Kategorie hat ein eigenes Kontrollkästchen **Aktivieren**:\n\n- 🧠 **Kopfdrehung** (universell — standardmäßig aktiviert)\n- 📏 **Gesichtsdistanz** (näher an die Kamera oder weiter weg)\n- 👁️ **Blickrichtung** (nur die Augen bewegen)\n- 😀 **Emotionen** (Lächeln, Überraschung, Wut, neutral)\n- 👁️‍🗨️ **Doppelblinzeln**\n- ✋ **Handgesten** (kulturell — standardmäßig deaktiviert)\n\nDeaktivieren Sie Kategorien, die Sie nicht benötigen, um CPU zu sparen.\n\n---\n\n## Gestenkategorien\n\n### 🌐 Universell (gleiche Bedeutung in jeder Kultur)\n\n| Geste | Achse | Wie aktivieren |\n|---|---|---|\n| Mitte | — | Geradeaus schauen, Gesicht stabil |\n| Nach links schauen | negativer Yaw | Drehen Sie den Kopf nach links |\n| Nach rechts schauen | positiver Yaw | Drehen Sie den Kopf nach rechts |\n| Nach oben schauen | negativer Pitch | Heben Sie das Gesicht an |\n| Nach unten schauen | positiver Pitch | Senken Sie das Gesicht |\n| Nach links neigen | negativer Roll | Neigen Sie den Kopf zur linken Schulter |\n| Nach rechts neigen | positiver Roll | Neigen Sie den Kopf zur rechten Schulter |\n| Näherkommen | Distanz | Gehen Sie näher an die Kamera |\n| Entfernen | Distanz | Gehen Sie weiter weg von der Kamera |\n| Blickrichtung | Blick | Bewegen Sie nur die Augen (Kopf zentriert) |\n| Lächeln | Emotion=glücklich | Lächeln Sie deutlich |\n| Überrascht | Emotion=Überraschung | Zeigen Sie Überraschung |\n| Wütend | Emotion=Wut | Zeigen Sie Wut |\n| Neutral | Emotion=neutral | Entspanntes Gesicht |\n| Doppelblinzeln | Blinzeln | Schließen Sie beide Augen zweimal schnell (< 700 ms) |\n\n### ⚠️ Kulturell (Bedeutung variiert je nach Land)\n\n| Geste | Westliche Bedeutung | Vorsicht in anderen Kulturen |\n|---|---|---|\n| 👍 Daumen hoch | Zustimmung | Naher Osten / Westasien: kann beleidigend sein |\n| ✌️ Friedenszeichen | Frieden / Sieg | Vereinigtes Königreich / Irland / Australien (Handfläche nach innen): Beleidigung |\n| 🤘 Rock-Hörner | Rock / Metal | Italien (Handfläche nach unten): „cornuto“ (Beleidigung) |\n| 👌 OK | OK / perfekt | Brasilien / Türkei / Deutschland: kann beleidigend sein |\n| ✊ Geschlossene Faust | Variiert je nach politischem Kontext | — |\n| 🖐️ Offene Handfläche | „Stopp“ oder Begrüßung | Griechenland (Mountza gegen jemanden): schwere Beleidigung |\n| ☝️ Zeigen | Hinweisen | In Asien gilt das Zeigen mit dem Finger als unhöflich |\n\nEsperantAI kennzeichnet jede Geste in der Oberfläche mit dem passenden Badge. Wählen Sie die Gesten danach aus, welches internationale Publikum Sie erreichen.\n\n### 🙏 Gassho (合掌)\n\nEine besondere Geste: Legen Sie beide Handflächen vor der Brust zusammen (wie bei einem Gebet oder einer respektvollen Verbeugung). In ostasiatischen Kulturen ist sie als Zeichen von Respekt oder Dankbarkeit verbreitet. EsperantAI erkennt sie mit hoher Zuverlässigkeit anhand von 6 Landmark-Prüfungen.\n\n---\n\n## Streaming-Plattformen verbinden\n\nDamit EsperantAI Events empfangen kann (Spenden, Abos, Raids, Follows oder Super Chats), verbinden Sie die Plattformen, auf denen Sie streamen.\n\n![Event-Status nach Plattform](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. Erstellen Sie eine Client ID unter https://dev.twitch.tv/console\n2. Registrieren Sie die Redirect-URI: `https://edugame.digital/oauth-callback.html` (oder Ihre lokale URL)\n3. In EsperantAI: Panel **Plattform-Events** → **Twitch EventSub**\n4. Fügen Sie Ihre Client ID ein\n5. Klicken Sie auf **Verbinden**\n6. Ein Twitch-Autorisierungsfenster öffnet sich. Akzeptieren Sie die Berechtigungen.\n7. Das Fenster schließt sich und Sie sehen „Twitch verbunden“\n\nEsperantAI verwendet EventSub WebSocket. Fügen Sie niemals ein Client Secret im Browser ein.\n\n### YouTube Live\n\n1. Erstellen Sie Zugangsdaten unter https://console.cloud.google.com\n2. Aktivieren Sie die YouTube Data API v3\n3. Erstellen Sie eine OAuth Client ID (Typ: Webanwendung)\n4. Registrieren Sie dieselbe Redirect-URI wie bei Twitch\n5. In EsperantAI: Panel **Plattform-Events** → **YouTube Live**\n6. Fügen Sie Ihre Client ID ein und klicken Sie auf **Verbinden**\n\nYouTube-Anforderungen: Sie müssen einen aktiven Livestream mit verfügbarem Chat haben, und Ihr Google-Cloud-Projekt muss über ausreichende Quota für Chat-Abfragen verfügen.\n\n### Kick\n\n1. Erstellen Sie eine Anwendung im Entwicklerportal von Kick.\n2. Registrieren Sie die Redirect-URI\n3. In EsperantAI: Panel **Plattform-Events** → **Kick**\n4. Fügen Sie Ihre Client ID ein und klicken Sie auf **Verbinden**\n5. Kick verwendet OAuth 2.1 mit PKCE.\n\nAktueller Status: **Beta/eingeschränkt**. Die offizielle Kick-Dokumentation nutzt Webhooks für vollständige Events. Im Browser kann EsperantAI nur einen eingeschränkten Teil der Aktivität erkennen; für Abos, Geschenke, Raids oder zuverlässige Kick-Events verwenden Sie eine Bridge wie StreamElements oder ein eigenes Backend/Webhook.\n\n### StreamElements (plattformübergreifende Bridge)\n\nWenn Sie bereits ein StreamElements-Konto haben, können Sie StreamElements als Bridge für Alerts mehrerer Plattformen verwenden:\n\n1. Gehen Sie zu https://streamelements.com/dashboard/account/channels\n2. Kopieren Sie Ihren JWT Token\n3. In EsperantAI: Panel **Plattform-Events** → **StreamElements**\n4. Fügen Sie das JWT ein und klicken Sie auf **Verbinden**\n\nHalten Sie diesen Token privat. Behandeln Sie ihn wie das Passwort Ihres StreamElements-Kontos.\n\n### Trovo\n\nEsperantAI enthält im Code einen technischen Trovo-Adapter, der auf OAuth und dem WebSocket-Chatdienst von Trovo basiert. In der aktuellen öffentlichen Oberfläche gibt es jedoch noch kein Trovo-Verbindungspanel; deshalb wird Trovo nicht als normaler Benutzerfluss dokumentiert. Wenn Sie Trovo jetzt benötigen, verwenden Sie eine kompatible Bridge oder warten Sie, bis das Trovo-Panel freigeschaltet wird.\n\n---\n\n## Event + Geste Kombinationen (Fortgeschritten)\n\nDas ist die Stärke von EsperantAI: **Plattform-Events** mit **Ihren Gesten** als Bestätigung kombinieren.\n\n![Ablauf von Event plus Geste](assets/manual/04-event-gesture-combo.svg)\n\n### Beispiel: Spenden mit Daumen hoch danken\n\n1. Panel **Event-Trigger** → Zeile „💰 Spende“\n2. ✅ Aktivieren\n3. Szene: `Szene_Danke`\n4. Erforderliche Geste: `👍 Daumen hoch`\n\n**Live-Ablauf**:\n- Eine Spende geht ein → EsperantAI zeigt „Warte auf Geste...“\n- Sie haben 5 Sekunden Zeit für 👍\n- Wenn Sie die Geste ausführen → Wechsel zu `Szene_Danke` + Ausführung aller weiteren konfigurierten Aktionen\n- Wenn nicht → der Event wird automatisch verworfen\n\n### Ohne erforderliche Geste (automatischer Trigger)\n\nWenn Sie **Erforderliche Geste** auf `— keine —` lassen, löst der Event die Aktion sofort aus.\n\nNützlich für:\n- Automatisch zur Feierszene wechseln, wenn Raids eintreffen\n- Automatisch ein Overlay anzeigen, wenn jemand ein Abo abschließt\n\n---\n\n## Empfindlichkeit und Totzone\n\n### Empfindlichkeit\n\nSchwellenwerte steuern, wie groß eine Geste sein muss, damit sie auslöst:\n\n- **Yaw**: wie weit Sie den Kopf seitlich drehen müssen (Standard: 0,15 rad ≈ 8,6°)\n- **Pitch nach oben/unten**: vertikale Neigung\n- **Roll**: seitliche Neigung\n\nErhöhen Sie die Werte für deutlichere Gesten. Verringern Sie sie für höhere Empfindlichkeit.\n\n### Totzone (gegen Ermüdung)\n\nWenn Sie fast zentriert sind (Yaw < 0,05, Pitch < 0,05, Roll < 0,08), wird **NICHTS ausgelöst**. So können Sie sich natürlich bewegen, ohne dass Mikrobewegungen Trigger aktivieren.\n\n### Stabile Frames\n\n`Stabile Frames` = wie viele aufeinanderfolgende Frames Sie die Geste halten müssen, bevor sie auslöst. Standard: 5 Frames (~150 ms bei 30 fps).\n\nErhöhen Sie den Wert, wenn Trigger zu leicht auslösen. Verringern Sie ihn für eine schnellere Reaktion.\n\n### Cooldown\n\n`Cooldown (ms)` = Mindestzeit zwischen Szenenwechseln. Standard: 500 ms.\n\nVerhindert, dass der Szenenwechsel instabil wird, wenn Sie schnell hin und her wechseln.\n\n---\n\n## Tastaturkürzel\n\n| Taste | Aktion |\n|---|---|\n| `Leertaste` | Erkennung pausieren / fortsetzen |\n| `C` | Manuell zur MITTE-Szene wechseln |\n| `R` | Szenenliste aus der Software neu laden |\n| `Esc` | Verbindung trennen |\n\n---\n\n## Trigger-Verlauf\n\nDas Panel **Erweitert → Trigger-Verlauf** zeigt die letzten 50 ausgelösten Aktionen:\n\n- ✓ grün = erfolgreich\n- ✗ rot = fehlgeschlagen\n- · grau = ausstehend\n\nNützlich, um nachzuvollziehen, was ausgelöst wurde, ohne DevTools zu öffnen.\n\n**CSV exportieren**: lädt den Verlauf für Offline-Analysen herunter.\n\n**Leeren**: löscht den Verlauf (wirkt sich auf nichts anderes aus).\n\n---\n\n## Sprache ändern\n\nEsperantAI erkennt automatisch die Sprache Ihres Betriebssystems. So ändern Sie sie manuell:\n\n- Oben rechts: Sprach-Dropdown\n- Wählen Sie Ihre bevorzugte Sprache\n- Die Oberfläche aktualisiert sich sofort\n\nVerfügbare Sprachen:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\nAlle 15 Sprachen sind in den aktuellen Oberflächendateien übersetzt.\n\n---\n\n## Lizenz verwalten\n\nPanel **Erweitert → Lizenz**:\n\n- **Status anzeigen**: Gültig / Ungültig\n- **Zugehörige Kunden-E-Mail anzeigen**\n- **Letzte Online-Validierung anzeigen**\n- **Auf diesem Gerät deaktivieren**: nutzen Sie dies vor einem PC-Wechsel oder um einen Platz freizugeben (von 3 verfügbaren Geräten)\n\n## Fehlerbehebung\n\n### „Aktivierung erforderlich“ bleibt bestehen, nachdem ich meinen Lizenzschlüssel eingefügt habe\n\n- Prüfen Sie, ob Sie den vollständigen Schlüssel kopiert haben (5 Gruppen mit je 4 Zeichen, getrennt durch Bindestriche)\n- Prüfen Sie Ihre Internetverbindung (die erste Aktivierung erfordert Online-Validierung)\n- Wenn Sie bereits auf 3 Geräten aktiviert haben, deaktivieren Sie zuerst eines\n- Kontaktieren Sie soporte@edugame.digital, falls das Problem weiterhin besteht\n\n### „Suche Gesicht...“ bleibt bestehen, obwohl mein Gesicht sichtbar ist\n\n- Verbessern Sie die Beleuchtung: Ihr Gesicht sollte gut ausgeleuchtet sein\n- Gehen Sie näher an die Kamera (40-80 cm sind optimal)\n- Schließen Sie andere Tabs, die die GPU nutzen (Chrome kann die GPU begrenzen, wenn zu viele Tabs geöffnet sind)\n- Wenn der Chrome Memory Saver aktiv ist, deaktivieren Sie ihn für diesen Tab\n\n### Szenen erscheinen nicht in den Dropdown-Menüs\n\n- Prüfen Sie, ob Sie mit der Streaming-Software verbunden sind (grünes Badge „Verbunden“)\n- Drücken Sie `R`, um die Szenenliste neu zu laden\n- Wenn sie weiterhin leer ist, trennen Sie die Verbindung und verbinden Sie erneut\n- In vMix: bestätigen Sie, dass der Web Controller aktiviert und unter `http://127.0.0.1:8088/api/` erreichbar ist\n- In PRISM: bestätigen Sie, dass das Plugin obs-websocket installiert und aktiviert ist\n- In XSplit: bestätigen Sie, dass die lokale XJS-Bridge läuft\n\n### Szenenwechsel werden ausgelöst, ohne dass ich Gesten mache\n\n- Erhöhen Sie den Yaw-/Pitch-/Roll-Schwellenwert im Panel **Empfindlichkeit**\n- Erhöhen Sie `Stabile Frames` von 5 auf 8-10\n- Stellen Sie sicher, dass die Totzone konfiguriert ist (Yaw 0,05, Pitch 0,05, Roll 0,08)\n- Prüfen Sie, dass keine weitere Person im Bild ist (mehrere Gesichter können Instabilität verursachen)\n\n### Verzögerung bei der Erkennung\n\n- Schließen Sie ressourcenintensive Anwendungen (Spiele, Videoschnitt)\n- Prüfen Sie, ob Sie eine dedizierte GPU verwenden, falls vorhanden (nicht die integrierte)\n- Reduzieren Sie die Kameraauflösung, falls sie 4K beträgt (1080p ist für die Erkennung optimal)\n\n### OBS reagiert nicht, obwohl EsperantAI „Szene geändert“ anzeigt\n\n- Prüfen Sie, ob der Szenenname im Dropdown exakt mit dem Namen in OBS übereinstimmt (Groß-/Kleinschreibung beachten)\n- Prüfen Sie, ob die Szene nicht in einer anderen Szenensammlung liegt\n- Prüfen Sie das Panel **Trigger-Verlauf** — wenn ✗ rot angezeigt wird, gibt es einen konkreten Fehler\n\n### Fehler „OBS nicht erreichbar — Manuell verbinden“\n\n- Prüfen Sie, ob OBS geöffnet ist\n- Prüfen Sie, ob WebSocket in OBS aktiviert ist\n- Wenn Sie in OBS ein Passwort eingerichtet haben, muss es exakt übereinstimmen\n- Einige Antivirenprogramme blockieren Port 4455 — fügen Sie eine Ausnahme hinzu\n\n### Twitch oder YouTube verbinden nicht\n\n- Prüfen Sie, ob die Redirect-URI in der Plattformkonsole exakt mit der URL von `oauth-callback.html` übereinstimmt\n- Erlauben Sie Pop-ups für die Domain, auf der Sie EsperantAI verwenden\n- Bei Twitch: verwenden Sie nur die Client ID; fügen Sie kein Client Secret ein\n- Bei YouTube: bestätigen Sie, dass die YouTube Data API v3 aktiviert ist und ein aktiver Livestream läuft\n\n### Kick zeigt nicht alle Events\n\nKick ist im Browser im Modus **Beta/eingeschränkt**. Vollständige Kick-Events werden offiziell über Webhooks empfangen; verwenden Sie StreamElements oder ein eigenes Backend, wenn Sie zuverlässige Abos, Geschenke oder Raids benötigen.\n\n---\n\n## Datenschutz\n\n### Was EsperantAI NICHT tut\n\n- ❌ sendet Ihr Videobild NICHT an einen Server\n- ❌ speichert Ihr Video oder Einzelbilder NICHT\n- ❌ sammelt biometrische Informationen NICHT remote\n- ❌ teilt Daten NICHT mit Werbetreibenden oder Dritten\n\n### Was EsperantAI verarbeitet\n\n- ✅ lokale Gesichtserkennung in Ihrem Browser (Human.js + WebGL)\n- ✅ lokale Verbindungen zu OBS / Streamlabs / vMix / PRISM / XSplit (Loopback `127.0.0.1`)\n- ✅ regelmäßige Validierung des Lizenzschlüssels (alle 7 Tage)\n- ✅ wenn Sie Twitch/YouTube/Kick/StreamElements verbinden: Plattform-Token im lokalen Speicher oder Sitzungsspeicher des Browsers\n\nVollständige Details stehen in `docs/PRIVACY.html`.\n\n---\n\n## Support\n\n- 📧 E-Mail: **soporte@edugame.digital**\n- 🌐 Web: https://edugame.digital\n- 📚 Technische Dokumentation: https://github.com/salazarjoelo/EsperantAI\n\nReaktionszeiten:\n- Allgemeine Fragen: 24-72 Stunden\n- Technische Fehler: 1-3 Werktage\n\n---\n\n*Letzte Aktualisierung: 2026-05-20. Version: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'it-IT': { name: 'Italiano', flag: '🇮🇹', content: "# EsperantAI — Manuale utente\n\n> **Gesti onesti.** Controlla il tuo software di streaming con il viso e le mani, senza hardware dedicato aggiuntivo.\n\n**Versione**: 3.0 · **Lingua**: Italiano (traduzioni disponibili in altre 14 lingue)\n\n**Controllo tecnico**: allineato alla documentazione ufficiale disponibile al **20 maggio 2026** per OBS Studio, Streamlabs Desktop, vMix, PRISM Live Studio, XSplit, Twitch, YouTube Live, Kick, Trovo e StreamElements. Dettaglio: [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md).\n\n---\n\n## Indice\n\n1. [Cos'è EsperantAI?](#cosè-esperantai)\n2. [Requisiti minimi](#requisiti-minimi)\n3. [Acquisto e attivazione](#acquisto-e-attivazione)\n4. [Primo utilizzo](#primo-utilizzo)\n5. [Connetti il tuo software di streaming](#connetti-il-tuo-software-di-streaming)\n6. [Configura gesti e scene](#configura-gesti-e-scene)\n7. [Categorie di gesti](#categorie-di-gesti)\n8. [Connetti le piattaforme di streaming](#connetti-le-piattaforme-di-streaming)\n9. [Combinazioni evento + gesto (Avanzato)](#combinazioni-evento--gesto-avanzato)\n10. [Sensibilità e zona morta](#sensibilità-e-zona-morta)\n11. [Scorciatoie da tastiera](#scorciatoie-da-tastiera)\n12. [Cronologia dei trigger](#cronologia-dei-trigger)\n13. [Cambiare lingua](#cambiare-lingua)\n14. [Gestire la licenza](#gestire-la-licenza)\n15. [Risoluzione dei problemi](#risoluzione-dei-problemi)\n16. [Privacy](#privacy)\n17. [Supporto](#supporto)\n\n---\n\n## Cos'è EsperantAI?\n\nEsperantAI è un'**applicazione web** che usa l'intelligenza artificiale per rilevare in tempo reale i gesti del tuo viso e delle tue mani, e li traduce in comandi per il tuo software di streaming. Il video della fotocamera viene elaborato localmente nel browser.\n\n![Flusso locale di EsperantAI](assets/manual/01-esperantai-flow.svg)\n\nFunziona con questi programmi di trasmissione:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (beta/avanzato)\n\nPuò anche ricevere eventi dalle piattaforme e combinarli con i tuoi gesti:\n\n- **Twitch**: supporto diretto tramite EventSub WebSocket.\n- **YouTube Live**: supporto diretto tramite YouTube Data API v3; richiede una diretta attiva e quota disponibile.\n- **Kick**: supporto beta/limitato nel browser. Per gli eventi completi di Kick serve un backend con webhook ufficiali oppure un ponte.\n- **StreamElements**: ponte multipiattaforma con token/JWT del tuo account.\n- **Trovo**: esiste un adattatore tecnico nel codice, ma il pannello pubblico di connessione non è ancora esposto nell'interfaccia attuale.\n\n### Perché «gesti onesti»?\n\nLe espressioni facciali di base e la rotazione della testa sono **universali in tutte le culture umane** (Paul Ekman, 1972). Non mentono e non cambiano in base alla geografia. EsperantAI chiama questi gesti «🌐 Universali» e li distingue dai gesti «⚠️ Culturali» (segni con le mani), il cui significato può variare da Paese a Paese.\n\nSei tu a decidere quali gesti usare in base al tuo pubblico.\n\n---\n\n## Requisiti minimi\n\n### Hardware\n\n- **Qualsiasi webcam USB** (consigliata: 1080p o superiore)\n- **CPU**: qualsiasi processore a 4+ core degli ultimi 5 anni\n- **RAM**: minimo 8 GB. Consigliati 16 GB se fai streaming nello stesso momento.\n- **GPU**: qualsiasi GPU con supporto WebGL, incluse le GPU integrate moderne\n\n### Software\n\n- **Sistema operativo**: Windows 10/11, macOS 12+ o Linux con kernel recente\n- **Browser**: Chrome 90+, Edge 90+ o Firefox 100+\n- **Software di streaming** (almeno uno): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Internet\n\n- Necessario per **attivare la licenza** e ogni **7 giorni** per la rivalidazione\n- Funziona **fino a 7 giorni offline** (periodo di grazia)\n\n---\n\n## Acquisto e attivazione\n\n1. Visita **https://edugame.digital**\n2. Fai clic su **«Acquista licenza»**\n3. Completa il pagamento tramite LemonSqueezy (carta, PayPal, ecc.)\n4. Riceverai un'email con:\n   - La tua **chiave di licenza** (formato: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Il link per usare EsperantAI\n5. Apri EsperantAI nel browser\n6. Apparirà la schermata di attivazione. Incolla la chiave di licenza\n7. Fai clic su **«Attiva licenza»**\n8. Fatto! 🎉\n\n### Quanti dispositivi?\n\nUna licenza può essere attivata su **massimo 3 dispositivi**. Per spostare la licenza su un altro dispositivo:\n\n1. Sul dispositivo precedente: pannello **Avanzate** → **Licenza** → **Disattiva su questo dispositivo**\n2. Sul nuovo dispositivo: attiva normalmente\n\n---\n\n## Primo utilizzo\n\n### Passo 1: Consenti l'accesso alla fotocamera\n\nQuando apri EsperantAI per la prima volta, il browser ti chiederà il permesso di accedere alla fotocamera. **Accetta**.\n\n> Importante: EsperantAI non invia mai il tuo video a nessun server. L'elaborazione è al 100% locale sul tuo dispositivo.\n\n### Passo 2: Seleziona la fotocamera\n\nSe hai più di una fotocamera, scegli quale usare dal menu a tendina delle fotocamere.\n\n### Passo 3: Verifica il rilevamento\n\nVedrai il tuo viso nel pannello a sinistra. Quando EsperantAI rileva il volto, gli indicatori Yaw / Pitch / Roll inizieranno a mostrare valori.\n\n### Passo 4: Assistente di calibrazione (Pro+)\n\nSe hai una licenza Pro o Pro+, l'**Assistente di calibrazione** si avvia automaticamente al primo utilizzo. Misura il tuo intervallo naturale di movimento e imposta la sensibilità ottimale. Puoi eseguirlo di nuovo in qualsiasi momento dal pulsante **Ricalibra**.\n\n---\n\n## Connetti il tuo software di streaming\n\n![Matrice di connessione del software di streaming](assets/manual/02-software-setup.svg)\n\nTutte le connessioni di questa sezione sono locali: EsperantAI comunica con il programma di trasmissione in esecuzione sullo stesso computer tramite `127.0.0.1`.\n\n### OBS Studio\n\n1. In OBS: **Strumenti → Impostazioni del server WebSocket**\n2. Abilita il server WebSocket. OBS Studio 28+ include già obs-websocket.\n3. In EsperantAI: pannello **Connessione**\n4. Software di streaming: **OBS Studio**\n5. URL WebSocket: `ws://127.0.0.1:4455` (predefinito)\n6. Password: quella configurata in OBS, se hai attivato una password\n7. Fai clic su **Connetti**\n\n### Streamlabs Desktop\n\n1. In Streamlabs Desktop: **Settings → Remote Control**\n2. Abilita il controllo remoto locale\n3. Copia l'**API Token** dalla schermata Remote Control\n4. In EsperantAI: software di streaming **Streamlabs Desktop**\n5. Token API: incollalo\n6. Porta: `59650` (predefinita)\n7. Fai clic su **Connetti**\n\n### vMix\n\n1. In vMix: **Settings → Web Controller**\n2. Abilita Web Controller. Porta predefinita: `8088`.\n3. In EsperantAI: software di streaming **vMix**\n4. Host: `127.0.0.1`\n5. Porta: `8088`\n6. Fai clic su **Connetti**\n\n> Nota: l'adattatore attuale di EsperantAI usa l'API HTTP locale di vMix. Se hai protetto Web Controller con regole di rete o credenziali non compatibili con il browser, la connessione può fallire.\n\n### PRISM Live Studio\n\n1. Usa **PRISM Live Studio v4.0.5+**.\n2. Installa manualmente il plugin `obs-websocket` compatibile con OBS/PRISM.\n3. Copialo nella cartella dei plugin di PRISM seguendo la guida ufficiale di PRISM per i plugin OBS.\n4. Riavvia PRISM\n5. Abilita WebSocket in **Strumenti → Impostazioni del server WebSocket**\n6. In EsperantAI: software di streaming **PRISM Live Studio** (funziona come OBS)\n\n> Differenza importante: OBS 28+ include già obs-websocket. PRISM richiede l'installazione manuale del plugin.\n\n### XSplit Broadcaster (beta/avanzato)\n\n1. Installa o abilita un ponte locale compatibile con **XSplit XJS / Remote xjs**.\n2. Verifica che il ponte esponga un URL WebSocket locale.\n3. In EsperantAI: software di streaming **XSplit**\n4. URL del proxy Remote xjs: `ws://127.0.0.1:5555/xjs` (predefinito)\n5. Fai clic su **Connetti**\n\n> XSplit è in modalità **beta/avanzata**. La compatibilità dipende dal ponte XJS locale installato; le funzionalità avanzate possono essere limitate.\n\n---\n\n## Configura gesti e scene\n\nUna volta connesso, le scene reali del tuo software appariranno automaticamente nei menu a tendina del pannello **Trigger**.\n\n### Mappatura di base\n\n1. Per ogni gesto (per esempio «Guarda a sinistra»), scegli una scena dal menu a tendina\n2. Quando esegui quel gesto e lo mantieni stabile per ~150 ms, EsperantAI passa a quella scena nel tuo software di streaming\n3. Il cambio è automatico e quasi istantaneo\n\n### Multi-azione (Pro+)\n\nCon una licenza Pro o Pro+, un gesto può attivare **più azioni** contemporaneamente:\n- Cambiare scena + riprodurre un suono + mostrare un overlay + inviare un messaggio in chat\n\n### Abilitare / disabilitare categorie\n\nOgni categoria ha la propria casella «Abilita»:\n\n- 🧠 **Rotazione della testa** (universale — abilitata per impostazione predefinita)\n- 📏 **Distanza del viso** (avvicinarsi o allontanarsi)\n- 👁️ **Sguardo** (muovere solo gli occhi)\n- 😀 **Emozioni** (sorriso, sorpresa, rabbia, neutro)\n- 👁️‍🗨️ **Doppio battito di ciglia**\n- ✋ **Gesti con le mani** (culturali — disabilitati per impostazione predefinita)\n\nDisabilita le categorie che non ti servono per risparmiare CPU.\n\n---\n\n## Categorie di gesti\n\n### 🌐 Universali (stesso significato in qualsiasi cultura)\n\n| Gesto | Asse | Come attivarlo |\n|---|---|---|\n| Centro | — | Guarda in avanti, viso stabile |\n| Guarda a sinistra | yaw negativo | Gira la testa verso sinistra |\n| Guarda a destra | yaw positivo | Gira la testa verso destra |\n| Guarda in alto | pitch negativo | Alza il viso |\n| Guarda in basso | pitch positivo | Abbassa il viso |\n| Inclina a sinistra | roll negativo | Inclina la testa verso la spalla sinistra |\n| Inclina a destra | roll positivo | Inclina la testa verso la spalla destra |\n| Avvicinarsi | distanza | Avvicinati alla fotocamera |\n| Allontanarsi | distanza | Allontanati dalla fotocamera |\n| Sguardo | sguardo | Muovi solo gli occhi (testa centrata) |\n| Sorriso | emozione=felice | Sorridi chiaramente |\n| Sorpreso | emozione=sorpresa | Mostra sorpresa |\n| Arrabbiato | emozione=rabbia | Mostra rabbia |\n| Neutro | emozione=neutro | Viso rilassato |\n| Doppio battito di ciglia | battito | Chiudi entrambi gli occhi due volte rapidamente (< 700 ms) |\n\n### ⚠️ Culturali (il significato varia in base al Paese)\n\n| Gesto | Significato occidentale | Attenzione in altre culture |\n|---|---|---|\n| 👍 Pollice in su | Approvazione | Medio Oriente / Asia occidentale: può essere offensivo |\n| ✌️ Pace | Pace / vittoria | Regno Unito / Irlanda / Australia (palmo verso l'interno): insulto |\n| 🤘 Corna rock | Rock / metal | Italia (palmo verso il basso): «cornuto» (insulto) |\n| 👌 OK | OK / perfetto | Brasile / Turchia / Germania: può essere offensivo |\n| ✊ Pugno chiuso | Varia in base al contesto politico | — |\n| 🖐️ Palmo aperto | «Stop» o saluto | Grecia (mountza verso qualcuno): insulto forte |\n| ☝️ Indicare | Indicare | Asia: indicare con il dito è maleducato |\n\nEsperantAI contrassegna ogni gesto con il badge corrispondente nell'interfaccia. Scegli quali usare in base al tuo pubblico globale.\n\n### 🙏 Gassho (合掌)\n\nUn gesto speciale: unisci entrambi i palmi davanti al petto (come in una preghiera o in un inchino di saluto). È comune nelle culture dell'Asia orientale come segno di rispetto o gratitudine. Viene rilevato con alta affidabilità tramite 6 controlli sui punti di riferimento.\n\n---\n\n## Connetti le piattaforme di streaming\n\nPer far sì che EsperantAI riceva eventi (donazioni, abbonamenti, raid, follow o Super Chat), connetti le piattaforme su cui fai streaming.\n\n![Stato degli eventi per piattaforma](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. Crea un Client ID su https://dev.twitch.tv/console\n2. Registra l'URI di reindirizzamento: `https://edugame.digital/oauth-callback.html` (o il tuo URL locale)\n3. In EsperantAI: pannello **Eventi piattaforma** → **Twitch EventSub**\n4. Incolla il tuo Client ID\n5. Fai clic su **Connetti**\n6. Si aprirà una finestra di autorizzazione di Twitch. Accetta i permessi.\n7. La finestra si chiuderà e vedrai «Twitch connesso»\n\nEsperantAI usa EventSub WebSocket. Non incollare nessun Client Secret nel browser.\n\n### YouTube Live\n\n1. Crea le credenziali su https://console.cloud.google.com\n2. Abilita YouTube Data API v3\n3. Crea un OAuth Client ID (tipo: Applicazione web)\n4. Registra lo stesso URI di reindirizzamento usato per Twitch\n5. In EsperantAI: pannello **Eventi piattaforma** → **YouTube Live**\n6. Incolla il tuo Client ID e fai clic su **Connetti**\n\nRequisiti di YouTube: devi avere una diretta attiva con chat disponibile, e il tuo progetto Google Cloud deve avere quota sufficiente per consultare la chat.\n\n### Kick\n\n1. Crea un'applicazione nel portale sviluppatori di Kick.\n2. Registra l'URI di reindirizzamento\n3. In EsperantAI: pannello **Eventi piattaforma** → **Kick**\n4. Incolla il tuo Client ID e fai clic su **Connetti**\n5. Kick usa OAuth 2.1 con PKCE.\n\nStato attuale: **beta/limitato**. La documentazione ufficiale di Kick usa webhook per gli eventi completi. Nel browser, EsperantAI può rilevare solo una parte limitata dell'attività; per abbonamenti, regali, raid o eventi affidabili di Kick usa un ponte come StreamElements oppure un backend/webhook.\n\n### StreamElements (ponte multipiattaforma)\n\nSe hai già un account StreamElements, puoi usarlo come ponte per avvisi da più piattaforme:\n\n1. Vai su https://streamelements.com/dashboard/account/channels\n2. Copia il tuo JWT Token\n3. In EsperantAI: pannello **Eventi piattaforma** → **StreamElements**\n4. Incolla il JWT e fai clic su **Connetti**\n\nMantieni privato questo token. Trattalo come una password del tuo account StreamElements.\n\n### Trovo\n\nEsperantAI include nel codice un adattatore tecnico per Trovo, basato su OAuth e sul servizio di chat WebSocket di Trovo. Nell'interfaccia pubblica attuale non esiste ancora un pannello di connessione Trovo, quindi non è documentato come flusso utente normale. Se hai bisogno di Trovo adesso, usa un ponte compatibile o attendi l'attivazione del pannello Trovo.\n\n---\n\n## Combinazioni evento + gesto (Avanzato)\n\nQuesta è la magia di EsperantAI: combinare **eventi della piattaforma** con **i tuoi gesti** come conferma.\n\n![Flusso evento più gesto](assets/manual/04-event-gesture-combo.svg)\n\n### Esempio: ringraziare le donazioni con un pollice in su\n\n1. Pannello **Trigger evento** → riga «💰 Donazione»\n2. ✅ Abilita\n3. Scena: `Scena_Grazie`\n4. Gesto richiesto: `👍 Pollice in su`\n\n**Flusso dal vivo**:\n- Arriva una donazione → EsperantAI mostra «In attesa del gesto...»\n- Hai 5 secondi per fare 👍\n- Se lo fai → passa a `Scena_Grazie` + esegue qualsiasi altra azione configurata\n- Se non lo fai → viene scartato automaticamente\n\n### Senza gesto richiesto (attivazione automatica)\n\nSe lasci «Gesto richiesto» su `— nessuno —`, l'evento attiva subito l'azione.\n\nUtile per:\n- Passare automaticamente alla scena di celebrazione quando arrivano raid\n- Mostrare automaticamente un overlay quando qualcuno si abbona\n\n---\n\n## Sensibilità e zona morta\n\n### Sensibilità\n\nLe soglie controllano quanto deve essere ampio un gesto perché venga attivato:\n\n- **Yaw**: quanto devi girare la testa lateralmente (predefinito: 0,15 rad ≈ 8,6°)\n- **Pitch su/giù**: inclinazione verticale\n- **Roll**: inclinazione laterale\n\nAumenta i valori per gesti più marcati. Riducili per una maggiore sensibilità.\n\n### Zona morta (anti-affaticamento)\n\nSe sei quasi centrato (yaw < 0,05, pitch < 0,05, roll < 0,08), **NON si attiva nulla**. Questo ti permette di muoverti in modo naturale senza che i micromovimenti attivino i trigger.\n\n### Fotogrammi stabili\n\n`Fotogrammi stabili` = quanti fotogrammi consecutivi devi mantenere il gesto prima che venga attivato. Valore predefinito: 5 fotogrammi (~150 ms a 30 fps).\n\nAumenta il valore se i trigger si attivano troppo facilmente. Riducilo per una risposta più rapida.\n\n### Raffreddamento\n\n`Raffreddamento (ms)` = tempo minimo tra i cambi di scena. Valore predefinito: 500 ms.\n\nEvita che il commutatore diventi «instabile» se oscilli rapidamente.\n\n---\n\n## Scorciatoie da tastiera\n\n| Tasto | Azione |\n|---|---|\n| `Spazio` | Pausa / Riprendi rilevamento |\n| `C` | Vai manualmente alla scena CENTRO |\n| `R` | Ricarica l'elenco delle scene dal software |\n| `Esc` | Disconnetti |\n\n---\n\n## Cronologia dei trigger\n\nIl pannello **Avanzate → Cronologia dei trigger** mostra le ultime 50 azioni attivate:\n\n- ✓ verde = riuscita\n- ✗ rosso = fallita\n- · grigio = in attesa\n\nUtile per controllare cosa è stato attivato senza aprire DevTools.\n\n**Esporta CSV**: scarica la cronologia per analisi offline.\n\n**Cancella**: elimina la cronologia (non influisce su altro).\n\n---\n\n## Cambiare lingua\n\nEsperantAI rileva automaticamente la lingua del tuo sistema operativo. Per cambiarla manualmente:\n\n- Angolo in alto a destra: menu a tendina della lingua\n- Seleziona la lingua preferita\n- L'interfaccia si aggiorna immediatamente\n\nLingue disponibili:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\nI 15 idiomi sono tradotti nei file di interfaccia attuali.\n\n---\n\n## Gestire la licenza\n\nPannello **Avanzate → Licenza**:\n\n- **Verifica stato**: Valida / Non valida\n- **Visualizza l'email del cliente associato**\n- **Visualizza l'ultima validazione online**\n- **Disattiva su questo dispositivo**: usalo prima di cambiare PC o per liberare uno slot (dei 3 disponibili)\n\n## Risoluzione dei problemi\n\n### «Attivazione richiesta» persiste dopo aver incollato la chiave di licenza\n\n- Verifica di aver copiato la chiave completa (5 gruppi da 4 caratteri separati da trattini)\n- Controlla la connessione a Internet (la prima attivazione richiede validazione online)\n- Se hai già attivato la licenza su 3 dispositivi, disattivane prima uno\n- Contatta soporte@edugame.digital se il problema persiste\n\n### «Ricerca del volto...» persiste anche se il viso è visibile\n\n- Migliora l'illuminazione: il volto deve essere ben illuminato\n- Avvicinati alla fotocamera (40-80 cm è ottimale)\n- Chiudi altre schede che usano la GPU (Chrome può limitarla se ci sono troppe schede aperte)\n- Se il Risparmio memoria di Chrome è attivo, disattivalo per questa scheda\n\n### Le scene non compaiono nei menu a tendina\n\n- Verifica di essere connesso al software di streaming (badge verde «Connesso»)\n- Premi `R` per ricaricare l'elenco delle scene\n- Se resta vuoto, disconnetti e riconnetti\n- In vMix, conferma che Web Controller sia abilitato e accessibile da `http://127.0.0.1:8088/api/`\n- In PRISM, conferma che il plugin obs-websocket sia installato e abilitato\n- In XSplit, conferma che il ponte XJS locale sia in esecuzione\n\n### I cambi di scena si attivano senza che io faccia gesti\n\n- Aumenta la soglia di yaw / pitch / roll nel pannello **Sensibilità**\n- Aumenta i `Fotogrammi stabili` da 5 a 8-10\n- Assicurati che la zona morta sia configurata (yaw 0,05, pitch 0,05, roll 0,08)\n- Controlla che non ci sia qualcun altro nell'inquadratura (più volti possono causare instabilità)\n\n### Ritardo nel rilevamento\n\n- Chiudi applicazioni pesanti (giochi, editing video)\n- Verifica di usare la GPU dedicata, se ne hai una, e non quella integrata\n- Riduci la risoluzione della fotocamera se è 4K (1080p è ottimale per il rilevamento)\n\n### OBS non reagisce anche se EsperantAI indica «Scena cambiata»\n\n- Verifica che il nome della scena nel menu a tendina corrisponda ESATTAMENTE a quello in OBS (maiuscole/minuscole incluse)\n- Verifica che la scena non si trovi in un'altra Raccolta scene\n- Controlla il pannello **Cronologia dei trigger** — se mostra ✗ rosso, c'è un errore specifico\n\n### Errore «OBS non raggiungibile — Connetti manualmente»\n\n- Verifica che OBS sia aperto\n- Verifica che WebSocket sia abilitato in OBS\n- Se hai configurato una password in OBS, deve corrispondere esattamente\n- Alcuni antivirus bloccano la porta 4455 — aggiungi un'eccezione\n\n### Twitch o YouTube non si connettono\n\n- Verifica che l'URI di reindirizzamento nella console della piattaforma corrisponda esattamente all'URL di `oauth-callback.html`\n- Consenti le finestre popup per il dominio in cui usi EsperantAI\n- In Twitch, usa solo il Client ID; non incollare il Client Secret\n- In YouTube, conferma che YouTube Data API v3 sia abilitata e che ci sia una diretta attiva\n\n### Kick non mostra tutti gli eventi\n\nKick è in modalità beta/limitata nel browser. Gli eventi completi di Kick vengono ricevuti ufficialmente tramite webhook; usa StreamElements o un backend tuo se ti servono abbonamenti, regali o raid affidabili.\n\n---\n\n## Privacy\n\n### Cosa EsperantAI NON fa\n\n- ❌ NON invia il tuo video a nessun server\n- ❌ NON salva il tuo video né catture\n- ❌ NON raccoglie informazioni biometriche da remoto\n- ❌ NON condivide dati con inserzionisti o terze parti\n\n### Cosa ELABORA\n\n- ✅ Rilevamento facciale locale nel browser (Human.js + WebGL)\n- ✅ Connessioni locali a OBS / Streamlabs / vMix / PRISM / XSplit (loopback `127.0.0.1`)\n- ✅ Validazione periodica della chiave di licenza (ogni 7 giorni)\n- ✅ Se connetti Twitch/YouTube/Kick/StreamElements: token della piattaforma nello storage locale o di sessione del browser\n\nDettagli completi in `docs/PRIVACY.html`.\n\n---\n\n## Supporto\n\n- 📧 Email: **soporte@edugame.digital**\n- 🌐 Web: https://edugame.digital\n- 📚 Documentazione tecnica: https://github.com/salazarjoelo/EsperantAI\n\nTempi di risposta:\n- Domande generali: 24-72 ore\n- Errori tecnici: 1-3 giorni lavorativi\n\n---\n\n*Ultimo aggiornamento: 2026-05-20. Versione: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'ru-RU': { name: 'Русский', flag: '🇷🇺', content: "# EsperantAI — Руководство пользователя\n\n> **Честные жесты.** Управляйте стриминговым ПО с помощью лица и рук, без отдельного дополнительного оборудования.\n\n**Версия**: 3.0 · **Язык**: Русский (доступно на 15 языках)\n\n**Техническая проверка**: сверено с официальной документацией, доступной на **20 мая 2026 года**, для OBS Studio, Streamlabs Desktop, vMix, PRISM Live Studio, XSplit, Twitch, YouTube Live, Kick, Trovo и StreamElements. Подробности: [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md).\n\n---\n\n## Содержание\n\n1. [Что такое EsperantAI?](#что-такое-esperantai)\n2. [Минимальные требования](#минимальные-требования)\n3. [Покупка и активация](#покупка-и-активация)\n4. [Первый запуск](#первый-запуск)\n5. [Подключение стримингового ПО](#подключение-стримингового-по)\n6. [Настройка жестов и сцен](#настройка-жестов-и-сцен)\n7. [Категории жестов](#категории-жестов)\n8. [Подключение стриминговых платформ](#подключение-стриминговых-платформ)\n9. [Комбо: событие + жест (Продвинутый уровень)](#комбо-событие--жест-продвинутый-уровень)\n10. [Чувствительность и мёртвая зона](#чувствительность-и-мёртвая-зона)\n11. [Горячие клавиши](#горячие-клавиши)\n12. [История триггеров](#история-триггеров)\n13. [Смена языка](#смена-языка)\n14. [Управление лицензией](#управление-лицензией)\n15. [Устранение неполадок](#устранение-неполадок)\n16. [Конфиденциальность](#конфиденциальность)\n17. [Поддержка](#поддержка)\n\n---\n\n## Что такое EsperantAI?\n\nEsperantAI — это **веб-приложение**, которое использует искусственный интеллект для распознавания жестов лица и рук в реальном времени и преобразует их в команды для вашего стримингового ПО. Видео с вашей камеры обрабатывается локально в браузере.\n\n![Локальный поток EsperantAI](assets/manual/01-esperantai-flow.svg)\n\nРаботает со следующими программами для трансляций:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (бета/расширенная настройка)\n\nТакже может получать события платформ и сочетать их с вашими жестами:\n\n- **Twitch**: прямое подключение через EventSub WebSocket.\n- **YouTube Live**: прямое подключение через YouTube Data API v3; требуется активная трансляция и доступная квота.\n- **Kick**: бета/ограниченная поддержка в браузере. Для полных событий Kick нужен официальный backend/webhooks или мост.\n- **StreamElements**: мультиплатформенный мост с токеном/JWT вашей учётной записи.\n- **Trovo**: технический адаптер есть в коде, но публичная панель подключения пока не выведена в текущем интерфейсе.\n\n### Почему «честные жесты»?\n\nБазовые мимические выражения и повороты головы **универсальны для всех человеческих культур** (Пол Экман, 1972). Они не лгут и не зависят от географии. EsperantAI называет такие жесты «🌐 Универсальные» и отличает их от «⚠️ Культурных» жестов (знаки руками), значение которых может различаться в зависимости от страны.\n\nВы сами решаете, какие жесты использовать, исходя из вашей аудитории.\n\n---\n\n## Минимальные требования\n\n### Оборудование\n\n- **Любая USB-веб-камера** (рекомендуется 1080p или выше)\n- **CPU**: любой 4-ядерный процессор за последние 5 лет\n- **RAM**: минимум 8 ГБ. Рекомендуется 16 ГБ при одновременном стриме.\n- **GPU**: любой с поддержкой WebGL (подойдут даже современные встроенные)\n\n### Программное обеспечение\n\n- **ОС**: Windows 10/11, macOS 12+ или Linux с актуальным ядром\n- **Браузер**: Chrome 90+, Edge 90+ или Firefox 100+\n- **Стриминговое ПО** (хотя бы одно): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Интернет\n\n- Необходим для **активации лицензии** и каждые **7 дней** для повторной проверки\n- Работает **до 7 дней офлайн** (льготный период)\n\n---\n\n## Покупка и активация\n\n1. Перейдите на **https://edugame.digital**\n2. Нажмите **«Buy License»**\n3. Оплатите через LemonSqueezy (карта, PayPal и т. д.)\n4. Вы получите письмо с:\n   - Вашим **лицензионным ключом** (формат: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Ссылкой для использования EsperantAI\n5. Откройте EsperantAI в браузере\n6. Появится экран активации. Вставьте лицензионный ключ\n7. Нажмите **«Activate License»**\n8. Готово! 🎉\n\n### Сколько устройств?\n\nОдна лицензия может быть активирована на **до 3 устройств**. Чтобы перенести лицензию на другое устройство:\n\n1. На старом устройстве: панель **Advanced** → **License** → **Deactivate on this device**\n2. На новом устройстве: активируйте обычным способом\n\n---\n\n## Первый запуск\n\n### Шаг 1: Разрешите доступ к камере\n\nПри первом открытии EsperantAI браузер запросит разрешение на использование камеры. **Разрешите его**.\n\n> Важно: EsperantAI никогда не отправляет ваше видео на сервер. Обработка выполняется на 100% локально на вашем компьютере.\n\n### Шаг 2: Выберите камеру\n\nЕсли у вас несколько камер, выберите нужную из выпадающего списка.\n\n### Шаг 3: Проверьте распознавание\n\nВы увидите своё лицо на левой панели. Когда EsperantAI распознает ваше лицо, индикаторы Yaw / Pitch / Roll начнут показывать значения.\n\n### Шаг 4: Мастер калибровки (Pro+)\n\nЕсли у вас лицензия Pro или Pro+, **Мастер калибровки** запускается автоматически при первом использовании. Он измеряет ваш естественный диапазон движений и устанавливает оптимальную чувствительность. Вы можете повторно запустить его в любое время с помощью кнопки **Recalibrate**.\n\n---\n\n## Подключение стримингового ПО\n\n![Матрица подключения стримингового ПО](assets/manual/02-software-setup.svg)\n\nВсе подключения в этом разделе локальные: EsperantAI связывается с программой трансляции, запущенной на вашем компьютере, через `127.0.0.1`.\n\n### OBS Studio\n\n1. В OBS: **Tools → WebSocket Server Settings**\n2. Включите WebSocket. OBS Studio 28+ уже включает obs-websocket.\n3. В EsperantAI: панель **Connection**\n4. Стриминговое ПО: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (по умолчанию)\n6. Пароль: тот, что вы установили в OBS, если вы включили пароль\n7. Нажмите **Connect**\n\n### Streamlabs Desktop\n\n1. В Streamlabs Desktop: **Settings → Remote Control**\n2. Включите локальное Remote Control\n3. Скопируйте **API Token** с экрана Remote Control\n4. В EsperantAI: стриминговое ПО: **Streamlabs Desktop**\n5. API Token: вставьте его\n6. Порт: `59650` (по умолчанию)\n7. Нажмите **Connect**\n\n### vMix\n\n1. В vMix: **Settings → Web Controller**\n2. Включите Web Controller. Порт по умолчанию: `8088`.\n3. В EsperantAI: стриминговое ПО: **vMix**\n4. Хост: `127.0.0.1`\n5. Порт: `8088`\n6. Нажмите **Connect**\n\n> Примечание: текущий адаптер EsperantAI использует локальный HTTP API vMix. Если Web Controller защищён сетевыми правилами или учетными данными, которые браузер не может использовать, подключение может не сработать.\n\n### PRISM Live Studio\n\n1. Используйте **PRISM Live Studio v4.0.5+**.\n2. Установите вручную плагин `obs-websocket`, совместимый с OBS/PRISM.\n3. Скопируйте его в папку плагинов PRISM согласно официальной инструкции PRISM для OBS-плагинов.\n4. Перезапустите PRISM\n5. Включите WebSocket в **Tools → WebSocket Server Settings**\n6. В EsperantAI: стриминговое ПО: **PRISM Live Studio** (работает так же, как OBS)\n\n> Важное отличие: OBS 28+ уже включает obs-websocket. Для PRISM плагин нужно установить вручную.\n\n### XSplit Broadcaster (бета/расширенная настройка)\n\n1. Установите или включите локальный мост, совместимый с **XSplit XJS / Remote xjs**.\n2. Проверьте, что мост предоставляет локальный WebSocket URL.\n3. В EsperantAI: стриминговое ПО: **XSplit**\n4. URL прокси Remote xjs: `ws://127.0.0.1:5555/xjs` (по умолчанию)\n5. Нажмите **Connect**\n\n> XSplit находится в режиме **бета/расширенной настройки**. Совместимость зависит от установленного локального XJS-моста; расширенные функции могут быть ограничены.\n\n---\n\n## Настройка жестов и сцен\n\nПосле подключения сцены вашего ПО автоматически появятся в выпадающих списках панели **Triggers**.\n\n### Базовое сопоставление\n\n1. Для каждого жеста (например, «Look Left») выберите сцену из выпадающего списка\n2. Когда вы выполните этот жест и удержите его стабильно ~150 мс, EsperantAI переключит сцену в вашем стриминговом ПО\n3. Переключение происходит автоматически и практически мгновенно\n\n### Мультидействие (Pro+)\n\nС лицензией Pro или Pro+ один жест может запускать **несколько действий** одновременно:\n- Переключить сцену + воспроизвести звук + показать оверлей + отправить сообщение в чат\n\n### Включение / отключение категорий\n\nУ каждой категории есть свой флажок «Enable»:\n\n- 🧠 **Повороты головы** (универсальные — включены по умолчанию)\n- 📏 **Расстояние до лица** (приближение/отдаление)\n- 👁️ **Взгляд** (движение только глазами)\n- 😀 **Эмоции** (улыбка, удивление, злость, нейтральное)\n- 👁️‍🗨️ **Двойное моргание**\n- ✋ **Жесты руками** (культурные — отключены по умолчанию)\n\nОтключайте ненужные категории для экономии ресурсов CPU.\n\n---\n\n## Категории жестов\n\n### 🌐 Универсальные (одинаковое значение в любой культуре)\n\n| Жест | Ось | Как активировать |\n|---|---|---|\n| Центр | — | Смотреть прямо, лицо стабильно |\n| Взгляд влево | отрицательный yaw | Повернуть голову влево |\n| Взгляд вправо | положительный yaw | Повернуть голову вправо |\n| Взгляд вверх | отрицательный pitch | Поднять лицо |\n| Взгляд вниз | положительный pitch | Опустить лицо |\n| Наклон влево | отрицательный roll | Наклонить голову к левому плечу |\n| Наклон вправо | положительный roll | Наклонить голову к правому плечу |\n| Приближение | расстояние | Приблизить лицо к камере |\n| Отдаление | расстояние | Отдалить лицо от камеры |\n| Направление взгляда | взгляд | Двигать только глазами (голова в центре) |\n| Улыбка | эмоция=happy | Чётко улыбнуться |\n| Удивление | эмоция=surprise | Сделать удивлённое выражение |\n| Злость | эмоция=angry | Сделать злое выражение |\n| Нейтральное | эмоция=neutral | Расслабленное лицо |\n| Двойное моргание | моргание | Быстро закрыть оба глаза дважды (< 700 мс) |\n\n### ⚠️ Культурные (значение зависит от страны)\n\n| Жест | Значение на Западе | Осторожность в других культурах |\n|---|---|---|\n| 👍 Палец вверх | Одобрение | Ближний Восток / Западная Азия: может быть оскорбительным |\n| ✌️ Знак мира | Мир / победа | Великобритания / Ирландия / Австралия (ладонью внутрь): оскорбление |\n| 🤘 Рога рока | Рок, метал | Италия (ладонью вниз): «корнуто» (оскорбление) |\n| 👌 ОК | ОК / отлично | Бразилия / Турция / Германия: может быть оскорбительным |\n| ✊ Сжатый кулак | Зависит от политического контекста | — |\n| 🖐️ Открытая ладонь | «Стоп» или приветствие | Греция (моундза в чью-то сторону): сильное оскорбление |\n| ☝️ Указание | Указать на что-то | Азия: указывать пальцем невежливо |\n\nEsperantAI отмечает каждый жест соответствующим значком в интерфейсе. Выбирайте, какие из них использовать, исходя из вашей глобальной аудитории.\n\n### 🙏 Гассё (合掌)\n\nОсобый жест: прижмите обе ладони друг к другу перед грудью (как при молитве или поклоне приветствия). Распространён в восточноазиатских культурах как знак уважения или благодарности. Распознаётся с высокой надёжностью с помощью 6 контрольных точек.\n\n---\n\n## Подключение стриминговых платформ\n\nЧтобы EsperantAI мог получать события (пожертвования, подписки, рейды, новые подписчики или Super Chats), подключите платформы, на которых вы ведёте трансляции.\n\n![Статус событий по платформам](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. Создайте Client ID на https://dev.twitch.tv/console\n2. Зарегистрируйте redirect URI: `https://edugame.digital/oauth-callback.html` (или ваш локальный URL)\n3. В EsperantAI: панель **Platform Events** → **Twitch EventSub**\n4. Вставьте ваш Client ID\n5. Нажмите **Connect**\n6. Откроется окно авторизации Twitch. Примите разрешения.\n7. Окно закроется, и вы увидите «Twitch Connected»\n\nEsperantAI использует EventSub WebSocket. Не вставляйте Client Secret в браузер.\n\n### YouTube Live\n\n1. Создайте учётные данные на https://console.cloud.google.com\n2. Включите YouTube Data API v3\n3. Создайте OAuth Client ID (тип: Web Application)\n4. Зарегистрируйте тот же redirect URI, что и для Twitch\n5. В EsperantAI: панель **Platform Events** → **YouTube Live**\n6. Вставьте ваш Client ID и нажмите **Connect**\n\nТребования YouTube: у вас должна быть активная трансляция с доступным чатом, а в проекте Google Cloud должна быть достаточная квота для запросов к чату.\n\n### Kick\n\n1. Создайте приложение на https://kick.com/settings/developer\n2. Зарегистрируйте redirect URI\n3. В EsperantAI: панель **Platform Events** → **Kick**\n4. Вставьте ваш Client ID и нажмите **Connect**\n5. Kick использует OAuth 2.1 с PKCE.\n\nТекущий статус: **бета/ограниченно**. Официальная документация Kick использует webhooks для полных событий. В браузере EsperantAI может обнаруживать только ограниченную часть активности; для подписок, подарков, рейдов или надёжных событий Kick используйте мост вроде StreamElements либо собственный backend/webhook.\n\n### StreamElements (мультиплатформенный мост)\n\nЕсли у вас уже есть аккаунт StreamElements, вы можете использовать его как мост для уведомлений с разных платформ:\n\n1. Перейдите на https://streamelements.com/dashboard/account/channels\n2. Скопируйте ваш JWT Token\n3. В EsperantAI: панель **Platform Events** → **StreamElements**\n4. Вставьте JWT и нажмите **Connect**\n\nХраните этот токен приватно. Относитесь к нему как к паролю от вашей учётной записи StreamElements.\n\n### Trovo\n\nEsperantAI включает технический адаптер для Trovo в коде, основанный на OAuth и WebSocket-сервисе чата Trovo. В текущем публичном интерфейсе пока нет панели подключения Trovo, поэтому это не документируется как обычный пользовательский сценарий. Если вам нужен Trovo сейчас, используйте совместимый мост или дождитесь включения панели Trovo.\n\n---\n\n## Комбо: событие + жест (Продвинутый уровень)\n\nЭто магия EsperantAI: объединение **событий платформы** с **вашими жестами** в качестве подтверждения.\n\n![Поток события и жеста](assets/manual/04-event-gesture-combo.svg)\n\n### Пример: поблагодарить за пожертвование жестом 👍\n\n1. Панель **Event Triggers** → строка «💰 Donation»\n2. ✅ Включите\n3. Сцена: `Thank_You_Scene`\n4. Требуемый жест: `👍 Thumbs up`\n\n**Как это работает в реальном времени**:\n- Поступает пожертвование → EsperantAI показывает «Waiting for gesture...»\n- У вас есть 5 секунд, чтобы показать 👍\n- Если вы покажете → переключается на `Thank_You_Scene` + выполняются другие настроенные действия\n- Если нет → событие автоматически отменяется\n\n### Без требуемого жеста (автоматический триггер)\n\nЕсли вы оставите «Required gesture» как `— none —`, событие вызовет действие немедленно.\n\nПолезно для:\n- Автоматического переключения на праздничную сцену при рейдах\n- Автоматического показа оверлея при новой подписке\n\n---\n\n## Чувствительность и мёртвая зона\n\n### Чувствительность\n\nПороги определяют, насколько выраженным должен быть жест для срабатывания:\n\n- **Yaw**: насколько сильно нужно повернуть голову вбок (по умолчанию: 0,15 рад ≈ 8,6°)\n- **Pitch вверх/вниз**: вертикальный наклон\n- **Roll**: боковой наклон\n\nУвеличьте значения для более выраженных жестов. Уменьшите для большей чувствительности.\n\n### Мёртвая зона (защита от утомления)\n\nЕсли вы почти в центре (yaw < 0,05, pitch < 0,05, roll < 0,08), **НИЧЕГО не срабатывает**. Это позволяет вам двигаться естественно, не активируя триггеры микродвижениями.\n\n### Стабильные кадры\n\n`Stable frames` = количество последовательных кадров, в течение которых жест должен удерживаться перед срабатыванием. По умолчанию: 5 кадров (~150 мс при 30 fps).\n\nУвеличьте, если триггеры срабатывают слишком легко. Уменьшите для более быстрой реакции.\n\n### Перезарядка\n\n`Cooldown (ms)` = минимальное время между переключениями сцен. По умолчанию: 500 мс.\n\nПредотвращает «дрожание» переключателя при быстрых колебаниях.\n\n---\n\n## Горячие клавиши\n\n| Клавиша | Действие |\n|---|---|\n| `Space` | Пауза / Возобновить распознавание |\n| `C` | Ручной переход к сцене CENTER |\n| `R` | Перезагрузить список сцен из ПО |\n| `Esc` | Отключиться |\n\n---\n\n## История триггеров\n\nПанель **Advanced → Trigger History** показывает последние 50 сработавших действий:\n\n- ✓ зелёный = успешно\n- ✗ красный = ошибка\n- · серый = ожидание\n\nПолезно для отслеживания сработавших триггеров без открытия DevTools.\n\n**Экспорт CSV**: скачайте историю для автономного анализа.\n\n**Очистить**: стереть историю (не влияет на остальные настройки).\n\n---\n\n## Смена языка\n\nEsperantAI автоматически определяет язык вашей операционной системы. Чтобы сменить его вручную:\n\n- В правом верхнем углу: выпадающий список языков\n- Выберите нужный язык\n- Интерфейс обновится немедленно\n\nДоступные языки:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\nВсе 15 языков переведены в текущих файлах интерфейса.\n\n---\n\n## Управление лицензией\n\nПанель **Advanced → License**:\n\n- **Просмотр статуса**: Действительна / Недействительна\n- **Просмотр связанного email клиента**\n- **Просмотр последней онлайн-проверки**\n- **Deactivate on this device**: используйте перед сменой ПК или для освобождения слота (из 3 доступных)\n\n---\n\n## Устранение неполадок\n\n### «Activation required» не исчезает после вставки лицензионного ключа\n\n- Убедитесь, что вы скопировали ключ целиком (5 групп по 4 символа, разделённых дефисами)\n- Проверьте интернет-соединение (при первой активации требуется онлайн-проверка)\n- Если вы уже активировали лицензию на 3 устройствах, сначала деактивируйте одно из них\n- Обратитесь в soporte@edugame.digital, если проблема сохраняется\n\n### «Searching for face...» не исчезает, хотя ваше лицо видно\n\n- Улучшите освещение: ваше лицо должно быть хорошо освещено\n- Приблизьтесь к камере (оптимально 40–80 см)\n- Закройте другие вкладки, использующие GPU (Chrome может ограничивать GPU, если их слишком много)\n- Если в Chrome активен Memory Saver, отключите его для этой вкладки\n\n### Сцены не появляются в выпадающих списках\n\n- Убедитесь, что вы подключены к стриминговому ПО (зелёный значок «Connected»)\n- Нажмите `R` для перезагрузки списка сцен\n- Если по-прежнему пусто, отключитесь и подключитесь заново\n- В vMix проверьте, что Web Controller включён и доступен по адресу `http://127.0.0.1:8088/api/`\n- В PRISM проверьте, что плагин obs-websocket установлен и включён\n- В XSplit проверьте, что локальный XJS-мост запущен\n\n### Переключение сцен происходит без ваших жестов\n\n- Увеличьте порог yaw / pitch / roll на панели **Sensitivity**\n- Увеличьте `Stable frames` с 5 до 8–10\n- Убедитесь, что мёртвая зона настроена (yaw 0,05, pitch 0,05, roll 0,08)\n- Проверьте, что в кадре нет других людей (несколько лиц могут вызывать нестабильность)\n\n### Задержка распознавания\n\n- Закройте ресурсоёмкие приложения (игры, видеомонтаж)\n- Убедитесь, что используется выделенный GPU, если он есть (а не встроенный)\n- Снизьте разрешение камеры, если оно 4K (1080p оптимально для распознавания)\n\n### OBS не реагирует, хотя EsperantAI показывает «Scene changed»\n\n- Убедитесь, что имя сцены в выпадающем списке ТОЧНО совпадает с именем в OBS (с учётом регистра)\n- Убедитесь, что сцена не находится в другой коллекции сцен (Scene Collection)\n- Проверьте панель **Trigger History** — если она показывает ✗ красный, есть конкретная ошибка\n\n### Ошибка «OBS unreachable — Connect manually»\n\n- Убедитесь, что OBS запущен\n- Убедитесь, что WebSocket включён в OBS\n- Если вы установили пароль в OBS, он должен совпадать точно\n- Некоторые антивирусы блокируют порт 4455 — добавьте исключение\n\n### Twitch или YouTube не подключаются\n\n- Проверьте, что redirect URI в консоли платформы точно совпадает с URL `oauth-callback.html`\n- Разрешите всплывающие окна для домена, где вы используете EsperantAI\n- В Twitch используйте только Client ID; не вставляйте Client Secret\n- В YouTube проверьте, что YouTube Data API v3 включена и что есть активная трансляция\n\n### Kick показывает не все события\n\nKick работает в браузере в режиме бета/ограниченной поддержки. Полные события Kick официально передаются через webhooks; используйте StreamElements или собственный backend, если вам нужны надёжные подписки, подарки или рейды.\n\n---\n\n## Конфиденциальность\n\n### Чего EsperantAI НЕ делает\n\n- ❌ НЕ отправляет ваше видео на сервер\n- ❌ НЕ сохраняет ваше видео или снимки\n- ❌ НЕ собирает биометрическую информацию удалённо\n- ❌ НЕ передаёт данные рекламодателям или третьим лицам\n\n### Что он ОБРАБАТЫВАЕТ\n\n- ✅ Локальное распознавание лиц в вашем браузере (Human.js + WebGL)\n- ✅ Локальные подключения к OBS / Streamlabs / vMix / PRISM / XSplit (loopback `127.0.0.1`)\n- ✅ Периодическая проверка лицензионного ключа (каждые 7 дней)\n- ✅ При подключении Twitch/YouTube/Kick/StreamElements: токены платформ в локальном хранилище или sessionStorage браузера\n\nПодробности в `docs/PRIVACY.html`.\n\n---\n\n## Поддержка\n\n- 📧 Электронная почта: **soporte@edugame.digital**\n- 🌐 Web: https://edugame.digital\n- 📚 Техническая документация: https://github.com/salazarjoelo/EsperantAI\n\nВремя ответа:\n- Общие вопросы: 24–72 часа\n- Технические ошибки: 1–3 рабочих дня\n\n---\n\n*Последнее обновление: 2026-05-20. Версия: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'ar-SA': { name: 'العربية (RTL)', flag: '🇸🇦', content: "<div dir=\"rtl\">\n\n# EsperantAI — دليل المستخدم\n\n> **إيماءات صادقة.** تحكّم في برامج البث باستخدام وجهك ويديك، بدون أي عتاد إضافي مخصّص.\n\n**الإصدار**: 3.0 · **اللغة**: العربية (المجموع: 15 لغة مدعومة)\n\n**التحقق التقني**: تمت المراجعة مقارنةً بالوثائق الرسمية المتاحة حتى **20 مايو 2026** لكل من OBS Studio وStreamlabs Desktop وvMix وPRISM Live Studio وXSplit وTwitch وYouTube Live وKick وTrovo وStreamElements. التفاصيل: [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md).\n\n---\n\n## جدول المحتويات\n\n1. [ما هو EsperantAI؟](#ما-هو-esperantai)\n2. [الحد الأدنى من المتطلبات](#الحد-الأدنى-من-المتطلبات)\n3. [الشراء والتفعيل](#الشراء-والتفعيل)\n4. [الاستخدام الأول](#الاستخدام-الأول)\n5. [ربط برامج البث](#ربط-برامج-البث)\n6. [تهيئة الإيماءات والمشاهد](#تهيئة-الإيماءات-والمشاهد)\n7. [فئات الإيماءات](#فئات-الإيماءات)\n8. [ربط منصات البث](#ربط-منصات-البث)\n9. [مزيج الحدث + الإيماءة (متقدم)](#مزيج-الحدث--الإيماءة-متقدم)\n10. [الحساسية والمنطقة الميتة](#الحساسية-والمنطقة-الميتة)\n11. [اختصارات لوحة المفاتيح](#اختصارات-لوحة-المفاتيح)\n12. [سجل المشغّلات](#سجل-المشغلات)\n13. [تغيير اللغة](#تغيير-اللغة)\n14. [إدارة الترخيص](#إدارة-الترخيص)\n15. [استكشاف الأخطاء وإصلاحها](#استكشاف-الأخطاء-وإصلاحها)\n16. [الخصوصية](#الخصوصية)\n17. [الدعم الفني](#الدعم-الفني)\n\n---\n\n## ما هو EsperantAI؟\n\nEsperantAI هو **تطبيق ويب** يستخدم الذكاء الاصطناعي للكشف عن إيماءات وجهك ويديك في الوقت الفعلي، ويحوّلها إلى أوامر لبرنامج البث لديك. تتم معالجة فيديو الكاميرا محلياً في متصفحك.\n\n![تدفق EsperantAI المحلي](assets/manual/01-esperantai-flow.svg)\n\nيعمل مع برامج البث التالية:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (بيتا / متقدم)\n\nويمكنه أيضاً استقبال أحداث من المنصات لدمجها مع إيماءاتك:\n\n- **Twitch**: دعم مباشر عبر EventSub WebSocket.\n- **YouTube Live**: دعم مباشر عبر YouTube Data API v3؛ يتطلب بثاً مباشراً نشطاً وحصة API متاحة.\n- **Kick**: دعم بيتا / محدود داخل المتصفح. أحداث Kick الكاملة تحتاج إلى backend/webhooks رسمية أو جسر.\n- **StreamElements**: جسر متعدد المنصات باستخدام token/JWT من حسابك.\n- **Trovo**: يوجد محوّل تقني في الكود، لكن لوحة الاتصال العامة غير معروضة بعد في الواجهة الحالية.\n\n### لماذا «إيماءات صادقة»؟\n\nتعبيرات الوجه الأساسية ودوران الرأس **عالمية في جميع الثقافات البشرية** (بول إيكمان، 1972). إنها لا تكذب ولا تختلف باختلاف الموقع الجغرافي. يُطلق EsperantAI على هذه الإيماءات اسم «🌐 عالمية» ويميّزها عن الإيماءات «⚠️ ثقافية» (الإشارات اليدوية)، التي قد يختلف معناها حسب البلد.\n\nأنت من يقرر أي الإيماءات تستخدم بناءً على جمهورك.\n\n---\n\n## الحد الأدنى من المتطلبات\n\n### الأجهزة\n\n- **أي كاميرا ويب USB** (يُنصح بدقة 1080p أو أعلى)\n- **CPU**: أي معالج بأربع نوى أو أكثر من السنوات الخمس الأخيرة\n- **RAM**: 8 غيغابايت كحد أدنى. يُنصح بـ 16 غيغابايت في حال البث المتزامن.\n- **GPU**: أي وحدة تدعم WebGL (حتى وحدات GPU المدمجة الحديثة تعمل)\n\n### البرمجيات\n\n- **نظام التشغيل**: Windows 10/11 أو macOS 12+ أو Linux بنواة حديثة\n- **المتصفح**: Chrome 90+ أو Edge 90+ أو Firefox 100+\n- **برامج البث** (واحد على الأقل): OBS Studio 28+ أو Streamlabs Desktop أو vMix أو PRISM أو XSplit\n\n### الإنترنت\n\n- مطلوب **لتفعيل الترخيص** وكل **7 أيام** لإعادة التحقق\n- يعمل **حتى 7 أيام بدون اتصال** (فترة السماح)\n\n---\n\n## الشراء والتفعيل\n\n1. تفضّل بزيارة **https://edugame.digital**\n2. انقر على **«شراء الترخيص»**\n3. أتمّم الدفع عبر LemonSqueezy (بطاقة، PayPal، إلخ)\n4. ستتلقّى بريداً إلكترونياً يحتوي على:\n   - **مفتاح الترخيص** الخاص بك (الصيغة: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - رابط لاستخدام EsperantAI\n5. افتح EsperantAI في المتصفح\n6. ستظهر شاشة التفعيل. الصق مفتاح الترخيص\n7. انقر على **«تفعيل الترخيص»**\n8. تم! 🎉\n\n### كم جهازاً؟\n\nيمكن تفعيل ترخيص واحد على **ما يصل إلى 3 أجهزة**. لنقل الترخيص إلى جهاز آخر:\n\n1. على الجهاز القديم: لوحة **متقدم** ← **الترخيص** ← **إلغاء التفعيل على هذا الجهاز**\n2. على الجهاز الجديد: فعّل بالطريقة المعتادة\n\n---\n\n## الاستخدام الأول\n\n### الخطوة 1: السماح بالوصول إلى الكاميرا\n\nعند فتح EsperantAI لأول مرة، سيطلب المتصفح إذن استخدام الكاميرا. **اسمح بذلك**.\n\n> مهم: لا يرسل EsperantAI أبداً الفيديو الخاص بك إلى أي خادم. تتم المعالجة بنسبة 100% محلياً على جهازك.\n\n### الخطوة 2: اختيار الكاميرا\n\nإذا كانت لديك أكثر من كاميرا واحدة، اختر الكاميرا المطلوبة من القائمة المنسدلة.\n\n### الخطوة 3: التحقق من الكشف\n\nسترى وجهك في اللوحة اليسرى. عندما يكتشف EsperantAI وجهك، ستبدأ مؤشرات Yaw / Pitch / Roll بعرض القيم.\n\n### الخطوة 4: معالج المعايرة (Pro+)\n\nإذا كان لديك ترخيص Pro أو Pro+، يُشغَّل **معالج المعايرة** تلقائياً عند الاستخدام الأول. يقيس نطاق حركتك الطبيعي ويضبط الحساسية المثلى. يمكنك إعادة تشغيله في أي وقت من زر **إعادة المعايرة**.\n\n---\n\n## ربط برامج البث\n\n![مصفوفة ربط برامج البث](assets/manual/02-software-setup.svg)\n\nكل الاتصالات في هذا القسم محلية: يتواصل EsperantAI مع برنامج البث الذي يعمل على جهازك نفسه عبر `127.0.0.1`.\n\n### OBS Studio\n\n1. في OBS: **Tools → WebSocket Server Settings**\n2. فعّل خادم WebSocket. يتضمن OBS Studio 28+ obs-websocket مسبقاً.\n3. في EsperantAI: لوحة **الاتصال**\n4. برامج البث: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (الافتراضي)\n6. كلمة المرور: أدخل كلمة المرور التي ضبطتها في OBS إذا فعّلت الحماية بكلمة مرور\n7. انقر **اتصال**\n\n### Streamlabs Desktop\n\n1. في Streamlabs: **Settings → Remote Control**\n2. فعّل Remote Control\n3. سجّل API Token\n4. في EsperantAI: برامج البث: **Streamlabs Desktop**\n5. API Token: الصقه\n6. المنفذ: `59650` (الافتراضي)\n7. انقر **اتصال**\n\n### vMix\n\n1. في vMix: **Settings → Web Controller**\n2. فعّل Web Controller. المنفذ الافتراضي: `8088`.\n3. في EsperantAI: برامج البث: **vMix**\n4. المضيف: `127.0.0.1`\n5. المنفذ: `8088`\n6. انقر **اتصال**\n\n> ملاحظة: يستخدم محوّل EsperantAI الحالي واجهة HTTP المحلية في vMix. إذا كان Web Controller محمياً بقواعد شبكة أو بيانات اعتماد لا يدعمها المتصفح، فقد يفشل الاتصال.\n\n### PRISM Live Studio\n\n1. استخدم **PRISM Live Studio v4.0.5+**.\n2. ثبّت يدوياً إضافة `obs-websocket` المتوافقة مع OBS/PRISM.\n3. انسخها إلى مجلد إضافات PRISM وفق دليل PRISM الرسمي لإضافات OBS.\n4. أعِد تشغيل PRISM\n5. فعّل WebSocket من **Tools → WebSocket Server Settings**\n6. في EsperantAI: برامج البث: **PRISM Live Studio** (يعمل بنفس طريقة OBS)\n\n> فرق مهم: OBS 28+ يتضمن obs-websocket مسبقاً. أما PRISM فيتطلب تثبيت الإضافة يدوياً.\n\n### XSplit Broadcaster (بيتا / متقدم)\n\n1. ثبّت أو فعّل جسراً محلياً متوافقاً مع **XSplit XJS / Remote xjs**.\n2. تأكد من أن الجسر يعرّض عنوان WebSocket محلياً.\n3. في EsperantAI: برامج البث: **XSplit**\n4. Remote xjs Proxy URL: `ws://127.0.0.1:5555/xjs` (الافتراضي)\n5. انقر **اتصال**\n\n> XSplit في حالة **بيتا / متقدم**. يعتمد التوافق على جسر XJS المحلي المثبّت؛ وقد تكون الميزات المتقدمة محدودة.\n\n---\n\n## تهيئة الإيماءات والمشاهد\n\nبعد الاتصال، ستظهر مشاهد البرنامج الفعلية تلقائياً في القوائم المنسدلة بلوحة **المشغّلات**.\n\n### الربط الأساسي\n\n1. لكل إيماءة (مثلاً «النظر يساراً») اختر مشهداً من القائمة المنسدلة\n2. عند تنفيذ الإيماءة والحفاظ عليها مستقرة لمدة ~150 مللي ثانية، سيبدّل EsperantAI المشهد في برنامج البث\n3. التبديل تلقائي وشبه فوري\n\n### الإجراءات المتعددة (Pro+)\n\nبترخيص Pro أو Pro+، يمكن لإيماءة واحدة تشغيل **إجراءات متعددة** في آن واحد:\n- تبديل المشهد + تشغيل صوت + عرض تراكب + إرسال رسالة في الدردشة\n\n### تفعيل / تعطيل الفئات\n\nلكل فئة مربع اختيار «تفعيل» خاص بها:\n\n- 🧠 **دوران الرأس** (عالمي — مفعّل افتراضياً)\n- 📏 **مسافة الوجه** (اقتراب/ابتعاد)\n- 👁️ **اتجاه النظر** (تحريك العينين فقط)\n- 😀 **المشاعر** (ابتسامة، مفاجأة، غضب، حياد)\n- 👁️‍🗨️ **الرمش المزدوج**\n- ✋ **إيماءات اليد** (ثقافية — معطّلة افتراضياً)\n\nعطّل الفئات التي لا تحتاجها لتوفير موارد CPU.\n\n---\n\n## فئات الإيماءات\n\n### 🌐 عالمية (نفس المعنى في أي ثقافة)\n\n| الإيماءة | المحور | طريقة التنشيط |\n|---|---|---|\n| المركز | — | النظر إلى الأمام مباشرة، الوجه مستقر |\n| النظر يساراً | yaw سلبي | إدارة الرأس إلى اليسار |\n| النظر يميناً | yaw موجب | إدارة الرأس إلى اليمين |\n| النظر لأعلى | pitch سلبي | رفع الوجه |\n| النظر لأسفل | pitch موجب | خفض الوجه |\n| الميل يساراً | roll سلبي | إمالة الرأس نحو الكتف الأيسر |\n| الميل يميناً | roll موجب | إمالة الرأس نحو الكتف الأيمن |\n| الاقتراب | المسافة | تقريب الوجه من الكاميرا |\n| الابتعاد | المسافة | إبعاد الوجه عن الكاميرا |\n| اتجاه النظر | النظر | تحريك العينين فقط (الرأس في المركز) |\n| الابتسام | مشاعر=happy | الابتسام بوضوح |\n| الدهشة | مشاعر=surprise | إظهار الدهشة |\n| الغضب | مشاعر=angry | إظهار الغضب |\n| الحياد | مشاعر=neutral | وجه مرتاح |\n| الرمش المزدوج | الرمش | إغلاق العينين مرتين بسرعة (< 700 مللي ثانية) |\n\n### ⚠️ ثقافية (المعنى يختلف حسب البلد)\n\n| الإيماءة | المعنى الغربي | تحذير في ثقافات أخرى |\n|---|---|---|\n| 👍 الإبهام لأعلى | الموافقة | **الشرق الأوسط / غرب آسيا: إيماءة مسيئة جداً! في منطقة الشرق الأوسط، تعتبر إيماءة الإبهام لأعلى (👍) إهانة كبيرة ومسيئة، مشابهة لرفع الإصبع الأوسط في الثقافة الغربية. يُحذَّر بشدة من استخدامها أمام جمهور عربي.** |\n| ✌️ علامة السلام | السلام / النصر | المملكة المتحدة / أيرلندا / أستراليا (الكف للداخل): إهانة |\n| 🤘 قرون الروك | موسيقى الروك | إيطاليا (الكف للأسفل): «كورنوتو» (إهانة) |\n| 👌 علامة الموافقة | حسناً / ممتاز | البرازيل / تركيا / ألمانيا: قد تكون مسيئة |\n| ✊ القبضة المغلقة | تختلف حسب السياق السياسي | — |\n| 🖐️ الكف المفتوح | «توقف» أو تحية | اليونان (مونتزا نحو شخص): إهانة شديدة |\n| ☝️ الإشارة | الإشارة إلى شيء | آسيا: الإشارة بالأصبع تعتبر وقاحة |\n\nيُعلِّم EsperantAI كل إيماءة بالشارة المناسبة في الواجهة. اختر الإيماءات المناسبة بناءً على جمهورك العالمي.\n\n### 🙏 غاشّو (合掌)\n\nإيماءة خاصة: اضغط براحتي اليدين معاً أمام صدرك (كما في الصلاة أو انحناءة التحية). شائعة في ثقافات شرق آسيا كعلامة على الاحترام أو الامتنان. يتم الكشف عنها بموثوقية عالية باستخدام 6 نقاط مرجعية.\n\n---\n\n## ربط منصات البث\n\nلكي يتلقّى EsperantAI الأحداث (التبرعات، الاشتراكات، الغارات، المتابعات أو Super Chats)، اربط المنصات التي تبث عليها.\n\n![حالة الأحداث حسب المنصة](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. أنشئ Client ID على https://dev.twitch.tv/console\n2. سجّل redirect URI: `https://edugame.digital/oauth-callback.html` (أو عنوانك المحلي)\n3. في EsperantAI: لوحة **أحداث المنصة** ← **Twitch EventSub**\n4. الصق Client ID الخاص بك\n5. انقر **اتصال**\n6. ستفتح نافذة تفويض Twitch. اقبل الأذونات.\n7. ستُغلق النافذة وسترى «Twitch متصل»\n\nيستخدم EsperantAI EventSub WebSocket. لا تلصق أي Client Secret في المتصفح.\n\n### YouTube Live\n\n1. أنشئ بيانات اعتماد على https://console.cloud.google.com\n2. فعّل YouTube Data API v3\n3. أنشئ OAuth Client ID (النوع: Web Application)\n4. سجّل نفس redirect URI المستخدم مع Twitch\n5. في EsperantAI: لوحة **أحداث المنصة** ← **YouTube Live**\n6. الصق Client ID الخاص بك وانقر **اتصال**\n\nمتطلبات YouTube: يجب أن يكون لديك بث مباشر نشط مع دردشة متاحة، ويجب أن يملك مشروع Google Cloud حصة API كافية للاستعلام عن الدردشة.\n\n### Kick\n\n1. أنشئ تطبيقاً على https://kick.com/settings/developer\n2. سجّل redirect URI\n3. في EsperantAI: لوحة **أحداث المنصة** ← **Kick**\n4. الصق Client ID الخاص بك وانقر **اتصال**\n5. يستخدم Kick بروتوكول OAuth 2.1 مع PKCE.\n\nالحالة الحالية: **بيتا / محدود**. تستخدم وثائق Kick الرسمية webhooks للأحداث الكاملة. داخل المتصفح لا يستطيع EsperantAI إلا اكتشاف جزء محدود من النشاط؛ للاشتراكات أو الهدايا أو الغارات أو أحداث Kick الموثوقة استخدم جسراً مثل StreamElements أو backend/webhook.\n\n### StreamElements (جسر متعدد المنصات)\n\nإذا كان لديك حساب StreamElements بالفعل، يمكنك استخدامه كجسر لتنبيهات منصات متعددة:\n\n1. انتقل إلى https://streamelements.com/dashboard/account/channels\n2. انسخ JWT Token الخاص بك\n3. في EsperantAI: لوحة **أحداث المنصة** ← **StreamElements**\n4. الصق JWT وانقر **اتصال**\n\nاحتفظ بهذا الرمز سرياً. عامله مثل كلمة مرور حسابك في StreamElements.\n\n### Trovo\n\nيتضمن EsperantAI محوّلاً تقنياً لـ Trovo في الكود، مبنياً على OAuth وخدمة دردشة Trovo عبر WebSocket. لكن الواجهة العامة الحالية لا تعرض بعد لوحة اتصال Trovo، لذلك لا يوثَّق كمسار استخدام عادي. إذا كنت تحتاج Trovo الآن، استخدم جسراً متوافقاً أو انتظر تفعيل لوحة Trovo.\n\n---\n\n## مزيج الحدث + الإيماءة (متقدم)\n\nهذا هو سحر EsperantAI: الجمع بين **أحداث المنصة** و**إيماءاتك** كتأكيد.\n\n![تدفق الحدث مع الإيماءة](assets/manual/04-event-gesture-combo.svg)\n\n### مثال: شكر المتبرّعين بإيماءة الإبهام\n\n1. لوحة **مشغّلات الأحداث** ← صف «💰 تبرع»\n2. ✅ فعّل\n3. المشهد: `مشهد_الشكر`\n4. الإيماءة المطلوبة: `👍 الإبهام لأعلى`\n\n**التدفق المباشر**:\n- يصل تبرّع ← يعرض EsperantAI «بانتظار الإيماءة...»\n- لديك 5 ثوانٍ لتنفيذ 👍\n- إذا نفّذتها ← يبدّل إلى `مشهد_الشكر` + ينفّذ الإجراءات الأخرى المُعدَّة\n- إذا لم تنفّذها ← يتم رفضه تلقائياً\n\n### بدون إيماءة مطلوبة (تشغيل تلقائي)\n\nإذا تركت «الإيماءة المطلوبة» كخيار `— لا شيء —`، سيُنفَّذ الإجراء فوراً عند ورود الحدث.\n\nمفيد لـ:\n- التبديل التلقائي إلى مشهد الاحتفال عند وصول الغارات\n- عرض التراكب تلقائياً عندما يشترك شخص جديد\n\n---\n\n## الحساسية والمنطقة الميتة\n\n### الحساسية\n\nتتحكم العتبات في حجم الإيماءة اللازم لتشغيل المشغّل:\n\n- **Yaw**: مقدار إدارة الرأس جانبياً (الافتراضي: 0.15 راد ≈ 8.6°)\n- **Pitch لأعلى/لأسفل**: الميل العمودي\n- **Roll**: الميل الجانبي\n\nزيّد القيم لإيماءات أكثر وضوحاً. خفّضها لحساسية أكبر.\n\n### المنطقة الميتة (مقاومة الإرهاق)\n\nإذا كنت في وضع قريب من المركز (yaw أقل من 0.05، pitch أقل من 0.05، roll أقل من 0.08)، **لا يُنشَّط أي شيء**. هذا يسمح لك بالتحرك طبيعياً دون أن تُفعّل الحركات الدقيقة أي مشغّلات.\n\n### الإطارات المستقرة\n\n`الإطارات المستقرة` = عدد الإطارات المتتالية التي يجب الحفاظ على الإيماءة خلالها قبل التشغيل. الافتراضي: 5 إطارات (~150 مللي ثانية بمعدل 30 إطاراً/ثانية).\n\nزيّد القيمة إذا كانت المشغّلات تعمل بسهولة مفرطة. خفّضها للاستجابة الأسرع.\n\n### فترة التهدئة\n\n`فترة التهدئة (ms)` = الحد الأدنى من الوقت بين تغييرات المشاهد. الافتراضي: 500 مللي ثانية.\n\nيمنع التبديل «العصبي» إذا تذبذبت بسرعة بين الإيماءات.\n\n---\n\n## اختصارات لوحة المفاتيح\n\n| المفتاح | الإجراء |\n|---|---|\n| `مسافة` | إيقاف مؤقت / استئناف الكشف |\n| `C` | الانتقال يدوياً إلى مشهد CENTER |\n| `R` | إعادة تحميل قائمة المشاهد من البرنامج |\n| `Esc` | قطع الاتصال |\n\n---\n\n## سجل المشغّلات\n\nتعرض لوحة
