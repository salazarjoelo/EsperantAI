*\n4. Software de streaming: **OBS Studio**\n5. URL do WebSocket: `ws://127.0.0.1:4455` (padrão)\n6. Senha: a que você configurou no OBS, se tiver ativado senha\n7. Clique em **Conectar**\n\n### Streamlabs Desktop\n\n1. No Streamlabs Desktop: **Settings → Remote Control**\n2. Ative o controle remoto local\n3. Copie o **API Token** na tela de Remote Control\n4. No EsperantAI: Software de streaming: **Streamlabs Desktop**\n5. Token de API: cole o token\n6. Porta: `59650` (padrão)\n7. Clique em **Conectar**\n\n### vMix\n\n1. No vMix: **Settings → Web Controller**\n2. Ative o Web Controller. Porta padrão: `8088`.\n3. No EsperantAI: Software de streaming: **vMix**\n4. Host: `127.0.0.1`\n5. Porta: `8088`\n6. Clique em **Conectar**\n\n> Observação: o adaptador atual do EsperantAI usa a API HTTP local do vMix. Se você protegeu o Web Controller com regras de rede ou credenciais incompatíveis com o navegador, a conexão pode falhar.\n\n### PRISM Live Studio\n\n1. Use **PRISM Live Studio v4.0.5+**.\n2. Instale manualmente o plugin `obs-websocket` compatível com OBS/PRISM.\n3. Copie-o para a pasta de plugins do PRISM seguindo o guia oficial da PRISM para plugins OBS.\n4. Reinicie o PRISM\n5. Ative o WebSocket em **Ferramentas → Configurações do servidor WebSocket**\n6. No EsperantAI: Software de streaming: **PRISM Live Studio** (funciona como o OBS)\n\n> Diferença importante: o OBS 28+ já inclui obs-websocket. O PRISM exige instalação manual do plugin.\n\n### XSplit Broadcaster (beta)\n\n1. Instale ou habilite uma ponte local compatível com **XSplit XJS / Remote xjs**.\n2. Verifique se a ponte expõe uma URL WebSocket local.\n3. No EsperantAI: Software de streaming: **XSplit**\n4. URL do proxy Remote xjs: `ws://127.0.0.1:5555/xjs` (padrão)\n5. Clique em **Conectar**\n\n> O XSplit está em **beta/avançado**. A compatibilidade depende da ponte XJS local instalada; recursos avançados podem estar limitados.\n\n---\n\n## Configure gestos e cenas\n\nDepois de conectado, as cenas reais do seu software aparecerão automaticamente nos menus suspensos do painel **Gatilhos**.\n\n### Mapeamento básico\n\n1. Para cada gesto (por exemplo, \"Olhar para a esquerda\"), escolha uma cena no menu suspenso\n2. Quando você fizer esse gesto e o mantiver estável por ~150ms, o EsperantAI mudará para essa cena no seu software de streaming\n3. A mudança é automática e praticamente instantânea\n\n### Multi-ação (Pro+)\n\nCom uma licença Pro ou Pro+, um gesto pode acionar **múltiplas ações** ao mesmo tempo:\n- Mudar cena + reproduzir som + mostrar overlay + enviar mensagem ao chat\n\n### Ativar / desativar categorias\n\nCada categoria tem sua própria caixa \"Ativar\":\n\n- 🧠 **Rotação da cabeça** (universal — ativada por padrão)\n- 📏 **Distância facial** (aproxime-se ou afaste-se)\n- 👁️ **Olhar** (mova só os olhos)\n- 😀 **Emoções** (sorriso, surpresa, raiva, neutro)\n- 👁️‍🗨️ **Piscada dupla**\n- ✋ **Gestos com as mãos** (cultural — desativados por padrão)\n\nDesative as categorias de que você não precisa para economizar CPU.\n\n---\n\n## Categorias de gestos\n\n### 🌐 Universais (mesmo significado em qualquer cultura)\n\n| Gesto | Eixo | Como ativar |\n|---|---|---|\n| Centro | — | Olhando para a frente, rosto estável |\n| Olhar para a esquerda | yaw negativo | Vire a cabeça para a sua esquerda |\n| Olhar para a direita | yaw positivo | Vire a cabeça para a sua direita |\n| Olhar para cima | pitch negativo | Levante o rosto |\n| Olhar para baixo | pitch positivo | Abaixe o rosto |\n| Inclinar para a esquerda | roll negativo | Incline a cabeça em direção ao ombro esquerdo |\n| Inclinar para a direita | roll positivo | Incline a cabeça em direção ao ombro direito |\n| Aproximar-se | distância | Aproxime-se da câmera |\n| Afastar-se | distância | Afaste-se da câmera |\n| Olhar direcional | olhar | Mova só os olhos (cabeça centralizada) |\n| Sorriso | emoção=feliz | Sorria claramente |\n| Surpresa | emoção=surpresa | Mostre surpresa |\n| Raiva | emoção=raiva | Mostre raiva |\n| Neutro | emoção=neutro | Rosto relaxado |\n| Piscada dupla | piscada | Feche os dois olhos duas vezes rapidamente (< 700ms) |\n\n### ⚠️ Culturais (o significado varia conforme o país)\n\n| Gesto | Significado ocidental | Cuidado em outras culturas |\n|---|---|---|\n| 👍 Joinha | Aprovação | Oriente Médio / Ásia Ocidental: pode ser ofensivo |\n| ✌️ Paz | Paz / vitória | Reino Unido / Irlanda / Austrália (palma para dentro): insulto |\n| 🤘 Chifres do rock | Rock / metal | Itália (palma para baixo): \"cornuto\" (insulto) |\n| 👌 OK | OK / perfeito | Brasil / Turquia / Alemanha: pode ser ofensivo |\n| ✊ Punho fechado | Varia conforme o contexto político | — |\n| 🖐️ Palma aberta | \"Pare\" ou saudação | Grécia (mountza em direção a alguém): insulto forte |\n| ☝️ Apontar | Indicar | Ásia: apontar com o dedo é falta de educação |\n\nO EsperantAI marca cada gesto com o respectivo selo na interface. Escolha quais usar de acordo com o seu público global.\n\n### 🙏 Gassho (合掌)\n\nUm gesto especial: junte as duas palmas à frente do peito (como em uma oração ou reverência de saudação). Comum em culturas do Leste Asiático como sinal de respeito ou gratidão. É detectado com alta confiabilidade por meio de 6 verificações de pontos de referência.\n\n---\n\n## Conecte plataformas de streaming\n\nPara que o EsperantAI receba eventos (doações, inscrições, raids, follows ou Super Chats), conecte as plataformas onde você faz streaming.\n\n![Estado de eventos por plataforma](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. Crie um Client ID em https://dev.twitch.tv/console\n2. Registre a URI de redirecionamento: `https://edugame.digital/oauth-callback.html` (ou sua URL local)\n3. No EsperantAI: painel **Eventos de plataforma** → **Twitch EventSub**\n4. Cole seu Client ID\n5. Clique em **Conectar**\n6. Uma janela de autorização da Twitch será aberta. Aceite as permissões.\n7. A janela será fechada e você verá \"Twitch conectado\"\n\nO EsperantAI usa EventSub WebSocket. Não cole nenhum Client Secret no navegador.\n\n### YouTube Live\n\n1. Crie credenciais em https://console.cloud.google.com\n2. Ative a YouTube Data API v3\n3. Crie um OAuth Client ID (tipo: Aplicação web)\n4. Registre a mesma URI de redirecionamento usada na Twitch\n5. No EsperantAI: painel **Eventos de plataforma** → **YouTube Live**\n6. Cole seu Client ID e clique em **Conectar**\n\nRequisitos do YouTube: você precisa ter uma live ativa com chat disponível, e seu projeto no Google Cloud deve ter quota suficiente para consultar o chat.\n\n### Kick\n\n1. Crie uma aplicação no portal de desenvolvedores da Kick.\n2. Registre a URI de redirecionamento\n3. No EsperantAI: painel **Eventos de plataforma** → **Kick**\n4. Cole seu Client ID e clique em **Conectar**\n5. A Kick usa OAuth 2.1 com PKCE.\n\nEstado atual: **beta/limitado**. A documentação oficial da Kick usa webhooks para eventos completos. No navegador, o EsperantAI só consegue detectar uma parte limitada da atividade; para inscrições, presentes, raids ou eventos confiáveis da Kick, use uma ponte como StreamElements ou um backend/webhook.\n\n### StreamElements (ponte multiplataforma)\n\nSe você já tem uma conta no StreamElements, pode usá-lo como ponte para alertas de várias plataformas:\n\n1. Acesse https://streamelements.com/dashboard/account/channels\n2. Copie seu JWT Token\n3. No EsperantAI: painel **Eventos de plataforma** → **StreamElements**\n4. Cole o JWT e clique em **Conectar**\n\nMantenha esse token privado. Trate-o como uma senha da sua conta do StreamElements.\n\n### Trovo\n\nO EsperantAI inclui um adaptador técnico para Trovo no código, baseado em OAuth e no serviço de chat WebSocket da Trovo. Na interface pública atual ainda não há um painel de conexão Trovo, por isso ele não é documentado como fluxo normal de usuário. Se você precisa de Trovo agora, use uma ponte compatível ou aguarde a ativação do painel Trovo.\n\n---\n\n## Combinações de evento + gesto (Avançado)\n\nEsta é a mágica do EsperantAI: combinar **eventos de plataforma** com **seus gestos** como confirmação.\n\n![Fluxo de evento mais gesto](assets/manual/04-event-gesture-combo.svg)\n\n### Exemplo: agradecer doações com um joinha\n\n1. Painel **Gatilhos de eventos** → linha \"💰 Doação\"\n2. ✅ Ative\n3. Cena: `Cena_Obrigado`\n4. Gesto obrigatório: `👍 Joinha`\n\n**Fluxo ao vivo**:\n- Chega uma doação → o EsperantAI mostra \"Aguardando gesto...\"\n- Você tem 5 segundos para fazer 👍\n- Se fizer → muda para `Cena_Obrigado` + executa qualquer outra ação configurada\n- Se não fizer → é descartado automaticamente\n\n### Sem gesto obrigatório (acionamento automático)\n\nSe você deixar \"Gesto obrigatório\" como `— nenhum —`, o evento aciona a ação imediatamente.\n\nÚtil para:\n- Mudar automaticamente para a cena de celebração quando chegam raids\n- Mostrar automaticamente um overlay quando alguém se inscreve\n\n---\n\n## Sensibilidade e zona morta\n\n### Sensibilidade\n\nOs limites controlam o quanto um gesto precisa ser amplo para disparar:\n\n- **Yaw**: quanto você deve virar a cabeça para os lados (padrão: 0,15 rad ≈ 8,6°)\n- **Pitch para cima/baixo**: inclinação vertical\n- **Roll**: inclinação lateral\n\nAumente os valores para exigir gestos mais marcados. Diminua para maior sensibilidade.\n\n### Zona morta (antifadiga)\n\nSe você estiver quase centralizado (yaw < 0,05, pitch < 0,05, roll < 0,08), **NADA dispara**. Isso permite que você se mova de forma natural sem que micromovimentos ativem gatilhos.\n\n### Quadros estáveis\n\n`Quadros estáveis` = quantos quadros consecutivos você deve manter o gesto antes que ele dispare. Padrão: 5 quadros (~150ms a 30fps).\n\nAumente se os gatilhos estiverem disparando com facilidade demais. Diminua para uma resposta mais rápida.\n\n### Resfriamento\n\n`Resfriamento (ms)` = tempo mínimo entre mudanças de cena. Padrão: 500ms.\n\nEvita que o alternador fique \"instável\" se você oscilar rapidamente.\n\n---\n\n## Atalhos de teclado\n\n| Tecla | Ação |\n|---|---|\n| `Espaço` | Pausar / Retomar detecção |\n| `C` | Ir manualmente para a cena CENTRO |\n| `R` | Recarregar lista de cenas do software |\n| `Esc` | Desconectar |\n\n---\n\n## Histórico de gatilhos\n\nO painel **Avançado → Histórico de gatilhos** mostra as últimas 50 ações disparadas:\n\n- ✓ verde = bem-sucedida\n- ✗ vermelho = falhou\n- · cinza = pendente\n\nÚtil para auditar o que foi disparado sem abrir o DevTools.\n\n**Exportar CSV**: baixa o histórico para análise offline.\n\n**Limpar**: apaga o histórico (não afeta mais nada).\n\n---\n\n## Alterar idioma\n\nO EsperantAI detecta automaticamente o idioma do seu sistema operacional. Para alterar manualmente:\n\n- Canto superior direito: menu suspenso de idioma\n- Selecione seu idioma preferido\n- A interface é atualizada imediatamente\n\nIdiomas disponíveis:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\nOs 15 idiomas estão traduzidos nos arquivos atuais da interface.\n\n---\n\n## Gerencie sua licença\n\nPainel **Avançado → Licença**:\n\n- **Ver status**: Válida / Inválida\n- **Ver e-mail do cliente associado**\n- **Ver última validação online**\n- **Desativar neste dispositivo**: use antes de trocar de PC ou para liberar uma vaga (das 3 disponíveis)\n\n## Solução de problemas\n\n### \"Ativação necessária\" persiste depois de colar minha chave de licença\n\n- Verifique se você copiou a chave completa (5 grupos de 4 caracteres separados por hífens)\n- Verifique sua conexão com a internet (a ativação requer validação online na primeira vez)\n- Se você já ativou em 3 dispositivos, desative um primeiro\n- Entre em contato com soporte@edugame.digital se o problema persistir\n\n### \"Procurando rosto...\" persiste mesmo com meu rosto visível\n\n- Melhore a iluminação: seu rosto deve estar bem iluminado\n- Aproxime-se da câmera (40-80 cm é o ideal)\n- Feche outras abas que usem GPU (o Chrome pode limitar a GPU se houver muitas abas abertas)\n- Se o Economizador de memória do Chrome estiver ativo, desative-o para esta aba\n\n### As cenas não aparecem nos menus suspensos\n\n- Verifique se você está conectado ao software de streaming (selo verde \"Conectado\")\n- Pressione `R` para recarregar a lista de cenas\n- Se continuar vazia, desconecte e conecte novamente\n- No vMix, confirme que o Web Controller está ativado e acessível em `http://127.0.0.1:8088/api/`\n- No PRISM, confirme que o plugin obs-websocket está instalado e habilitado\n- No XSplit, confirme que a ponte XJS local está rodando\n\n### As mudanças de cena disparam sem eu fazer gestos\n\n- Aumente o limite de yaw / pitch / roll no painel **Sensibilidade**\n- Aumente os `Quadros estáveis` de 5 para 8-10\n- Verifique se a zona morta está configurada (yaw 0,05, pitch 0,05, roll 0,08)\n- Confira se não há mais ninguém no enquadramento (vários rostos podem causar instabilidade)\n\n### Atraso na detecção\n\n- Feche aplicativos pesados (jogos, edição de vídeo)\n- Verifique se você está usando a GPU dedicada, se tiver uma (não a integrada)\n- Reduza a resolução da câmera se for 4K (1080p é ideal para detecção)\n\n### O OBS não reage embora o EsperantAI indique \"Cena alterada\"\n\n- Verifique se o nome da cena no menu suspenso corresponde EXATAMENTE ao nome no OBS (diferencia maiúsculas de minúsculas)\n- Verifique se a cena não está em outra Coleção de cenas\n- Consulte o painel **Histórico de gatilhos** — se mostrar ✗ vermelho, há um erro específico\n\n### Erro \"OBS inalcançável — Conecte manualmente\"\n\n- Verifique se o OBS está aberto\n- Verifique se o WebSocket está ativado no OBS\n- Se você configurou uma senha no OBS, ela deve corresponder exatamente\n- Alguns antivírus bloqueiam a porta 4455 — adicione uma exceção\n\n### Twitch ou YouTube não conectam\n\n- Verifique se a URI de redirecionamento na console da plataforma corresponde exatamente à URL de `oauth-callback.html`\n- Permita pop-ups para o domínio onde você está usando o EsperantAI\n- Na Twitch, use apenas o Client ID; não cole Client Secret\n- No YouTube, confirme que a YouTube Data API v3 está ativada e que há uma live ativa\n\n### A Kick não mostra todos os eventos\n\nA Kick está em modo beta/limitado no navegador. Os eventos completos da Kick são recebidos oficialmente por webhooks; use StreamElements ou um backend próprio se precisar de inscrições, presentes ou raids confiáveis.\n\n---\n\n## Privacidade\n\n### O que o EsperantAI NÃO faz\n\n- ❌ NÃO envia seu vídeo para nenhum servidor\n- ❌ NÃO armazena seu vídeo nem capturas\n- ❌ NÃO coleta informações biométricas remotamente\n- ❌ NÃO compartilha dados com anunciantes nem terceiros\n\n### O que ELE processa\n\n- ✅ Detecção facial local no seu navegador (Human.js + WebGL)\n- ✅ Conexões locais com OBS / Streamlabs / vMix / PRISM / XSplit (loopback `127.0.0.1`)\n- ✅ Validação periódica da chave de licença (a cada 7 dias)\n- ✅ Se você conectar Twitch/YouTube/Kick/StreamElements: tokens de plataforma em armazenamento local ou de sessão do navegador\n\nDetalhes completos em `docs/PRIVACY.html`.\n\n---\n\n## Suporte\n\n- 📧 E-mail: **soporte@edugame.digital**\n- 🌐 Web: https://edugame.digital\n- 📚 Documentação técnica: https://github.com/salazarjoelo/EsperantAI\n\nTempos de resposta:\n- Dúvidas gerais: 24-72 horas\n- Erros técnicos: 1-3 dias úteis\n\n---\n\n*Última atualização: 2026-05-20. Versão: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'ja-JP': { name: '日本語', flag: '🇯🇵', content: "# EsperantAI — ユーザーマニュアル\n\n> **誠実なジェスチャー。** 顔と手の動きで配信ソフトを操作できます。専用の追加ハードウェアは不要です。\n\n**バージョン**: 3.0 · **言語**: 日本語（ほか14言語の翻訳あり）\n\n**技術検証**: OBS Studio、Streamlabs Desktop、vMix、PRISM Live Studio、XSplit、Twitch、YouTube Live、Kick、Trovo、StreamElementsについて、**2026年5月20日**時点で入手可能な公式ドキュメントと照合済みです。詳細: [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md)。\n\n---\n\n## 目次\n\n1. [EsperantAIとは？](#esperantaiとは)\n2. [最小要件](#最小要件)\n3. [購入とライセンス認証](#購入とライセンス認証)\n4. [初めて使うとき](#初めて使うとき)\n5. [配信ソフトを接続する](#配信ソフトを接続する)\n6. [ジェスチャーとシーンを設定する](#ジェスチャーとシーンを設定する)\n7. [ジェスチャーカテゴリー](#ジェスチャーカテゴリー)\n8. [配信プラットフォームを接続する](#配信プラットフォームを接続する)\n9. [イベント + ジェスチャーの組み合わせ（上級）](#イベント--ジェスチャーの組み合わせ上級)\n10. [感度とデッドゾーン](#感度とデッドゾーン)\n11. [キーボードショートカット](#キーボードショートカット)\n12. [トリガー履歴](#トリガー履歴)\n13. [言語を変更する](#言語を変更する)\n14. [ライセンスを管理する](#ライセンスを管理する)\n15. [トラブルシューティング](#トラブルシューティング)\n16. [プライバシー](#プライバシー)\n17. [サポート](#サポート)\n\n---\n\n## EsperantAIとは？\n\nEsperantAIは、AIで顔と手のジェスチャーをリアルタイムに検出し、配信ソフトのコマンドに変換する**ウェブアプリ**です。カメラ映像はブラウザ内でローカル処理されます。\n\n![EsperantAIのローカル処理フロー](assets/manual/01-esperantai-flow.svg)\n\n以下の配信ソフトで使えます。\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster**（ベータ/上級者向け）\n\nプラットフォームのイベントを受け取り、ジェスチャーと組み合わせることもできます。\n\n- **Twitch**: EventSub WebSocketによる直接対応。\n- **YouTube Live**: YouTube Data API v3による直接対応。アクティブなライブ配信と利用可能なクォータが必要です。\n- **Kick**: ブラウザではベータ/限定対応です。Kickの完全なイベントには、公式webhookを扱うバックエンドまたはブリッジが必要です。\n- **StreamElements**: アカウントのトークン/JWTを使うマルチプラットフォームブリッジです。\n- **Trovo**: コード上には技術アダプターがありますが、現在の公開UIには接続パネルがまだ表示されていません。\n\n### なぜ「誠実なジェスチャー」なのか？\n\n基本的な表情や頭の回転は、**人間の文化全体に共通する**ものです（Paul Ekman, 1972）。地理によって意味が変わりにくく、偽りにくい身体信号です。EsperantAIではこれらを「🌐 ユニバーサル」ジェスチャーと呼び、国によって意味が変わることのある「⚠️ カルチャー」ジェスチャー（手のサイン）と区別しています。\n\nどのジェスチャーを使うかは、あなたの視聴者に合わせて選べます。\n\n---\n\n## 最小要件\n\n### ハードウェア\n\n- **任意のUSBウェブカメラ**（推奨: 1080p以上）\n- **CPU**: 直近5年程度の4コア以上のプロセッサー\n- **RAM**: 最低8 GB。同時に配信する場合は16 GB推奨。\n- **GPU**: WebGL対応GPU（最近の内蔵GPUでも動作します）\n\n### ソフトウェア\n\n- **OS**: Windows 10/11、macOS 12+、または新しいカーネルのLinux\n- **ブラウザ**: Chrome 90+、Edge 90+、またはFirefox 100+\n- **配信ソフト**（少なくとも1つ）: OBS Studio 28+、Streamlabs Desktop、vMix、PRISM、XSplit\n\n### インターネット\n\n- **ライセンス認証**と**7日ごとの再検証**に必要です\n- **最大7日間はオフラインでも動作**します（猶予期間）\n\n---\n\n## 購入とライセンス認証\n\n1. **https://edugame.digital** にアクセスします\n2. **「Comprar licencia」** をクリックします\n3. LemonSqueezyで支払いを完了します（カード、PayPalなど）\n4. 次の内容を含むメールが届きます\n   - **ライセンスキー**（形式: `XXXX-XXXX-XXXX-XXXX-XXXX`）\n   - EsperantAIを使うためのリンク\n5. ブラウザでEsperantAIを開きます\n6. ライセンス認証画面が表示されたら、ライセンスキーを貼り付けます\n7. **「Activar licencia」** をクリックします\n8. これで使用できます\n\n### 何台のデバイスで使えますか？\n\n1つのライセンスは**最大3台のデバイス**で認証できます。別のデバイスにライセンスを移す場合は、次の手順を使います。\n\n1. 以前のデバイス: **高度な設定**パネル → **ライセンス** → **このデバイスで無効化**\n2. 新しいデバイス: 通常どおり認証\n\n---\n\n## 初めて使うとき\n\n### ステップ1: カメラアクセスを許可する\n\nEsperantAIを初めて開くと、ブラウザがカメラへのアクセス許可を求めます。**許可**してください。\n\n> 重要: EsperantAIはあなたの映像をサーバーへ送信しません。処理は100%お使いのデバイス内で行われます。\n\n### ステップ2: カメラを選択する\n\n複数のカメラがある場合は、カメラのドロップダウンから使うカメラを選びます。\n\n### ステップ3: 検出を確認する\n\n左側のパネルに顔が表示されます。EsperantAIが顔を検出すると、Yaw / Pitch / Roll のインジケーターに値が表示され始めます。\n\n### ステップ4: キャリブレーションウィザード（Pro+）\n\nProまたはPro+ライセンスをお持ちの場合、初回使用時に**キャリブレーションウィザード**が自動で起動します。自然に動かせる範囲を測定し、最適な感度を設定します。**再キャリブレーション**ボタンからいつでも再実行できます。\n\n---\n\n## 配信ソフトを接続する\n\n![配信ソフト接続マトリクス](assets/manual/02-software-setup.svg)\n\nこのセクションの接続はすべてローカル接続です。EsperantAIは、同じコンピューター上で動作している配信ソフトと `127.0.0.1` 経由で通信します。\n\n### OBS Studio\n\n1. OBSで **ツール → WebSocketサーバー設定** を開きます\n2. WebSocketサーバーを有効にします。OBS Studio 28+にはobs-websocketが含まれています\n3. EsperantAIで **接続** パネルを開きます\n4. 配信ソフト: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455`（既定値）\n6. パスワード: OBSでパスワードを有効にした場合は、そのパスワード\n7. **接続** をクリックします\n\n### Streamlabs Desktop\n\n1. Streamlabs Desktopで **Settings → Remote Control** を開きます\n2. ローカルのRemote Controlを有効にします\n3. Remote Control画面から **API Token** をコピーします\n4. EsperantAIで配信ソフトに **Streamlabs Desktop** を選びます\n5. API Tokenを貼り付けます\n6. ポート: `59650`（既定値）\n7. **接続** をクリックします\n\n### vMix\n\n1. vMixで **Settings → Web Controller** を開きます\n2. Web Controllerを有効にします。既定のポートは `8088` です\n3. EsperantAIで配信ソフトに **vMix** を選びます\n4. ホスト: `127.0.0.1`\n5. ポート: `8088`\n6. **接続** をクリックします\n\n> 注: 現在のEsperantAIアダプターは、vMixのローカルHTTP APIを使用します。Web Controllerをネットワークルールやブラウザ非対応の認証情報で保護している場合、接続に失敗することがあります。\n\n### PRISM Live Studio\n\n1. **PRISM Live Studio v4.0.5+** を使用します\n2. OBS/PRISM互換の `obs-websocket` プラグインを手動でインストールします\n3. PRISMの公式OBSプラグインガイドに従って、PRISMのプラグインフォルダーへコピーします\n4. PRISMを再起動します\n5. **ツール → WebSocketサーバー設定** でWebSocketを有効にします\n6. EsperantAIで配信ソフトに **PRISM Live Studio** を選びます（OBSと同じ方式で動作します）\n\n> 重要な違い: OBS 28+にはobs-websocketが含まれています。PRISMではプラグインを手動でインストールする必要があります。\n\n### XSplit Broadcaster（ベータ/上級者向け）\n\n1. **XSplit XJS / Remote xjs** と互換性のあるローカルブリッジをインストールまたは有効化します\n2. ブリッジがローカルWebSocket URLを公開していることを確認します\n3. EsperantAIで配信ソフトに **XSplit** を選びます\n4. Remote xjsプロキシURL: `ws://127.0.0.1:5555/xjs`（既定値）\n5. **接続** をクリックします\n\n> XSplitは**ベータ/上級者向け**です。互換性はインストール済みのローカルXJSブリッジに依存し、高度な機能は制限される場合があります。\n\n---\n\n## ジェスチャーとシーンを設定する\n\n接続が完了すると、配信ソフト内の実際のシーンが **トリガー** パネルのドロップダウンに自動表示されます。\n\n### 基本マッピング\n\n1. 各ジェスチャー（例: 「左を見る」）に対して、ドロップダウンからシーンを選びます\n2. そのジェスチャーを行い、約150ms安定して保つと、EsperantAIが配信ソフトのシーンを切り替えます\n3. 切り替えは自動で、ほぼ即時に行われます\n\n### マルチアクション（Pro+）\n\nProまたはPro+ライセンスでは、1つのジェスチャーから**複数のアクション**を同時に実行できます。\n- シーン切り替え + サウンド再生 + オーバーレイ表示 + チャットメッセージ送信\n\n### カテゴリーの有効化 / 無効化\n\n各カテゴリーには専用の「有効化」チェックボックスがあります。\n\n- 🧠 **頭の回転**（ユニバーサル — 既定で有効）\n- 📏 **顔の距離**（近づく / 離れる）\n- 👁️ **視線**（目だけを動かす）\n- 😀 **感情**（笑顔、驚き、怒り、ニュートラル）\n- 👁️‍🗨️ **ダブルまばたき**\n- ✋ **手のジェスチャー**（カルチャー — 既定で無効）\n\nCPU使用量を抑えたい場合は、不要なカテゴリーを無効にしてください。\n\n---\n\n## ジェスチャーカテゴリー\n\n### 🌐 ユニバーサル（どの文化でも同じ意味）\n\n| ジェスチャー | 軸 | 有効にする動き |\n|---|---|---|\n| センター | — | 正面を向き、顔を安定させる |\n| 左を見る | yaw 負方向 | 頭を左に向ける |\n| 右を見る | yaw 正方向 | 頭を右に向ける |\n| 上を見る | pitch 負方向 | 顔を上げる |\n| 下を見る | pitch 正方向 | 顔を下げる |\n| 左に傾ける | roll 負方向 | 頭を左肩の方へ傾ける |\n| 右に傾ける | roll 正方向 | 頭を右肩の方へ傾ける |\n| 近づく | 距離 | カメラに近づく |\n| 離れる | 距離 | カメラから離れる |\n| 視線 | 視線 | 頭を中央に保ったまま目だけを動かす |\n| 笑顔 | 感情=happy | はっきり笑う |\n| 驚き | 感情=surprise | 驚いた表情を見せる |\n| 怒り | 感情=anger | 怒った表情を見せる |\n| ニュートラル | 感情=neutral | 力を抜いた表情 |\n| ダブルまばたき | まばたき | 両目をすばやく2回閉じる（< 700ms） |\n\n### ⚠️ カルチャー（意味が国によって変わる）\n\n| ジェスチャー | 西洋での意味 | 他文化での注意点 |\n|---|---|---|\n| 👍 親指を立てる | 承認 | 中東 / 西アジアでは侮辱的に受け取られる場合があります |\n| ✌️ ピース | 平和 / 勝利 | 英国 / アイルランド / オーストラリアで手のひらが内側の場合は侮辱になります |\n| 🤘 ロックサイン | ロック / メタル | イタリアで手のひらを下に向けると「cornuto」（侮辱）になる場合があります |\n| 👌 OK | OK / 完璧 | ブラジル / トルコ / ドイツでは侮辱的に受け取られる場合があります |\n| ✊ 握りこぶし | 政治的文脈により変わります | — |\n| 🖐️ 開いた手のひら | 「止まれ」または挨拶 | ギリシャで相手に向けると mountza という強い侮辱になります |\n| ☝️ 指差し | 示す | アジアでは指で指すことが失礼とされる場合があります |\n\nEsperantAIは、インターフェース上で各ジェスチャーに対応するバッジを表示します。世界中の視聴者に合わせて、使うジェスチャーを選んでください。\n\n### 🙏 Gassho（合掌）\n\n特別なジェスチャーです。祈りやお辞儀の挨拶のように、胸の前で両手のひらを合わせます。東アジアの文化では、敬意や感謝を表すしぐさとして広く使われます。6つのランドマーク確認により、高い信頼性で検出されます。\n\n---\n\n## 配信プラットフォームを接続する\n\nEsperantAIでイベント（投げ銭、サブスク、レイド、フォロー、Super Chatなど）を受け取るには、配信しているプラットフォームを接続します。\n\n![プラットフォームイベントの状態](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. https://dev.twitch.tv/console でClient IDを作成します\n2. リダイレクトURIを登録します: `https://edugame.digital/oauth-callback.html`（またはローカルURL）\n3. EsperantAIで **プラットフォームイベント** パネル → **Twitch EventSub** を開きます\n4. Client IDを貼り付けます\n5. **接続** をクリックします\n6. Twitchの認証ウィンドウが開きます。権限を許可します\n7. ウィンドウが閉じ、「Twitch接続済み」と表示されます\n\nEsperantAIはEventSub WebSocketを使用します。Client Secretはブラウザに貼り付けないでください。\n\n### YouTube Live\n\n1. https://console.cloud.google.com で認証情報を作成します\n2. YouTube Data API v3を有効にします\n3. OAuth Client IDを作成します（種類: ウェブアプリケーション）\n4. Twitchと同じリダイレクトURIを登録します\n5. EsperantAIで **プラットフォームイベント** パネル → **YouTube Live** を開きます\n6. Client IDを貼り付けて **接続** をクリックします\n\nYouTubeの要件: チャットが利用できるアクティブなライブ配信が必要です。また、Google Cloudプロジェクトにライブチャットを取得するための十分なクォータが必要です。\n\n### Kick\n\n1. Kickの開発者ポータルでアプリを作成します\n2. リダイレクトURIを登録します\n3. EsperantAIで **プラットフォームイベント** パネル → **Kick** を開きます\n4. Client IDを貼り付けて **接続** をクリックします\n5. KickはPKCE付きOAuth 2.1を使用します\n\n現在の状態: **ベータ/限定対応**です。Kickの公式ドキュメントでは、完全なイベントはwebhookで扱います。ブラウザ内のEsperantAIが検出できるアクティビティは一部に限られます。Kickのサブスク、ギフト、レイド、または信頼性の高いイベントが必要な場合は、StreamElementsのようなブリッジ、またはバックエンド/webhookを使用してください。\n\n### StreamElements（マルチプラットフォームブリッジ）\n\nすでにStreamElementsアカウントを持っている場合、複数プラットフォームのアラート用ブリッジとして使用できます。\n\n1. https://streamelements.com/dashboard/account/channels にアクセスします\n2. JWT Tokenをコピーします\n3. EsperantAIで **プラットフォームイベント** パネル → **StreamElements** を開きます\n4. JWTを貼り付けて **接続** をクリックします\n\nこのトークンは非公開にしてください。StreamElementsアカウントのパスワードと同じように扱ってください。\n\n### Trovo\n\nEsperantAIには、OAuthとTrovoのWebSocketチャットサービスを基にしたTrovo用の技術アダプターがコード内に含まれています。ただし、現在の公開インターフェースにはTrovo接続パネルがまだないため、通常のユーザーフローとしては記載していません。今すぐTrovoが必要な場合は、互換性のあるブリッジを使うか、Trovoパネルの有効化を待ってください。\n\n---\n\n## イベント + ジェスチャーの組み合わせ（上級）\n\nここがEsperantAIの特徴です。**プラットフォームイベント**と**あなたのジェスチャー**を確認操作として組み合わせます。\n\n![イベントとジェスチャーのフロー](assets/manual/04-event-gesture-combo.svg)\n\n### 例: 投げ銭に親指を立てて感謝する\n\n1. **イベントトリガー** パネル → 「💰 投げ銭」の行\n2. ✅ 有効化\n3. シーン: `Escena_Gracias`\n4. 必須ジェスチャー: `👍 親指を立てる`\n\n**ライブ中の流れ**:\n- 投げ銭が届く → EsperantAIが「ジェスチャー待ち...」を表示\n- 5秒以内に 👍 を行う\n- 実行した場合 → `Escena_Gracias` に切り替え + 設定済みの他のアクションも実行\n- 実行しない場合 → 自動的に破棄\n\n### 必須ジェスチャーなし（自動トリガー）\n\n「必須ジェスチャー」を `— なし —` のままにすると、イベントがただちにアクションを実行します。\n\n便利な例:\n- レイドが来たときに、お祝いシーンへ自動で切り替える\n- サブスク時にオーバーレイを自動表示する\n\n---\n\n## 感度とデッドゾーン\n\n### 感度\n\nしきい値は、どれくらい大きなジェスチャーでトリガーするかを制御します。\n\n- **Yaw**: 頭を左右にどれくらい回す必要があるか（既定値: 0.15 rad ≈ 8.6°）\n- **Pitch 上/下**: 縦方向の傾き\n- **Roll**: 横方向の傾き\n\n値を上げると、より大きなジェスチャーが必要になります。値を下げると、より敏感に反応します。\n\n### デッドゾーン（疲労防止）\n\nほぼ中央にいる場合（yaw < 0.05、pitch < 0.05、roll < 0.08）、**何もトリガーされません**。自然な動きで小さな揺れがトリガーを発動しないようにするためです。\n\n### 安定フレーム\n\n`安定フレーム` = トリガー前に、ジェスチャーを何フレーム連続で維持する必要があるか。既定値: 5フレーム（30fpsで約150ms）。\n\nトリガーが簡単に発動しすぎる場合は値を上げます。反応を速くしたい場合は値を下げます。\n\n### クールダウン\n\n`クールダウン (ms)` = シーン切り替え間の最短時間。既定値: 500ms。\n\nすばやく揺れたときに切り替えが不安定になるのを防ぎます。\n\n---\n\n## キーボードショートカット\n\n| キー | アクション |\n|---|---|\n| `Space` | 検出の一時停止 / 再開 |\n| `C` | 手動でセンターシーンへ移動 |\n| `R` | 配信ソフトからシーン一覧を再読み込み |\n| `Esc` | 切断 |\n\n---\n\n## トリガー履歴\n\n**高度な設定 → トリガー履歴** パネルには、直近50件の実行アクションが表示されます。\n\n- ✓ 緑 = 成功\n- ✗ 赤 = 失敗\n- · グレー = 保留中\n\nDevToolsを開かずに、何がトリガーされたかを確認するのに便利です。\n\n**CSVエクスポート**: 履歴をダウンロードしてオフライン分析できます。\n\n**クリア**: 履歴を削除します（ほかの設定には影響しません）。\n\n---\n\n## 言語を変更する\n\nEsperantAIはOSの言語を自動検出します。手動で変更する場合は、次の手順です。\n\n- 右上の言語ドロップダウンを開く\n- 使いたい言語を選ぶ\n- インターフェースがすぐに更新されます\n\n利用可能な言語:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\n現在のインターフェースファイルでは、15言語が翻訳されています。\n\n---\n\n## ライセンスを管理する\n\n**高度な設定 → ライセンス** パネル:\n\n- **状態を表示**: 有効 / 無効\n- **紐づけられた顧客メールアドレスを表示**\n- **最後のオンライン検証を表示**\n- **このデバイスで無効化**: PCを変更する前、または3台の利用枠のうち1枠を空けるために使います\n\n---\n\n## トラブルシューティング\n\n### ライセンスキーを貼り付けた後も「認証が必要」と表示される\n\n- キー全体をコピーしたか確認します（ハイフンで区切られた4文字×5グループ）\n- インターネット接続を確認します（初回認証にはオンライン検証が必要です）\n- すでに3台で認証している場合は、先に1台を無効化します\n- 問題が続く場合は soporte@edugame.digital へ連絡してください\n\n### 顔が見えているのに「顔を検索中...」が続く\n\n- 照明を改善します。顔が十分に明るく見える必要があります\n- カメラに近づきます（40〜80 cmが最適です）\n- GPUを使う他のタブを閉じます（タブが多すぎるとChromeがGPUを制限することがあります）\n- Chromeのメモリセーバーが有効な場合は、このタブでは無効にします\n\n### ドロップダウンにシーンが表示されない\n\n- 配信ソフトに接続していることを確認します（緑の「接続済み」バッジ）\n- `R` を押してシーン一覧を再読み込みします\n- それでも空の場合は、一度切断してから再接続します\n- vMixでは、Web Controllerが有効で `http://127.0.0.1:8088/api/` からアクセスできることを確認します\n- PRISMでは、obs-websocketプラグインがインストールされ有効になっていることを確認します\n- XSplitでは、ローカルXJSブリッジが実行中であることを確認します\n\n### ジェスチャーをしていないのにシーンが切り替わる\n\n- **感度** パネルで yaw / pitch / roll のしきい値を上げます\n- `安定フレーム` を5から8〜10へ上げます\n- デッドゾーンが設定されていることを確認します（yaw 0.05、pitch 0.05、roll 0.08）\n- 画面内にほかの人がいないことを確認します（複数の顔で不安定になることがあります）\n\n### 検出が遅い\n\n- 重いアプリを閉じます（ゲーム、動画編集など）\n- 専用GPUがある場合は、内蔵GPUではなく専用GPUを使っていることを確認します\n- カメラ解像度が4Kの場合は下げます（検出には1080pが最適です）\n\n### EsperantAIでは「シーン変更」と表示されるのにOBSが反応しない\n\n- ドロップダウン内のシーン名がOBSのシーン名と**完全に一致**しているか確認します（大文字小文字を区別します）\n- そのシーンが別のシーンコレクションにないか確認します\n- **トリガー履歴** パネルを確認します。赤い ✗ が表示される場合、具体的なエラーがあります\n\n### 「OBSに到達できません — 手動で接続してください」というエラー\n\n- OBSが開いていることを確認します\n- OBSでWebSocketが有効になっていることを確認します\n- OBSでパスワードを設定した場合は、完全に一致している必要があります\n- 一部のウイルス対策ソフトがポート4455をブロックすることがあります。例外を追加してください\n\n### TwitchまたはYouTubeが接続できない\n\n- プラットフォームのコンソールに登録したリダイレクトURIが、`oauth-callback.html` のURLと完全に一致していることを確認します\n- EsperantAIを使っているドメインでポップアップを許可します\n- TwitchではClient IDだけを使用し、Client Secretは貼り付けないでください\n- YouTubeでは、YouTube Data API v3が有効で、アクティブなライブ配信があることを確認します\n\n### Kickですべてのイベントが表示されない\n\nKickはブラウザではベータ/限定対応です。Kickの完全なイベントは公式にはwebhookで受信します。信頼性の高いサブスク、ギフト、レイドが必要な場合は、StreamElementsまたは自前のバックエンドを使用してください。\n\n---\n\n## プライバシー\n\n### EsperantAIがしないこと\n\n- ❌ あなたの映像をサーバーへ送信しません\n- ❌ 映像やキャプチャを保存しません\n- ❌ 生体情報をリモートで収集しません\n- ❌ データを広告主や第三者と共有しません\n\n### EsperantAIが処理すること\n\n- ✅ ブラウザ内でのローカル顔検出（Human.js + WebGL）\n- ✅ OBS / Streamlabs / vMix / PRISM / XSplitへのローカル接続（ループバック `127.0.0.1`）\n- ✅ ライセンスキーの定期検証（7日ごと）\n- ✅ Twitch/YouTube/Kick/StreamElementsを接続した場合: ブラウザのローカルストレージまたはセッションストレージ内のプラットフォームトークン\n\n詳細は `docs/PRIVACY.html` を参照してください。\n\n---\n\n## サポート\n\n- 📧 メール: **soporte@edugame.digital**\n- 🌐 Web: https://edugame.digital\n- 📚 技術ドキュメント: https://github.com/salazarjoelo/EsperantAI\n\n返信目安:\n- 一般的な問い合わせ: 24〜72時間\n- 技術的な不具合: 1〜3営業日\n\n---\n\n*最終更新: 2026-05-20。バージョン: 3.0。*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'zh-CN': { name: '中文', flag: '🇨🇳', content: "# EsperantAI — 用户手册\n\n> **真诚的手势。** 用面部和手势控制你的直播软件，无需专用额外硬件。\n\n**版本**：3.0 · **语言**：简体中文（另有 14 种语言翻译可用）\n\n**技术验证**：已根据截至 **2026 年 5 月 20 日**可用的官方文档核对 OBS Studio、Streamlabs Desktop、vMix、PRISM Live Studio、XSplit、Twitch、YouTube Live、Kick、Trovo 和 StreamElements。详情见 [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md)。\n\n---\n\n## 目录\n\n1. [EsperantAI 是什么？](#esperantai-是什么)\n2. [最低配置要求](#最低配置要求)\n3. [购买与激活](#购买与激活)\n4. [首次使用](#首次使用)\n5. [连接直播软件](#连接直播软件)\n6. [配置手势与场景](#配置手势与场景)\n7. [手势分类](#手势分类)\n8. [连接直播平台](#连接直播平台)\n9. [事件 + 手势组合（高级）](#事件--手势组合高级)\n10. [灵敏度与死区](#灵敏度与死区)\n11. [键盘快捷键](#键盘快捷键)\n12. [触发历史](#触发历史)\n13. [更改语言](#更改语言)\n14. [管理你的许可证](#管理你的许可证)\n15. [故障排除](#故障排除)\n16. [隐私](#隐私)\n17. [技术支持](#技术支持)\n\n---\n\n## EsperantAI 是什么？\n\nEsperantAI 是一款**网页应用**，使用人工智能实时检测你的面部和手部动作，并把这些动作转换成直播软件命令。摄像头画面会在你的浏览器本地处理。\n\n![EsperantAI 本地流程](assets/manual/01-esperantai-flow.svg)\n\n它可配合以下直播软件使用：\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster**（测试版）\n\n它也可以接收平台事件，并与手势组合使用：\n\n- **Twitch**：通过 EventSub WebSocket 直接支持。\n- **YouTube Live**：通过 YouTube Data API v3 直接支持；需要正在进行的直播和可用配额。\n- **Kick**：浏览器内为测试版/有限支持。完整 Kick 事件需要官方后端/webhook 或桥接方案。\n- **StreamElements**：使用你账户的 token/JWT 作为跨平台桥接。\n- **Trovo**：代码中已有技术适配器，但当前公共界面还没有公开 Trovo 连接面板。\n\n### 为什么叫“真诚的手势”？\n\n基础面部表情和头部旋转在**所有人类文化中都是共通的**（Paul Ekman，1972）。它们不会说谎，也不会因为地域不同而改变。EsperantAI 把这些手势标为“🌐 通用”，并把它们与“⚠️ 文化相关”手势（手势动作）区分开来，后者的含义可能因国家或地区而异。\n\n请根据你的观众群体选择要使用的手势。\n\n---\n\n## 最低配置要求\n\n### 硬件\n\n- **任意 USB 网络摄像头**（推荐 1080p 或更高）\n- **CPU**：近 5 年内的任意 4 核及以上处理器\n- **内存**：最低 8 GB；如果同时直播，建议 16 GB\n- **GPU**：任何支持 WebGL 的显卡（现代集成显卡也可以）\n\n### 软件\n\n- **操作系统**：Windows 10/11、macOS 12+，或使用较新内核的 Linux\n- **浏览器**：Chrome 90+、Edge 90+ 或 Firefox 100+\n- **直播软件**（至少一种）：OBS Studio 28+、Streamlabs Desktop、vMix、PRISM、XSplit\n\n### 网络\n\n- **激活许可证**需要联网，并且每 **7 天**需要重新验证\n- 可**离线使用最多 7 天**（宽限期）\n\n---\n\n## 购买与激活\n\n1. 访问 **https://edugame.digital**\n2. 点击 **“购买许可证”**\n3. 通过 LemonSqueezy 完成付款（银行卡、PayPal 等）\n4. 你会收到一封电子邮件，其中包含：\n   - 你的**许可证密钥**（格式：`XXXX-XXXX-XXXX-XXXX-XXXX`）\n   - EsperantAI 使用链接\n5. 在浏览器中打开 EsperantAI\n6. 激活界面出现后，粘贴你的许可证密钥\n7. 点击 **“激活许可证”**\n8. 完成！\n\n### 可以在几台设备上使用？\n\n一个许可证最多可在 **3 台设备**上激活。如果要把许可证转移到另一台设备：\n\n1. 在旧设备上：**高级**面板 → **许可证** → **在此设备上停用**\n2. 在新设备上：正常激活即可\n\n---\n\n## 首次使用\n\n### 第 1 步：允许摄像头访问\n\n第一次打开 EsperantAI 时，浏览器会请求摄像头权限。请**允许**。\n\n> 重要：EsperantAI 绝不会把你的视频发送到任何服务器。处理过程 100% 在你的设备本地完成。\n\n### 第 2 步：选择摄像头\n\n如果你有多个摄像头，请从摄像头下拉菜单中选择要使用的设备。\n\n### 第 3 步：确认检测正常\n\n左侧面板会显示你的面部。当 EsperantAI 检测到你的面部后，Yaw / Pitch / Roll 指示器会开始显示数值。\n\n### 第 4 步：校准向导（Pro+）\n\n如果你拥有 Pro 或 Pro+ 许可证，**校准向导**会在首次使用时自动启动。它会测量你的自然活动范围，并设置合适的灵敏度。你也可以随时通过 **重新校准** 按钮再次运行。\n\n---\n\n## 连接直播软件\n\n![直播软件连接矩阵](assets/manual/02-software-setup.svg)\n\n本节中的所有连接都是本地连接：EsperantAI 通过 `127.0.0.1` 与运行在同一台电脑上的直播软件通信。\n\n### OBS Studio\n\n1. 在 OBS 中打开：**工具 → WebSocket 服务器设置**\n2. 启用 WebSocket 服务器。OBS Studio 28+ 已内置 obs-websocket。\n3. 在 EsperantAI 中打开：**连接**面板\n4. 直播软件选择：**OBS Studio**\n5. WebSocket URL：`ws://127.0.0.1:4455`（默认）\n6. 密码：如果你在 OBS 中启用了密码，请填写对应密码\n7. 点击 **连接**\n\n### Streamlabs Desktop\n\n1. 在 Streamlabs Desktop 中打开：**Settings → Remote Control**\n2. 启用本地远程控制\n3. 从 Remote Control 页面复制 **API Token**\n4. 在 EsperantAI 中选择直播软件：**Streamlabs Desktop**\n5. 粘贴 API Token\n6. 端口：`59650`（默认）\n7. 点击 **连接**\n\n### vMix\n\n1. 在 vMix 中打开：**Settings → Web Controller**\n2. 启用 Web Controller。默认端口为 `8088`。\n3. 在 EsperantAI 中选择直播软件：**vMix**\n4. 主机：`127.0.0.1`\n5. 端口：`8088`\n6. 点击 **连接**\n\n> 注意：当前 EsperantAI 适配器使用 vMix 本地 HTTP API。如果你通过网络规则或浏览器不支持的凭据保护了 Web Controller，连接可能会失败。\n\n### PRISM Live Studio\n\n1. 使用 **PRISM Live Studio v4.0.5+**。\n2. 手动安装与 OBS/PRISM 兼容的 `obs-websocket` 插件。\n3. 按照 PRISM 官方 OBS 插件指南，把插件复制到 PRISM 的插件文件夹。\n4. 重启 PRISM\n5. 在 **工具 → WebSocket 服务器设置** 中启用 WebSocket\n6. 在 EsperantAI 中选择直播软件：**PRISM Live Studio**（工作方式与 OBS 相同）\n\n> 重要区别：OBS 28+ 已内置 obs-websocket；PRISM 需要手动安装插件。\n\n### XSplit Broadcaster（测试版）\n\n1. 安装或启用兼容 **XSplit XJS / Remote xjs** 的本地桥接。\n2. 确认该桥接暴露本地 WebSocket URL。\n3. 在 EsperantAI 中选择直播软件：**XSplit**\n4. Remote xjs 代理 URL：`ws://127.0.0.1:5555/xjs`（默认）\n5. 点击 **连接**\n\n> XSplit 处于**测试版**。兼容性取决于已安装的本地 XJS 桥接；高级功能可能受限。\n\n---\n\n## 配置手势与场景\n\n连接成功后，你的直播软件中的真实场景会自动显示在 **触发器** 面板的下拉菜单中。\n\n### 基本映射\n\n1. 为每个手势（例如“向左看”）从下拉菜单中选择一个场景\n2. 当你做出该手势并稳定保持约 150ms 后，EsperantAI 会在直播软件中切换到对应场景\n3. 切换是自动的，几乎即时完成\n\n### 多动作（Pro+）\n\n使用 Pro 或 Pro+ 许可证时，一个手势可以同时触发**多个动作**：\n- 切换场景 + 播放声音 + 显示叠加层 + 向聊天发送消息\n\n### 启用/禁用分类\n\n每个分类都有自己的“启用”复选框：\n\n- 🧠 **头部旋转**（通用 — 默认启用）\n- 📏 **面部距离**（靠近或远离）\n- 👁️ **视线**（只移动眼睛）\n- 😀 **表情**（微笑、惊讶、愤怒、中性）\n- 👁️‍🗨️ **双眨眼**\n- ✋ **手势**（文化相关 — 默认禁用）\n\n禁用不需要的分类可以节省 CPU。\n\n---\n\n## 手势分类\n\n### 🌐 通用（在任何文化中含义相同）\n\n| 手势 | 轴 | 如何触发 |\n|---|---|---|\n| 居中 | — | 正视前方，面部保持稳定 |\n| 向左看 | yaw 负值 | 将头转向左侧 |\n| 向右看 | yaw 正值 | 将头转向右侧 |\n| 向上看 | pitch 负值 | 抬起脸 |\n| 向下看 | pitch 正值 | 低下脸 |\n| 向左倾斜 | roll 负值 | 将头向左肩倾斜 |\n| 向右倾斜 | roll 正值 | 将头向右肩倾斜 |\n| 靠近 | 距离 | 靠近摄像头 |\n| 远离 | 距离 | 远离摄像头 |\n| 视线 | 视线 | 只移动眼睛（头部居中） |\n| 微笑 | 表情=高兴 | 清楚地微笑 |\n| 惊讶 | 表情=惊讶 | 做出惊讶表情 |\n| 愤怒 | 表情=愤怒 | 做出生气表情 |\n| 中性 | 表情=中性 | 面部放松 |\n| 双眨眼 | 眨眼 | 快速闭合双眼两次（< 700ms） |\n\n### ⚠️ 文化相关（含义因国家或地区而异）\n\n| 手势 | 西方含义 | 其他文化中的注意事项 |\n|---|---|---|\n| 👍 竖大拇指 | 赞同 | 中东 / 西亚：可能具有冒犯性 |\n| ✌️ 胜利手势 | 和平 / 胜利 | 英国 / 爱尔兰 / 澳大利亚（手心向内）：侮辱手势 |\n| 🤘 摇滚手势 | 摇滚 / 金属乐 | 意大利（手心向下）：“cornuto”（侮辱） |\n| 👌 OK | OK / 完美 | 巴西 / 土耳其 / 德国：可能具有冒犯性 |\n| ✊ 握拳 | 随政治语境而变 | — |\n| 🖐️ 张开手掌 | “停”或问候 | 希腊（对人做 mountza）：强烈侮辱 |\n| ☝️ 指向 | 指示 | 亚洲：用手指指人通常不礼貌 |\n\nEsperantAI 会在界面中为每个手势显示对应标记。请根据你的全球观众选择要启用的手势。\n\n### 🙏 合掌（合掌）\n\n一个特殊手势：双手掌心在胸前合拢（类似祈祷或致意鞠躬）。在东亚文化中常用于表达尊重或感谢。EsperantAI 通过 6 项关键点检查来检测这个动作，可靠性较高。\n\n---\n\n## 连接直播平台\n\n为了让 EsperantAI 接收事件（打赏、订阅、raid、关注或 Super Chat），请连接你进行直播的平台。\n\n![平台事件状态](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. 在 https://dev.twitch.tv/console 创建 Client ID\n2. 注册重定向 URI：`https://edugame.digital/oauth-callback.html`（或你的本地 URL）\n3. 在 EsperantAI 中打开：**平台事件**面板 → **Twitch EventSub**\n4. 粘贴你的 Client ID\n5. 点击 **连接**\n6. Twitch 授权窗口会打开。接受权限。\n7. 窗口关闭后，你会看到“Twitch 已连接”\n\nEsperantAI 使用 EventSub WebSocket。不要把任何 Client Secret 粘贴到浏览器中。\n\n### YouTube Live\n\n1. 在 https://console.cloud.google.com 创建凭据\n2. 启用 YouTube Data API v3\n3. 创建 OAuth Client ID（类型：Web 应用）\n4. 注册与 Twitch 相同的重定向 URI\n5. 在 EsperantAI 中打开：**平台事件**面板 → **YouTube Live**\n6. 粘贴 Client ID 并点击 **连接**\n\nYouTube 要求：你必须有正在进行、且聊天可用的直播；你的 Google Cloud 项目也必须有足够配额来查询聊天。\n\n### Kick\n\n1. 在 Kick 开发者门户创建应用。\n2. 注册重定向 URI\n3. 在 EsperantAI 中打开：**平台事件**面板 → **Kick**\n4. 粘贴 Client ID 并点击 **连接**\n5. Kick 使用带 PKCE 的 OAuth 2.1。\n\n当前状态：**测试版/有限支持**。Kick 官方文档使用 webhook 接收完整事件。在浏览器内，EsperantAI 只能检测一部分有限活动；如果需要可靠的 Kick 订阅、礼物、raid 或完整事件，请使用 StreamElements 这类桥接，或使用后端/webhook。\n\n### StreamElements（跨平台桥接）\n\n如果你已经有 StreamElements 账户，可以把它作为多个平台提醒的桥接：\n\n1. 前往 https://streamelements.com/dashboard/account/channels\n2. 复制你的 JWT Token\n3. 在 EsperantAI 中打开：**平台事件**面板 → **StreamElements**\n4. 粘贴 JWT 并点击 **连接**\n\n请将该 token 保密。把它当作你的 StreamElements 账户密码处理。\n\n### Trovo\n\nEsperantAI 代码中包含 Trovo 技术适配器，基于 OAuth 和 Trovo WebSocket 聊天服务。当前公共界面还没有 Trovo 连接面板，因此它不作为普通用户流程记录。如果你现在需要 Trovo，请使用兼容桥接，或等待 Trovo 面板启用。\n\n---\n\n## 事件 + 手势组合（高级）\n\n这是 EsperantAI 的核心能力：把**平台事件**和**你的手势**组合起来，由手势作为确认。\n\n![事件加手势流程](assets/manual/04-event-gesture-combo.svg)\n\n### 示例：用竖大拇指感谢打赏\n\n1. **事件触发器**面板 → “💰 打赏”行\n2. ✅ 启用\n3. 场景：`Escena_Gracias`\n4. 必需手势：`👍 竖大拇指`\n\n**直播流程**：\n- 收到打赏 → EsperantAI 显示“等待手势...”\n- 你有 5 秒时间做出 👍\n- 如果做出手势 → 切换到 `Escena_Gracias` + 执行其他已配置动作\n- 如果没有做出 → 自动取消\n\n### 不要求手势（自动触发）\n\n如果把“必需手势”保持为 `— 无 —`，事件会立即触发动作。\n\n适用于：\n- 收到 raid 时自动切换到庆祝场景\n- 有人订阅时自动显示叠加层\n\n---\n\n## 灵敏度与死区\n\n### 灵敏度\n\n阈值控制手势需要多明显才会触发：\n\n- **Yaw**：头部向左右转动的幅度（默认：0.15 rad ≈ 8.6°）\n- **Pitch 上/下**：垂直倾斜\n- **Roll**：侧向倾斜\n\n调高数值需要更明显的手势。调低数值会提高灵敏度。\n\n### 死区（防疲劳）\n\n如果你几乎处于居中状态（yaw < 0.05、pitch < 0.05、roll < 0.08），**不会触发任何动作**。这样你可以自然移动，不会因细微动作误触发。\n\n### 稳定帧数\n\n`稳定帧数` = 触发前必须连续保持手势的帧数。默认：5 帧（30fps 时约 150ms）。\n\n如果触发太容易，请调高。若需要更快响应，请调低。\n\n### 冷却时间\n\n`冷却时间 (ms)` = 两次场景切换之间的最短时间。默认：500ms。\n\n它可以避免你快速摆动时切换不稳定。\n\n---\n\n## 键盘快捷键\n\n| 按键 | 动作 |\n|---|---|\n| `空格` | 暂停 / 恢复检测 |\n| `C` | 手动跳转到“居中”场景 |\n| `R` | 从直播软件重新加载场景列表 |\n| `Esc` | 断开连接 |\n\n---\n\n## 触发历史\n\n**高级 → 触发历史**面板会显示最近 50 条已触发动作：\n\n- ✓ 绿色 = 成功\n- ✗ 红色 = 失败\n- · 灰色 = 待处理\n\n这有助于在不打开 DevTools 的情况下审计触发了哪些动作。\n\n**导出 CSV**：下载历史记录，供离线分析。\n\n**清除**：清空历史记录（不影响其他内容）。\n\n---\n\n## 更改语言\n\nEsperantAI 会自动检测你的操作系统语言。如果要手动更改：\n\n- 右上角：语言下拉菜单\n- 选择你偏好的语言\n- 界面会立即更新\n\n可用语言：\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\n当前界面文件已翻译为 15 种语言。\n\n---\n\n## 管理你的许可证\n\n**高级 → 许可证**面板：\n\n- **查看状态**：有效 / 无效\n- **查看关联的客户电子邮件**\n- **查看上次在线验证时间**\n- **在此设备上停用**：更换电脑前使用，或释放一个设备名额（最多 3 个）\n\n## 故障排除\n\n### 粘贴许可证密钥后仍显示“需要激活”\n\n- 确认你复制了完整密钥（5 组 4 个字符，以连字符分隔）\n- 检查网络连接（首次激活需要在线验证）\n- 如果已在 3 台设备上激活，请先停用其中一台\n- 如果问题仍然存在，请联系 soporte@edugame.digital\n\n### 面部可见，但一直显示“正在寻找面部...”\n\n- 改善照明：你的面部应有足够光线\n- 靠近摄像头（40-80 cm 最佳）\n- 关闭其他使用 GPU 的标签页（打开太多标签页时，Chrome 可能限制 GPU）\n- 如果 Chrome 内存节省程序已启用，请为此标签页停用\n\n### 场景没有出现在下拉菜单中\n\n- 确认你已经连接到直播软件（绿色“已连接”标记）\n- 按 `R` 重新加载场景列表\n- 如果仍然为空，请断开后重新连接\n- 在 vMix 中，确认 Web Controller 已启用，并可通过 `http://127.0.0.1:8088/api/` 访问\n- 在 PRISM 中，确认 obs-websocket 插件已安装并启用\n- 在 XSplit 中，确认本地 XJS 桥接正在运行\n\n### 没有做手势却触发了场景切换\n\n- 在 **灵敏度** 面板中提高 yaw / pitch / roll 阈值\n- 将 `稳定帧数` 从 5 提高到 8-10\n- 确认死区已配置（yaw 0.05、pitch 0.05、roll 0.08）\n- 检查画面中是否有其他人（多张面孔可能造成不稳定）\n\n### 检测有延迟\n\n- 关闭占用资源较高的应用（游戏、视频编辑软件）\n- 如果有独立显卡，确认正在使用独立显卡而不是集成显卡\n- 如果摄像头是 4K，请降低分辨率（1080p 对检测更合适）\n\n### OBS 没有反应，但 EsperantAI 显示“场景已切换”\n\n- 确认下拉菜单中的场景名称与 OBS 中的名称**完全一致**（区分大小写）\n- 确认该场景不在其他场景集合中\n- 查看 **触发历史** 面板。如果显示红色 ✗，里面会有具体错误\n\n### 错误：“OBS 无法访问 — 请手动连接”\n\n- 确认 OBS 已打开\n- 确认 OBS 中已启用 WebSocket\n- 如果你在 OBS 中设置了密码，密码必须完全一致\n- 某些杀毒软件会阻止端口 4455，请添加例外\n\n### Twitch 或 YouTube 无法连接\n\n- 确认平台控制台里的重定向 URI 与 `oauth-callback.html` 的 URL 完全一致\n- 允许 EsperantAI 所在域名打开弹出窗口\n- 在 Twitch 中只使用 Client ID；不要粘贴 Client Secret\n- 在 YouTube 中确认 YouTube Data API v3 已启用，并且有正在进行的直播\n\n### Kick 没有显示所有事件\n\nKick 在浏览器中处于测试版/有限支持。Kick 的完整事件官方通过 webhook 接收；如果需要可靠的订阅、礼物或 raid，请使用 StreamElements 或你自己的后端。\n\n---\n\n## 隐私\n\n### EsperantAI 不会做的事\n\n- ❌ 不会把你的视频发送到任何服务器\n- ❌ 不会存储你的视频或截图\n- ❌ 不会远程收集生物特征信息\n- ❌ 不会与广告商或第三方共享数据\n\n### EsperantAI 会处理的内容\n\n- ✅ 在你的浏览器中进行本地面部检测（Human.js + WebGL）\n- ✅ 与 OBS / Streamlabs / vMix / PRISM / XSplit 建立本地连接（loopback `127.0.0.1`）\n- ✅ 定期验证许可证密钥（每 7 天）\n- ✅ 如果连接 Twitch/YouTube/Kick/StreamElements：平台 token 会保存在浏览器本地存储或会话存储中\n\n完整详情见 `docs/PRIVACY.html`。\n\n---\n\n## 技术支持\n\n- 📧 电子邮件：**soporte@edugame.digital**\n- 🌐 网站：https://edugame.digital\n- 📚 技术文档：https://github.com/salazarjoelo/EsperantAI\n\n响应时间：\n- 一般咨询：24-72 小时\n- 技术错误：1-3 个工作日\n\n---\n\n*最后更新：2026-05-20。版本：3.0。*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'ko-KR': { name: '한국어', flag: '🇰🇷', content: "# EsperantAI — 사용자 매뉴얼\n\n> **정직한 제스처.** 전용 추가 하드웨어 없이 얼굴과 손동작으로 스트리밍 소프트웨어를 제어하세요.\n\n**버전**: 3.0 · **언어**: 한국어 (추가 14개 언어 번역 제공)\n\n**기술 검증**: OBS Studio, Streamlabs Desktop, vMix, PRISM Live Studio, XSplit, Twitch, YouTube Live, Kick, Trovo, StreamElements의 2026년 5월 20일 기준 공식 문서를 바탕으로 검토했습니다. 세부 내용: [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md).\n\n---\n\n## 목차\n\n1. [EsperantAI란?](#esperantai란)\n2. [최소 사양](#최소-사양)\n3. [구매 및 활성화](#구매-및-활성화)\n4. [처음 사용하기](#처음-사용하기)\n5. [스트리밍 소프트웨어 연결](#스트리밍-소프트웨어-연결)\n6. [제스처와 씬 설정](#제스처와-씬-설정)\n7. [제스처 카테고리](#제스처-카테고리)\n8. [스트리밍 플랫폼 연결](#스트리밍-플랫폼-연결)\n9. [이벤트 + 제스처 조합 (고급)](#이벤트--제스처-조합-고급)\n10. [감도와 데드존](#감도와-데드존)\n11. [키보드 단축키](#키보드-단축키)\n12. [트리거 기록](#트리거-기록)\n13. [언어 변경](#언어-변경)\n14. [라이선스 관리](#라이선스-관리)\n15. [문제 해결](#문제-해결)\n16. [개인정보](#개인정보)\n17. [지원](#지원)\n\n---\n\n## EsperantAI란?\n\nEsperantAI는 인공지능으로 얼굴과 손 제스처를 실시간 감지하고, 이를 스트리밍 소프트웨어 명령으로 변환하는 **웹 애플리케이션**입니다. 카메라 영상은 사용자의 브라우저 안에서 로컬로 처리됩니다.\n\n![EsperantAI 로컬 흐름](assets/manual/01-esperantai-flow.svg)\n\n다음 방송 프로그램과 함께 사용할 수 있습니다.\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (베타)\n\n플랫폼 이벤트를 받아 사용자의 제스처와 조합할 수도 있습니다.\n\n- **Twitch**: EventSub WebSocket을 통한 직접 지원.\n- **YouTube Live**: YouTube Data API v3를 통한 직접 지원. 활성 라이브 방송과 사용 가능한 할당량이 필요합니다.\n- **Kick**: 브라우저 기반 베타/제한 지원. Kick의 전체 이벤트를 쓰려면 공식 백엔드/웹훅 또는 브리지가 필요합니다.\n- **StreamElements**: 계정의 토큰/JWT를 사용하는 멀티플랫폼 브리지.\n- **Trovo**: 코드에는 기술 어댑터가 있지만, 현재 공개 UI에는 연결 패널이 아직 노출되어 있지 않습니다.\n\n### 왜 \"정직한 제스처\"인가요?\n\n기본 얼굴 표정과 머리 회전은 **모든 인간 문화권에서 보편적**입니다(Paul Ekman, 1972). 거짓말하지 않고, 지역에 따라 의미가 크게 달라지지 않습니다. EsperantAI는 이런 제스처를 \"🌐 보편\" 제스처로 부르며, 나라에 따라 의미가 달라질 수 있는 \"⚠️ 문화권별\" 제스처(손동작)와 구분합니다.\n\n어떤 제스처를 사용할지는 시청자층에 맞춰 직접 선택합니다.\n\n---\n\n## 최소 사양\n\n### 하드웨어\n\n- **USB 웹캠** 아무 모델이나 사용 가능(권장: 1080p 이상)\n- **CPU**: 최근 5년 이내의 4코어 이상 프로세서\n- **RAM**: 최소 8 GB. 동시에 스트리밍한다면 16 GB 권장\n- **GPU**: WebGL 지원 GPU. 최신 내장 그래픽도 작동합니다\n\n### 소프트웨어\n\n- **운영 체제**: Windows 10/11, macOS 12+, 또는 최신 커널의 Linux\n- **브라우저**: Chrome 90+, Edge 90+, 또는 Firefox 100+\n- **스트리밍 소프트웨어**(최소 1개): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### 인터넷\n\n- **라이선스 활성화**와 **7일마다 이루어지는 재검증**에 필요합니다\n- 오프라인에서도 **최대 7일** 동안 사용할 수 있습니다(유예 기간)\n\n---\n\n## 구매 및 활성화\n\n1. **https://edugame.digital**에 접속합니다.\n2. **\"라이선스 구매\"**를 클릭합니다.\n3. LemonSqueezy에서 결제를 완료합니다(카드, PayPal 등).\n4. 다음 내용이 포함된 이메일을 받습니다.\n   - **라이선스 키**(형식: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - EsperantAI 사용 링크\n5. 브라우저에서 EsperantAI를 엽니다.\n6. 활성화 화면이 표시되면 라이선스 키를 붙여넣습니다.\n7. **\"라이선스 활성화\"**를 클릭합니다.\n8. 완료입니다.\n\n### 몇 대의 기기에서 사용할 수 있나요?\n\n하나의 라이선스는 **최대 3대의 기기**에서 활성화할 수 있습니다. 다른 기기로 라이선스를 옮기려면 다음 순서로 진행합니다.\n\n1. 기존 기기: **고급** 패널 → **라이선스** → **이 기기에서 비활성화**\n2. 새 기기: 평소와 같이 활성화\n\n---\n\n## 처음 사용하기\n\n### 1단계: 카메라 접근 허용\n\nEsperantAI를 처음 열면 브라우저가 카메라 접근 권한을 요청합니다. **허용**을 선택하세요.\n\n> 중요: EsperantAI는 사용자의 영상을 어떤 서버로도 전송하지 않습니다. 처리는 100% 사용자의 기기에서 로컬로 이루어집니다.\n\n### 2단계: 카메라 선택\n\n카메라가 여러 대라면 카메라 드롭다운 메뉴에서 사용할 카메라를 선택합니다.\n\n### 3단계: 감지 확인\n\n왼쪽 패널에 얼굴이 표시됩니다. EsperantAI가 얼굴을 감지하면 Yaw / Pitch / Roll 표시기에 값이 나타나기 시작합니다.\n\n### 4단계: 보정 마법사 (Pro+)\n\nPro 또는 Pro+ 라이선스가 있으면 처음 사용할 때 **보정 마법사**가 자동으로 실행됩니다. 자연스러운 움직임 범위를 측정하고 최적 감도를 설정합니다. 나중에도 **재보정** 버튼으로 언제든 다시 실행할 수 있습니다.\n\n---\n\n## 스트리밍 소프트웨어 연결\n\n![스트리밍 소프트웨어 연결 매트릭스](assets/manual/02-software-setup.svg)\n\n이 섹션의 모든 연결은 로컬 연결입니다. EsperantAI는 같은 컴퓨터에서 실행 중인 방송 프로그램과 `127.0.0.1`을 통해 통신합니다.\n\n### OBS Studio\n\n1. OBS에서 **도구 → WebSocket 서버 설정**을 엽니다.\n2. WebSocket 서버를 활성화합니다. OBS Studio 28+에는 obs-websocket이 이미 포함되어 있습니다.\n3. EsperantAI에서 **연결** 패널을 엽니다.\n4. 스트리밍 소프트웨어: **OBS Studio**를 선택합니다.\n5. WebSocket URL: `ws://127.0.0.1:4455`(기본값)\n6. 비밀번호: OBS에서 비밀번호를 켰다면 그 값을 입력합니다.\n7. **연결**을 클릭합니다.\n\n### Streamlabs Desktop\n\n1. Streamlabs Desktop에서 **Settings → Remote Control**을 엽니다.\n2. 로컬 원격 제어를 활성화합니다.\n3. Remote Control 화면의 **API Token**을 복사합니다.\n4. EsperantAI에서 스트리밍 소프트웨어를 **Streamlabs Desktop**으로 선택합니다.\n5. API Token을 붙여넣습니다.\n6. 포트: `59650`(기본값)\n7. **연결**을 클릭합니다.\n\n### vMix\n\n1. vMix에서 **Settings → Web Controller**를 엽니다.\n2. Web Controller를 활성화합니다. 기본 포트는 `8088`입니다.\n3. EsperantAI에서 스트리밍 소프트웨어를 **vMix**로 선택합니다.\n4. 호스트: `127.0.0.1`\n5. 포트: `8088`\n6. **연결**을 클릭합니다.\n\n> 참고: 현재 EsperantAI의 vMix 어댑터는 vMix의 로컬 HTTP API를 사용합니다. Web Controller가 브라우저에서 접근할 수 없도록 네트워크 규칙이나 호환되지 않는 인증 방식으로 보호되어 있으면 연결이 실패할 수 있습니다.\n\n### PRISM Live Studio\n\n1. **PRISM Live Studio v4.0.5+**를 사용합니다.\n2. OBS/PRISM과 호환되는 `obs-websocket` 플러그인을 수동으로 설치합니다.\n3. PRISM의 공식 OBS 플러그인 안내에 따라 PRISM 플러그인 폴더에 복사합니다.\n4. PRISM을 다시 시작합니다.\n5. **도구 → WebSocket 서버 설정**에서 WebSocket을 활성화합니다.\n6. EsperantAI에서 스트리밍 소프트웨어를 **PRISM Live Studio**로 선택합니다(OBS와 같은 방식으로 작동).\n\n> 중요한 차이: OBS 28+에는 obs-websocket이 이미 포함되어 있습니다. PRISM은 플러그인을 직접 설치해야 합니다.\n\n### XSplit Broadcaster (베타)\n\n1. **XSplit XJS / Remote xjs**와 호환되는 로컬 브리지를 설치하거나 활성화합니다.\n2. 해당 브리지가 로컬 WebSocket URL을 노출하는지 확인합니다.\n3. EsperantAI에서 스트리밍 소프트웨어를 **XSplit**으로 선택합니다.\n4. Remote xjs 프록시 URL: `ws://127.0.0.1:5555/xjs`(기본값)\n5. **연결**을 클릭합니다.\n\n> XSplit은 **베타/고급** 지원 상태입니다. 호환성은 설치된 로컬 XJS 브리지에 따라 달라지며, 고급 기능은 제한될 수 있습니다.\n\n---\n\n## 제스처와 씬 설정\n\n연결이 완료되면 방송 소프트웨어의 실제 씬이 **트리거** 패널의 드롭다운 메뉴에 자동으로 표시됩니다.\n\n### 기본 매핑\n\n1. 각 제스처(예: \"왼쪽 보기\")마다 드롭다운에서 씬을 선택합니다.\n2. 해당 제스처를 취하고 약 150ms 동안 안정적으로 유지하면 EsperantAI가 스트리밍 소프트웨어의 씬을 전환합니다.\n3. 전환은 자동이며 거의 즉시 실행됩니다.\n\n### 멀티 액션 (Pro+)\n\nPro 또는 Pro+ 라이선스가 있으면 하나의 제스처로 **여러 동작**을 동시에 실행할 수 있습니다.\n\n- 씬 전환 + 소리 재생 + 오버레이 표시 + 채팅 메시지 전송\n\n### 카테고리 활성화 / 비활성화\n\n각 카테고리에는 별도의 \"활성화\" 체크박스가 있습니다.\n\n- 🧠 **머리 회전**(보편 — 기본 활성화)\n- 📏 **얼굴 거리**(카메라에 가까이 가기 또는 멀어지기)\n- 👁️ **시선**(눈만 움직이기)\n- 😀 **감정**(미소, 놀람, 화남, 중립)\n- 👁️‍🗨️ **두 번 깜박임**\n- ✋ **손 제스처**(문화권별 — 기본 비활성화)\n\n필요하지 않은 카테고리를 끄면 CPU 사용량을 줄일 수 있습니다.\n\n---\n\n## 제스처 카테고리\n\n### 🌐 보편 제스처 (어느 문화권에서도 같은 의미)\n\n| 제스처 | 축 | 활성화 방법 |\n|---|---|---|\n| 중앙 | — | 정면을 보고 얼굴을 안정적으로 유지 |\n| 왼쪽 보기 | yaw 음수 | 머리를 왼쪽으로 돌리기 |\n| 오른쪽 보기 | yaw 양수 | 머리를 오른쪽으로 돌리기 |\n| 위 보기 | pitch 음수 | 얼굴을 들어 올리기 |\n| 아래 보기 | pitch 양수 | 얼굴을 아래로 내리기 |\n| 왼쪽으로 기울이기 | roll 음수 | 머리를 왼쪽 어깨 쪽으로 기울이기 |\n| 오른쪽으로 기울이기 | roll 양수 | 머리를 오른쪽 어깨 쪽으로 기울이기 |\n| 가까이 가기 | 거리 | 카메라에 가까이 가기 |\n| 멀어지기 | 거리 | 카메라에서 멀어지기 |\n| 시선 | 시선 | 머리는 중앙에 둔 채 눈만 움직이기 |\n| 미소 | 감정=행복 | 또렷하게 미소 짓기 |\n| 놀람 | 감정=놀람 | 놀란 표정 짓기 |\n| 화남 | 감정=화남 | 화난 표정 짓기 |\n| 중립 | 감정=중립 | 편안한 얼굴 |\n| 두 번 깜박임 | 깜박임 | 양쪽 눈을 빠르게 두 번 감기(< 700ms) |\n\n### ⚠️ 문화권별 제스처 (나라에 따라 의미가 달라질 수 있음)\n\n| 제스처 | 서구권에서의 의미 | 다른 문화권에서의 주의점 |\n|---|---|---|\n| 👍 엄지 올리기 | 승인 | 중동 / 서아시아: 모욕으로 받아들여질 수 있음 |\n| ✌️ 평화 | 평화 / 승리 | 영국 / 아일랜드 / 호주(손바닥이 안쪽): 모욕 |\n| 🤘 록 사인 | 록 / 메탈 | 이탈리아(손바닥이 아래): \"cornuto\"(모욕) |\n| 👌 OK | OK / 완벽 | 브라질 / 튀르키예 / 독일: 모욕으로 받아들여질 수 있음 |\n| ✊ 주먹 | 정치적 맥락에 따라 다름 | — |\n| 🖐️ 펼친 손바닥 | \"멈춤\" 또는 인사 | 그리스(상대에게 mountza): 강한 모욕 |\n| ☝️ 가리키기 | 지시 | 아시아: 손가락으로 가리키는 행동은 무례할 수 있음 |\n\nEsperantAI는 인터페이스에서 각 제스처에 해당하는 배지를 표시합니다. 전 세계 시청자층을 고려해 사용할 제스처를 선택하세요.\n\n### 🙏 합장 (合掌)\n\n특별한 제스처입니다. 기도나 예를 갖춘 인사처럼 양손바닥을 가슴 앞에서 맞댑니다. 동아시아 문화권에서 존중이나 감사를 표현할 때 흔히 쓰입니다. 6개의 랜드마크 검사를 통해 높은 신뢰도로 감지됩니다.\n\n---\n\n## 스트리밍 플랫폼 연결\n\nEsperantAI가 이벤트(도네이션, 구독, 레이드, 팔로우 또는 Super Chat)를 받으려면 방송 중인 플랫폼을 연결하세요.\n\n![플랫폼별 이벤트 상태](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. https://dev.twitch.tv/console 에서 Client ID를 만듭니다.\n2. 리디렉트 URI를 등록합니다: `https://edugame.digital/oauth-callback.html`(또는 로컬 URL)\n3. EsperantAI에서 **플랫폼 이벤트** 패널 → **Twitch EventSub**를 엽니다.\n4. Client ID를 붙여넣습니다.\n5. **연결**을 클릭합니다.\n6. Twitch 인증 창이 열리면 권한을 허용합니다.\n7. 창이 닫히고 \"Twitch 연결됨\"이 표시됩니다.\n\nEsperantAI는 EventSub WebSocket을 사용합니다. 브라우저에는 어떤 Client Secret도 붙여넣지 마세요.\n\n### YouTube Live\n\n1. https://console.cloud.google.com 에서 사용자 인증 정보를 만듭니다.\n2. YouTube Data API v3를 활성화합니다.\n3. OAuth Client ID를 만듭니다(유형: 웹 애플리케이션).\n4. Twitch와 같은 리디렉트 URI를 등록합니다.\n5. EsperantAI에서 **플랫폼 이벤트** 패널 → **YouTube Live**를 엽니다.\n6. Client ID를 붙여넣고 **연결**을 클릭합니다.\n\nYouTube 요구 사항: 채팅을 사용할 수 있는 활성 라이브 방송이 있어야 하며, Google Cloud 프로젝트에 채팅 조회에 필요한 할당량이 충분해야 합니다.\n\n### Kick\n\n1. Kick 개발자 포털에서 애플리케이션을 만듭니다.\n2. 리디렉트 URI를 등록합니다.\n3. EsperantAI에서 **플랫폼 이벤트** 패널 → **Kick**을 엽니다.\n4. Client ID를 붙여넣고 **연결**을 클릭합니다.\n5. Kick은 PKCE가 포함된 OAuth 2.1을 사용합니다.\n\n현재 상태: **베타/제한**. Kick 공식 문서는 전체 이벤트에 웹훅을 사용합니다. 브라우저에서 EsperantAI가 감지할 수 있는 활동은 일부로 제한됩니다. Kick 구독, 선물, 레이드 또는 신뢰도 높은 이벤트가 필요하다면 StreamElements 같은 브리지나 백엔드/웹훅을 사용하세요.\n\n### StreamElements (멀티플랫폼 브리지)\n\n이미 StreamElements 계정이 있다면 여러 플랫폼의 알림을 위한 브리지로 사용할 수 있습니다.\n\n1. https://streamelements.com/dashboard/account/channels 로 이동합니다.\n2. JWT Token을 복사합니다.\n3. EsperantAI에서 **플랫폼 이벤트** 패널 → **StreamElements**를 엽니다.\n4. JWT를 붙여넣고 **연결**을 클릭합니다.\n\n이 토큰은 비공개로 보관하세요. StreamElements 계정의 비밀번호처럼 취급해야 합니다.\n\n### Trovo\n\nEsperantAI 코드에는 Trovo의 OAuth와 WebSocket 채팅 서비스를 기반으로 한 기술 어댑터가 포함되어 있습니다. 하지만 현재 공개 인터페이스에는 Trovo 연결 패널이 아직 없으므로 일반 사용자 흐름으로 문서화하지 않습니다. 지금 Trovo가 필요하다면 호환되는 브리지를 사용하거나 Trovo 패널이 활성화될 때까지 기다리세요.\n\n---\n\n## 이벤트 + 제스처 조합 (고급)\n\nEsperantAI의 핵심은 **플랫폼 이벤트**와 **사용자의 제스처**를 확인 단계로 결합하는 것입니다.\n\n![이벤트와 제스처 조합 흐름](assets/manual/04-event-gesture-combo.svg)\n\n### 예시: 엄지 올리기로 도네이션에 감사하기\n\n1. **이벤트 트리거** 패널 → \"💰 도네이션\" 행\n2. ✅ 활성화\n3. 씬: `Escena_Gracias`\n4. 필수 제스처: `👍 엄지 올리기`\n\n**라이브 흐름**:\n\n- 도네이션이 들어옴 → EsperantAI가 \"제스처 대기 중...\"을 표시\n- 5초 안에 👍을 해야 함\n- 제스처를 하면 → `Escena_Gracias`로 전환 + 설정된 다른 동작 실행\n- 하지 않으면 → 자동으로 취소\n\n### 필수 제스처 없음 (자동 실행)\n\n\"필수 제스처\"를 `— 없음 —`으로 두면 이벤트가 즉시 동작을 실행합니다.\n\n유용한 경우:\n\n- 레이드가 들어오면 자동으로 축하 씬으로 전환\n- 누군가 구독하면 자동으로 오버레이 표시\n\n---\n\n## 감도와 데드존\n\n### 감도\n\n임계값은 제스처가 실행되려면 얼마나 크게 움직여야 하는지를 제어합니다.\n\n- **Yaw**: 머리를 좌우로 얼마나 돌려야 하는지(기본값: 0.15 rad ≈ 8.6°)\n- **Pitch 위/아래**: 세로 방향 기울기\n- **Roll**: 좌우 방향 기울기\n\n값을 높이면 더 뚜렷한 제스처가 필요합니다. 값을 낮추면 더 민감해집니다.\n\n### 데드존 (피로 방지)\n\n거의 중앙에 있을 때(yaw < 0.05, pitch < 0.05, roll < 0.08)는 **아무것도 실행되지 않습니다**. 자연스럽게 움직여도 미세한 움직임이 트리거를 켜지 않도록 도와줍니다.\n\n### 안정 프레임\n\n`안정 프레임` = 트리거되기 전에 제스처를 몇 프레임 연속으로 유지해야 하는지. 기본값은 5프레임입니다(30fps 기준 약 150ms).\n\n트리거가 너무 쉽게 켜진다면 값을 올리세요. 더 빠른 반응이 필요하면 낮추세요.\n\n### 쿨다운\n\n`쿨다운 (ms)` = 씬 전환 사이의 최소 시간. 기본값은 500ms입니다.\n\n빠르게 흔들릴 때 전환이 불안정해지는 것을 막습니다.\n\n---\n\n## 키보드 단축키\n\n| 키 | 동작 |\n|---|---|\n| `스페이스` | 감지 일시정지 / 재개 |\n| `C` | 수동으로 중앙 씬으로 이동 |\n| `R` | 소프트웨어에서 씬 목록 다시 불러오기 |\n| `Esc` | 연결 해제 |\n\n---\n\n## 트리거 기록\n\n**고급 → 트리거 기록** 패널에는 최근 실행된 50개의 동작이 표시됩니다.\n\n- ✓ 초록 = 성공\n- ✗ 빨강 = 실패\n- · 회색 = 대기 중\n\nDevTools를 열지 않고도 무엇이 실행되었는지 확인할 때 유용합니다.\n\n**CSV 내보내기**: 오프라인 분석을 위해 기록을 다운로드합니다.\n\n**지우기**: 기록을 삭제합니다(다른 항목에는 영향을 주지 않습니다).\n\n---\n\n## 언어 변경\n\nEsperantAI는 운영 체제의 언어를 자동으로 감지합니다. 수동으로 변경하려면 다음을 사용하세요.\n\n- 오른쪽 위: 언어 드롭다운 메뉴\n- 원하는 언어 선택\n- 인터페이스가 즉시 업데이트됩니다\n\n사용 가능한 언어:\n\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\n현재 인터페이스 파일에는 15개 언어가 번역되어 있습니다.\n\n---\n\n## 라이선스 관리\n\n**고급 → 라이선스** 패널:\n\n- **상태 보기**: 유효 / 무효\n- **연결된 고객 이메일 보기**\n- **마지막 온라인 검증 보기**\n- **이 기기에서 비활성화**: PC를 바꾸기 전이나 사용 가능한 3개 슬롯 중 하나를 비울 때 사용합니다\n\n## 문제 해결\n\n### 라이선스 키를 붙여넣었는데도 \"활성화 필요\"가 계속 표시됨\n\n- 키 전체를 복사했는지 확인합니다(하이픈으로 구분된 4자리 5그룹).\n- 인터넷 연결을 확인합니다(첫 활성화에는 온라인 검증이 필요합니다).\n- 이미 3대의 기기에서 활성화했다면 먼저 한 대를 비활성화합니다.\n- 문제가 계속되면 soporte@edugame.digital 로 문의하세요.\n\n### 얼굴이 보이는데도 \"얼굴 검색 중...\"이 계속 표시됨\n\n- 조명을 개선하세요. 얼굴이 충분히 밝아야 합니다.\n- 카메라에 조금 더 가까이 가세요(40-80 cm가 적절합니다).\n- GPU를 사용하는 다른 탭을 닫으세요(Chrome은 탭이 너무 많으면 GPU 사용을 제한할 수 있습니다).\n- Chrome 메모리 절약 모드가 켜져 있다면 이 탭에서는 끄세요.\n\n### 드롭다운 메뉴에 씬이 나타나지 않음\n\n- 스트리밍 소프트웨어에 연결되어 있는지 확인합니다(초록색 \"연결됨\" 배지).\n- `R`을 눌러 씬 목록을 다시 불러옵니다.\n- 그래도 비어 있다면 연결을 끊었다가 다시 연결합니다.\n- vMix에서는 Web Controller가 활성화되어 있고 `http://127.0.0.1:8088/api/`에서 접근 가능한지 확인합니다.\n- PRISM에서는 obs-websocket 플러그인이 설치되어 있고 활성화되어 있는지 확인합니다.\n- XSplit에서는 로컬 XJS 브리지가 실행 중인지 확인합니다.\n\n### 제스처를 하지 않았는데 씬 전환이 실행됨\n\n- **감도** 패널에서 yaw / pitch / roll 임계값을 올립니다.\n- `안정 프레임`을 5에서 8-10으로 올립니다.\n- 데드존이 설정되어 있는지 확인합니다(yaw 0.05, pitch 0.05, roll 0.08).\n- 화면 안에 다른 사람이 없는지 확인합니다(얼굴이 여러 개 있으면 불안정할 수 있습니다).\n\n### 감지가 느림\n\n- 게임, 영상 편집 프로그램처럼 무거운 앱을 닫습니다.\n- 전용 GPU가 있다면 내장 그래픽이 아니라 전용 GPU를 사용 중인지 확인합니다.\n- 카메라가 4K라면 해상도를 낮춥니다(감지에는 1080p가 적절합니다).\n\n### EsperantAI는 \"씬 변경됨\"이라고 표시하지만 OBS가 반응하지 않음\n\n- 드롭다운 메뉴의 씬 이름이 OBS의 씬 이름과 정확히 같은지 확인합니다(대소문자 구분).\n- 해당 씬이 다른 씬 컬렉션에 있지 않은지 확인합니다.\n- **트리거 기록** 패널을 확인합니다. ✗ 빨강이 표시되면 구체적인 오류가 있습니다.\n\n### \"OBS에 연결할 수 없음 — 수동으로 연결하세요\" 오류\n\n- OBS가 열려 있는지 확인합니다.\n- OBS에서 WebSocket이 활성화되어 있는지 확인합니다.\n- OBS에서 비밀번호를 설정했다면 정확히 일치해야 합니다.\n- 일부 백신 프로그램이 4455 포트를 차단할 수 있습니다. 예외를 추가하세요.\n\n### Twitch 또는 YouTube가 연결되지 않음\n\n- 플랫폼 콘솔의 리디렉트 URI가 `oauth-callback.html`의 URL과 정확히 일치하는지 확인합니다.\n- EsperantAI를 사용하는 도메인에서 팝업 창을 허용합니다.\n- Twitch에서는 Client ID만 사용합니다. Client Secret은 붙여넣지 마세요.\n- YouTube에서는 YouTube Data API v3가 활성화되어 있고 활성 라이브 방송이 있는지 확인합니다.\n\n### Kick이 모든 이벤트를 표시하지 않음\n\nKick은 브라우저에서 **베타/제한** 모드입니다. Kick의 전체 이벤트는 공식적으로 웹훅으로 수신됩니다. 신뢰도 높은 구독, 선물, 레이드 이벤트가 필요하다면 StreamElements 또는 자체 백엔드를 사용하세요.\n\n---\n\n## 개인정보\n\n### EsperantAI가 하지 않는 일\n\n- ❌ 영상을 어떤 서버에도 보내지 않습니다\n- ❌ 영상이나 캡처를 저장하지 않습니다\n- ❌ 생체 정보를 원격으로 수집하지 않습니다\n- ❌ 데이터를 광고주나 제3자와 공유하지 않습니다\n\n### EsperantAI가 처리하는 일\n\n- ✅ 브라우저 안에서 로컬 얼굴 감지(Human.js + WebGL)\n- ✅ OBS / Streamlabs / vMix / PRISM / XSplit로의 로컬 연결(loopback `127.0.0.1`)\n- ✅ 라이선스 키의 주기적 검증(7일마다)\n- ✅ Twitch/YouTube/Kick/StreamElements를 연결한 경우: 브라우저의 로컬 또는 세션 저장소에 플랫폼 토큰 저장\n\n전체 세부 내용은 `docs/PRIVACY.html`에서 확인할 수 있습니다.\n\n---\n\n## 지원\n\n- 📧 이메일: **soporte@edugame.digital**\n- 🌐 웹: https://edugame.digital\n- 📚 기술 문서: https://github.com/salazarjoelo/EsperantAI\n\n응답 시간:\n\n- 일반 문의: 24-72시간\n- 기술 오류: 영업일 기준 1-3일\n\n---\n\n*최종 업데이트: 2026-05-20. 버전: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'fr-FR': { name: 'Français', flag: '🇫🇷', content: "# EsperantAI — Manuel d'utilisation\n\n> **Gestes honnêtes.** Contrôlez votre logiciel de streaming avec votre visage et vos mains, sans matériel supplémentaire dédié.\n\n**Version** : 3.0 · **Langue** : Français (traductions disponibles dans 14 autres langues)\n\n**Validation technique** : vérifié à partir de la documentation officielle disponible au **20 mai 2026** pour OBS Studio, Streamlabs Desktop, vMix, PRISM Live Studio, XSplit, Twitch, YouTube Live, Kick, Trovo et StreamElements. Détail : [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md).\n\n---\n\n## Table des matières\n\n1. [Qu'est-ce qu'EsperantAI ?](#quest-ce-quesperantai-)\n2. [Configuration minimale](#configuration-minimale)\n3. [Achat et activation](#achat-et-activation)\n4. [Première utilisation](#première-utilisation)\n5. [Connecter votre logiciel de streaming](#connecter-votre-logiciel-de-streaming)\n6. [Configurer les gestes et les scènes](#configurer-les-gestes-et-les-scènes)\n7. [Catégories de gestes](#catégories-de-gestes)\n8. [Connecter les plateformes de streaming](#connecter-les-plateformes-de-streaming)\n9. [Combinaisons Événement + Geste (Avancé)](#combinaisons-événement--geste-avancé)\n10. [Sensibilité et zone morte](#sensibilité-et-zone-morte)\n11. [Raccourcis clavier](#raccourcis-clavier)\n12. [Historique des déclencheurs](#historique-des-déclencheurs)\n13. [Changer la langue](#changer-la-langue)\n14. [Gérer votre licence](#gérer-votre-licence)\n15. [Dépannage](#dépannage)\n16. [Confidentialité](#confidentialité)\n17. [Support](#support)\n\n---\n\n## Qu'est-ce qu'EsperantAI ?\n\nEsperantAI est une **application web** qui utilise l'intelligence artificielle pour détecter vos gestes du visage et des mains en temps réel, puis les traduit en commandes pour votre logiciel de streaming. La vidéo de votre caméra est traitée localement dans votre navigateur.\n\n![Flux local d'EsperantAI](assets/manual/01-esperantai-flow.svg)\n\nFonctionne avec les logiciels de diffusion suivants :\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (bêta)\n\nIl peut aussi recevoir des événements de plateformes pour les combiner avec vos gestes :\n\n- **Twitch** : prise en charge directe via EventSub WebSocket.\n- **YouTube Live** : prise en charge directe via YouTube Data API v3 ; un direct actif et un quota disponible sont requis.\n- **Kick** : prise en charge bêta/limitée dans le navigateur. Les événements Kick complets exigent un backend, des webhooks officiels ou un pont.\n- **StreamElements** : pont multiplateforme avec le token/JWT de votre compte.\n- **Trovo** : un adaptateur technique existe dans le code, mais le panneau public de connexion n'est pas encore exposé dans l'interface actuelle.\n\n### Pourquoi « gestes honnêtes » ?\n\nLes expressions faciales de base et la rotation de la tête sont **universelles dans toutes les cultures humaines** (Paul Ekman, 1972). Elles ne mentent pas, elles ne varient pas selon la géographie. EsperantAI les appelle des gestes « 🌐 Universels » et les distingue des gestes « ⚠️ Culturels » (signes de la main), dont la signification peut varier selon les pays.\n\nC'est vous qui décidez quels gestes utiliser en fonction de votre audience.\n\n---\n\n## Configuration minimale\n\n### Matériel\n\n- **N'importe quelle webcam USB** (recommandation : 1080p ou supérieur)\n- **CPU** : tout processeur 4 cœurs ou plus des 5 dernières années\n- **RAM** : 8 Go minimum. 16 Go recommandés si vous streamez simultanément.\n- **GPU** : n'importe quel GPU avec support WebGL (même les GPU intégrés récents fonctionnent)\n\n### Logiciel\n\n- **OS** : Windows 10/11, macOS 12+ ou Linux avec noyau récent\n- **Navigateur** : Chrome 90+, Edge 90+ ou Firefox 100+\n- **Logiciel de streaming** (au moins un) : OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Internet\n\n- Requis pour **activer votre licence** et tous les **7 jours** pour la revalidation\n- Fonctionne **jusqu'à 7 jours hors ligne** (période de grâce)\n\n---\n\n## Achat et activation\n\n1. Rendez-vous sur **https://edugame.digital**\n2. Cliquez sur **« Buy License »**\n3. Effectuez le paiement via LemonSqueezy (carte, PayPal, etc.)\n4. Vous recevrez un e-mail contenant :\n   - Votre **clé de licence** (format : `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Un lien pour utiliser EsperantAI\n5. Ouvrez EsperantAI dans votre navigateur\n6. L'écran d'activation apparaîtra. Collez votre clé de licence\n7. Cliquez sur **« Activate License »**\n8. C'est fait ! 🎉\n\n### Combien d'appareils ?\n\nUne licence peut être activée sur **jusqu'à 3 appareils**. Pour transférer votre licence vers un autre appareil :\n\n1. Sur l'ancien appareil : panneau **Advanced** → **License** → **Deactivate on this device**\n2. Sur le nouvel appareil : activez normalement\n\n---\n\n## Première utilisation\n\n### Étape 1 : Autoriser l'accès à la caméra\n\nLorsque vous ouvrez EsperantAI pour la première fois, votre navigateur vous demandera l'autorisation d'accéder à la caméra. **Acceptez**.\n\n> Important : EsperantAI n'envoie jamais votre vidéo vers un serveur. Le traitement est 100 % local sur votre ordinateur.\n\n### Étape 2 : Sélectionner la caméra\n\nSi vous disposez de plusieurs caméras, choisissez celle à utiliser dans le menu déroulant.\n\n### Étape 3 : Vérifier la détection\n\nVous verrez votre visage dans le panneau de gauche. Lorsqu'EsperantAI détecte votre visage, les indicateurs Yaw / Pitch / Roll commenceront à afficher des valeurs.\n\n### Étape 4 : Assistant de calibrage (Pro+)\n\nSi vous possédez une licence Pro ou Pro+, l'**Assistant de calibrage** se lance automatiquement lors de la première utilisation. Il mesure votre amplitude naturelle de mouvement et définit une sensibilité optimale. Vous pouvez le relancer à tout moment via le bouton **Recalibrate**.\n\n---\n\n## Connecter votre logiciel de streaming\n\n![Matrice de connexion des logiciels de streaming](assets/manual/02-software-setup.svg)\n\nToutes les connexions de cette section sont locales : EsperantAI communique avec le logiciel de diffusion qui tourne sur le même ordinateur via `127.0.0.1`.\n\n### OBS Studio\n\n1. Dans OBS : **Outils → Paramètres du serveur WebSocket**\n2. Activez le serveur WebSocket. OBS Studio 28+ inclut déjà obs-websocket.\n3. Dans EsperantAI : panneau **Connexion**\n4. Logiciel de streaming : **OBS Studio**\n5. URL WebSocket : `ws://127.0.0.1:4455` (par défaut)\n6. Mot de passe : celui que vous avez configuré dans OBS, si vous en avez activé un\n7. Cliquez sur **Connecter**\n\n### Streamlabs Desktop\n\n1. Dans Streamlabs Desktop : **Settings → Remote Control**\n2. Activez le contrôle distant local\n3. Copiez l'**API Token** depuis l'écran Remote Control\n4. Dans EsperantAI : Logiciel de streaming : **Streamlabs Desktop**\n5. Token API : collez-le\n6. Port : `59650` (par défaut)\n7. Cliquez sur **Connecter**\n\n### vMix\n\n1. Dans vMix : **Settings → Web Controller**\n2. Activez Web Controller. Port par défaut : `8088`.\n3. Dans EsperantAI : Logiciel de streaming : **vMix**\n4. Hôte : `127.0.0.1`\n5. Port : `8088`\n6. Cliquez sur **Connecter**\n\n> Remarque : l'adaptateur actuel d'EsperantAI utilise l'API HTTP locale de vMix. Si vous avez protégé Web Controller avec des règles réseau ou des identifiants non compatibles avec le navigateur, la connexion peut échouer.\n\n### PRISM Live Studio\n\n1. Utilisez **PRISM Live Studio v4.0.5+**.\n2. Installez manuellement le plugin `obs-websocket` compatible avec OBS/PRISM.\n3. Copiez-le dans le dossier de plugins de PRISM en suivant le guide officiel de PRISM pour les plugins OBS.\n4. Redémarrez PRISM.\n5. Activez WebSocket dans **Outils → Paramètres du serveur WebSocket**\n6. Dans EsperantAI : Logiciel de streaming : **PRISM Live Studio** (fonctionne comme OBS)\n\n> Différence importante : OBS 28+ inclut déjà obs-websocket. PRISM exige l'installation manuelle du plugin.\n\n### XSplit Broadcaster (bêta)\n\n1. Installez ou activez un pont local compatible avec **XSplit XJS / Remote xjs**.\n2. Vérifiez que le pont expose une URL WebSocket locale.\n3. Dans EsperantAI : Logiciel de streaming : **XSplit**\n4. URL du proxy Remote xjs : `ws://127.0.0.1:5555/xjs` (par défaut)\n5. Cliquez sur **Connecter**\n\n> XSplit est en **bêta**. La compatibilité dépend du pont XJS local installé ; les fonctions avancées peuvent être limitées.\n\n---\n\n## Configurer les gestes et les scènes\n\nUne fois connecté, les scènes réelles de votre logiciel apparaîtront automatiquement dans les listes déroulantes du panneau **Déclencheurs**.\n\n### Mappage de base\n\n1. Pour chaque geste (par exemple, « Regarder à gauche »), choisissez une scène dans la liste déroulante\n2. Lorsque vous effectuez ce geste et le maintenez stable pendant ~150 ms, EsperantAI basculera vers cette scène dans votre logiciel de streaming\n3. Le changement est automatique et quasi instantané\n\n### Multi-action (Pro+)\n\nAvec une licence Pro ou Pro+, un seul geste peut déclencher **plusieurs actions** simultanément :\n- Changer de scène + jouer un son + afficher un overlay + envoyer un message dans le chat\n\n### Activer / désactiver les catégories\n\nChaque catégorie possède sa propre case à cocher « Activer » :\n\n- 🧠 **Rotation de la tête** (universel — activé par défaut)\n- 📏 **Distance du visage** (se rapprocher/s'éloigner)\n- 👁️ **Regard** (bouger uniquement les yeux)\n- 😀 **Émotions** (sourire, surprise, colère, neutre)\n- 👁️‍🗨️ **Double clin d'œil**\n- ✋ **Gestes de la main** (culturel — désactivé par défaut)\n\nDésactivez les catégories dont vous n'avez pas besoin pour économiser les ressources CPU.\n\n---\n\n## Catégories de gestes\n\n### 🌐 Universels (même signification dans toutes les cultures)\n\n| Geste | Axe | Comment l'activer |\n|---|---|---|\n| Centre | — | Regarder droit devant, visage stable |\n| Regarder à gauche | yaw négatif | Tourner la tête vers la gauche |\n| Regarder à droite | yaw positif | Tourner la tête vers la droite |\n| Regarder en haut | pitch négatif | Lever le visage |\n| Regarder en bas | pitch positif | Baisser le visage |\n| Inclinaison à gauche | roll négatif | Incliner la tête vers l'épaule gauche |\n| Inclinaison à droite | roll positif | Incliner la tête vers l'épaule droite |\n| Se rapprocher | distance | Rapprocher le visage de la caméra |\n| S'éloigner | distance | Éloigner le visage de la caméra |\n| Direction du regard | regard | Bouger uniquement les yeux (tête centrée) |\n| Sourire | émotion=heureux | Sourire clairement |\n| Surpris | émotion=surprise | Manifester clairement la surprise |\n| En colère | émotion=colère | Avoir l'air en colère |\n| Neutre | émotion=neutre | Visage détendu |\n| Double clignement | clignement | Fermer les deux yeux deux fois rapidement (< 700 ms) |\n\n### ⚠️ Culturels (la signification varie selon les pays)\n\n| Geste | Signification occidentale | Précaution dans d'autres cultures |\n|---|---|---|\n| 👍 Pouce levé | Approbation | Moyen-Orient / Asie de l'Ouest : peut être offensant |\n| ✌️ Paix | Paix / victoire | Royaume-Uni / Irlande / Australie (paume vers l'intérieur) : insulte |\n| 🤘 Cornes de rock | Rock/metal | Italie (paume vers le bas) : « cornuto » (insulte) |\n| 👌 OK | OK / parfait | Brésil / Turquie / Allemagne : peut être offensant |\n| ✊ Poing fermé | Variable selon le contexte politique | — |\n| 🖐️ Paume ouverte | « Stop » ou salutation | Grèce (mountza vers quelqu'un) : insulte grave |\n| ☝️ Montrer du doigt | Indiquer | Asie : montrer du doigt est impoli |\n\nEsperantAI marque chaque geste avec son badge correspondant dans l'interface. Choisissez lesquels utiliser en fonction de votre audience mondiale.\n\n### 🙏 Gassho (合掌)\n\nUn geste spécial : pressez les deux paumes l'une contre l'autre devant votre poitrine (comme une prière ou une salutation). Courant dans les cultures d'Asie de l'Est comme signe de respect ou de gratitude. Détecté avec une grande fiabilité grâce à 6 vérifications de points de repère.\n\n---\n\n## Connecter les plateformes de streaming\n\nPour qu'EsperantAI reçoive des événements (dons, abonnements, raids, follows ou Super Chats), connectez les plateformes sur lesquelles vous diffusez.\n\n![État des événements par plateforme](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. Créez un Client ID sur https://dev.twitch.tv/console\n2. Enregistrez l'URI de redirection : `https://edugame.digital/oauth-callback.html` (ou votre URL locale)\n3. Dans EsperantAI : panneau **Événements de plateforme** → **Twitch EventSub**\n4. Collez votre Client ID\n5. Cliquez sur **Connecter**\n6. Une fenêtre d'autorisation Twitch s'ouvrira. Acceptez les permissions.\n7. La fenêtre se fermera et vous verrez « Twitch connecté »\n\nEsperantAI utilise EventSub WebSocket. Ne collez aucun Client Secret dans le navigateur.\n\n### YouTube Live\n\n1. Créez des identifiants sur https://console.cloud.google.com\n2. Activez YouTube Data API v3\n3. Créez un OAuth Client ID (type : Web Application)\n4. Enregistrez la même URI de redirection que pour Twitch\n5. Dans EsperantAI : panneau **Événements de plateforme** → **YouTube Live**\n6. Collez votre Client ID et cliquez sur **Connecter**\n\nConditions YouTube : vous devez avoir un direct actif avec un chat disponible, et votre projet Google Cloud doit disposer d'un quota suffisant pour interroger le chat.\n\n### Kick\n\n1. Créez une application dans le portail développeur de Kick.\n2. Enregistrez l'URI de redirection\n3. Dans EsperantAI : panneau **Événements de plateforme** → **Kick**\n4. Collez votre Client ID et cliquez sur **Connecter**\n5. Kick utilise OAuth 2.1 avec PKCE.\n\nÉtat actuel : **bêta/limité**. La documentation officielle de Kick utilise des webhooks pour les événements complets. Dans le navigateur, EsperantAI ne peut détecter qu'une partie limitée de l'activité ; pour les abonnements, cadeaux, raids ou événements Kick fiables, utilisez un pont comme StreamElements ou un backend/webhook.\n\n### StreamElements (pont multiplateforme)\n\nSi vous avez déjà un compte StreamElements, vous pouvez l'utiliser comme pont pour les alertes de plusieurs plateformes :\n\n1. Allez sur https://streamelements.com/dashboard/account/channels\n2. Copiez votre JWT Token\n3. Dans EsperantAI : panneau **Événements de plateforme** → **StreamElements**\n4. Collez le JWT et cliquez sur **Connecter**\n\nGardez ce token privé. Traitez-le comme un mot de passe de votre compte StreamElements.\n\n### Trovo\n\nEsperantAI inclut dans le code un adaptateur technique pour Trovo, basé sur OAuth et le service de chat WebSocket de Trovo. Dans l'interface publique actuelle, il n'existe pas encore de panneau de connexion Trovo ; Trovo n'est donc pas documenté comme un parcours utilisateur normal. Si vous avez besoin de Trovo maintenant, utilisez un pont compatible ou attendez l'activation du panneau Trovo.\n\n---\n\n## Combinaisons Événement + Geste (Avancé)\n\nVoici la magie d'EsperantAI : combiner des **événements de plateforme** avec **vos gestes** comme confirmation.\n\n![Flux événement plus geste](assets/manual/04-event-gesture-combo.svg)\n\n### Exemple : remercier les donateurs avec un pouce levé\n\n1. Panneau **Déclencheurs d'événements** → ligne « 💰 Don »\n2. ✅ Activez\n3. Scène : `Scene_Merci`\n4. Geste requis : `👍 Pouce levé`\n\n**Déroulement en direct** :\n- Un don arrive → EsperantAI affiche « En attente du geste... »\n- Vous avez 5 secondes pour faire 👍\n- Si vous le faites → bascule vers `Scene_Merci` + exécute les autres actions configurées\n- Si vous ne le faites pas → l'événement est automatiquement ignoré\n\n### Sans geste requis (déclenchement automatique)\n\nSi vous laissez « Geste requis » sur `— aucun —`, l'événement déclenche l'action immédiatement.\n\nUtile pour :\n- Basculer automatiquement vers la scène de célébration lors d'un raid\n- Afficher automatiquement un overlay lorsqu'un viewer s'abonne\n\n---\n\n## Sensibilité et zone morte\n\n### Sensibilité\n\nLes seuils déterminent l'amplitude nécessaire d'un geste pour le déclencher :\n\n- **Yaw** : de combien tourner la tête sur le côté (par défaut : 0,15 rad ≈ 8,6°)\n- **Pitch haut/bas** : inclinaison verticale\n- **Roll** : inclinaison latérale\n\nAugmentez les valeurs pour des gestes plus exagérés. Diminuez pour plus de sensibilité.\n\n### Zone morte (anti-fatigue)\n\nSi vous êtes presque centré (yaw < 0,05, pitch < 0,05, roll < 0,08), **RIEN ne se déclenche**. Cela vous permet de bouger naturellement sans que des micro-mouvements n'activent des déclencheurs.\n\n### Images stables\n\n`Images stables` = nombre d'images consécutives pendant lesquelles le geste doit être maintenu avant le déclenchement. Par défaut : 5 images (~150 ms à 30 fps).\n\nAugmentez si les déclencheurs s'activent trop facilement. Diminuez pour une réponse plus rapide.\n\n### Temps de recharge\n\n`Temps de recharge (ms)` = temps minimum entre les changements de scène. Par défaut : 500 ms.\n\nEmpêche le commutateur d'être « instable » si vous oscillez rapidement.\n\n---\n\n## Raccourcis clavier\n\n| Touche | Action |\n|---|---|\n| `Espace` | Mettre en pause / Reprendre la détection |\n| `C` | Basculer manuellement vers la scène CENTRE |\n| `R` | Recharger la liste des scènes depuis le logiciel |\n| `Échap` | Se déconnecter |\n\n---\n\n## Historique des déclencheurs\n\nLe panneau **Avancé → Historique des déclencheurs** affiche les 50 dernières actions déclenchées :\n\n- ✓ vert = réussi\n- ✗ rouge = échoué\n- · gris = en attente\n\nUtile pour vérifier ce qui a été déclenché sans ouvrir les DevTools.\n\n**Exporter CSV** : téléchargez l'historique pour une analyse hors ligne.\n\n**Effacer** : efface l'historique (n'affecte rien d'autre).\n\n---\n\n## Changer la langue\n\nEsperantAI détecte automatiquement la langue de votre système d'exploitation. Pour la modifier manuellement :\n\n- Coin supérieur droit : menu déroulant des langues\n- Sélectionnez la langue de votre choix\n- L'interface se met à jour immédiatement\n\nLangues disponibles :\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\nLes 15 langues sont traduites dans les fichiers d'interface actuels.\n\n---\n\n## Gérer votre licence\n\nPanneau **Avancé → Licence** :\n\n- **Voir le statut** : Valide / Invalide\n- **Voir l'e-mail du client associé**\n- **Voir la dernière validation en ligne**\n- **Désactiver sur cet appareil** : à utiliser avant de changer de PC ou pour libérer un emplacement (sur les 3 disponibles)\n\n---\n\n## Dépannage\n\n### « Activation requise » persiste après avoir collé ma clé de licence\n\n- Vérifiez que vous avez copié la clé complète (5 groupes de 4 caractères séparés par des tirets)\n- Vérifiez votre connexion Internet (l'activation nécessite une validation en ligne la première fois)\n- Si vous avez déjà activé sur 3 appareils, désactivez-en un d'abord\n- Contactez soporte@edugame.digital si le problème persiste\n\n### « Recherche du visage... » persiste bien que mon visage soit visible\n\n- Améliorez l'éclairage : votre visage doit être bien éclairé\n- Rapprochez-vous de la caméra (40 à 80 cm est optimal)\n- Fermez les autres onglets utilisant le GPU (Chrome peut limiter le GPU si trop d'onglets sont ouverts)\n- Si le Memory Saver de Chrome est actif, désactivez-le pour cet onglet\n\n### Les scènes n'apparaissent pas dans les listes déroulantes\n\n- Vérifiez que vous êtes connecté au logiciel de streaming (badge vert « Connecté »)\n- Appuyez sur `R` pour recharger la liste des scènes\n- Si toujours vide, déconnectez puis reconnectez-vous\n- Dans vMix, confirmez que Web Controller est activé et accessible depuis `http://127.0.0.1:8088/api/`\n- Dans PRISM, confirmez que le plugin obs-websocket est installé et activé\n- Dans XSplit, confirmez que le pont XJS local est en cours d'exécution\n\n### Les changements de scène se déclenchent sans que je fasse de gestes\n\n- Augmentez le seuil de yaw / pitch / roll dans le panneau **Sensibilité**\n- Augmentez les `Images stables` de 5 à 8-10\n- Assurez-vous que la zone morte est configurée (yaw 0,05, pitch 0,05, roll 0,08)\n- Vérifiez que personne d'autre n'est dans le cadre (plusieurs visages peuvent causer de l'instabilité)\n\n### Latence de détection\n\n- Fermez les applications gourmandes (jeux, montage vidéo)\n- Vérifiez que vous utilisez le GPU dédié si vous en avez un (et non le GPU intégré)\n- Réduisez la résolution de la caméra si elle est en 4K (1080p est optimal pour la détection)\n\n### OBS ne réagit pas alors qu'EsperantAI indique « Scène changée »\n\n- Vérifiez que le nom de la scène dans la liste déroulante correspond EXACTEMENT à celui dans OBS (sensible à la casse)\n- Vérifiez que la scène ne se trouve pas dans une autre Collection de scènes\n- Consultez le panneau **Historique des déclencheurs** — s'il affiche ✗ rouge, il y a une erreur spécifique\n\n### Erreur « OBS inaccessible — Connecter manuellement »\n\n- Vérifiez qu'OBS est ouvert\n- Vérifiez que le WebSocket est activé dans OBS\n- Si vous avez défini un mot de passe dans OBS, il doit correspondre exactement\n- Certains antivirus bloquent le port 4455 — ajoutez une exception\n\n### Twitch ou YouTube ne se connectent pas\n\n- Vérifiez que l'URI de redirection dans la console de la plateforme correspond exactement à l'URL de `oauth-callback.html`\n- Autorisez les fenêtres contextuelles pour le domaine où vous utilisez EsperantAI\n- Sur Twitch, utilisez uniquement le Client ID ; ne collez pas de Client Secret\n- Sur YouTube, confirmez que YouTube Data API v3 est activée et qu'un direct est actif\n\n### Kick n'affiche pas tous les événements\n\nKick est en mode bêta/limité dans le navigateur. Les événements Kick complets sont officiellement reçus par webhooks ; utilisez StreamElements ou votre propre backend si vous avez besoin d'abonnements, de cadeaux ou de raids fiables.\n\n---\n\n## Confidentialité\n\n### Ce qu'EsperantAI NE fait PAS\n\n- ❌ N'envoie PAS votre vidéo vers un serveur\n- ❌ Ne stocke PAS votre vidéo ou des captures\n- ❌ Ne collecte PAS d'informations biométriques à distance\n- ❌ Ne partage PAS de données avec des annonceurs ou des tiers\n\n### Ce qu'IL traite\n\n- ✅ Détection faciale locale dans votre navigateur (Human.js + WebGL)\n- ✅ Connexions locales à OBS / Streamlabs / vMix / PRISM / XSplit (loopback `127.0.0.1`)\n- ✅ Validation périodique de la clé de licence (tous les 7 jours)\n- ✅ Si vous connectez Twitch/YouTube/Kick/StreamElements : tokens de plateforme dans le stockage local ou de session du navigateur\n\nDétails complets dans `docs/PRIVACY.html`.\n\n---\n\n## Support\n\n- 📧 E-mail : **soporte@edugame.digital**\n- 🌐 Web : https://edugame.digital\n- 📚 Documentation technique : https://github.com/salazarjoelo/EsperantAI\n\nDélais de réponse :\n- Questions générales : 24 à 72 heures\n- Bugs techniques : 1 à 3 jours ouvrés\n\n---\n\n*Dernière mise à jour : 2026-05-20. Version : 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'de-DE': { name: 'Deutsch', flag: '🇩🇪', content: "# EsperantAI — Benutzerhandbuch\n\n> **Ehrliche Gesten.** Steuern Sie Ihre Streaming-Software mit Gesicht und Händen, ohne zusätzliche Spezialhardware.\n\n**Version**: 3.0 · **Sprache**: Deutsch (Übersetzungen in 14 weiteren Sprachen verfügbar)\n\n**Technische Validierung**: geprüft gegen die zum **20. Mai 2026** verfügbare offizielle Dokumentation für OBS Studio, Streamlabs Desktop, vMix, PRISM Live Studio, XSplit, Twitch, YouTube Live, Kick, Trovo und StreamElements. Details: [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md).\n\n---\n\n## Inhaltsverzeichnis\n\n1. [Was ist EsperantAI?](#was-ist-esperantai)\n2. [Mindestanforderungen](#mindestanforderungen)\n3. [Kauf und Aktivierung](#kauf-und-aktivierung)\n4. [Erste Schritte](#erste-schritte)\n5. [Streaming-Software verbinden](#streaming-software-verbinden)\n6. [Gesten und Szenen konfigurieren](#gesten-und-szenen-konfigurieren)\n7. [Gestenkategorien](#gestenkategorien)\n8. [Streaming-Plattformen verbinden](#streaming-plattformen-verbinden)\n9. [Event + Geste Kombinationen (Fortgeschritten)](#event--geste-kombinationen-fortgeschritten)\n10. [Empfindlichkeit und Totzone](#empfindlichkeit-und-totzone)\n11. [Tastaturkürzel](#tastaturkürzel)\n12. [Trigger-Verlauf](#trigger-verlauf)\n13. [Sprache ändern](#sprache-ändern)\n14. [Lizenz verwalten](#lizenz-verwalten)\n15. [Fehlerbehebung](#fehlerbehebung)\n16. [Datenschutz](#datenschutz)\n17. [Support](#support)\n\n---\n\n## Was ist EsperantAI?\n\nEsperantAI ist eine **Webanwendung**, die mit künstlicher Intelligenz Ihre Gesichtsgesten und Handgesten in Echtzeit erkennt und in Befehle für Ihre Streaming-Software übersetzt. Das Videobild Ihrer Kamera wird lokal in Ihrem Browser verarbeitet.\n\n![Lokaler Ablauf von EsperantAI](assets/manual/01-esperantai-flow.svg)\n\nEsperantAI funktioniert mit diesen Streaming-Programmen:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live S
