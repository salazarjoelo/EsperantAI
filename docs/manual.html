itivo | Inclinare la testa verso la spalla destra |\n| Avvicinati | distanza | Avvicinare il viso alla fotocamera |\n| Allontanati | distanza | Allontanare il viso dalla fotocamera |\n| Direzione dello sguardo | sguardo | Muovere solo gli occhi (testa centrata) |\n| Sorriso | emozione=happy | Sorridere chiaramente |\n| Sorpresa | emozione=surprise | Mostrare sorpresa |\n| Rabbia | emozione=angry | Mostrare rabbia |\n| Neutro | emozione=neutral | Viso rilassato |\n| Doppio battito di ciglia | battito | Chiudere entrambi gli occhi due volte velocemente (< 700 ms) |\n\n### ⚠️ Culturali (il significato varia per Paese)\n\n| Gesto | Significato occidentale | Attenzione in altre culture |\n|---|---|---|\n| 👍 Pollice su | Approvazione | Medio Oriente / Asia occidentale: può essere offensivo |\n| ✌️ Pace | Pace / vittoria | UK / Irlanda / Australia (palmo verso l'interno): insulto |\n| 🤘 Corna del rock | Rock / metal | **Italia (palmo verso il basso): «cornuto» — GRAVE INSULTO. In Italia, le corna con il palmo rivolto verso il basso indicano il tradimento coniugale e sono considerate un'offesa gravissima. Usalo SOLO con il palmo rivolto verso l'alto ( gesto rock) e mai davanti a un pubblico italiano se non sei sicuro del contesto.** |\n| 👌 OK | OK / perfetto | Brasile / Turchia / Germania: può essere offensivo |\n| ✊ Pugno chiuso | Dipende dal contesto politico | — |\n| 🖐️ Palmo aperto | «Stop» o saluto | Grecia (mountza verso qualcuno): insulto forte |\n| ☝️ Indicare | Indicare qualcosa | Asia: indicare con il dito è maleducato |\n\nEsperantAI contrassegna ogni gesto con il relativo badge nell'interfaccia. Scegli quali usare in base al tuo pubblico globale.\n\n### 🙏 Gassho (合掌)\n\nUn gesto speciale: premi entrambi i palmi delle mani davanti al petto (come in preghiera o inchino di saluto). Comune nelle culture dell'Asia orientale come segno di rispetto o gratitudine. Rilevato con alta affidabilità tramite 6 punti di controllo.\n\n---\n\n## Connetti le piattaforme di streaming\n\nPerché EsperantAI riceva eventi (donazioni, abbonamenti, raid), connetti le piattaforme su cui fai streaming.\n\n### Twitch\n\n1. Crea un Client ID su https://dev.twitch.tv/console\n2. Registra la redirect URI: `https://esperantai.com/oauth-callback.html` (o il tuo URL locale)\n3. In EsperantAI: pannello **Platform Events** → **Twitch EventSub**\n4. Incolla il tuo Client ID\n5. Clicca **Connect**\n6. Si aprirà una finestra di autorizzazione Twitch. Accetta i permessi.\n7. La finestra si chiuderà e vedrai «Twitch Connected»\n\n### YouTube Live\n\n1. Crea le credenziali su https://console.cloud.google.com\n2. Abilita YouTube Data API v3\n3. Crea un OAuth Client ID (tipo: Web Application)\n4. Registra la stessa redirect URI usata per Twitch\n5. In EsperantAI: pannello **Platform Events** → **YouTube Live**\n6. Incolla il tuo Client ID e clicca **Connect**\n\n### Kick\n\n1. Crea un'app su https://kick.com/settings/developer\n2. Registra la redirect URI\n3. In EsperantAI: pannello **Platform Events** → **Kick**\n4. Incolla il tuo Client ID e clicca **Connect**\n5. Kick usa OAuth 2.1 con PKCE (più sicuro)\n\n### StreamElements (ponte multi-piattaforma)\n\nSe hai già un account StreamElements, puoi unificare Twitch + YouTube + Facebook con un solo token:\n\n1. Vai su https://streamelements.com/dashboard/account/channels\n2. Copia il tuo JWT Token\n3. In EsperantAI: pannello **Platform Events** → **StreamElements**\n4. Incolla il JWT e clicca **Connect**\n\n---\n\n## Combo evento + gesto (Avanzato)\n\nQuesta è la magia di EsperantAI: combinare **eventi della piattaforma** con **i tuoi gesti** come conferma.\n\n### Esempio: ringraziare le donazioni con un pollice su\n\n1. Pannello **Event Triggers** → riga «💰 Donation»\n2. ✅ Abilita\n3. Scena: `Thank_You_Scene`\n4. Gesto richiesto: `👍 Thumbs up`\n\n**Flusso dal vivo**:\n- Arriva una donazione → EsperantAI mostra «Waiting for gesture...»\n- Hai 5 secondi per fare 👍\n- Se lo fai → passa a `Thank_You_Scene` + esegue le altre azioni configurate\n- Se non lo fai → viene automaticamente ignorato\n\n### Senza gesto richiesto (trigger automatico)\n\nSe lasci «Required gesture» su `— none —`, l'evento attiva l'azione immediatamente.\n\nUtile per:\n- Cambiare automaticamente scena di celebrazione quando arriva un raid\n- Mostrare automaticamente un overlay quando qualcuno si abbona\n\n---\n\n## Sensibilità e zona morta\n\n### Sensibilità\n\nLe soglie controllano quanto ampio deve essere un gesto per attivarsi:\n\n- **Yaw**: quanto girare la testa di lato (predefinito: 0,15 rad ≈ 8,6°)\n- **Pitch su/giù**: inclinazione verticale\n- **Roll**: inclinazione laterale\n\nAumenta i valori per gesti più marcati. Riducili per maggiore sensibilità.\n\n### Zona morta (anti-affaticamento)\n\nSe sei quasi centrato (yaw < 0,05, pitch < 0,05, roll < 0,08), **NIENTE si attiva**. Questo ti permette di muoverti naturalmente senza che i micro-movimenti attivino i trigger.\n\n| Gesto | Asse | Come attivarlo |\n|---|---|---|\n\n### Frame stabili\n\n`Stable frames` = quanti frame consecutivi il gesto deve essere mantenuto prima dell'attivazione. Predefinito: 5 frame (~150 ms a 30 fps).\n\nAumenta se i trigger si attivano troppo facilmente. Riduci per una risposta più rapida.\n\n### Cooldown\n\n`Cooldown (ms)` = tempo minimo tra i cambi di scena. Predefinito: 500 ms.\n\nImpedisce che il selettore sia «nervoso» se oscilli rapidamente.\n\n---\n\n## Scorciatoie da tastiera\n\n| Tasto | Azione |\n|---|---|\n| `Spazio` | Metti in pausa / Riprendi il rilevamento |\n| `C` | Vai manualmente alla scena CENTER |\n| `R` | Ricarica l'elenco scene dal software |\n| `Esc` | Disconnetti |\n\n---\n\n## Cronologia trigger\n\nIl pannello **Advanced → Trigger History** mostra le ultime 50 azioni attivate:\n\n- ✓ verde = riuscita\n- ✗ rosso = fallita\n- · grigio = in attesa\n\nUtile per controllare cosa ha attivato i trigger senza aprire DevTools.\n\n**Esporta CSV**: scarica la cronologia per analisi offline.\n\n**Cancella**: elimina la cronologia (non influenza altro).\n\n---\n\n## Cambia lingua\n\nEsperantAI rileva automaticamente la lingua del tuo sistema operativo. Per cambiarla manualmente:\n\n- Angolo in alto a destra: menu a tendina della lingua\n- Seleziona la lingua preferita\n- L'interfaccia si aggiorna immediatamente\n\nLingue disponibili:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n\nTutte le 13 lingue sono completamente tradotte (323 chiavi ciascuna).\n\n---\n\n## Gestisci la tua licenza\n\nPannello **Advanced → License**:\n\n- **Visualizza stato**: Valida / Non valida\n- **Visualizza email del cliente associata**\n- **Visualizza ultima validazione online**\n- **Deactivate on this device**: usa prima di cambiare PC o per liberare uno slot (dei 3 disponibili)\n\n---\n\n## Risoluzione dei problemi\n\n### «Activation required» persiste dopo aver incollato la chiave di licenza\n\n- Verifica di aver copiato la chiave completa (5 gruppi di 4 caratteri separati da trattini)\n- Controlla la connessione internet (l'attivazione richiede la validazione online la prima volta)\n- Se hai già attivato su 3 dispositivi, disattivane uno prima\n- Contatta support@edugame.digital se il problema persiste\n\n### «Searching for face...» persiste anche se il viso è visibile\n\n- Migliora l'illuminazione: il viso deve essere ben illuminato\n- Avvicinati alla fotocamera (40-80 cm è l'ottimale)\n- Chiudi le altre schede che usano la GPU (Chrome potrebbe limitare la GPU se ne hai troppe aperte)\n- Se il Memory Saver di Chrome è attivo, disabilitalo per questa scheda\n\n### Le scene non compaiono nei menu a tendina\n\n- Verifica di essere connesso al software di streaming (badge verde «Connected»)\n- Premi `R` per ricaricare l'elenco delle scene\n- Se ancora vuoto, disconnetti e riconnettiti\n\n### I cambi di scena si attivano senza fare gesti\n\n- Aumenta la soglia yaw / pitch / roll nel pannello **Sensitivity**\n- Aumenta `Stable frames` da 5 a 8-10\n- Assicurati che la zona morta sia configurata (yaw 0,05, pitch 0,05, roll 0,08)\n- Verifica che nessun altro sia nell'inquadratura (più visi possono causare instabilità)\n\n### Ritardo nel rilevamento\n\n- Chiudi le app pesanti (giochi, montaggio video)\n- Verifica di usare la GPU dedicata se ne hai una (non quella integrata)\n- Riduci la risoluzione della fotocamera se è 4K (1080p è ottimale per il rilevamento)\n\n### OBS non reagisce anche se EsperantAI dice «Scene changed»\n\n- Verifica che il nome della scena nel menu a tendina corrisponda ESATTAMENTE a quello in OBS (maiuscole/minuscole)\n- Verifica che la scena non sia in un'altra Scene Collection\n- Controlla il pannello **Trigger History** — se mostra ✗ rosso, c'è un errore specifico\n\n### Errore «OBS unreachable — Connect manually»\n\n- Verifica che OBS sia aperto\n- Verifica che WebSocket sia abilitato in OBS\n- Se hai impostato una password in OBS, deve corrispondere esattamente\n- Alcuni antivirus bloccano la porta 4455 — aggiungi un'eccezione\n\n---\n\n## Privacy\n\n### Cosa EsperantAI NON fa\n\n- ❌ NON invia il tuo video a nessun server\n- ❌ NON salva il tuo video o catture\n- ❌ NON raccoglie informazioni biometriche da remoto\n- ❌ NON condivide dati con inserzionisti o terze parti\n\n### Cosa ELABORA\n\n- ✅ Rilevamento facciale locale nel tuo browser (Human.js + WebGL)\n- ✅ Connessioni locali al tuo OBS / Streamlabs / vMix (loopback 127.0.0.1)\n- ✅ Validazione periodica della chiave di licenza (ogni 7 giorni)\n- ✅ Se connetti Twitch/YouTube/Kick: token OAuth in sessionStorage (eliminati alla chiusura del browser)\n\nDettagli completi in `docs/PRIVACY.html`.\n\n---\n\n## Supporto\n\n- 📧 Email: **support@edugame.digital**\n- 🌐 Web: https://esperantai.com\n- 📚 Documentazione tecnica: https://github.com/salazarjoelo/EsperantAI\n\nTempi di risposta:\n- Domande generali: 24-72 ore\n- Bug tecnici: 1-3 giorni lavorativi\n\n---\n\n*Ultimo aggiornamento: 2026-05-14. Versione: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'ru-RU': { name: 'Русский', flag: '🇷🇺', content: "# EsperantAI — Руководство пользователя\n\n> **Честные жесты.** Управляйте стриминговым ПО с помощью лица и рук. Без Stream Deck. Без дополнительного оборудования.\n\n**Версия**: 3.0 · **Язык**: Русский (переводы доступны ещё на 12 языках)\n\n---\n\n## Содержание\n\n1. [Что такое EsperantAI?](#что-такое-esperantai)\n2. [Минимальные требования](#минимальные-требования)\n3. [Покупка и активация](#покупка-и-активация)\n4. [Первый запуск](#первый-запуск)\n5. [Подключение стримингового ПО](#подключение-стримингового-по)\n6. [Настройка жестов и сцен](#настройка-жестов-и-сцен)\n7. [Категории жестов](#категории-жестов)\n8. [Подключение стриминговых платформ](#подключение-стриминговых-платформ)\n9. [Комбо: событие + жест (Продвинутый уровень)](#комбо-событие--жест-продвинутый-уровень)\n10. [Чувствительность и мёртвая зона](#чувствительность-и-мёртвая-зона)\n11. [Горячие клавиши](#горячие-клавиши)\n12. [История триггеров](#история-триггеров)\n13. [Смена языка](#смена-языка)\n14. [Управление лицензией](#управление-лицензией)\n15. [Устранение неполадок](#устранение-неполадок)\n16. [Конфиденциальность](#конфиденциальность)\n17. [Поддержка](#поддержка)\n\n---\n\n## Что такое EsperantAI?\n\nEsperantAI — это **веб-приложение**, которое использует искусственный интеллект для распознавания жестов лица и рук в реальном времени и преобразует их в команды для вашего стримингового ПО. Работает с:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (бета)\n\nА также получает события от платформ:\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements** (мультиплатформенный мост)\n\n### Почему «честные жесты»?\n\nБазовые мимические выражения и повороты головы **универсальны для всех человеческих культур** (Пол Экман, 1972). Они не лгут и не зависят от географии. EsperantAI называет такие жесты «🌐 Универсальные» и отличает их от «⚠️ Культурных» жестов (знаки руками), значение которых может различаться в зависимости от страны.\n\nВы сами решаете, какие жесты использовать, исходя из вашей аудитории.\n\n---\n\n## Минимальные требования\n\n### Оборудование\n\n- **Любая USB-веб-камера** (рекомендуется 1080p или выше)\n- **CPU**: любой 4-ядерный процессор за последние 5 лет\n- **RAM**: минимум 8 ГБ. Рекомендуется 16 ГБ при одновременном стриме.\n- **GPU**: любой с поддержкой WebGL (подойдут даже современные встроенные)\n\n### Программное обеспечение\n\n- **ОС**: Windows 10/11, macOS 12+ или Linux с актуальным ядром\n- **Браузер**: Chrome 90+, Edge 90+ или Firefox 100+\n- **Стриминговое ПО** (хотя бы одно): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Интернет\n\n- Необходим для **активации лицензии** и каждые **7 дней** для повторной проверки\n- Работает **до 7 дней офлайн** (льготный период)\n\n---\n\n## Покупка и активация\n\n1. Перейдите на **https://esperantai.com**\n2. Нажмите **«Buy License»**\n3. Оплатите через LemonSqueezy (карта, PayPal и т. д.)\n4. Вы получите письмо с:\n   - Вашим **лицензионным ключом** (формат: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Ссылкой для использования EsperantAI\n5. Откройте EsperantAI в браузере\n6. Появится экран активации. Вставьте лицензионный ключ\n7. Нажмите **«Activate License»**\n8. Готово! 🎉\n\n### Сколько устройств?\n\nОдна лицензия может быть активирована на **до 3 устройств**. Чтобы перенести лицензию на другое устройство:\n\n1. На старом устройстве: панель **Advanced** → **License** → **Deactivate on this device**\n2. На новом устройстве: активируйте обычным способом\n\n---\n\n## Первый запуск\n\n### Шаг 1: Разрешите доступ к камере\n\nПри первом открытии EsperantAI браузер запросит разрешение на использование камеры. **Разрешите его**.\n\n> Важно: EsperantAI никогда не отправляет ваше видео на сервер. Обработка выполняется на 100% локально на вашем компьютере.\n\n### Шаг 2: Выберите камеру\n\nЕсли у вас несколько камер, выберите нужную из выпадающего списка.\n\n### Шаг 3: Проверьте распознавание\n\nВы увидите своё лицо на левой панели. Когда EsperantAI распознает ваше лицо, индикаторы Yaw / Pitch / Roll начнут показывать значения.\n\n### Шаг 4: Мастер калибровки (Pro+)\n\nЕсли у вас лицензия Pro или Pro+, **Мастер калибровки** запускается автоматически при первом использовании. Он измеряет ваш естественный диапазон движений и устанавливает оптимальную чувствительность. Вы можете повторно запустить его в любое время с помощью кнопки **Recalibrate**.\n\n---\n\n## Подключение стримингового ПО\n\n### OBS Studio\n\n1. В OBS: **Tools → WebSocket Server Settings**\n2. Включите WebSocket. Запишите пароль, если вы его установили.\n3. В EsperantAI: панель **Connection**\n4. Стриминговое ПО: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (по умолчанию)\n6. Пароль: тот, что вы установили в OBS\n7. Нажмите **Connect**\n\n### Streamlabs Desktop\n\n1. В Streamlabs: **Settings → Remote Control**\n2. Включите Remote Control\n3. Запишите API Token\n4. В EsperantAI: стриминговое ПО: **Streamlabs Desktop**\n5. API Token: вставьте его\n6. Порт: `59650` (по умолчанию)\n7. Нажмите **Connect**\n\n### vMix\n\n1. В vMix: **Settings → Web Controller**\n2. Включите Web Controller. Порт по умолчанию: 8088.\n3. В EsperantAI: стриминговое ПО: **vMix**\n4. Хост: `127.0.0.1`\n5. Порт: `8088`\n6. Нажмите **Connect**\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5+ требует ручной установки плагина obs-websocket\n2. Скачайте `obs-websocket` с [форума OBS](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/)\n3. Скопируйте его в папку плагинов PRISM\n4. Перезапустите PRISM\n5. Включите WebSocket в **Tools → WebSocket Server Settings**\n6. В EsperantAI: стриминговое ПО: **PRISM Live Studio** (работает так же, как OBS)\n\n### XSplit Broadcaster (бета)\n\n1. Установите расширение «Remote xjs» в XSplit (Settings → Extensions)\n2. Включите Remote в настройках\n3. В EsperantAI: стриминговое ПО: **XSplit**\n4. Remote xjs Proxy URL: `ws://127.0.0.1:5555/xjs` (по умолчанию)\n5. Нажмите **Connect**\n\n> XSplit находится в **бета-версии**. Расширенные функции могут быть ограничены.\n\n---\n\n## Настройка жестов и сцен\n\nПосле подключения сцены вашего ПО автоматически появятся в выпадающих списках панели **Triggers**.\n\n### Базовое сопоставление\n\n1. Для каждого жеста (например, «Look Left») выберите сцену из выпадающего списка\n2. Когда вы выполните этот жест и удержите его стабильно ~150 мс, EsperantAI переключит сцену в вашем стриминговом ПО\n3. Переключение происходит автоматически и практически мгновенно\n\n### Мультидействие (Pro+)\n\nС лицензией Pro или Pro+ один жест может запускать **несколько действий** одновременно:\n- Переключить сцену + воспроизвести звук + показать оверлей + отправить сообщение в чат\n\n### Включение / отключение категорий\n\nУ каждой категории есть свой флажок «Enable»:\n\n- 🧠 **Повороты головы** (универсальные — включены по умолчанию)\n- 📏 **Расстояние до лица** (приближение/отдаление)\n- 👁️ **Взгляд** (движение только глазами)\n- 😀 **Эмоции** (улыбка, удивление, злость, нейтральное)\n- 👁️‍🗨️ **Двойное моргание**\n- ✋ **Жесты руками** (культурные — отключены по умолчанию)\n\nОтключайте ненужные категории для экономии ресурсов CPU.\n\n---\n\n## Категории жестов\n\n### 🌐 Универсальные (одинаковое значение в любой культуре)\n\n| Жест | Ось | Как активировать |\n|---|---|---|\n| Центр | — | Смотреть прямо, лицо стабильно |\n| Взгляд влево | отрицательный yaw | Повернуть голову влево |\n| Взгляд вправо | положительный yaw | Повернуть голову вправо |\n| Взгляд вверх | отрицательный pitch | Поднять лицо |\n| Взгляд вниз | положительный pitch | Опустить лицо |\n| Наклон влево | отрицательный roll | Наклонить голову к левому плечу |\n| Наклон вправо | положительный roll | Наклонить голову к правому плечу |\n| Приближение | расстояние | Приблизить лицо к камере |\n| Отдаление | расстояние | Отдалить лицо от камеры |\n| Направление взгляда | взгляд | Двигать только глазами (голова в центре) |\n| Улыбка | эмоция=happy | Чётко улыбнуться |\n| Удивление | эмоция=surprise | Сделать удивлённое выражение |\n| Злость | эмоция=angry | Сделать злое выражение |\n| Нейтральное | эмоция=neutral | Расслабленное лицо |\n| Двойное моргание | моргание | Быстро закрыть оба глаза дважды (< 700 мс) |\n\n### ⚠️ Культурные (значение зависит от страны)\n\n| Жест | Значение на Западе | Осторожность в других культурах |\n|---|---|---|\n| 👍 Палец вверх | Одобрение | Ближний Восток / Западная Азия: может быть оскорбительным |\n| ✌️ Знак мира | Мир / победа | Великобритания / Ирландия / Австралия (ладонью внутрь): оскорбление |\n| 🤘 Рога рока | Рок, метал | Италия (ладонью вниз): «корнуто» (оскорбление) |\n| 👌 ОК | ОК / отлично | Бразилия / Турция / Германия: может быть оскорбительным |\n| ✊ Сжатый кулак | Зависит от политического контекста | — |\n| 🖐️ Открытая ладонь | «Стоп» или приветствие | Греция (моундза в чью-то сторону): сильное оскорбление |\n| ☝️ Указание | Указать на что-то | Азия: указывать пальцем невежливо |\n\nEsperantAI отмечает каждый жест соответствующим значком в интерфейсе. Выбирайте, какие из них использовать, исходя из вашей глобальной аудитории.\n\n### 🙏 Гассё (合掌)\n\nОсобый жест: прижмите обе ладони друг к другу перед грудью (как при молитве или поклоне приветствия). Распространён в восточноазиатских культурах как знак уважения или благодарности. Распознаётся с высокой надёжностью с помощью 6 контрольных точек.\n\n---\n\n## Подключение стриминговых платформ\n\nЧтобы EsperantAI мог получать события (пожертвования, подписки, рейды), подключите платформы, на которых вы стримите.\n\n### Twitch\n\n1. Создайте Client ID на https://dev.twitch.tv/console\n2. Зарегистрируйте redirect URI: `https://esperantai.com/oauth-callback.html` (или ваш локальный URL)\n3. В EsperantAI: панель **Platform Events** → **Twitch EventSub**\n4. Вставьте ваш Client ID\n5. Нажмите **Connect**\n6. Откроется окно авторизации Twitch. Примите разрешения.\n7. Окно закроется, и вы увидите «Twitch Connected»\n\n### YouTube Live\n\n1. Создайте учётные данные на https://console.cloud.google.com\n2. Включите YouTube Data API v3\n3. Создайте OAuth Client ID (тип: Web Application)\n4. Зарегистрируйте тот же redirect URI, что и для Twitch\n5. В EsperantAI: панель **Platform Events** → **YouTube Live**\n6. Вставьте ваш Client ID и нажмите **Connect**\n\n### Kick\n\n1. Создайте приложение на https://kick.com/settings/developer\n2. Зарегистрируйте redirect URI\n3. В EsperantAI: панель **Platform Events** → **Kick**\n4. Вставьте ваш Client ID и нажмите **Connect**\n5. Kick использует OAuth 2.1 с PKCE (более безопасно)\n\n### StreamElements (мультиплатформенный мост)\n\nЕсли у вас уже есть аккаунт StreamElements, вы можете объединить Twitch + YouTube + Facebook с одним токеном:\n\n1. Перейдите на https://streamelements.com/dashboard/account/channels\n2. Скопируйте ваш JWT Token\n3. В EsperantAI: панель **Platform Events** → **StreamElements**\n4. Вставьте JWT и нажмите **Connect**\n\n---\n\n## Комбо: событие + жест (Продвинутый уровень)\n\nЭто магия EsperantAI: объединение **событий платформы** с **вашими жестами** в качестве подтверждения.\n\n### Пример: поблагодарить за пожертвование жестом 👍\n\n1. Панель **Event Triggers** → строка «💰 Donation»\n2. ✅ Включите\n3. Сцена: `Thank_You_Scene`\n4. Требуемый жест: `👍 Thumbs up`\n\n**Как это работает в реальном времени**:\n- Поступает пожертвование → EsperantAI показывает «Waiting for gesture...»\n- У вас есть 5 секунд, чтобы показать 👍\n- Если вы покажете → переключается на `Thank_You_Scene` + выполняются другие настроенные действия\n- Если нет → событие автоматически отменяется\n\n### Без требуемого жеста (автоматический триггер)\n\nЕсли вы оставите «Required gesture» как `— none —`, событие вызовет действие немедленно.\n\nПолезно для:\n- Автоматического переключения на праздничную сцену при рейдах\n- Автоматического показа оверлея при новой подписке\n\n---\n\n## Чувствительность и мёртвая зона\n\n### Чувствительность\n\nПороги определяют, насколько выраженным должен быть жест для срабатывания:\n\n- **Yaw**: насколько сильно нужно повернуть голову вбок (по умолчанию: 0,15 рад ≈ 8,6°)\n- **Pitch вверх/вниз**: вертикальный наклон\n- **Roll**: боковой наклон\n\nУвеличьте значения для более выраженных жестов. Уменьшите для большей чувствительности.\n\n### Мёртвая зона (защита от утомления)\n\nЕсли вы почти в центре (yaw < 0,05, pitch < 0,05, roll < 0,08), **НИЧЕГО не срабатывает**. Это позволяет вам двигаться естественно, не активируя триггеры микродвижениями.\n\n### Стабильные кадры\n\n`Stable frames` = количество последовательных кадров, в течение которых жест должен удерживаться перед срабатыванием. По умолчанию: 5 кадров (~150 мс при 30 fps).\n\nУвеличьте, если триггеры срабатывают слишком легко. Уменьшите для более быстрой реакции.\n\n### Перезарядка\n\n`Cooldown (ms)` = минимальное время между переключениями сцен. По умолчанию: 500 мс.\n\nПредотвращает «дрожание» переключателя при быстрых колебаниях.\n\n---\n\n## Горячие клавиши\n\n| Клавиша | Действие |\n|---|---|\n| `Space` | Пауза / Возобновить распознавание |\n| `C` | Ручной переход к сцене CENTER |\n| `R` | Перезагрузить список сцен из ПО |\n| `Esc` | Отключиться |\n\n---\n\n## История триггеров\n\nПанель **Advanced → Trigger History** показывает последние 50 сработавших действий:\n\n- ✓ зелёный = успешно\n- ✗ красный = ошибка\n- · серый = ожидание\n\nПолезно для отслеживания сработавших триггеров без открытия DevTools.\n\n**Экспорт CSV**: скачайте историю для автономного анализа.\n\n**Очистить**: стереть историю (не влияет на остальные настройки).\n\n---\n\n## Смена языка\n\nEsperantAI автоматически определяет язык вашей операционной системы. Чтобы сменить его вручную:\n\n- В правом верхнем углу: выпадающий список языков\n- Выберите нужный язык\n- Интерфейс обновится немедленно\n\nДоступные языки:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n\nВсе 13 языков полностью переведены (по 323 ключа).\n\n---\n\n## Управление лицензией\n\nПанель **Advanced → License**:\n\n- **Просмотр статуса**: Действительна / Недействительна\n- **Просмотр связанного email клиента**\n- **Просмотр последней онлайн-проверки**\n- **Deactivate on this device**: используйте перед сменой ПК или для освобождения слота (из 3 доступных)\n\n---\n\n## Устранение неполадок\n\n### «Activation required» не исчезает после вставки лицензионного ключа\n\n- Убедитесь, что вы скопировали ключ целиком (5 групп по 4 символа, разделённых дефисами)\n- Проверьте интернет-соединение (при первой активации требуется онлайн-проверка)\n- Если вы уже активировали лицензию на 3 устройствах, сначала деактивируйте одно из них\n- Обратитесь в support@edugame.digital, если проблема сохраняется\n\n### «Searching for face...» не исчезает, хотя ваше лицо видно\n\n- Улучшите освещение: ваше лицо должно быть хорошо освещено\n- Приблизьтесь к камере (оптимально 40–80 см)\n- Закройте другие вкладки, использующие GPU (Chrome может ограничивать GPU, если их слишком много)\n- Если в Chrome активен Memory Saver, отключите его для этой вкладки\n\n### Сцены не появляются в выпадающих списках\n\n- Убедитесь, что вы подключены к стриминговому ПО (зелёный значок «Connected»)\n- Нажмите `R` для перезагрузки списка сцен\n- Если по-прежнему пусто, отключитесь и подключитесь заново\n\n### Переключение сцен происходит без ваших жестов\n\n- Увеличьте порог yaw / pitch / roll на панели **Sensitivity**\n- Увеличьте `Stable frames` с 5 до 8–10\n- Убедитесь, что мёртвая зона настроена (yaw 0,05, pitch 0,05, roll 0,08)\n- Проверьте, что в кадре нет других людей (несколько лиц могут вызывать нестабильность)\n\n### Задержка распознавания\n\n- Закройте ресурсоёмкие приложения (игры, видеомонтаж)\n- Убедитесь, что используется выделенный GPU, если он есть (а не встроенный)\n- Снизьте разрешение камеры, если оно 4K (1080p оптимально для распознавания)\n\n### OBS не реагирует, хотя EsperantAI показывает «Scene changed»\n\n- Убедитесь, что имя сцены в выпадающем списке ТОЧНО совпадает с именем в OBS (с учётом регистра)\n- Убедитесь, что сцена не находится в другой коллекции сцен (Scene Collection)\n- Проверьте панель **Trigger History** — если она показывает ✗ красный, есть конкретная ошибка\n\n### Ошибка «OBS unreachable — Connect manually»\n\n- Убедитесь, что OBS запущен\n- Убедитесь, что WebSocket включён в OBS\n- Если вы установили пароль в OBS, он должен совпадать точно\n- Некоторые антивирусы блокируют порт 4455 — добавьте исключение\n\n---\n\n## Конфиденциальность\n\n### Чего EsperantAI НЕ делает\n\n- ❌ НЕ отправляет ваше видео на сервер\n- ❌ НЕ сохраняет ваше видео или снимки\n- ❌ НЕ собирает биометрическую информацию удалённо\n- ❌ НЕ передаёт данные рекламодателям или третьим лицам\n\n### Что он ОБРАБАТЫВАЕТ\n\n- ✅ Локальное распознавание лиц в вашем браузере (Human.js + WebGL)\n- ✅ Локальные подключения к вашему OBS / Streamlabs / vMix (loopback 127.0.0.1)\n- ✅ Периодическая проверка лицензионного ключа (каждые 7 дней)\n- ✅ При подключении Twitch/YouTube/Kick: OAuth-токены в sessionStorage (удаляются при закрытии браузера)\n\nПодробности в `docs/PRIVACY.html`.\n\n---\n\n## Поддержка\n\n- 📧 Email: **support@edugame.digital**\n- 🌐 Web: https://esperantai.com\n- 📚 Техническая документация: https://github.com/salazarjoelo/EsperantAI\n\nВремя ответа:\n- Общие вопросы: 24–72 часа\n- Технические ошибки: 1–3 рабочих дня\n\n---\n\n*Последнее обновление: 2026-05-14. Версия: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'ar-SA': { name: 'العربية (RTL)', flag: '🇸🇦', content: "<div dir=\"rtl\">\n\n# EsperantAI — دليل المستخدم\n\n> **إيماءات صادقة.** تحكّم في برامج البث باستخدام وجهك ويديك. بدون Stream Deck. بدون معدات إضافية.\n\n**الإصدار**: 3.0 · **اللغة**: العربية (ترجمات متاحة بـ 12 لغة أخرى)\n\n---\n\n## جدول المحتويات\n\n1. [ما هو EsperantAI؟](#ما-هو-esperantai)\n2. [الحد الأدنى من المتطلبات](#الحد-الأدنى-من-المتطلبات)\n3. [الشراء والتفعيل](#الشراء-والتفعيل)\n4. [الاستخدام الأول](#الاستخدام-الأول)\n5. [ربط برامج البث](#ربط-برامج-البث)\n6. [تهيئة الإيماءات والمشاهد](#تهيئة-الإيماءات-والمشاهد)\n7. [فئات الإيماءات](#فئات-الإيماءات)\n8. [ربط منصات البث](#ربط-منصات-البث)\n9. [مزيج الحدث + الإيماءة (متقدم)](#مزيج-الحدث--الإيماءة-متقدم)\n10. [الحساسية والمنطقة الميتة](#الحساسية-والمنطقة-الميتة)\n11. [اختصارات لوحة المفاتيح](#اختصارات-لوحة-المفاتيح)\n12. [سجل المشغّلات](#سجل-المشغلات)\n13. [تغيير اللغة](#تغيير-اللغة)\n14. [إدارة الترخيص](#إدارة-الترخيص)\n15. [استكشاف الأخطاء وإصلاحها](#استكشاف-الأخطاء-وإصلاحها)\n16. [الخصوصية](#الخصوصية)\n17. [الدعم الفني](#الدعم-الفني)\n\n---\n\n## ما هو EsperantAI؟\n\nEsperantAI هو **تطبيق ويب** يستخدم الذكاء الاصطناعي للكشف عن إيماءات وجهك ويديك في الوقت الفعلي، ويحوّلها إلى أوامر لبرامج البث الخاصة بك. يعمل مع:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (نسخة تجريبية)\n\nويتلقى أحداثاً من منصات مثل:\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements** (جسر متعدد المنصات)\n\n### لماذا «إيماءات صادقة»؟\n\nتعبيرات الوجه الأساسية ودوران الرأس **عالمية في جميع الثقافات البشرية** (بول إيكمان، 1972). إنها لا تكذب ولا تختلف باختلاف الموقع الجغرافي. يُطلق EsperantAI على هذه الإيماءات اسم «🌐 عالمية» ويميّزها عن الإيماءات «⚠️ ثقافية» (الإشارات اليدوية)، التي قد يختلف معناها حسب البلد.\n\nأنت من يقرر أي الإيماءات تستخدم بناءً على جمهورك.\n\n---\n\n## الحد الأدنى من المتطلبات\n\n### الأجهزة\n\n- **أي كاميرا ويب USB** (يُنصح بدقة 1080p أو أعلى)\n- **CPU**: أي معالج بأربع نوى أو أكثر من السنوات الخمس الأخيرة\n- **RAM**: 8 غيغابايت كحد أدنى. يُنصح بـ 16 غيغابايت في حال البث المتزامن.\n- **GPU**: أي وحدة تدعم WebGL (حتى وحدات GPU المدمجة الحديثة تعمل)\n\n### البرمجيات\n\n- **نظام التشغيل**: Windows 10/11 أو macOS 12+ أو Linux بنواة حديثة\n- **المتصفح**: Chrome 90+ أو Edge 90+ أو Firefox 100+\n- **برامج البث** (واحد على الأقل): OBS Studio 28+ أو Streamlabs Desktop أو vMix أو PRISM أو XSplit\n\n### الإنترنت\n\n- مطلوب **لتفعيل الترخيص** وكل **7 أيام** لإعادة التحقق\n- يعمل **حتى 7 أيام بدون اتصال** (فترة السماح)\n\n---\n\n## الشراء والتفعيل\n\n1. تفضّل بزيارة **https://esperantai.com**\n2. انقر على **«Buy License»**\n3. أتمّم الدفع عبر LemonSqueezy (بطاقة، PayPal، إلخ)\n4. ستتلقّى بريداً إلكترونياً يحتوي على:\n   - **مفتاح الترخيص** الخاص بك (الصيغة: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - رابط لاستخدام EsperantAI\n5. افتح EsperantAI في المتصفح\n6. ستظهر شاشة التفعيل. الصق مفتاح الترخيص\n7. انقر على **«Activate License»**\n8. تم! 🎉\n\n### كم جهازاً؟\n\nيمكن تفعيل ترخيص واحد على **ما يصل إلى 3 أجهزة**. لنقل الترخيص إلى جهاز آخر:\n\n1. على الجهاز القديم: لوحة **Advanced** ← **License** ← **Deactivate on this device**\n2. على الجهاز الجديد: فعّل بالطريقة المعتادة\n\n---\n\n## الاستخدام الأول\n\n### الخطوة 1: السماح بالوصول إلى الكاميرا\n\nعند فتح EsperantAI لأول مرة، سيطلب المتصفح إذن استخدام الكاميرا. **اسمح بذلك**.\n\n> مهم: لا يرسل EsperantAI أبداً الفيديو الخاص بك إلى أي خادم. تتم المعالجة بنسبة 100% محلياً على جهازك.\n\n### الخطوة 2: اختيار الكاميرا\n\nإذا كانت لديك أكثر من كاميرا واحدة، اختر الكاميرا المطلوبة من القائمة المنسدلة.\n\n### الخطوة 3: التحقق من الكشف\n\nسترى وجهك في اللوحة اليمنى. عندما يكتشف EsperantAI وجهك، ستبدأ مؤشرات Yaw / Pitch / Roll بعرض القيم.\n\n### الخطوة 4: معالج المعايرة (Pro+)\n\nإذا كان لديك ترخيص Pro أو Pro+، يُشغَّل **معالج المعايرة** تلقائياً عند الاستخدام الأول. يقيس نطاق حركتك الطبيعي ويضبط الحساسية المثلى. يمكنك إعادة تشغيله في أي وقت من زر **Recalibrate**.\n\n---\n\n## ربط برامج البث\n\n### OBS Studio\n\n1. في OBS: **Tools → WebSocket Server Settings**\n2. فعّل WebSocket. سجّل كلمة المرور إذا كنت قد عيّنت واحدة.\n3. في EsperantAI: لوحة **Connection**\n4. برامج البث: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (الافتراضي)\n6. كلمة المرور: التي عيّنتها في OBS\n7. انقر **Connect**\n\n### Streamlabs Desktop\n\n1. في Streamlabs: **Settings → Remote Control**\n2. فعّل Remote Control\n3. سجّل API Token\n4. في EsperantAI: برامج البث: **Streamlabs Desktop**\n5. API Token: الصقه\n6. المنفذ: `59650` (الافتراضي)\n7. انقر **Connect**\n\n### vMix\n\n1. في vMix: **Settings → Web Controller**\n2. فعّل Web Controller. المنفذ الافتراضي: 8088.\n3. في EsperantAI: برامج البث: **vMix**\n4. المضيف: `127.0.0.1`\n5. المنفذ: `8088`\n6. انقر **Connect**\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5+ يتطلب تثبيت مكون obs-websocket الإضافي يدوياً\n2. حمّل `obs-websocket` من [منتدى OBS](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/)\n3. انسخه إلى مجلد الإضافات في PRISM\n4. أعِد تشغيل PRISM\n5. فعّل WebSocket من **Tools → WebSocket Server Settings**\n6. في EsperantAI: برامج البث: **PRISM Live Studio** (يعمل بنفس طريقة OBS)\n\n### XSplit Broadcaster (نسخة تجريبية)\n\n1. ثبّت إضافة «Remote xjs» في XSplit (Settings → Extensions)\n2. فعّل Remote في التفضيلات\n3. في EsperantAI: برامج البث: **XSplit**\n4. Remote xjs Proxy URL: `ws://127.0.0.1:5555/xjs` (الافتراضي)\n5. انقر **Connect**\n\n> XSplit في مرحلة **نسخة تجريبية**. قد تكون الميزات المتقدمة محدودة.\n\n---\n\n## تهيئة الإيماءات والمشاهد\n\nبعد الاتصال، ستظهر مشاهد البرنامج الفعلية تلقائياً في القوائم المنسدلة بلوحة **Triggers**.\n\n### الربط الأساسي\n\n1. لكل إيماءة (مثلاً «Look Left») اختر مشهداً من القائمة المنسدلة\n2. عند تنفيذ الإيماءة والحفاظ عليها مستقرة لمدة ~150 مللي ثانية، سيبدّل EsperantAI المشهد في برنامج البث\n3. التبديل تلقائي وشبه فوري\n\n### الإجراءات المتعددة (Pro+)\n\nبترخيص Pro أو Pro+، يمكن لإيماءة واحدة تشغيل **إجراءات متعددة** في آن واحد:\n- تبديل المشهد + تشغيل صوت + عرض تراكب + إرسال رسالة في الدردشة\n\n### تفعيل / تعطيل الفئات\n\nلكل فئة مربع اختيار «Enable» خاص بها:\n\n- 🧠 **دوران الرأس** (عالمي — مفعّل افتراضياً)\n- 📏 **مسافة الوجه** (اقتراب/ابتعاد)\n- 👁️ **اتجاه النظر** (تحريك العينين فقط)\n- 😀 **المشاعر** (ابتسامة، مفاجأة، غضب، حياد)\n- 👁️‍🗨️ **الرمش المزدوج**\n- ✋ **إيماءات اليد** (ثقافية — معطّلة افتراضياً)\n\nعطّل الفئات التي لا تحتاجها لتوفير موارد CPU.\n\n---\n\n## فئات الإيماءات\n\n### 🌐 عالمية (نفس المعنى في أي ثقافة)\n\n| الإيماءة | المحور | طريقة التنشيط |\n|---|---|---|\n| المركز | — | النظر إلى الأمام مباشرة، الوجه مستقر |\n| النظر يساراً | yaw سلبي | إدارة الرأس إلى اليسار |\n| النظر يميناً | yaw موجب | إدارة الرأس إلى اليمين |\n| النظر لأعلى | pitch سلبي | رفع الوجه |\n| النظر لأسفل | pitch موجب | خفض الوجه |\n| الميل يساراً | roll سلبي | إمالة الرأس نحو الكتف الأيسر |\n| الميل يميناً | roll موجب | إمالة الرأس نحو الكتف الأيمن |\n| الاقتراب | المسافة | تقريب الوجه من الكاميرا |\n| الابتعاد | المسافة | إبعاد الوجه عن الكاميرا |\n| اتجاه النظر | النظر | تحريك العينين فقط (الرأس في المركز) |\n| الابتسام | مشاعر=happy | الابتسام بوضوح |\n| الدهشة | مشاعر=surprise | إظهار الدهشة |\n| الغضب | مشاعر=angry | إظهار الغضب |\n| الحياد | مشاعر=neutral | وجه مرتاح |\n| الرمش المزدوج | الرمش | إغلاق العينين مرتين بسرعة (< 700 مللي ثانية) |\n\n### ⚠️ ثقافية (المعنى يختلف حسب البلد)\n\n| الإيماءة | المعنى الغربي | تحذير في ثقافات أخرى |\n|---|---|---|\n| 👍 الإبهام لأعلى | الموافقة | **الشرق الأوسط / غرب آسيا: إيماءة مسيئة جداً! في منطقة الشرق الأوسط، تعتبر إيماءة الإبهام لأعلى (👍) إهانة كبيرة ومسيئة، مشابهة لرفع الإصبع الأوسط في الثقافة الغربية. يُحذَّر بشدة من استخدامها أمام جمهور عربي.** |\n| ✌️ علامة السلام | السلام / النصر | المملكة المتحدة / أيرلندا / أستراليا (الكف للداخل): إهانة |\n| 🤘 قرون الروك | موسيقى الروك | إيطاليا (الكف للأسفل): «كورنوتو» (إهانة) |\n| 👌 علامة الموافقة | حسناً / ممتاز | البرازيل / تركيا / ألمانيا: قد تكون مسيئة |\n| ✊ القبضة المغلقة | تختلف حسب السياق السياسي | — |\n| 🖐️ الكف المفتوح | «توقف» أو تحية | اليونان (مونتزا نحو شخص): إهانة شديدة |\n| ☝️ الإشارة | الإشارة إلى شيء | آسيا: الإشارة بالأصبع تعتبر وقاحة |\n\nيُعلِّم EsperantAI كل إيماءة بالشارة المناسبة في الواجهة. اختر الإيماءات المناسبة بناءً على جمهورك العالمي.\n\n### 🙏 غاشّو (合掌)\n\nإيماءة خاصة: اضغط براحتي اليدين معاً أمام صدرك (كما في الصلاة أو انحناءة التحية). شائعة في ثقافات شرق آسيا كعلامة على الاحترام أو الامتنان. يتم الكشف عنها بموثوقية عالية باستخدام 6 نقاط مرجعية.\n\n---\n\n## ربط منصات البث\n\nلكي يتلقّى EsperantAI الأحداث (التبرعات، الاشتراكات، الغارات)، اربط المنصات التي تبث عليها.\n\n### Twitch\n\n1. أنشئ Client ID على https://dev.twitch.tv/console\n2. سجّل redirect URI: `https://esperantai.com/oauth-callback.html` (أو عنوانك المحلي)\n3. في EsperantAI: لوحة **Platform Events** ← **Twitch EventSub**\n4. الصق Client ID الخاص بك\n5. انقر **Connect**\n6. ستفتح نافذة تفويض Twitch. اقبل الأذونات.\n7. ستُغلق النافذة وسترى «Twitch Connected»\n\n### YouTube Live\n\n1. أنشئ بيانات اعتماد على https://console.cloud.google.com\n2. فعّل YouTube Data API v3\n3. أنشئ OAuth Client ID (النوع: Web Application)\n4. سجّل نفس redirect URI المستخدم مع Twitch\n5. في EsperantAI: لوحة **Platform Events** ← **YouTube Live**\n6. الصق Client ID الخاص بك وانقر **Connect**\n\n### Kick\n\n1. أنشئ تطبيقاً على https://kick.com/settings/developer\n2. سجّل redirect URI\n3. في EsperantAI: لوحة **Platform Events** ← **Kick**\n4. الصق Client ID الخاص بك وانقر **Connect**\n5. يستخدم Kick بروتوكول OAuth 2.1 مع PKCE (أكثر أماناً)\n\n### StreamElements (جسر متعدد المنصات)\n\nإذا كان لديك حساب StreamElements بالفعل، يمكنك توحيد Twitch + YouTube + Facebook برمز واحد:\n\n1. انتقل إلى https://streamelements.com/dashboard/account/channels\n2. انسخ JWT Token الخاص بك\n3. في EsperantAI: لوحة **Platform Events** ← **StreamElements**\n4. الصق JWT وانقر **Connect**\n\n---\n\n## مزيج الحدث + الإيماءة (متقدم)\n\nهذا هو سحر EsperantAI: الجمع بين **أحداث المنصة** و**إيماءاتك** كتأكيد.\n\n### مثال: شكر المتبرّعين بإيماءة الإبهام\n\n1. لوحة **Event Triggers** ← صف «💰 Donation»\n2. ✅ فعّل\n3. المشهد: `Thank_You_Scene`\n4. الإيماءة المطلوبة: `👍 Thumbs up`\n\n**التدفق المباشر**:\n- يصل تبرّع ← يعرض EsperantAI «Waiting for gesture...»\n- لديك 5 ثوانٍ لتنفيذ 👍\n- إذا نفّذتها ← يبدّل إلى `Thank_You_Scene` + ينفّذ الإجراءات الأخرى المُعدَّة\n- إذا لم تنفّذها ← يتم رفضه تلقائياً\n\n### بدون إيماءة مطلوبة (تشغيل تلقائي)\n\nإذا تركت «Required gesture» كخيار `— none —`، سيُنفَّذ الإجراء فوراً عند ورود الحدث.\n\nمفيد لـ:\n- التبديل التلقائي إلى مشهد الاحتفال عند وصول الغارات\n- عرض التراكب تلقائياً عندما يشترك شخص جديد\n\n---\n\n## الحساسية والمنطقة الميتة\n\n### الحساسية\n\nتتحكم العتبات في حجم الإيماءة اللازم لتشغيل المشغّل:\n\n- **Yaw**: مقدار إدارة الرأس جانبياً (الافتراضي: 0.15 راد ≈ 8.6°)\n- **Pitch لأعلى/لأسفل**: الميل العمودي\n- **Roll**: الميل الجانبي\n\nزيّد القيم لإيماءات أكثر وضوحاً. خفّضها لحساسية أكبر.\n\n### المنطقة الميتة (مقاومة الإرهاق)\n\nإذا كنت في وضع قريب من المركز (yaw أقل من 0.05، pitch أقل من 0.05، roll أقل من 0.08)، **لا يُنشَّط أي شيء**. هذا يسمح لك بالتحرك طبيعياً دون أن تُفعّل الحركات الدقيقة أي مشغّلات.\n\n### الإطارات المستقرة\n\n`Stable frames` = عدد الإطارات المتتالية التي يجب الحفاظ على الإيماءة خلالها قبل التشغيل. الافتراضي: 5 إطارات (~150 مللي ثانية بمعدل 30 إطاراً/ثانية).\n\nزيّد القيمة إذا كانت المشغّلات تعمل بسهولة مفرطة. خفّضها للاستجابة الأسرع.\n\n### فترة التهدئة\n\n`Cooldown (ms)` = الحد الأدنى من الوقت بين تغييرات المشاهد. الافتراضي: 500 مللي ثانية.\n\nيمنع التبديل «العصبي» إذا تذبذبت بسرعة بين الإيماءات.\n\n---\n\n## اختصارات لوحة المفاتيح\n\n| المفتاح | الإجراء |\n|---|---|\n| `Space` | إيقاف مؤقت / استئناف الكشف |\n| `C` | الانتقال يدوياً إلى مشهد CENTER |\n| `R` | إعادة تحميل قائمة المشاهد من البرنامج |\n| `Esc` | قطع الاتصال |\n\n---\n\n## سجل المشغّلات\n\nتعرض لوحة **Advanced ← Trigger History** آخر 50 إجراءً مُنشَطاً:\n\n- ✓ أخضر = ناجح\n- ✗ أحمر = فاشل\n- · رمادي = قيد الانتظار\n\nمفيد لمراجعة ما نشّط المشغّلات دون فتح DevTools.\n\n**تصدير CSV**: تنزيل السجل للتحليل دون اتصال.\n\n**مسح**: حذف السجل (لا يؤثر على شيء آخر).\n\n---\n\n## تغيير اللغة\n\nيكتشف EsperantAI تلقائياً لغة نظام التشغيل لديك. لتغييرها يدوياً:\n\n- في الزاوية العلوية اليمنى: القائمة المنسدلة للغات\n- اختر لغتك المفضلة\n- تتحدّث الواجهة فوراً\n\nاللغات المتاحة:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n\nجميع اللغات الـ 13 مترجمة بالكامل (323 مفتاحاً لكل منها).\n\n---\n\n## إدارة الترخيص\n\nلوحة **Advanced ← License**:\n\n- **عرض الحالة**: صالح / غير صالح\n- **عرض البريد الإلكتروني للعميل المرتبط**\n- **عرض آخر تحقق عبر الإنترنت**\n- **Deactivate on this device**: استخدمها قبل تغيير الحاسوب أو لتحرير خانة (من الخانات الثلاث المتاحة)\n\n---\n\n## استكشاف الأخطاء وإصلاحها\n\n### «Activation required» تستمر بعد لصق مفتاح الترخيص\n\n- تحقّق من أنك نسخت المفتاح كاملاً (5 مجموعات من 4 أحرف مفصولة بشرطات)\n- تحقّق من اتصالك بالإنترنت (يتطلب التفعيل تحققاً عبر الإنترنت في المرة الأولى)\n- إذا فعّلت الترخيص على 3 أجهزة بالفعل، عطّل واحداً أولاً\n- تواصل مع support@edugame.digital إذا استمرت المشكلة\n\n### «Searching for face...» تستمر رغم أن وجهي مرئي\n\n- حسّن الإضاءة: يجب أن يكون وجهك مضاءً جيداً\n- اقترب من الكاميرا (40-80 سم هو النطاق الأمثل)\n- أغلق علامات التبويب الأخرى التي تستخدم GPU (قد يقيّد Chrome الـ GPU إذا كانت هناك علامات كثيرة مفتوحة)\n- إذا كان Memory Saver في Chrome مفعّلاً، عطّله لعلامة التبويب هذه\n\n### المشاهد لا تظهر في القوائم المنسدلة\n\n- تحقّق من أنك متصل ببرنامج البث (شارة خضراء «Connected»)\n- اضغط `R` لإعادة تحميل قائمة المشاهد\n- إذا بقيت فارغة، اققط الاتصال وأعد الاتصال\n\n### تبدّل المشاهد يتم بدون تنفيذ إيماءات\n\n- زيّد عتبة yaw / pitch / roll في لوحة **Sensitivity**\n- زيّد `Stable frames` من 5 إلى 8-10\n- تأكّد من تهيئة المنطقة الميتة (yaw 0.05، pitch 0.05، roll 0.08)\n- تحقّق من عدم وجود شخص آخر في الإطار (الوجوه المتعددة قد تسبب عدم استقرار)\n\n### تأخير في الكشف\n\n- أغلق التطبيقات الثقيلة (الألعاب، تحرير الفيديو)\n- تحقّق من استخدام GPU المخصص إذا كان متاحاً (وليس المدمج)\n- خفّض دقة الكاميرا إذا كانت 4K (1080p هي الأمثل للكشف)\n\n### OBS لا يستجيب رغم أن EsperantAI يعرض «Scene changed»\n\n- تحقّق من أن اسم المشهد في القائمة المنسدلة يطابق تماماً الاسم في OBS (حساس لحالة الأحرف)\n- تحقّق من أن المشهد ليس في Scene Collection أخرى\n- تحقّق من لوحة **Trigger History** — إذا عُرض ✗ أحمر، فهناك خطأ محدد\n\n### خطأ «OBS unreachable — Connect manually»\n\n- تحقّق من أن OBS مفتوح\n- تحقّق من أن WebSocket مفعّل في OBS\n- إذا عيّنت كلمة مرور في OBS، يجب أن تطابق تماماً\n- بعض برامج مكافحة الفيروسات تحظر المنفذ 4455 — أضف استثناءً\n\n---\n\n## الخصوصية\n\n### ما لا يفعله EsperantAI\n\n- ❌ لا يرسل الفيديو الخاص بك إلى أي خادم\n- ❌ لا يحفظ الفيديو أو اللقطات الخاصة بك\n- ❌ لا يجمع معلومات بيومترية عن بُعد\n- ❌ لا يشارك البيانات مع المعلنين أو أطراف ثالثة\n\n### ما يعالجه\n\n- ✅ كشف الوجوه محلياً في متصفحك (Human.js + WebGL)\n- ✅ اتصالات محلية بـ OBS / Streamlabs / vMix (loopback 127.0.0.1)\n- ✅ تحقق دوري من مفتاح الترخيص (كل 7 أيام)\n- ✅ إذا ربطت Twitch/YouTube/Kick: رموز OAuth في sessionStorage (تُحذف عند إغلاق المتصفح)\n\nالتفاصيل الكاملة في `docs/PRIVACY.html`.\n\n---\n\n## الدعم الفني\n\n- 📧 البريد الإلكتروني: **support@edugame.digital**\n- 🌐 الموقع: https://esperantai.com\n- 📚 التوثيق التقني: https://github.com/salazarjoelo/EsperantAI\n\nأوقات الاستجابة:\n- الاستفسارات العامة: 24-72 ساعة\n- الأخطاء التقنية: 1-3 أيام عمل\n\n---\n\n*آخر تحديث: 2026-05-14. الإصدار: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n\n</div>\n" },
  'pl-PL': { name: 'Polski', flag: '🇵🇱', content: "# EsperantAI — Instrukcja użytkownika\n\n> **Szczere gesty.** Steruj swoim oprogramowaniem do streamingu za pomocą twarzy i rąk. Bez Stream Decka. Bez dodatkowego sprzętu.\n\n**Wersja**: 3.0 · **Język**: Polski (tłumaczenia dostępne w 12 kolejnych językach)\n\n---\n\n## Spis treści\n\n1. [Czym jest EsperantAI?](#czym-jest-esperantai)\n2. [Wymagania minimalne](#wymagania-minimalne)\n3. [Zakup i aktywacja](#zakup-i-aktywacja)\n4. [Pierwsze uruchomienie](#pierwsze-uruchomienie)\n5. [Połącz swoje oprogramowanie do streamingu](#połącz-swoje-oprogramowanie-do-streamingu)\n6. [Konfiguracja gestów i scen](#konfiguracja-gestów-i-scen)\n7. [Kategorie gestów](#kategorie-gestów)\n8. [Połącz platformy streamingowe](#połącz-platformy-streamingowe)\n9. [Kombo: zdarzenie + gest (Zaawansowane)](#kombo-zdarzenie--gest-zaawansowane)\n10. [Czułość i martwa strefa](#czułość-i-martwa-strefa)\n11. [Skróty klawiszowe](#skróty-klawiszowe)\n12. [Historia wyzwalaczy](#historia-wyzwalaczy)\n13. [Zmiana języka](#zmiana-języka)\n14. [Zarządzanie licencją](#zarządzanie-licencją)\n15. [Rozwiązywanie problemów](#rozwiązywanie-problemów)\n16. [Prywatność](#prywatność)\n17. [Pomoc techniczna](#pomoc-techniczna)\n\n---\n\n## Czym jest EsperantAI?\n\nEsperantAI to **aplikacja webowa**, która wykorzystuje sztuczną inteligencję do wykrywania w czasie rzeczywistym gestów twarzy i rąk oraz przekształcania ich w komendy dla twojego oprogramowania do streamingu. Działa z:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (beta)\n\nI odbiera zdarzenia z platform takich jak:\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements** (most wieloplatformowy)\n\n### Dlaczego „szczere gesty\"?\n\nPodstawowe wyrażenia twarzy i rotacja głowy są **uniwersalne we wszystkich kulturach ludzkich** (Paul Ekman, 1972). Nie kłamią, nie różnią się w zależności od kręgu geograficznego. EsperantAI nazywa te gesty „🌐 Uniwersalne\" i odróżnia je od gestów „⚠️ Kulturowych\" (znaki wykonywane rękami), których znaczenie może się różnić w zależności od kraju.\n\nTo ty decydujesz, których gestów używać, dostosowując się do swojej widowni.\n\n---\n\n## Wymagania minimalne\n\n### Sprzęt\n\n- **Dowolna kamera USB** (zalecana: 1080p lub wyższa)\n- **CPU**: dowolny 4-rdzeniowy procesor z ostatnich 5 lat\n- **RAM**: minimum 8 GB. Zalecane 16 GB przy jednoczesnym streamowaniu.\n- **GPU**: dowolny z obsługą WebGL (działają nawet nowoczesne układy zintegrowane)\n\n### Oprogramowanie\n\n- **OS**: Windows 10/11, macOS 12+ lub Linux z aktualnym jądrem\n- **Przeglądarka**: Chrome 90+, Edge 90+ lub Firefox 100+\n- **Oprogramowanie do streamingu** (przynajmniej jedno): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Internet\n\n- Wymagany do **aktywacji licencji** i co **7 dni** do ponownej walidacji\n- Działa **do 7 dni offline** (okres karencji)\n\n---\n\n## Zakup i aktywacja\n\n1. Wejdź na **https://esperantai.com**\n2. Kliknij **„Buy License\"**\n3. Opłać zamówienie przez LemonSqueezy (karta, PayPal itp.)\n4. Otrzymasz e-mail z:\n   - Twoim **kluczem licencyjnym** (format: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Linkiem do korzystania z EsperantAI\n5. Otwórz EsperantAI w przeglądarce\n6. Pojawi się ekran aktywacji. Wklej swój klucz licencyjny\n7. Kliknij **„Activate License\"**\n8. Gotowe! 🎉\n\n### Ile urządzeń?\n\nJedna licencja może być aktywowana na **maksymalnie 3 urządzeniach**. Aby przenieść licencję na inne urządzenie:\n\n1. Na starym urządzeniu: panel **Advanced** → **License** → **Deactivate on this device**\n2. Na nowym urządzeniu: aktywuj normalnie\n\n---\n\n## Pierwsze uruchomienie\n\n### Krok 1: Zezwól na dostęp do kamery\n\nGdy otworzysz EsperantAI po raz pierwszy, przeglądarka poprosi o zgodę na używanie kamery. **Zezwól**.\n\n> Ważne: EsperantAI nigdy nie wysyła twojego obrazu wideo na żaden serwer. Przetwarzanie odbywa się w 100% lokalnie na twoim komputerze.\n\n### Krok 2: Wybierz kamerę\n\nJeśli masz więcej niż jedną kamerę, wybierz, której użyć, z listy rozwijanej.\n\n### Krok 3: Sprawdź wykrywanie\n\nZobaczysz swoją twarz na lewym panelu. Gdy EsperantAI wykryje twoją twarz, wskaźniki Yaw / Pitch / Roll zaczną pokazywać wartości.\n\n### Krok 4: Kreator kalibracji (Pro+)\n\nJeśli masz licencję Pro lub Pro+, **Kreator kalibracji** uruchamia się automatycznie przy pierwszym użyciu. Mierzy twój naturalny zakres ruchu i ustawia optymalną czułość. Możesz uruchomić go ponownie w dowolnym momencie za pomocą przycisku **Recalibrate**.\n\n---\n\n## Połącz swoje oprogramowanie do streamingu\n\n### OBS Studio\n\n1. W OBS: **Tools → WebSocket Server Settings**\n2. Włącz WebSocket. Zapisz hasło, jeśli je ustawiłeś.\n3. W EsperantAI: panel **Connection**\n4. Oprogramowanie do streamingu: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (domyślne)\n6. Hasło: to, które ustawiłeś w OBS\n7. Kliknij **Connect**\n\n### Streamlabs Desktop\n\n1. W Streamlabs: **Settings → Remote Control**\n2. Włącz Remote Control\n3. Zapisz API Token\n4. W EsperantAI: oprogramowanie do streamingu: **Streamlabs Desktop**\n5. API Token: wklej go\n6. Port: `59650` (domyślny)\n7. Kliknij **Connect**\n\n### vMix\n\n1. W vMix: **Settings → Web Controller**\n2. Włącz Web Controller. Domyślny port: 8088.\n3. W EsperantAI: oprogramowanie do streamingu: **vMix**\n4. Host: `127.0.0.1`\n5. Port: `8088`\n6. Kliknij **Connect**\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5+ wymaga ręcznej instalacji wtyczki obs-websocket\n2. Pobierz `obs-websocket` z [forum OBS](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/)\n3. Skopiuj ją do folderu wtyczek PRISM\n4. Uruchom ponownie PRISM\n5. Włącz WebSocket w **Tools → WebSocket Server Settings**\n6. W EsperantAI: oprogramowanie do streamingu: **PRISM Live Studio** (działa tak samo jak OBS)\n\n### XSplit Broadcaster (beta)\n\n1. Zainstaluj rozszerzenie „Remote xjs\" w XSplit (Settings → Extensions)\n2. Włącz Remote w preferencjach\n3. W EsperantAI: oprogramowanie do streamingu: **XSplit**\n4. Remote xjs Proxy URL: `ws://127.0.0.1:5555/xjs` (domyślne)\n5. Kliknij **Connect**\n\n> XSplit jest w fazie **beta**. Zaawansowane funkcje mogą być ograniczone.\n\n---\n\n## Konfiguracja gestów i scen\n\nPo połączeniu sceny twojego oprogramowania pojawią się automatycznie na listach rozwijanych w panelu **Triggers**.\n\n### Podstawowe mapowanie\n\n1. Dla każdego gestu (np. „Look Left\") wybierz scenę z listy rozwijanej\n2. Gdy wykonasz ten gest i utrzymasz go stabilnie przez ~150 ms, EsperantAI przełączy scenę w twoim oprogramowaniu do streamingu\n3. Zmiana jest automatyczna i niemal natychmiastowa\n\n### Wiele akcji (Pro+)\n\nZ licencją Pro lub Pro+ jeden gest może uruchomić **wiele akcji** jednocześnie:\n- Przełączyć scenę + odtworzyć dźwięk + wyświetlić nakładkę + wysłać wiadomość na czacie\n\n### Włącz / wyłącz kategorie\n\nKażda kategoria ma własne pole wyboru „Enable\":\n\n- 🧠 **Rotacja głowy** (uniwersalna — włączona domyślnie)\n- 📏 **Odległość twarzy** (zbliżenie/oddalenie)\n- 👁️ **Kierunek wzroku** (ruch samymi oczami)\n- 😀 **Emocje** (uśmiech, zdziwienie, złość, neutralna)\n- 👁️‍🗨️ **Podwójne mrugnięcie**\n- ✋ **Gesty rąk** (kulturowe — wyłączone domyślnie)\n\nWyłącz kategorie, których nie potrzebujesz, aby oszczędzić CPU.\n\n---\n\n## Kategorie gestów\n\n### 🌐 Uniwersalne (to samo znaczenie w każdej kulturze)\n\n| Gest | Oś | Jak aktywować |\n|---|---|---|\n| Centrum | — | Patrzeć prosto, twarz stabilna |\n| Spojrzenie w lewo | ujemny yaw | Obrócić głowę w lewo |\n| Spojrzenie w prawo | dodatni yaw | Obrócić głowę w prawo |\n| Spojrzenie w górę | ujemny pitch | Podnieść twarz |\n| Spojrzenie w dół | dodatni pitch | Opuścić twarz |\n| Przechył w lewo | ujemny roll | Przechylić głowę w stronę lewego ramienia |\n| Przechył w prawo | dodatni roll | Przechylić głowę w stronę prawego ramienia |\n| Zbliżenie | odległość | Zbliżyć twarz do kamery |\n| Oddalenie | odległość | Oddalić twarz od kamery |\n| Kierunek wzroku | wzrok | Poruszać tylko oczami (głowa wycentrowana) |\n| Uśmiech | emocja=happy | Wyraźnie się uśmiechnąć |\n| Zdziwienie | emocja=surprise | Wyrazić zdziwienie |\n| Złość | emocja=angry | Wyrazić złość |\n| Neutralna | emocja=neutral | Zrelaksowana twarz |\n| Podwójne mrugnięcie | mrugnięcie | Szybko zamknąć obie oczy dwukrotnie (< 700 ms) |\n\n### ⚠️ Kulturowe (znaczenie zależy od kraju)\n\n| Gest | Znaczenie na Zachodzie | Uwaga w innych kulturach |\n|---|---|---|\n| 👍 Kciuk w górę | Zgoda, aprobata | Bliski Wschód / Azja Zachodnia: może być obraźliwy |\n| ✌️ Znak pokoju | Pokój / zwycięstwo | UK / Irlandia / Australia (dłoń do wewnątrz): obelga |\n| 🤘 Znak rocka | Rock, metal | Włochy (dłoń w dół): „cornuto\" (obelga) |\n| 👌 OK | OK / idealnie | Brazylia / Turcja / Niemcy: może być obraźliwy. **Uwaga: w Polsce gest OK (👌) budzi kontrowersje i może być odebrany negatywnie — zaleca się ostrożność przy używaniu tego gestu przed polską widownią.** |\n| ✊ Zaciśnięta pięść | Zależy od kontekstu politycznego | — |\n| 🖐️ Otwarta dłoń | „Stop\" lub powitanie | Grecja (mountza w czyjąś stronę): silna obelga |\n| ☝️ Wskazywanie | Wskazać coś | Azja: wskazywanie palcem jest niegrzeczne |\n\nEsperantAI oznacza każdy gest odpowiednim symbolem w interfejsie. Wybieraj, których używać, kierując się swoją globalną widownią.\n\n### 🙏 Gassho (合掌)\n\nSpecjalny gest: dłonie złączone razem przed klatką piersiową (jak do modlitwy lub ukłonu powitalnego). Pospolity w kulturach Azji Wschodniej jako znak szacunku lub wdzięczności. Wykrywany z wysoką niezawodnością przy użyciu 6 punktów kontrolnych.\n\n---\n\n## Połącz platformy streamingowe\n\nAby EsperantAI odbierał zdarzenia (dotacje, subskrypcje, rajdy), połącz platformy, na których streamujesz.\n\n### Twitch\n\n1. Utwórz Client ID na https://dev.twitch.tv/console\n2. Zarejestruj redirect URI: `https://esperantai.com/oauth-callback.html` (lub swój lokalny URL)\n3. W EsperantAI: panel **Platform Events** → **Twitch EventSub**\n4. Wklej swój Client ID\n5. Kliknij **Connect**\n6. Otworzy się okno autoryzacji Twitch. Zaakceptuj uprawnienia.\n7. Okno się zamknie i zobaczysz „Twitch Connected\"\n\n### YouTube Live\n\n1. Utwórz poświadczenia na https://console.cloud.google.com\n2. Włącz YouTube Data API v3\n3. Utwórz OAuth Client ID (typ: Web Application)\n4. Zarejestruj ten sam redirect URI co dla Twitcha\n5. W EsperantAI: panel **Platform Events** → **YouTube Live**\n6. Wklej swój Client ID i kliknij **Connect**\n\n### Kick\n\n1. Utwórz aplikację na https://kick.com/settings/developer\n2. Zarejestruj redirect URI\n3. W EsperantAI: panel **Platform Events** → **Kick**\n4. Wklej swój Client ID i kliknij **Connect**\n5. Kick używa OAuth 2.1 z PKCE (bezpieczniejsze)\n\n### StreamElements (most wieloplatformowy)\n\nJeśli masz już konto StreamElements, możesz połączyć Twitch + YouTube + Facebook za pomocą jednego tokena:\n\n1. Przejdź na https://streamelements.com/dashboard/account/channels\n2. Skopiuj swój JWT Token\n3. W EsperantAI: panel **Platform Events** → **StreamElements**\n4. Wklej JWT i kliknij **Connect**\n\n---\n\n## Kombo: zdarzenie + gest (Zaawansowane)\n\nTo jest magia EsperantAI: łączenie **zdarzeń platformy** z **twoimi gestami** jako potwierdzeniem.\n\n### Przykład: podziękowanie za dotację gestem kciuka w górę\n\n1. Panel **Event Triggers** → wiersz „💰 Donation\"\n2. ✅ Włącz\n3. Scena: `Thank_You_Scene`\n4. Wymagany gest: `👍 Thumbs up`\n\n**Przebieg na żywo**:\n- Nadchodzi dotacja → EsperantAI wyświetla „Waiting for gesture...\"\n- Masz 5 sekund na wykonanie 👍\n- Jeśli wykonasz → przełącza na `Thank_You_Scene` + uruchamia inne skonfigurowane akcje\n- Jeśli nie → zdarzenie jest automatycznie odrzucane\n\n### Bez wymaganego gestu (automatyczny wyzwalacz)\n\nJeśli zostawisz „Required gesture\" jako `— none —`, zdarzenie uruchomi akcję natychmiast.\n\nPrzydatne do:\n- Automatycznego przełączania na scenę celebracji, gdy nadchodzi rajd\n- Automatycznego wyświetlania nakładki, gdy ktoś zasubskrybuje\n\n---\n\n## Czułość i martwa strefa\n\n### Czułość\n\nProgi kontrolują, jak wyraźny musi być gest, aby uruchomić wyzwalacz:\n\n- **Yaw**: jak mocno obrócić głowę w bok (domyślnie: 0,15 rad ≈ 8,6°)\n- **Pitch w górę/w dół**: pionowe pochylenie\n- **Roll**: boczne pochylenie\n\nZwiększ wartości dla bardziej wyrazistych gestów. Zmniejsz dla większej czułości.\n\n### Martwa strefa (ochrona przed zmęczeniem)\n\nJeśli jesteś niemal wycentrowany (yaw < 0,05, pitch < 0,05, roll < 0,08), **NIC się nie uruchamia**. Dzięki temu możesz poruszać się naturalnie, nie aktywując wyzwalaczy mikroruchami.\n\n### Stabilne klatki\n\n`Stable frames` = ile kolejnych klatek gest musi być utrzymywany przed uruchomieniem. Domyślnie: 5 klatek (~150 ms przy 30 fps).\n\nZwiększ, jeśli wyzwalacze aktywują się zbyt łatwo. Zmniejsz dla szybszej reakcji.\n\n### Odnowienie\n\n`Cooldown (ms)` = minimalny czas między zmianami scen. Domyślnie: 500 ms.\n\nZapobiega „nerwowemu\" przełączaniu, gdy szybko oscylujesz między gestami.\n\n---\n\n## Skróty klawiszowe\n\n| Klawisz | Akcja |\n|---|---|\n| `Spacja` | Wstrzymaj / Wznów wykrywanie |\n| `C` | Ręczne przejście do sceny CENTER |\n| `R` | Przeładuj listę scen z oprogramowania |\n| `Esc` | Rozłącz |\n\n---\n\n## Historia wyzwalaczy\n\nPanel **Advanced → Trigger History** pokazuje ostatnie 50 uruchomionych akcji:\n\n- ✓ zielony = udana\n- ✗ czerwony = nieudana\n- · szary = oczekująca\n\nPrzydatne do sprawdzania, co uruchomiło wyzwalacze, bez otwierania DevTools.\n\n**Eksport CSV**: pobierz historię do analizy offline.\n\n**Wyczyść**: usuń historię (nie wpływa na nic innego).\n\n---\n\n## Zmiana języka\n\nEsperantAI automatycznie wykrywa język twojego systemu operacyjnego. Aby zmienić go ręcznie:\n\n- W prawym górnym rogu: lista rozwijana języków\n- Wybierz preferowany język\n- Interfejs zaktualizuje się natychmiast\n\nDostępne języki:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n\nWszystkie 13 języków jest w pełni przetłumaczonych (po 323 klucze).\n\n---\n\n## Zarządzanie licencją\n\nPanel **Advanced → License**:\n\n- **Wyświetl status**: Ważna / Nieważna\n- **Wyświetl powiązany e-mail klienta**\n- **Wyświetl ostatnią walidację online**\n- **Deactivate on this device**: użyj przed zmianą komputera lub aby zwolnić miejsce (z 3 dostępnych)\n\n---\n\n## Rozwiązywanie problemów\n\n### „Activation required\" nie znika po wklejeniu klucza licencyjnego\n\n- Sprawdź, czy skopiowałeś kompletny klucz (5 grup po 4 znaki oddzielone myślnikami)\n- Sprawdź połączenie z internetem (aktywacja wymaga weryfikacji online przy pierwszym uruchomieniu)\n- Jeśli aktywowałeś już na 3 urządzeniach, najpierw dezaktywuj jedno z nich\n- Skontaktuj się z support@edugame.digital, jeśli problem utrzymuje się\n\n### „Searching for face...\" nie znika, mimo że twarz jest widoczna\n\n- Popraw oświetlenie: twoja twarz powinna być dobrze oświetlona\n- Zbliż się do kamery (optymalnie 40–80 cm)\n- Zamknij inne karty używające GPU (Chrome może ograniczać GPU, gdy jest ich zbyt wiele)\n- Jeśli w Chrome aktywny jest Memory Saver, wyłącz go dla tej karty\n\n### Sceny nie pojawiają się na listach rozwijanych\n\n- Sprawdź, czy jesteś połączony z oprogramowaniem do streamingu (zielony znacznik „Connected\")\n- Naciśnij `R`, aby przeładować listę scen\n- Jeśli nadal pusto, rozłącz i połącz ponownie\n\n### Zmiany scen uruchamiają się bez wykonywania gestów\n\n- Zwiększ próg yaw / pitch / roll w panelu **Sensitivity**\n- Zwiększ `Stable frames` z 5 do 8–10\n- Upewnij się, że martwa strefa jest skonfigurowana (yaw 0,05, pitch 0,05, roll 0,08)\n- Sprawdź, czy w kadrze nie ma innej osoby (wiele twarzy może powodować niestabilność)\n\n### Opóźnienie wykrywania\n\n- Zamknij obciążające aplikacje (gry, montaż wideo)\n- Sprawdź, czy używasz dedykowanego GPU, jeśli go posiadasz (nie zintegrowanego)\n- Zmniejsz rozdzielczość kamery, jeśli jest 4K (1080p jest optymalne do wykrywania)\n\n### OBS nie reaguje, mimo że EsperantAI pokazuje „Scene changed\"\n\n- Sprawdź, czy nazwa sceny na liście rozwijanej DOKŁADNIE odpowiada tej w OBS (wielkość liter ma znaczenie)\n- Sprawdź, czy scena nie znajduje się w innej Scene Collection\n- Sprawdź panel **Trigger History** — jeśli wyświetla ✗ czerwony, oznacza to konkretny błąd\n\n### Błąd „OBS unreachable — Connect manually\"\n\n- Sprawdź, czy OBS jest otwarty\n- Sprawdź, czy WebSocket jest włączony w OBS\n- Jeśli ustawiłeś hasło w OBS, musi ono dokładnie pasować\n- Niektóre programy antywirusowe blokują port 4455 — dodaj wyjątek\n\n---\n\n## Prywatność\n\n### Czego EsperantAI NIE robi\n\n- ❌ NIE wysyła twojego wideo na żaden serwer\n- ❌ NIE zapisuje twojego wideo ani zrzutów\n- ❌ NIE zbiera danych biometrycznych zdalnie\n- ❌ NIE udostępnia danych reklamodawcom ani stronom trzecim\n\n### Co PRZETWARZA\n\n- ✅ Lokalne wykrywanie twarzy w twojej przeglądarce (Human.js + WebGL)\n- ✅ Lokalne połączenia z twoim OBS / Streamlabs / vMix (loopback 127.0.0.1)\n- ✅ Okresowa walidacja klucza licencyjnego (co 7 dni)\n- ✅ Jeśli połączysz Twitch/YouTube/Kick: tokeny OAuth w sessionStorage (usuwane po zamknięciu przeglądarki)\n\nSzczegóły w `docs/PRIVACY.html`.\n\n---\n\n## Pomoc techniczna\n\n- 📧 E-mail: **support@edugame.digital**\n- 🌐 Web: https://esperantai.com\n- 📚 Dokumentacja techniczna: https://github.com/salazarjoelo/EsperantAI\n\nCzas odpowiedzi:\n- Pytania ogólne: 24–72 godziny\n- Błędy techniczne: 1–3 dni robocze\n\n---\n\n*Ostatnia aktualizacja: 2026-05-14. Wersja: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'hi-IN': { name: 'हिंदी', flag: '🇮🇳', content: "# EsperantAI — उपयोगकर्ता मैनुअल\n\n> **ईमानदार इशारे।** अपने चेहरे और हाथों से अपने स्ट्रीमिंग सॉफ़्टवेयर को नियंत्रित करें। स्ट्रीम डेक की आवश्यकता नहीं। किसी अतिरिक्त हार्डवेयर की आवश्यकता नहीं।\n\n**संस्करण**: 3.0 · **भाषा**: हिंदी (12 अन्य भाषाओं में अनुवाद उपलब्ध)\n\n---\n\n## विषय सूची\n\n1. [EsperantAI क्या है?](#esperantai-क्या-है)\n2. [न्यूनतम आवश्यकताएँ](#न्यूनतम-आवश्यकताएँ)\n3. [खरीद और सक्रियण](#खरीद-और-सक्रियण)\n4. [पहला उपयोग](#पहला-उपयोग)\n5. [अपना स्ट्रीमिंग सॉफ़्टवेयर कनेक्ट करें](#अपना-स्ट्रीमिंग-सॉफ़्टवेयर-कनेक्ट-करें)\n6. [इशारे और दृश्य कॉन्फ़िगर करें](#इशारे-और-दृश्य-कॉन्फ़िगर-करें)\n7. [इशारों की श्रेणियाँ](#इशारों-की-श्रेणियाँ)\n8. [स्ट्रीमिंग प्लेटफ़ॉर्म कनेक्ट करें](#स्ट्रीमिंग-प्लेटफ़ॉर्म-कनेक्ट-करें)\n9. [इवेंट + इशारा संयोजन (उन्नत)](#इवेंट--इशारा-संयोजन-उन्नत)\n10. [संवेदनशीलता और डेड ज़ोन](#संवेदनशीलता-और-डेड-ज़ोन)\n11. [कीबोर्ड शॉर्टकट](#कीबोर्ड-शॉर्टकट)\n12. [ट्रिगर इतिहास](#ट्रिगर-इतिहास)\n13. [भाषा बदलें](#भाषा-बदलें)\n14. [अपने लाइसेंस का प्रबंधन करें](#अपने-लाइसेंस-का-प्रबंधन-करें)\n15. [समस्या निवारण](#समस्या-निवारण)\n16. [गोपनीयता](#गोपनीयता)\n17. [सहायता](#सहायता)\n\n---\n\n## EsperantAI क्या है?\n\nEsperantAI एक **वेब ऐप** है जो कृत्रिम बुद्धिमत्ता का उपयोग करके आपके चेहरे और हाथों के इशारों को वास्तविक समय में पहचानता है, और उन्हें आपके स्ट्रीमिंग सॉफ़्टवेयर के लिए कमांड में अनुवादित करता है। यह निम्नलिखित के साथ काम करता है:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (बीटा)\n\nऔर निम्नलिखित प्लेटफ़ॉर्म से इवेंट प्राप्त करता है:\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements** (मल्टी-प्लेटफ़ॉर्म ब्रिज)\n\n### \"ईमानदार इशारे\" क्यों?\n\nमूल चेहरे के भाव और सिर का घूमना **सभी मानव संस्कृतियों में सार्वभौमिक** है (पॉल एकमैन, 1972)। वे झूठ नहीं बोलते, वे भूगोल के अनुसार नहीं बदलते। EsperantAI इन्हें \"🌐 सार्वभौमिक\" इशारे कहता है और उन्हें \"⚠️ सांस्कृतिक\" इशारों (हाथ के संकेत) से अलग करता है, जिनका अर्थ देश के अनुसार भिन्न हो सकता है।\n\nआप अपने दर्शकों के आधार पर कौन से इशारे उपयोग करने हैं, यह तय करें।\n\n---\n\n## न्यूनतम आवश्यकताएँ\n\n### हार्डवेयर\n\n- **कोई भी USB वेबकैम** (अनुशंसित: 1080p या उच्चतर)\n- **CPU**: पिछले 5 वर्षों का कोई भी 4+ कोर प्रोसेसर\n- **RAM**: 8 GB न्यूनतम। यदि आप एक साथ स्ट्रीमिंग कर रहे हैं तो 16 GB अनुशंसित।\n- **GPU**: WebGL समर्थन वाला कोई भी (आधुनिक एकीकृत GPU भी काम करते हैं)\n\n### सॉफ़्टवेयर\n\n- **OS**: Windows 10/11, macOS 12+, या हालिया कर्नेल वाला Linux\n- **ब्राउज़र**: Chrome 90+, Edge 90+, या Firefox 100+\n- **स्ट्रीमिंग सॉफ़्टवेयर** (कम से कम एक): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### इंटरनेट\n\n- अपनी **लाइसेंस सक्रिय करने** के लिए आवश्यक और हर **7 दिन** पुनः सत्यापन के लिए\n- **7 दिनों तक ऑफ़लाइन** काम करता है (ग्रेस पीरियड)\n\n---\n\n## खरीद और सक्रियण\n\n1. **https://esperantai.com** पर जाएँ\n2. **\"लाइसेंस खरीदें\"** पर क्लिक करें\n3. LemonSqueezy के माध्यम से भुगतान पूर्ण करें (कार्ड, PayPal, आदि)\n4. आपको ईमेल प्राप्त होगा जिसमें:\n   - आपकी **लाइसेंस कुंजी** (प्रारूप: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - EsperantAI उपयोग करने का लिंक\n5. अपने ब्राउज़र में EsperantAI खोलें\n6. सक्रियण स्क्रीन दिखाई देगी। अपनी लाइसेंस कुंजी पेस्ट करें\n7. **\"लाइसेंस सक्रिय करें\"** पर क्लिक करें\n8. हो गया! 🎉\n\n### कितने उपकरण?\n\nएक लाइसेंस **3 उपकरणों तक** सक्रिय किया जा सकता है। अपना लाइसेंस दूसरे उपकरण पर ले जाने के लिए:\n\n1. पुराने उपकरण पर: **उन्नत** पैनल → **लाइसेंस** → **इस उपकरण पर निष्क्रिय करें**\n2. नए उपकरण पर: सामान्य रूप से सक्रिय करें\n\n---\n\n## पहला उपयोग\n\n### चरण 1: कैमरा एक्सेस की अनुमति दें\n\nजब आप पहली बार EsperantAI खोलते हैं, तो आपका ब्राउज़र कैमरा अनुमति माँगेगा। **स्वीकार करें**।\n\n> महत्वपूर्ण: EsperantAI आपका वीडियो किसी भी सर्वर पर नहीं भेजता। प्रसंस्करण आपके कंप्यूटर पर 100% स्थानीय है।\n\n### चरण 2: कैमरा चुनें\n\nयदि आपके पास एक से अधिक कैमरे हैं, तो कैमरा ड्रॉपडाउन से कौन सा उपयोग करना है चुनें।\n\n### चरण 3: पहचान सत्यापित करें\n\nआप बाएँ पैनल में अपना चेहरा देखेंगे। जब EsperantAI आपका चेहरा पहचान लेगा, Yaw / Pitch / Roll संकेतक मान दिखाना शुरू कर देंगे।\n\n### चरण 4: कैलिब्रेशन विज़ार्ड (Pro+)\n\nयदि आपके पास Pro या Pro+ लाइसेंस है, तो **कैलिब्रेशन विज़ार्ड** पहले उपयोग पर स्वचालित रूप से शुरू होता है। यह आपकी प्राकृतिक गति की सीमा को मापता है और इष्टतम संवेदनशीलता सेट करता है। आप इसे कभी भी **रीकैलिब्रेट** बटन से फिर से चला सकते हैं।\n\n---\n\n## अपना स्ट्रीमिंग सॉफ़्टवेयर कनेक्ट करें\n\n### OBS Studio\n\n1. OBS में: **Tools → WebSocket Server Settings**\n2. WebSocket सक्षम करें। यदि आपने पासवर्ड सेट किया है तो नोट करें।\n3. EsperantAI में: **कनेक्शन** पैनल\n4. स्ट्रीमिंग सॉफ़्टवेयर: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (डिफ़ॉल्ट)\n6. पासवर्ड: OBS में जो सेट किया है\n7. **कनेक्ट** पर क्लिक करें\n\n### Streamlabs Desktop\n\n1. Streamlabs में: **Settings → Remote Control**\n2. Remote Control सक्षम करें\n3. API Token नोट करें\n4. EsperantAI में: स्ट्रीमिंग सॉफ़्टवेयर: **Streamlabs Desktop**\n5. API Token: पेस्ट करें\n6. पोर्ट: `59650` (डिफ़ॉल्ट)\n7. **कनेक्ट** पर क्लिक करें\n\n### vMix\n\n1. vMix में: **Settings → Web Controller**\n2. Web Controller सक्षम करें। डिफ़ॉल्ट पोर्ट: 8088।\n3. EsperantAI में: स्ट्रीमिंग सॉफ़्टवेयर: **vMix**\n4. होस्ट: `127.0.0.1`\n5. पोर्ट: `8088`\n6. **कनेक्ट** पर क्लिक करें\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5+ के लिए obs-websocket प्लगइन的手动 स्थापना आवश्यक है\n2. [OBS फ़ोरम](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/) से `obs-websocket` डाउनलोड करें\n3. PRISM के प्लगइन फ़ोल्डर में कॉपी करें\n4. PRISM पुनः आरंभ करें\n5. **Tools → WebSocket Server Settings** में WebSocket सक्षम करें\n6. EsperantAI में: स्ट्रीमिंग सॉफ़्टवेयर: **PRISM Live Studio** (OBS की तरह काम करता है)\n\n### XSplit Broadcaster (बीटा)\n\n1. XSplit में \"Remote xjs\" एक्सटेंशन स्थापित करें (Settings → Extensions)\n2. प्राथमिकताओं में Remote सक्षम करें\n3. EsperantAI में: स्ट्रीमिंग सॉफ़्टवेयर: **XSplit**\n4. Remote xjs Proxy URL: `ws://127.0.0.1:5555/xjs` (डिफ़ॉल्ट)\n5. **कनेक्ट** पर क्लिक करें\n\n> XSplit **बीटा** में है। उन्नत सुविधाएँ सीमित हो सकती हैं।\n\n---\n\n## इशारे और दृश्य कॉन्फ़िगर करें\n\nकनेक्ट होने के बाद, आपके सॉफ़्टवेयर के वास्तविक दृश्य स्वचालित रूप से **ट्रिगर** पैनल ड्रॉपडाउन में दिखाई देंगे।\n\n### मूल मैपिंग\n\n1. प्रत्येक इशारे के लिए (उदा., \"बाईं ओर देखें\"), ड्रॉपडाउन से एक दृश्य चुनें\n2. जब आप वह इशारा करते हैं और लगभग 150ms तक स्थिर रखते हैं, तो EsperantAI आपके स्ट्रीमिंग सॉफ़्टवेयर में उस दृश्य पर स्विच करेगा\n3. परिवर्तन स्वचालित और लगभग तात्कालिक है\n\n### मल्टी-एक्शन (Pro+)\n\nPro या Pro+ लाइसेंस के साथ, एक इशारा **कई कार्यों** को एक साथ ट्रिगर कर सकता है:\n- दृश्य बदलें + ध्वनि चलाएँ + ओवरले दिखाएँ + चैट संदेश भेजें\n\n### श्रेणियाँ सक्षम / अक्षम करें\n\nप्रत्येक श्रेणी का अपना \"सक्षम\" चेकबॉक्स है:\n\n- 🧠 **सिर का घूमना** (सार्वभौमिक — डिफ़ॉल्ट रूप से सक्षम)\n- 📏 **चेहरे की दूरी** (करीब/दूर जाएँ)\n- 👁️ **दृष्टि** (केवल आँखें घुमाएँ)\n- 😀 **भावनाएँ** (मुस्कान, आश्चर्य, गुस्सा, तटस्थ)\n- 👁️‍🗨️ **दोहरी पलक झपकी**\n- ✋ **हाथ के इशारे** (सांस्कृतिक — डिफ़ॉल्ट रूप से अक्षम)\n\nCPU बचाने के लिए अनावश्यक श्रेणियाँ अक्षम करें।\n\n---\n\n## इशारों की श्रेणियाँ\n\n### 🌐 सार्वभौमिक (किसी भी संस्कृति में समान अर्थ)\n\n| इशारा | अक्ष | सक्रिय करने का तरीका |\n|---|---|---|\n| केंद्र | — | सीधे सामने देखना, चेहरा स्थिर |\n| बाईं ओर देखें | नकारात्मक yaw | सिर बाईं ओर घुमाएँ |\n| दाईं ओर देखें | सकारात्मक yaw | सिर दाईं ओर घुमाएँ |\n| ऊपर देखें | नकारात्मक pitch | चेहरा ऊपर उठाएँ |\n| नीचे देखें | सकारात्मक pitch | चेहरा नीचे करें |\n| बाईं ओर झुकें | नकारात्मक roll | सिर बाएँ कंधे की ओर झुकाएँ |\n| दाईं ओर झुकें | सकारात्मक roll | सिर दाएँ कंधे की ओर झुकाएँ |\n| करीब आएँ | दूरी | कैमरे के करीब आएँ |\n| दूर जाएँ | दूरी | कैमरे से दूर जाएँ |\n| दृष्टि | दृष्टि | केवल आँखें घुमाएँ (सिर केंद्रित) |\n| मुस्कुरा रहे हैं | भावना=खुशी | स्पष्ट रूप से मुस्कुराएँ |\n| आश्चर्यित | भावना=आश्चर्य | आश्चर्यित दिखें |\n| गुस्सा | भावना=गुस्सा | गुस्से में दिखें |\n| तटस्थ | भावना=तटस्थ | विश्रामित चेहरा |\n| दोहरी पलक झपकी | पलक झपकी | दोनों आँखें जल्दी दो बार बंद करें (< 700ms) |\n\n### ⚠️ सांस्कृतिक (अर्थ देश के अनुसार भिन्न)\n\n| इशारा | पश्चिमी अर्थ | अन्य संस्कृतियों में सावधानी |\n|---|---|---|\n| 👍 अंगूठा ऊपर | स्वीकृति | मध्य पूर्व / पश्चिम एशिया: आपत्तिजनक हो सकता है |\n| ✌️ शांति | शांति / विजय | यूके / आयरलैंड / ऑस्ट्रेलिया (हथेली अंदर): अपमान |\n| 🤘 रॉक साइन | रॉक / मेटल | इटली (हथेली नीचे): \"कोर्नुटो\" (अपमान) |\n| 👌 ओके | ओके / परिपूर्ण | ब्राज़ील / तुर्की / जर्मनी: आपत्तिजनक हो सकता है |\n| ✊ बंद मुट्ठी | राजनीतिक संदर्भ पर निर्भर | — |\n| 🖐️ खुली हथेली | \"रुको\" या अभिवादन | ग्रीस (किसी की ओर माउंट्ज़ा): गंभीर अपमान |\n| ☝️ इशारा करना | संकेत | एशिया: उंगली से इशारा करना अभद्र है |\n\nEsperantAI UI में प्रत्येक इशारे को उसके संबंधित बैज के साथ चिह्नित करता है। अपने वैश्विक दर्शकों के आधार पर कौन से उपयोग करने हैं चुनें।\n\n### 🙏 गश्शो (合掌)\n\nएक विशेष इशारा: अपनी छाती के सामने दोनों हथेलियाँ एक साथ दबाएँ (प्रार्थना या अभिवादन झुकाव की तरह)। पूर्वी एशियाई संस्कृतियों में सम्मान या कृतज्ञता के संकेत के रूप में सामान्य। 6 लैंडमार्क जाँचों के साथ उच्च विश्वसनीयता से पहचाना जाता है।\n\n---\n\n## स्ट्रीमिंग प्लेटफ़ॉर्म कनेक्ट करें\n\nEsperantAI को इवेंट (दान, सब्सक्रिप्शन, रेड) प्राप्त करने के लिए, उन प्लेटफ़ॉर्म को कनेक्ट करें जहाँ आप स्ट्रीम करते हैं।\n\n### Twitch\n\n1. https://dev.twitch.tv/console पर Client ID बनाएँ\n2. रीडायरेक्ट URI पंजीकृत करें: `https://esperantai.com/oauth-callback.html` (या अपना स्थानीय URL)\n3. EsperantAI में: **प्लेटफ़ॉर्म इवेंट** पैनल → **Twitch EventSub**\n4. अपना Client ID पेस्ट करें\n5. **कनेक्ट** पर क्लिक करें\n6. Twitch प्राधिकरण विंडो खुलेगी। अनुमतियाँ स्वीकार करें।\n7. विंडो बंद हो जाएगी और आपको \"Twitch कनेक्टेड\" दिखाई देगा\n\n### YouTube Live\n\n1. https://console.cloud.google.com पर क्रेडेंशियल बनाएँ\n2. YouTube Data API v3 सक्षम करें\n3. OAuth Client ID बनाएँ (प्रकार: वेब एप्लिकेशन)\n4. Twitch के समान रीडायरेक्ट URI पंजीकृत करें\n5. EsperantAI में: **प्लेटफ़ॉर्म इवेंट** पैनल → **YouTube Live**\n6. अपना Client ID पेस्ट करें और **कनेक्ट** पर क्लिक करें\n\n### Kick\n\n1. https://kick.com/settings/developer पर ऐप बनाएँ\n2. रीडायरेक्ट URI पंजीकृत करें\n3. EsperantAI में: **प्लेटफ़ॉर्म इवेंट** पैनल → **Kick**\n4. अपना Client ID पेस्ट करें और **कनेक्ट** पर क्लिक करें\n5. Kick OAuth 2.1 with PKCE का उपयोग करता है (अधिक सुरक्षित)\n\n### StreamElements (मल्टी-प्लेटफ़ॉर्म ब्रिज)\n\nयदि आपके पास पहले से StreamElements खाता है, तो आप एक ही टोकन से Twitch + YouTube + Facebook को एकीकृत कर सकते हैं:\n\n1. https://streamelements.com/dashboard/account/channels पर जाएँ\n2. अपना JWT Token कॉपी करें\n3. EsperantAI में: **प्लेटफ़ॉर्म इवेंट** पैनल → **StreamElements**\n4. JWT पेस्ट करें और **कनेक्ट** पर क्लिक करें\n\n---\n\n## इवेंट + इशारा संयोजन (उन्नत)\n\nयह EsperantAI का जादू है: **प्लेटफ़ॉर्म इवेंट** को पुष्टि के रूप में **आपके इशारों** के साथ संयोजित करना।\n\n### उदाहरण: अंगूठा ऊपर के साथ दान का धन्यवाद करें\n\n1. **इवेंट ट्रिगर** पैनल → \"💰 दान\" पंक्ति\n2. ✅ सक्षम करें\n3. दृश्य: `थैंक्यू_सीन`\n4. आवश्यक इशारा: `👍 अंगूठा ऊपर`\n\n**लाइव प्रवाह**:\n- एक दान आता है → EsperantAI \"इशारे की प्रतीक्षा...\" दिखाता है\n- आपके पास 👍 करने के लिए 5 सेकंड हैं\n- यदि आप करते हैं → `थैंक्यू_सीन` पर स्विच करता है + कोई अन्य कॉन्फ़िगर की गई कार्रवाई चलाता है\n- यदि नहीं → स्वचालित रूप से खारिज हो जाता है\n\n### कोई आवश्यक इशारा नहीं (स्वतः-ट्रिगर)\n\nयदि आप \"आवश्यक इशारा\" को `— कोई नहीं —` के रूप में छोड़ते हैं, तो इवेंट तुरंत कार्रवाई ट्रिगर करता है।\n\nउपयोगी:\n- जब रेड आते हैं तो स्वचालित रूप से उत्सव दृश्य पर स्विच करने के लिए\n- जब कोई सब्सक्राइब करता है तो स्वचालित रूप से ओवरले दिखाने के लिए\n\n---\n\n## संवेदनशीलता और डेड ज़ोन\n\n### संवेदनशीलता\n\nथ्रेसहोल्ड नियंत्रित करते हैं कि ट्रिगर होने के लिए इशारा कितना बड़ा होना चाहिए:\n\n- **Yaw**: सिर को कितना किनारे की ओर घुमाना है (डिफ़ॉल्ट: 0.15 rad ≈ 8.6°)\n- **Pitch ऊपर/नीचे**: लंबवत झुकाव\n- **Roll**: पार्श्व झुकाव\n\nअधिक स्पष्ट इशारों के लिए मान बढ़ाएँ। अधिक संवेदनशीलता के लिए कम करें।\n\n### डेड ज़ोन (थकान रोकथाम)\n\nयदि आप लगभग केंद्रित हैं (yaw < 0.05, pitch < 0.05, roll < 0.08), तो **कुछ भी ट्रिगर नहीं होता**। यह आपको स्वाभाविक रूप से चलने की अनुमति देता है बिना माइक्रो-मूवमेंट ट्रिगर को सक्रिय किए।\n\n### स्थिर फ़्रेम\n\n`स्थिर फ़्रेम` = ट्रिगर होने से पहले इशारे को कितने लगातार फ़्रेम तक पकड़ना है। डिफ़ॉल्ट: 5 फ़्रेम (~150ms 30fps पर)।\n\nयदि ट्रिगर बहुत आसानी से सक्रिय हो रहे हैं तो बढ़ाएँ। तेज़ प्रतिक्रिया के लिए कम करें।\n\n### कूलडाउन\n\n`कूलडाउन (ms)` = दृश्य परिवर्तनों के बीच न्यूनतम समय। डिफ़ॉल्ट: 500ms।\n\nयदि आप जल्दी-जल्दी दिशा बदलते हैं तो स्विचर के \"झटकेदार\" होने से रोकता है।\n\n---\n\n## कीबोर्ड शॉर्टकट\n\n| कुंजी | कार्रवाई |\n|---|---|\n| `Space` | पहचान रोकें / फिर से शुरू करें |\n| `C` | मैन्युअल रूप से CENTRE दृश्य पर जाएँ |\n| `R` | सॉफ़्टवेयर से दृश्य सूची पुनः लोड करें |\n| `Esc` | डिसकनेक्ट करें |\n\n---\n\n## ट्रिगर इतिहास\n\n**उन्नत → ट्रिगर इतिहास** पैनल अंतिम 50 ट्रिगर की गई कार्रवाइयाँ दिखाता है:\n\n- ✓ हरा = सफल\n- ✗ लाल = विफल\n- · सलेटी = लंबित\n\nDevTools खोले बिना क्या ट्रिगर हुआ जाँचने के लिए उपयोगी।\n\n**CSV निर्यात**: ऑफ़लाइन विश्लेषण के लिए इतिहास डाउनलोड करें।\n\n**साफ़ करें**: इतिहास मिटाएँ (किसी अन्य चीज़ को प्रभावित नहीं करता)।\n\n---\n\n## भाषा बदलें\n\nEsperantAI स्वचालित रूप से आपके ऑपरेटिंग सिस्टम की भाषा का पता लगाता है। मैन्युअल रूप से बदलने के लिए:\n\n- ऊपरी दाएँ कोने: भाषा ड्रॉपडाउन\n- अपनी पसंदीदा भाषा चुनें\n- UI तुरंत अपडेट होता है\n\nउपलब्ध भाषाएँ:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिंदी\n- 🇮🇩 Bahasa Indonesia\n\nसभी 15 भाषाएँ पूरी तरह अनुवादित हैं।\n\n---\n\n## अपने लाइसेंस का प्रबंधन करें\n\n**उन्नत → लाइसेंस** पैनल:\n\n- **स्थिति देखें**: मान्य / अमान्य\n- **संबंधित ग्राहक ईमेल देखें**\n- **अंतिम ऑनलाइन सत्यापन देखें**\n- **इस उपकरण पर निष्क्रिय करें**: PC बदलने से पहले या एक स्लॉट खाली करने के लिए उपयोग करें (3 उपलब्ध में से)\n\n### रिफंड\n\nयदि EsperantAI आपकी अपेक्षाओं पर खरा नहीं उतरता, तो आपके पास खरीद से **14 दिन** के भीतर पूर्ण रिफंड का अधिकार है। अपनी लाइसेंस कुंजी के साथ support@edugame.digital पर ईमेल करें।\n\n---\n\n## समस्या निवारण\n\n### \"सक्रियण आवश्यक\" लाइसेंस कुंजी पेस्ट करने के बाद भी बना रहता है\n\n- सत्यापित करें कि आपने पूरी कुंजी कॉपी की है (4 अक्षरों के 5 समूह डैश से अलग)\n- अपना इंटरनेट कनेक्शन जाँचें (पहली बार सक्रियण के लिए ऑनलाइन सत्यापन आवश्यक है)\n- यदि आपने पहले ही 3 उपकरणों पर सक्रिय किया है, तो पहले एक को निष्क्रिय करें\n- यदि समस्या बनी रहती है तो support@edugame.digital से संपर्क करें\n\n### \"चेहरा खोज रहा है...\" तब भी बना रहता है जब मेरा चेहरा दिखाई दे रहा है\n\n- प्रकाश सुधारें: आपका चेहरा अच्छी तरह से रोशनी में होना चाहिए\n- कैमरे के करीब जाएँ (40-80 cm इष्टतम है)\n- GPU का उपयोग करने वाले अन्य टैब बंद करें (बहुत सारे टैब होने पर Chrome GPU को सीमित कर सकता है)\n- यदि Chrome का मेमोरी सेवर सक्रिय है, तो इस टैब के लिए अक्षम करें\n\n### दृश्य ड्रॉपडाउन में दिखाई नहीं देते\n\n- सत्यापित करें कि आप स्ट्रीमिंग सॉफ़्टवेयर से कनेक्ट हैं (हरा बैज \"कनेक्टेड\")\n- दृश्य सूची पुनः लोड करने के लिए `R` दबाएँ\n- यदि अभी भी खाली है, तो डिसकनेक्ट करें और फिर से कनेक्ट करें\n\n### मैं इशारे किए बिना दृश्य परिवर्तन ट्रिगर होते हैं\n\n- **संवेदनशीलता** पैनल में yaw / pitch / roll थ्रेसहोल्ड बढ़ाएँ\n- `स्थिर फ़्रेम` को 5 से 8-10 तक बढ़ाएँ\n- सुनिश्चित करें कि डेड ज़ोन कॉन्फ़िगर किया गया है (yaw 0.05, pitch 0.05, roll 0.08)\n- जाँचें कि फ़्रेम में कोई और नहीं है (कई चेहरे अस्थिरता का कारण बन सकते हैं)\n\n### पहचान में देरी\n\n- भारी ऐप्स बंद करें (गेम, वीडियो एडिटिंग)\n- यदि आपके पास समर्पित GPU है तो सत्यापित करें कि आप उसका उपयोग कर रहे हैं (एकीकृत नहीं)\n- यदि कैमरा 4K है तो रिज़ॉल्यूशन कम करें (पहचान के लिए 1080p इष्टतम है)\n\n### OBS प्रतिक्रिया नहीं करता जबकि EsperantAI \"दृश्य बदला\" कहता है\n\n- सत्यापित करें कि ड्रॉपडाउन में दृश्य का नाम OBS में बिल्कुल मेल खाता है (केस-सेंसिटिव)\n- सत्यापित करें कि दृश्य किसी अन्य Scene Collection में नहीं है\n- **ट्रिगर इतिहास** पैनल जाँचें — यदि यह ✗ लाल दिखाता है, तो एक विशिष्ट त्रुटि है\n\n### त्रुटि \"OBS पहुँच योग्य नहीं — मैन्युअल रूप से कनेक्ट करें\"\n\n- सत्यापित करें कि OBS खुला है\n- सत्यापित करें कि OBS में WebSocket सक्षम है\n- यदि आपने OBS में पासवर्ड सेट किया है, तो यह बिल्कुल मेल खाना चाहिए\n- कुछ एंटीवायरस पोर्ट 4455 को ब्लॉक करते हैं — अपवाद जोड़ें\n\n---\n\n## गोपनीयता\n\n### EsperantAI जो नहीं करता\n\n- ❌ आपका वीडियो किसी भी सर्वर पर नहीं भेजता\n- ❌ आपका वीडियो या कैप्चर संग्रहीत नहीं करता\n- ❌ दूरस्थ रूप से बायोमेट्रिक जानकारी एकत्र नहीं करता\n- ❌ विज्ञापनदाताओं या तृतीय पक्षों के साथ डेटा साझा नहीं करता\n\n### जो यह प्रसंस्करित करता है\n\n- ✅ आपके ब्राउज़र में स्थानीय चेहरा पहचान (Human.js + WebGL)\n- ✅ आपके OBS / Streamlabs / vMix के लिए स्थानीय कनेक्शन (loopback 127.0.0.1)\n- ✅ आवधिक लाइसेंस कुंजी सत्यापन (हर 7 दिन)\n- ✅ यदि आप Twitch/YouTube/Kick कनेक्ट करते हैं: sessionStorage में OAuth टोकन (ब्राउज़र बंद होने पर हट जाते हैं)\n\nपूर्ण विवरण `docs/PRIVACY.html` में।\n\n---\n\n## सहायता\n\n- 📧 ईमेल: **support@edugame.digital**\n- 🌐 वेब: https://esperantai.com\n- 📚 तकनीकी दस्तावेज़: https://github.com/salazarjoelo/EsperantAI\n\nप्रतिक्रिया समय:\n- सामान्य प्रश्न: 24-72 घंटे\n- तकनीकी त्रुटियाँ: 1-3 कार्य दिवस\n\n---\n\n*अंतिम अपडेट: 2026-05-14। संस्करण: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
