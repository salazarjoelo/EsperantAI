  'ja-JP': { name: '日本語', flag: '🇯🇵', content: "# EsperantAI — ユーザーマニュアル\n\n> **誠実なジェスチャー。** 顔と手の動きで配信ソフトを操作。Stream Deckも追加の機材も不要。\n\n**バージョン**: 3.0 · **言語**: 日本語（他12言語の翻訳あり）\n\n---\n\n## 目次\n\n1. [EsperantAIとは？](#what-is-esperantai)\n2. [動作環境](#minimum-requirements)\n3. [購入とライセンス認証](#purchase--activation)\n4. [初めての使用](#first-use)\n5. [配信ソフトの接続](#connect-your-streaming-software)\n6. [ジェスチャーとシーンの設定](#configure-gestures--scenes)\n7. [ジェスチャーカテゴリー](#gesture-categories)\n8. [配信プラットフォームの接続](#connect-streaming-platforms)\n9. [イベント＋ジェスチャーの組み合わせ（上級）](#event--gesture-combos-advanced)\n10. [感度とデッドゾーン](#sensitivity--dead-zone)\n11. [キーボードショートカット](#keyboard-shortcuts)\n12. [トリガー履歴](#trigger-history)\n13. [言語の変更](#change-language)\n14. [ライセンスの管理](#manage-your-license)\n15. [トラブルシューティング](#troubleshooting)\n16. [プライバシー](#privacy)\n17. [サポート](#support)\n\n---\n\n## EsperantAIとは？\n\nEsperantAIは、人工知能を使って顔と手のジェスチャーをリアルタイムに検出し、配信ソフトのコマンドに変換する**ウェブアプリ**です。以下のソフトウェアに対応しています：\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster**（ベータ）\n\nまた、以下のプラットフォームからイベントを受信できます：\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements**（マルチプラットフォームブリッジ）\n\n### なぜ「誠実なジェスチャー」なのか？\n\n基本的な顔の表情や頭の回転は、**すべての人間文化において共通**しています（Paul Ekman, 1972）。嘘をつかず、地域によって変わりません。EsperantAIではこれらを「🌐 ユニバーサル」ジェスチャーと呼び、意味が国によって異なる可能性のある「⚠️ カルチャー」ジェスチャー（手話サイン）と区別しています。\n\nご自身の視聴者に合わせて、どのジェスチャーを使うかお選びください。\n\n---\n\n## 動作環境\n\n### ハードウェア\n\n- **USBウェブカメラ**（推奨：1080p以上）\n- **CPU**: 過去5年以内の4コア以上のプロセッサー\n- **メモリ**: 8 GB以上。同時に配信する場合は16 GBを推奨\n- **GPU**: WebGL対応のもの（最近の統合GPUでも動作します）\n\n### ソフトウェア\n\n- **OS**: Windows 10/11、macOS 12+、または最近のカーネルを使用するLinux\n- **ブラウザ**: Chrome 90+、Edge 90+、またはFirefox 100+\n- **配信ソフト**（いずれか1つ以上）：OBS Studio 28+、Streamlabs Desktop、vMix、PRISM、XSplit\n\n### インターネット接続\n\n- ライセンスの**認証時**および**7日ごとの再検証**に必要\n- 最大**7日間オフライン**動作可能（猶予期間）\n\n---\n\n## 購入とライセンス認証\n\n1. **https://esperantai.com** にアクセス\n2. **「Buy License」** をクリック\n3. LemonSqueezyで支払いを完了（クレジットカード、PayPalなど）\n4. 以下を含むメールが届きます：\n   - **ライセンスキー**（形式：`XXXX-XXXX-XXXX-XXXX-XXXX`）\n   - EsperantAIの利用リンク\n5. ブラウザでEsperantAIを開く\n6. ライセンス認証画面が表示されます。ライセンスキーを貼り付け\n7. **「Activate License」** をクリック\n8. 完了！ 🎉\n\n### 複数デバイスで使えますか？\n\n1つのライセンスは**最大3台のデバイス**で認証できます。別のデバイスにライセンスを移すには：\n\n1. 古いデバイスで：**高度な設定**パネル → **ライセンス** → **このデバイスで無効化**\n2. 新しいデバイスで：通常通り認証\n\n---\n\n## 初めての使用\n\n### ステップ1：カメラアクセスを許可\n\n初めてEsperantAIを開くと、ブラウザがカメラの使用許可を求めます。**許可してください**。\n\n> 重要：EsperantAIは映像を一切サーバーに送信しません。処理はすべてお使いのコンピューター上で100%ローカルに行われます。\n\n### ステップ2：カメラを選択\n\nカメラが複数ある場合は、ドロップダウンから使用するカメラを選択してください。\n\n### ステップ3：検出の確認\n\n左パネルに顔が表示されます。EsperantAIが顔を検出すると、Yaw / Pitch / Roll のインジケーターに数値が表示されます。\n\n### ステップ4：キャリブレーションウィザード（Pro+）\n\nProまたはPro+ライセンスをお持ちの場合、初回使用時に**キャリブレーションウィザード**が自動的に起動します。自然な可動範囲を測定し、最適な感度を設定します。**再キャリブレーション**ボタンからいつでも再実行できます。\n\n---\n\n## 配信ソフトの接続\n\n### OBS Studio\n\n1. OBSで：**ツール → WebSocket Server Settings**\n2. WebSocketを有効にする。パスワードを設定した場合はメモしておく\n3. EsperantAIで：**接続**パネル\n4. 配信ソフト：**OBS Studio**\n5. WebSocket URL：`ws://127.0.0.1:4455`（デフォルト）\n6. パスワード：OBSで設定したもの\n7. **Connect** をクリック\n\n### Streamlabs Desktop\n\n1. Streamlabsで：**Settings → Remote Control**\n2. Remote Controlを有効にする\n3. API Tokenをメモ\n4. EsperantAIで：配信ソフト：**Streamlabs Desktop**\n5. API Token：貼り付け\n6. ポート：`59650`（デフォルト）\n7. **Connect** をクリック\n\n### vMix\n\n1. vMixで：**Settings → Web Controller**\n2. Web Controllerを有効にする。デフォルトポート：8088\n3. EsperantAIで：配信ソフト：**vMix**\n4. ホスト：`127.0.0.1`\n5. ポート：`8088`\n6. **Connect** をクリック\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5以降ではobs-websocketプラグインの手動インストールが必要\n2. [OBSフォーラム](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/)から`obs-websocket`をダウンロード\n3. PRISMのプラグインフォルダーにコピー\n4. PRISMを再起動\n5. **ツール → WebSocket Server Settings** でWebSocketを有効にする\n6. EsperantAIで：配信ソフト：**PRISM Live Studio**（OBSと同じ方法で動作）\n\n### XSplit Broadcaster（ベータ）\n\n1. XSplitで「Remote xjs」拡張機能をインストール（Settings → Extensions）\n2. 設定でRemoteを有効にする\n3. EsperantAIで：配信ソフト：**XSplit**\n4. Remote xjs Proxy URL：`ws://127.0.0.1:5555/xjs`（デフォルト）\n5. **Connect** をクリック\n\n> XSplitは**ベータ版**です。高度な機能が制限される場合があります。\n\n---\n\n## ジェスチャーとシーンの設定\n\n接続すると、配信ソフトの実際のシーンが**トリガー**パネルのドロップダウンに自動的に表示されます。\n\n### 基本的なマッピング\n\n1. 各ジェスチャー（例：「左を向く」）に対して、ドロップダウンからシーンを選択\n2. そのジェスチャーを行い、約150ms安定して保つと、EsperantAIが配信ソフトのシーンを切り替えます\n3. 切り替えは自動的かつほぼ瞬時に行われます\n\n### マルチアクション（Pro+）\n\nProまたはPro+ライセンスでは、1つのジェスチャーで**複数のアクション**を同時にトリガーできます：\n- シーン切り替え＋音声再生＋オーバーレイ表示＋チャットメッセージ送信\n\n### カテゴリーの有効化/無効化\n\n各カテゴリーには個別の「有効化」チェックボックスがあります：\n\n- 🧠 **頭の回転**（ユニバーサル — デフォルトで有効）\n- 📏 **顔の距離**（近づく/遠ざかる）\n- 👁️ **視線**（目だけを動かす）\n- 😀 **感情**（笑顔、驚き、怒り、ニュートラル）\n- 👁️‍🗨️ **ダブルブリンク**\n- ✋ **手のジェスチャー**（カルチャー — デフォルトで無効）\n\nCPUを節約するため、不要なカテゴリーは無効にしてください。\n\n---\n\n## ジェスチャーカテゴリー\n\n### 🌐 ユニバーサル（どの文化でも同じ意味）\n\n| ジェスチャー | 軸 | 活性化方法 |\n|---|---|---|\n| センター | — | 正面を向き、顔を安定させる |\n| 左を向く | 負のyaw | 頭を左に回す |\n| 右を向く | 正のyaw | 頭を右に回す |\n| 上を向く | 負のpitch | 顔を上げる |\n| 下を向く | 正のpitch | 顔を下げる |\n| 左に傾ける | 負のroll | 頭を左肩に傾ける |\n| 右に傾ける | 正のroll | 頭を右肩に傾ける |\n| 近づく | 距離 | 顔をカメラに近づける |\n| 遠ざかる | 距離 | 顔をカメラから遠ざける |\n| 視線 | 視線 | 頭を動かさず目だけを動かす |\n| 笑顔 | 感情=happy | はっきりと笑う |\n| 驚き | 感情=surprise | 驚いた表情をする |\n| 怒り | 感情=angry | 怒った表情をする |\n| ニュートラル | 感情=neutral | リラックスした表情 |\n| ダブルブリンク | まばたき | 両目を素早く2回閉じる（700ms以内） |\n\n### ⚠️ カルチャー（国によって意味が異なる）\n\n| ジェスチャー | 西洋での意味 | 他文化での注意点 |\n|---|---|---|\n| 👍 サムズアップ | 賛成・OK | 中東/西アジア：攻撃的に受け取られる場合あり |\n| ✌️ ピース | 平和・勝利 | 英国/アイルランド/オーストラリア（手のひらを内側に）：侮辱 |\n| 🤘 ロックサイン | ロック・メタル | イタリア（手のひらを下に）：「コルヌート」（侮辱）。※日本では特に問題なし |\n| 👌 OK | OK・完璧 | ブラジル/トルコ/ドイツ：攻撃的に受け取られる場合あり。※日本では問題なく使用可能 |\n| ✊ 握りこぶし | 文脈により異なる | — |\n| 🖐️ 開いた手のひら | 「ストップ」または挨拶 | ギリシャ（相手に向けてmountza）：強い侮辱 |\n| ☝️ 指差し | 指示 | アジア：指で指すのは失礼 |\n\nEsperantAIはUIで各ジェスチャーに対応するバッジを表示します。グローバルな視聴者に合わせて、どのジェスチャーを使用するか選んでください。\n\n### 🙏 合掌（合掌）\n\n特別なジェスチャー：胸の前で両手のひらを合わせます（祈りや挨拶のお辞儀のように）。合掌（がっしょう）は日本の文化において、敬意や感謝の意を表す一般的なジェスチャーであり、仏教の礼拝や日常の挨拶（お辞儀と共に）でも広く使われています。6つのランドマークチェックにより高い信頼性で検出されます。\n\n---\n\n## 配信プラットフォームの接続\n\nEsperantAIがイベント（投げ銭、サブスク、レイド）を受信するには、配信しているプラットフォームを接続してください。\n\n### Twitch\n\n1. https://dev.twitch.tv/console でClient IDを作成\n2. リダイレクトURIを登録：`https://esperantai.com/oauth-callback.html`（またはローカルURL）\n3. EsperantAIで：**プラットフォームイベント**パネル → **Twitch EventSub**\n4. Client IDを貼り付け\n5. **Connect** をクリック\n6. Twitchの認証ウィンドウが開きます。権限を許可\n7. ウィンドウが閉じ、「Twitch Connected」と表示されます\n\n### YouTube Live\n\n1. https://console.cloud.google.com で認証情報を作成\n2. YouTube Data API v3を有効にする\n3. OAuth Client IDを作成（種類：ウェブアプリケーション）\n4. Twitchと同じリダイレクトURIを登録\n5. EsperantAIで：**プラットフォームイベント**パネル → **YouTube Live**\n6. Client IDを貼り付け、**Connect** をクリック\n\n### Kick\n\n1. https://kick.com/settings/developer でアプリを作成\n2. リダイレクトURIを登録\n3. EsperantAIで：**プラットフォームイベント**パネル → **Kick**\n4. Client IDを貼り付け、**Connect** をクリック\n5. KickはOAuth 2.1 with PKCEを使用（より安全）\n\n### StreamElements（マルチプラットフォームブリッジ）\n\nすでにStreamElementsのアカウントをお持ちの場合、1つのトークンでTwitch + YouTube + Facebookを統合できます：\n\n1. https://streamelements.com/dashboard/account/channels にアクセス\n2. JWT Tokenをコピー\n3. EsperantAIで：**プラットフォームイベント**パネル → **StreamElements**\n4. JWTを貼り付け、**Connect** をクリック\n\n---\n\n## イベント＋ジェスチャーの組み合わせ（上級）\n\nEsperantAIの魔法はここにあります：**プラットフォームイベント**と**あなたのジェスチャー**を確認として組み合わせます。\n\n### 例：投げ銭にサムズアップで感謝\n\n1. **イベントトリガー**パネル → 「💰 投げ銭」の行\n2. ✅ 有効化\n3. シーン：`Thank_You_Scene`\n4. 必須ジェスチャー：`👍 サムズアップ`\n\n**ライブの流れ**：\n- 投げ銭が届く → EsperantAIに「ジェスチャー待ち...」と表示\n- 5秒以内に👍を行う\n- 行うと → `Thank_You_Scene`に切り替え＋設定された他のアクションを実行\n- 行わないと → 自動的に却下\n\n### 必須ジェスチャーなし（自動トリガー）\n\n「必須ジェスチャー」を`— なし —`のままにすると、イベントが即座にアクションをトリガーします。\n\n以下の場面で便利：\n- レイド到着時に自動でお祝いシーンに切り替え\n- サブスク時に自動でオーバーレイを表示\n\n---\n\n## 感度とデッドゾーン\n\n### 感度\n\nしきい値はジェスチャーがトリガーされるのにどれくらいの大きさが必要かを制御します：\n\n- **Yaw**：頭を横にどれくらい回すか（デフォルト：0.15 rad ≈ 8.6°）\n- **Pitch 上/下**：上下の傾き\n- **Roll**：左右の傾き\n\n値を上げるとより大きなジェスチャーが必要に、下げるとより感度が高くなります。\n\n### デッドゾーン（疲労防止）\n\nほぼ中央を向いている場合（yaw < 0.05、pitch < 0.05、roll < 0.08）、**何もトリガーされません**。これにより、自然な動きでマイクロモーションがトリガーされるのを防ぎます。\n\n### 安定フレーム\n\n`安定フレーム` = ジェスチャーがトリガーされる前に連続して何フレーム保持しなければならないか。デフォルト：5フレーム（約150ms / 30fps）。\n\nトリガーが簡単に発動しすぎる場合は値を上げ、より速い反応が必要な場合は下げてください。\n\n### クールダウン\n\n`クールダウン (ms)` = シーン切り替え間の最短時間。デフォルト：500ms。\n\n素早く揺れ動いた場合の切り替えの「ジッター」を防ぎます。\n\n---\n\n## キーボードショートカット\n\n| キー | アクション |\n|---|---|\n| `Space` | 検出の一時停止 / 再開 |\n| `C` | 手動でセンターシーンに移動 |\n| `R` | 配信ソフトからシーンリストを再読み込み |\n| `Esc` | 切断 |\n\n---\n\n## トリガー履歴\n\n**高度な設定 → トリガー履歴**パネルに、直近50件のトリガーアクションが表示されます：\n\n- ✓ 緑 = 成功\n- ✗ 赤 = 失敗\n- · グレー = 保留中\n\nDevToolsを開かずに何がトリガーされたかを確認するのに便利です。\n\n**CSVエクスポート**：履歴をダウンロードしてオフラインで分析。\n\n**クリア**：履歴を消去（他には影響しません）。\n\n---\n\n## 言語の変更\n\nEsperantAIはオペレーティングシステムの言語を自動的に検出します。手動で変更するには：\n\n- 右上の言語ドロップダウン\n- 希望の言語を選択\n- UIが即座に更新されます\n\n対応言語：\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n\n全13言語が完全に翻訳されています（各323キー）。\n\n---\n\n## ライセンスの管理\n\n**高度な設定 → ライセンス**パネル：\n\n- **ステータスの確認**：有効 / 無効\n- **紐づけられたカスタマーメールの確認**\n- **最後のオンライン検証の確認**\n- **このデバイスで無効化**：PCを変更する前や、スロットを解放する場合に使用（3台まで）\n\n### 返金\n\nEsperantAIが期待に沿わない場合、購入から**14日以内**に全額返金をリクエストできます。ライセンスキーを添えて support@edugame.digital にメールしてください。\n\n---\n\n## トラブルシューティング\n\n### ライセンスキーを貼り付けたのに「認証が必要」と表示される\n\n- キーを完全にコピーしたか確認（4文字×5グループ、ハイフン区切り）\n- インターネット接続を確認（初回認証にはオンライン検証が必要）\n- すでに3台で認証済みの場合は、先に1台を無効化\n- 解決しない場合は support@edugame.digital に連絡\n\n### 顔が見えているのに「顔を検索中...」のまま\n\n- 照明を改善：顔が明るく照らされているか確認\n- カメラに近づく（40〜80cmが最適）\n- GPUを使用する他のタブを閉じる（Chromeはタブが多すぎるとGPUを制限することがあります）\n- Chromeのメモリセーバーが有効な場合、このタブで無効にする\n\n### ドロップダウンにシーンが表示されない\n\n- 配信ソフトに接続されているか確認（緑のバッジ「Connected」）\n- `R`キーを押してシーンリストを再読み込み\n- それでも空の場合は、切断して再接続\n\n### ジェスチャーをしていないのにシーンが切り替わる\n\n- **感度**パネルでyaw / pitch / rollのしきい値を上げる\n- `安定フレーム`を5から8〜10に上げる\n- デッドゾーンが設定されているか確認（yaw 0.05、pitch 0.05、roll 0.08）\n- 他人がフレーム内にいないか確認（複数顔で不安定になることがあります）\n\n### 検出のラグ\n\n- 重いアプリ（ゲーム、動画編集）を閉じる\n- 統合GPUではなく、専用GPUを使用しているか確認\n- カメラ解像度が4Kの場合は1080pに下げる（検出には1080pが最適）\n\n### EsperantAIに「シーン変更」と表示されるのにOBSが反応しない\n\n- ドロップダウンのシーン名がOBSのものと完全に一致しているか確認（大文字小文字を区別）\n- シーンが別のシーンコレクションにないか確認\n- **トリガー履歴**パネルを確認 — ✗赤が表示されている場合、具体的なエラーがあります\n\n### 「OBSに接続できません — 手動で接続してください」というエラー\n\n- OBSが開いているか確認\n- OBSでWebSocketが有効になっているか確認\n- OBSでパスワードを設定している場合、正確に一致している必要があります\n- 一部のウイルス対策ソフトがポート4455をブロック — 例外を追加\n\n---\n\n## プライバシー\n\n### EsperantAIがしないこと\n\n- ❌ 映像をサーバーに送信しません\n- ❌ 映像やキャプチャを保存しません\n- ❌ 生体情報をリモートで収集しません\n- ❌ データを広告主や第三者と共有しません\n\n### 処理する内容\n\n- ✅ ブラウザ内でのローカル顔検出（Human.js + WebGL）\n- ✅ OBS / Streamlabs / vMixへのローカル接続（ループバック 127.0.0.1）\n- ✅ 定期的なライセンスキー検証（7日ごと）\n- ✅ Twitch/YouTube/Kickを接続した場合：sessionStorageにOAuthトークンを保存（ブラウザを閉じると削除）\n\n詳細は `docs/PRIVACY.html` をご覧ください。\n\n---\n\n## サポート\n\n- 📧 メール：**support@edugame.digital**\n- 🌐 ウェブ：https://esperantai.com\n- 📚 技術ドキュメント：https://github.com/salazarjoelo/EsperantAI\n\n対応時間：\n- 一般的な質問：24〜72時間\n- 技術的なバグ：1〜3営業日\n\n---\n\n*最終更新：2026-05-14。バージョン：3.0。*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'zh-CN': { name: '中文', flag: '🇨🇳', content: "# EsperantAI — 用户手册\n\n> **真诚的手势。** 用你的面部和手势控制直播软件。无需 Stream Deck。无需额外硬件。\n\n**版本**：3.0 · **语言**：简体中文（另有12种语言翻译可用）\n\n---\n\n## 目录\n\n1. [EsperantAI 是什么？](#what-is-esperantai)\n2. [最低配置要求](#minimum-requirements)\n3. [购买与激活](#purchase--activation)\n4. [首次使用](#first-use)\n5. [连接直播软件](#connect-your-streaming-software)\n6. [配置手势与场景](#configure-gestures--scenes)\n7. [手势分类](#gesture-categories)\n8. [连接直播平台](#connect-streaming-platforms)\n9. [事件+手势组合（高级）](#event--gesture-combos-advanced)\n10. [灵敏度与死区](#sensitivity--dead-zone)\n11. [键盘快捷键](#keyboard-shortcuts)\n12. [触发历史](#trigger-history)\n13. [更改语言](#change-language)\n14. [管理你的许可证](#manage-your-license)\n15. [故障排除](#troubleshooting)\n16. [隐私](#privacy)\n17. [技术支持](#support)\n\n---\n\n## EsperantAI 是什么？\n\nEsperantAI 是一款**网页应用**，利用人工智能实时检测你的面部和手势，并将其转化为直播软件的命令。支持以下软件：\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster**（测试版）\n\n并可接收以下平台的事件：\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements**（多平台桥接）\n\n### 为什么叫\"真诚的手势\"？\n\n基本的面部表情和头部旋转在**所有人类文化中都是共通的**（Paul Ekman，1972）。它们不会说谎，不会因地域而异。EsperantAI 将这些称为\"🌐 通用\"手势，并将其与含义可能因国家而异的\"⚠️ 文化\"手势（手语）区分开来。\n\n请根据你的观众群体自行选择使用哪些手势。\n\n---\n\n## 最低配置要求\n\n### 硬件\n\n- **任意 USB 网络摄像头**（推荐：1080p 或更高）\n- **CPU**：近5年内的4核及以上处理器\n- **内存**：最低 8 GB。同时直播时建议 16 GB\n- **GPU**：支持 WebGL 即可（现代集成显卡也可运行）\n\n### 软件\n\n- **操作系统**：Windows 10/11、macOS 12+ 或使用较新内核的 Linux\n- **浏览器**：Chrome 90+、Edge 90+ 或 Firefox 100+\n- **直播软件**（至少一款）：OBS Studio 28+、Streamlabs Desktop、vMix、PRISM、XSplit\n\n### 网络\n\n- **激活许可证**和**每7天的重新验证**需要联网\n- 最长可**离线使用7天**（宽限期）\n\n---\n\n## 购买与激活\n\n1. 访问 **https://esperantai.com**\n2. 点击 **\"Buy License\"**\n3. 通过 LemonSqueezy 完成支付（信用卡、PayPal 等）\n4. 你将收到一封邮件，包含：\n   - 你的**许可证密钥**（格式：`XXXX-XXXX-XXXX-XXXX-XXXX`）\n   - EsperantAI 使用链接\n5. 在浏览器中打开 EsperantAI\n6. 会显示激活界面，粘贴你的许可证密钥\n7. 点击 **\"Activate License\"**\n8. 完成！🎉\n\n### 可以在多台设备上使用吗？\n\n一个许可证最多可在**3台设备**上激活。将许可证转移到其他设备：\n\n1. 在旧设备上：**高级**面板 → **许可证** → **在此设备上停用**\n2. 在新设备上：正常激活即可\n\n---\n\n## 首次使用\n\n### 第1步：允许摄像头访问\n\n首次打开 EsperantAI 时，浏览器会请求摄像头权限。**请允许**。\n\n> 重要：EsperantAI 绝不会将你的视频发送到任何服务器。处理完全在你的电脑本地进行。\n\n### 第2步：选择摄像头\n\n如果你有多个摄像头，从摄像头下拉菜单中选择要使用的那个。\n\n### 第3步：验证检测\n\n左侧面板会显示你的面部。当 EsperantAI 检测到你的面部时，Yaw / Pitch / Roll 指示器将开始显示数值。\n\n### 第4步：校正向导（Pro+）\n\n如果你拥有 Pro 或 Pro+ 许可证，**校正向导**会在首次使用时自动启动。它会测量你自然的活动范围并设置最佳灵敏度。可随时通过**重新校正**按钮重新运行。\n\n---\n\n## 连接直播软件\n\n### OBS Studio\n\n1. 在 OBS 中：**工具 → WebSocket 服务器设置**\n2. 启用 WebSocket。如果设置了密码请记下\n3. 在 EsperantAI 中：**连接**面板\n4. 直播软件：**OBS Studio**\n5. WebSocket URL：`ws://127.0.0.1:4455`（默认）\n6. 密码：你在 OBS 中设置的密码\n7. 点击 **Connect**\n\n### Streamlabs Desktop\n\n1. 在 Streamlabs 中：**Settings → Remote Control**\n2. 启用 Remote Control\n3. 记下 API Token\n4. 在 EsperantAI 中：直播软件：**Streamlabs Desktop**\n5. API Token：粘贴\n6. 端口：`59650`（默认）\n7. 点击 **Connect**\n\n### vMix\n\n1. 在 vMix 中：**Settings → Web Controller**\n2. 启用 Web Controller。默认端口：8088\n3. 在 EsperantAI 中：直播软件：**vMix**\n4. 主机：`127.0.0.1`\n5. 端口：`8088`\n6. 点击 **Connect**\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5+ 需要手动安装 obs-websocket 插件\n2. 从 [OBS 论坛](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/)下载 `obs-websocket`\n3. 复制到 PRISM 的插件文件夹\n4. 重启 PRISM\n5. 在 **工具 → WebSocket 服务器设置** 中启用 WebSocket\n6. 在 EsperantAI 中：直播软件：**PRISM Live Studio**（与 OBS 相同方式工作）\n\n### XSplit Broadcaster（测试版）\n\n1. 在 XSplit 中安装 \"Remote xjs\" 扩展（Settings → Extensions）\n2. 在首选项中启用 Remote\n3. 在 EsperantAI 中：直播软件：**XSplit**\n4. Remote xjs 代理 URL：`ws://127.0.0.1:5555/xjs`（默认）\n5. 点击 **Connect**\n\n> XSplit 目前为**测试版**，高级功能可能受限。\n\n---\n\n## 配置手势与场景\n\n连接后，直播软件中的实际场景会自动显示在**触发器**面板的下拉菜单中。\n\n### 基本映射\n\n1. 为每个手势（例如\"向左看\"）从下拉菜单中选择一个场景\n2. 当你做出该手势并保持稳定约150毫秒后，EsperantAI 将在直播软件中切换到该场景\n3. 切换自动且近乎即时\n\n### 多重动作（Pro+）\n\n拥有 Pro 或 Pro+ 许可证时，一个手势可同时触发**多个动作**：\n- 切换场景 + 播放声音 + 显示叠加层 + 发送聊天消息\n\n### 启用/禁用分类\n\n每个分类都有独立的\"启用\"复选框：\n\n- 🧠 **头部旋转**（通用 — 默认启用）\n- 📏 **面部距离**（靠近/远离）\n- 👁️ **视线**（仅移动眼球）\n- 😀 **表情**（微笑、惊讶、愤怒、中性）\n- 👁️‍🗨️ **双眨眼**\n- ✋ **手势**（文化相关 — 默认禁用）\n\n禁用不需要的分类可节省 CPU 资源。\n\n---\n\n## 手势分类\n\n### 🌐 通用（在任何文化中含义相同）\n\n| 手势 | 轴 | 激活方式 |\n|---|---|---|\n| 中心 | — | 正视前方，面部保持稳定 |\n| 向左看 | 负偏航 | 头向左转 |\n| 向右看 | 正偏航 | 头向右转 |\n| 向上看 | 负俯仰 | 抬起面部 |\n| 向下看 | 正俯仰 | 低下面部 |\n| 向左倾斜 | 负翻滚 | 头向左肩倾斜 |\n| 向右倾斜 | 正翻滚 | 头向右肩倾斜 |\n| 靠近 | 距离 | 面部靠近摄像头 |\n| 远离 | 距离 | 面部远离摄像头 |\n| 视线 | 视线 | 保持头部不动，仅移动眼球 |\n| 微笑 | 表情=happy | 清晰地微笑 |\n| 惊讶 | 表情=surprise | 做出惊讶表情 |\n| 愤怒 | 表情=angry | 做出生气表情 |\n| 中性 | 表情=neutral | 放松的面部 |\n| 双眨眼 | 眨眼 | 快速闭合双眼两次（700毫秒内） |\n\n### ⚠️ 文化相关（含义因国家而异）\n\n| 手势 | 西方含义 | 其他文化中的注意事项 |\n|---|---|---|\n| 👍 竖大拇指 | 赞同、好 | 中东/西亚：可能具有冒犯性。※在中国无问题，广泛使用 |\n| ✌️ 比耶 | 和平/胜利 | 英国/爱尔兰/澳大利亚（手心向内）：侮辱手势 |\n| 🤘 金属角 | 摇滚 | 意大利（手心向下）：\"cornuto\"（侮辱） |\n| 👌 OK | 好/完美 | 巴西/土耳其/德国：可能具有冒犯性 |\n| ✊ 握拳 | 因政治语境而异 | — |\n| 🖐️ 张开手掌 | \"停\"或打招呼 | 希腊（对他人做mountza手势）：强烈侮辱 |\n| ☝️ 指点 | 指示 | 亚洲：用手指指人是无礼的。※在中国尤其注意 |\n\nEsperantAI 在界面中为每个手势标注相应的标识。请根据你的全球观众选择使用哪些手势。\n\n### 🙏 合十（合十）\n\n特殊手势：在胸前将双手掌心合拢（如同祈祷或鞠躬问候）。合十在中国文化中是常见的手势，广泛用于佛教礼仪、表达敬意、感恩和祈福。日常生活中也常在感谢、道歉或问候时配合使用。通过6个关键点检测，识别可靠性极高。\n\n---\n\n## 连接直播平台\n\n为了让 EsperantAI 接收事件（打赏、订阅、突袭），请连接你直播的平台。\n\n### Twitch\n\n1. 在 https://dev.twitch.tv/console 创建 Client ID\n2. 注册重定向 URI：`https://esperantai.com/oauth-callback.html`（或你的本地 URL）\n3. 在 EsperantAI 中：**平台事件**面板 → **Twitch EventSub**\n4. 粘贴你的 Client ID\n5. 点击 **Connect**\n6. 将打开 Twitch 授权窗口，接受权限\n7. 窗口将关闭，显示\"Twitch Connected\"\n\n### YouTube Live\n\n1. 在 https://console.cloud.google.com 创建凭据\n2. 启用 YouTube Data API v3\n3. 创建 OAuth Client ID（类型：Web 应用）\n4. 注册与 Twitch 相同的重定向 URI\n5. 在 EsperantAI 中：**平台事件**面板 → **YouTube Live**\n6. 粘贴 Client ID，点击 **Connect**\n\n### Kick\n\n1. 在 https://kick.com/settings/developer 创建应用\n2. 注册重定向 URI\n3. 在 EsperantAI 中：**平台事件**面板 → **Kick**\n4. 粘贴 Client ID，点击 **Connect**\n5. Kick 使用 OAuth 2.1 with PKCE（更安全）\n\n### StreamElements（多平台桥接）\n\n如果你已有 StreamElements 账号，可以用一个令牌统一管理 Twitch + YouTube + Facebook：\n\n1. 访问 https://streamelements.com/dashboard/account/channels\n2. 复制你的 JWT Token\n3. 在 EsperantAI 中：**平台事件**面板 → **StreamElements**\n4. 粘贴 JWT，点击 **Connect**\n\n---\n\n## 事件+手势组合（高级）\n\n这就是 EsperantAI 的核心功能：将**平台事件**与**你的手势**作为确认进行组合。\n\n### 示例：竖大拇指感谢打赏\n\n1. **事件触发**面板 → \"💰 打赏\"行\n2. ✅ 启用\n3. 场景：`Thank_You_Scene`\n4. 必选手势：`👍 竖大拇指`\n\n**直播流程**：\n- 收到打赏 → EsperantAI 显示\"等待手势...\"\n- 你有5秒时间做出👍\n- 做出手势 → 切换到 `Thank_You_Scene` + 执行其他已配置的动作\n- 未做出 → 自动取消\n\n### 无需必选手势（自动触发）\n\n如果将\"必选手势\"保持为 `— 无 —`，事件将立即触发动作。\n\n适用于：\n- 收到突袭时自动切换到庆祝场景\n- 有人订阅时自动显示叠加层\n\n---\n\n## 灵敏度与死区\n\n### 灵敏度\n\n阈值控制手势需要多大才能触发：\n\n- **偏航**：头部向侧面转动的幅度（默认：0.15 rad ≈ 8.6°）\n- **俯仰 上/下**：上下倾斜\n- **翻滚**：左右倾斜\n\n调高数值需要更大幅度的手势。调低则更灵敏。\n\n### 死区（防疲劳）\n\n当你几乎处于中心位置时（偏航 < 0.05、俯仰 < 0.05、翻滚 < 0.08），**不会触发任何动作**。这让你可以自然移动，而不会因微小动作触发。\n\n### 稳定帧数\n\n`稳定帧数` = 手势必须连续保持多少帧才会触发。默认：5帧（约150毫秒 / 30fps）。\n\n如果触发太灵敏请调高，需要更快响应请调低。\n\n### 冷却时间\n\n`冷却时间 (ms)` = 场景切换之间的最短间隔。默认：500毫秒。\n\n防止快速来回晃动时切换\"抖动\"。\n\n---\n\n## 键盘快捷键\n\n| 按键 | 动作 |\n|---|---|\n| `Space` | 暂停/恢复检测 |\n| `C` | 手动跳转到中心场景 |\n| `R` | 从直播软件重新加载场景列表 |\n| `Esc` | 断开连接 |\n\n---\n\n## 触发历史\n\n**高级 → 触发历史**面板显示最近50条触发的动作：\n\n- ✓ 绿色 = 成功\n- ✗ 红色 = 失败\n- · 灰色 = 待处理\n\n无需打开 DevTools 即可查看触发记录，非常方便。\n\n**导出 CSV**：下载历史记录进行离线分析。\n\n**清除**：清空历史记录（不影响其他功能）。\n\n---\n\n## 更改语言\n\nEsperantAI 会自动检测操作系统的语言。手动更改方法：\n\n- 右上角：语言下拉菜单\n- 选择你偏好的语言\n- 界面立即更新\n\n可用语言：\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n\n全部13种语言已完全翻译（各323个键）。\n\n---\n\n## 管理你的许可证\n\n**高级 → 许可证**面板：\n\n- **查看状态**：有效/无效\n- **查看关联的客户邮箱**\n- **查看上次在线验证时间**\n- **在此设备上停用**：更换电脑前或释放名额时使用（共3个名额）\n\n### 退款\n\n如果 EsperantAI 未能满足你的预期，从购买之日起**14天内**可申请全额退款。请将许可证密钥发送至 support@edugame.digital。\n\n---\n\n## 故障排除\n\n### 粘贴许可证密钥后仍显示\"需要激活\"\n\n- 确认已复制完整密钥（5组4位字符，以连字符分隔）\n- 检查网络连接（首次激活需要在线验证）\n- 如已在3台设备上激活，请先停用其中一台\n- 如仍未解决，请联系 support@edugame.digital\n\n### 面部可见但一直显示\"正在搜索面部...\"\n\n- 改善照明：确保面部光线充足\n- 靠近摄像头（40-80厘米最佳）\n- 关闭使用 GPU 的其他标签页（Chrome 可能会限制 GPU 使用）\n- 如果 Chrome 的内存节省功能已开启，请对此标签页禁用\n\n### 下拉菜单中不显示场景\n\n- 确认已连接直播软件（绿色标记\"Connected\"）\n- 按 `R` 键重新加载场景列表\n- 如仍为空，请断开后重新连接\n\n### 没有做手势却触发了场景切换\n\n- 在**灵敏度**面板中提高偏航/俯仰/翻滚阈值\n- 将`稳定帧数`从5提高到8-10\n- 确认死区已配置（偏航 0.05、俯仰 0.05、翻滚 0.08）\n- 检查画面中是否有其他人（多人面部可能导致不稳定）\n\n### 检测延迟\n\n- 关闭占用资源的程序（游戏、视频编辑）\n- 确认使用的是独立显卡而非集成显卡（如有）\n- 如果摄像头分辨率为4K，降低到1080p（1080p是检测的最佳分辨率）\n\n### EsperantAI 显示\"场景已更改\"但 OBS 没有反应\n\n- 确认下拉菜单中的场景名称与 OBS 中的完全一致（区分大小写）\n- 确认场景不在其他场景集合中\n- 查看**触发历史**面板 — 如果显示 ✗ 红色，说明有具体错误\n\n### 错误\"OBS 无法连接 — 请手动连接\"\n\n- 确认 OBS 已打开\n- 确认 OBS 中已启用 WebSocket\n- 如在 OBS 中设置了密码，必须完全匹配\n- 部分杀毒软件会阻止端口 4455 — 请添加例外\n\n---\n\n## 隐私\n\n### EsperantAI 不会做的事\n\n- ❌ 不会将你的视频发送到任何服务器\n- ❌ 不会存储你的视频或截图\n- ❌ 不会远程收集生物特征信息\n- ❌ 不会与广告商或第三方共享数据\n\n### 会处理的内容\n\n- ✅ 在浏览器中进行本地面部检测（Human.js + WebGL）\n- ✅ 到 OBS / Streamlabs / vMix 的本地连接（回环 127.0.0.1）\n- ✅ 定期许可证密钥验证（每7天）\n- ✅ 如连接 Twitch/YouTube/Kick：OAuth 令牌存储在 sessionStorage 中（关闭浏览器时删除）\n\n完整详情请参阅 `docs/PRIVACY.html`。\n\n---\n\n## 技术支持\n\n- 📧 邮箱：**support@edugame.digital**\n- 🌐 网站：https://esperantai.com\n- 📚 技术文档：https://github.com/salazarjoelo/EsperantAI\n\n响应时间：\n- 一般问题：24-72小时\n- 技术问题：1-3个工作日\n\n---\n\n*最后更新：2026-05-14。版本：3.0。*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'ko-KR': { name: '한국어', flag: '🇰🇷', content: "# EsperantAI — 사용자 매뉴얼\n\n> **진실한 제스처.** 얼굴과 손동작으로 스트리밍 소프트웨어를 제어하세요. Stream Deck도 추가 하드웨어도 필요 없습니다.\n\n**버전**: 3.0 · **언어**: 한국어 (12개 추가 언어 번역 제공)\n\n---\n\n## 목차\n\n1. [EsperantAI란?](#what-is-esperantai)\n2. [최소 사양](#minimum-requirements)\n3. [구매 및 활성화](#purchase--activation)\n4. [처음 사용하기](#first-use)\n5. [스트리밍 소프트웨어 연결](#connect-your-streaming-software)\n6. [제스처 및 씬 설정](#configure-gestures--scenes)\n7. [제스처 카테고리](#gesture-categories)\n8. [스트리밍 플랫폼 연결](#connect-streaming-platforms)\n9. [이벤트 + 제스처 콤보 (고급)](#event--gesture-combos-advanced)\n10. [감도 및 데드존](#sensitivity--dead-zone)\n11. [키보드 단축키](#keyboard-shortcuts)\n12. [트리거 기록](#trigger-history)\n13. [언어 변경](#change-language)\n14. [라이선스 관리](#manage-your-license)\n15. [문제 해결](#troubleshooting)\n16. [개인정보](#privacy)\n17. [고객 지원](#support)\n\n---\n\n## EsperantAI란?\n\nEsperantAI는 인공지능을 사용하여 얼굴과 손의 제스처를 실시간으로 감지하고, 스트리밍 소프트웨어의 명령으로 변환하는 **웹 앱**입니다. 다음 소프트웨어와 함께 작동합니다:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (베타)\n\n그리고 다음 플랫폼에서 이벤트를 수신합니다:\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements** (멀티플랫폼 브릿지)\n\n### 왜 \"진실한 제스처\"인가요?\n\n기본적인 얼굴 표정과 머리 회전은 **모든 인간 문화에서 보편적**입니다 (Paul Ekman, 1972). 거짓이 없고 지역에 따라 달라지지 않습니다. EsperantAI는 이를 \"🌐 유니버설\" 제스처라고 부르며, 의미가 국가에 따라 다를 수 있는 \"⚠️ 컬처럴\" 제스처(손동작)와 구분합니다.\n\n시청자층에 맞춰 어떤 제스처를 사용할지 직접 선택하세요.\n\n---\n\n## 최소 사양\n\n### 하드웨어\n\n- **USB 웹캠** (권장: 1080p 이상)\n- **CPU**: 최근 5년 이내의 4코어 이상 프로세서\n- **RAM**: 최소 8 GB. 동시 스트리밍 시 16 GB 권장\n- **GPU**: WebGL 지원 (최신 내장 그래픽도 작동)\n\n### 소프트웨어\n\n- **OS**: Windows 10/11, macOS 12+ 또는 최신 커널의 Linux\n- **브라우저**: Chrome 90+, Edge 90+ 또는 Firefox 100+\n- **스트리밍 소프트웨어** (최소 1개): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### 인터넷\n\n- **라이선스 활성화** 및 **7일마다 재검증**에 필요\n- 최대 **7일간 오프라인** 사용 가능 (유예 기간)\n\n---\n\n## 구매 및 활성화\n\n1. **https://esperantai.com** 에 방문\n2. **\"Buy License\"** 클릭\n3. LemonSqueezy로 결제 완료 (카드, PayPal 등)\n4. 다음 내용이 포함된 이메일을 받습니다:\n   - **라이선스 키** (형식: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - EsperantAI 사용 링크\n5. 브라우저에서 EsperantAI 열기\n6. 활성화 화면이 나타납니다. 라이선스 키를 붙여넣기\n7. **\"Activate License\"** 클릭\n8. 완료! 🎉\n\n### 여러 기기에서 사용할 수 있나요?\n\n하나의 라이선스는 **최대 3대의 기기**에서 활성화할 수 있습니다. 다른 기기로 라이선스를 이전하려면:\n\n1. 이전 기기에서: **고급** 패널 → **라이선스** → **이 기기에서 비활성화**\n2. 새 기기에서: 정상적으로 활성화\n\n---\n\n## 처음 사용하기\n\n### 1단계: 카메라 접근 허용\n\n처음 EsperantAI를 열면 브라우저가 카메라 사용 권한을 요청합니다. **허용**해 주세요.\n\n> 중요: EsperantAI는 영상을 어떤 서버에도 전송하지 않습니다. 모든 처리는 컴퓨터에서 100% 로컬로 이루어집니다.\n\n### 2단계: 카메라 선택\n\n카메라가 여러 대인 경우, 드롭다운에서 사용할 카메라를 선택하세요.\n\n### 3단계: 감지 확인\n\n왼쪽 패널에 얼굴이 표시됩니다. EsperantAI가 얼굴을 감지하면 Yaw / Pitch / Roll 표시기에 수치가 나타납니다.\n\n### 4단계: 캘리브레이션 마법사 (Pro+)\n\nPro 또는 Pro+ 라이선스가 있는 경우, 처음 사용 시 **캘리브레이션 마법사**가 자동으로 실행됩니다. 자연스러운 가동 범위를 측정하여 최적의 감도를 설정합니다. **재캘리브레이션** 버튼으로 언제든 다시 실행할 수 있습니다.\n\n---\n\n## 스트리밍 소프트웨어 연결\n\n### OBS Studio\n\n1. OBS에서: **도구 → WebSocket 서버 설정**\n2. WebSocket을 활성화합니다. 비밀번호를 설정한 경우 메모해 두세요\n3. EsperantAI에서: **연결** 패널\n4. 스트리밍 소프트웨어: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (기본값)\n6. 비밀번호: OBS에서 설정한 것\n7. **Connect** 클릭\n\n### Streamlabs Desktop\n\n1. Streamlabs에서: **Settings → Remote Control**\n2. Remote Control 활성화\n3. API Token을 메모\n4. EsperantAI에서: 스트리밍 소프트웨어: **Streamlabs Desktop**\n5. API Token: 붙여넣기\n6. 포트: `59650` (기본값)\n7. **Connect** 클릭\n\n### vMix\n\n1. vMix에서: **Settings → Web Controller**\n2. Web Controller 활성화. 기본 포트: 8088\n3. EsperantAI에서: 스트리밍 소프트웨어: **vMix**\n4. 호스트: `127.0.0.1`\n5. 포트: `8088`\n6. **Connect** 클릭\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5+는 obs-websocket 플러그인을 수동으로 설치해야 합니다\n2. [OBS 포럼](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/)에서 `obs-websocket` 다운로드\n3. PRISM의 플러그인 폴더에 복사\n4. PRISM 재시작\n5. **도구 → WebSocket 서버 설정** 에서 WebSocket 활성화\n6. EsperantAI에서: 스트리밍 소프트웨어: **PRISM Live Studio** (OBS와 동일하게 작동)\n\n### XSplit Broadcaster (베타)\n\n1. XSplit에서 \"Remote xjs\" 확장 프로그램 설치 (Settings → Extensions)\n2. 환경설정에서 Remote 활성화\n3. EsperantAI에서: 스트리밍 소프트웨어: **XSplit**\n4. Remote xjs 프록시 URL: `ws://127.0.0.1:5555/xjs` (기본값)\n5. **Connect** 클릭\n\n> XSplit은 **베타**입니다. 고급 기능이 제한될 수 있습니다.\n\n---\n\n## 제스처 및 씬 설정\n\n연결하면 스트리밍 소프트웨어의 실제 씬이 **트리거** 패널의 드롭다운에 자동으로 나타납니다.\n\n### 기본 매핑\n\n1. 각 제스처(예: \"왼쪽 보기\")에 대해 드롭다운에서 씬을 선택\n2. 해당 제스처를 취하고 약 150ms 동안 안정적으로 유지하면, EsperantAI가 스트리밍 소프트웨어의 씬을 전환합니다\n3. 전환은 자동이며 거의 즉각적입니다\n\n### 멀티 액션 (Pro+)\n\nPro 또는 Pro+ 라이선스가 있으면 하나의 제스처로 **여러 동작**을 동시에 트리거할 수 있습니다:\n- 씬 전환 + 소리 재생 + 오버레이 표시 + 채팅 메시지 전송\n\n### 카테고리 활성화/비활성화\n\n각 카테고리에는 개별 \"활성화\" 체크박스가 있습니다:\n\n- 🧠 **머리 회전** (유니버설 — 기본 활성화)\n- 📏 **얼굴 거리** (가까이/멀리 이동)\n- 👁️ **시선** (눈만 이동)\n- 😀 **감정** (미소, 놀람, 분노, 중립)\n- 👁️‍🗨️ **더블 블링크**\n- ✋ **손 제스처** (컬처럴 — 기본 비활성화)\n\nCPU를 절약하려면 필요하지 않은 카테고리를 비활성화하세요.\n\n---\n\n## 제스처 카테고리\n\n### 🌐 유니버설 (모든 문화에서 동일한 의미)\n\n| 제스처 | 축 | 활성화 방법 |\n|---|---|---|\n| 센터 | — | 정면을 보고 얼굴을 안정적으로 유지 |\n| 왼쪽 보기 | 음의 yaw | 머리를 왼쪽으로 돌리기 |\n| 오른쪽 보기 | 양의 yaw | 머리를 오른쪽으로 돌리기 |\n| 위 보기 | 음의 pitch | 얼굴을 올리기 |\n| 아래 보기 | 양의 pitch | 얼굴을 내리기 |\n| 왼쪽 기울이기 | 음의 roll | 머리를 왼쪽 어깨 쪽으로 기울이기 |\n| 오른쪽 기울이기 | 양의 roll | 머리를 오른쪽 어깨 쪽으로 기울이기 |\n| 가까이 다가가기 | 거리 | 얼굴을 카메라에 가까이 |\n| 멀리 물러나기 | 거리 | 얼굴을 카메라에서 멀리 |\n| 시선 | 시선 | 머리는 고정하고 눈만 이동 |\n| 미소 | 감정=happy | 뚜렷하게 미소 짓기 |\n| 놀람 | 감정=surprise | 놀란 표정 짓기 |\n| 분노 | 감정=angry | 화난 표정 짓기 |\n| 중립 | 감정=neutral | 편안한 표정 |\n| 더블 블링크 | 블링크 | 양 눈을 빠르게 두 번 감기 (700ms 이내) |\n\n### ⚠️ 컬처럴 (국가에 따라 의미가 다를 수 있음)\n\n| 제스처 | 서양에서의 의미 | 다른 문화에서의 주의사항 |\n|---|---|---|\n| 👍 엄지 척 | 찬동, 좋음 | 중동/서아시아: 모욕적으로 받아들일 수 있음 |\n| ✌️ 브이 피스 | 평화/승리 | 영국/아일랜드/호주 (손바닥 안쪽): 모욕. ※한국에서는 사진 찍을 때 매우 흔하고 긍정적인 제스처로 사용됨 |\n| 🤘 락 사인 | 록/메탈 | 이탈리아 (손바닥 아래): \"cornuto\" (모욕) |\n| 👌 OK | OK/완벽 | 브라질/터키/독일: 모욕적으로 받아들일 수 있음. ※한국에서는 매우 불쾌한 제스처이므로 사용에 주의 필요 |\n| ✊ 주먹 쥐기 | 정치적 맥락에 따라 다름 | — |\n| 🖐️ 손바닥 펼치기 | \"멈춤\" 또는 인사 | 그리스 (상대에게 mountza): 강한 모욕 |\n| ☝️ 손가락 가리키기 | 지시 | 아시아: 손가락으로 가리키는 것은 무례 |\n\nEsperantAI는 UI에서 각 제스처에 해당하는 배지를 표시합니다. 글로벌 시청자를 고려하여 어떤 제스처를 사용할지 선택하세요.\n\n### 🙏 합장 (합장)\n\n특별한 제스처: 가슴 앞에서 양 손바닥을 맞대어 모읍니다 (기도나 인사처럼). 합장은 한국 문화에서 인사, 감사 표현, 불교 기도 등에 널리 사용되는 친숙한 제스처입니다. 일상생활에서도 감사나 죄송함을 표현할 때 자연스럽게 사용됩니다. 6개의 랜드마크 체크를 통해 높은 신뢰도로 감지됩니다.\n\n---\n\n## 스트리밍 플랫폼 연결\n\nEsperantAI가 이벤트(도네이션, 구독, 레이드)를 수신하려면, 방송 중인 플랫폼을 연결하세요.\n\n### Twitch\n\n1. https://dev.twitch.tv/console 에서 Client ID 생성\n2. 리디렉트 URI 등록: `https://esperantai.com/oauth-callback.html` (또는 로컬 URL)\n3. EsperantAI에서: **플랫폼 이벤트** 패널 → **Twitch EventSub**\n4. Client ID 붙여넣기\n5. **Connect** 클릭\n6. Twitch 인증 창이 열립니다. 권한을 허용하세요\n7. 창이 닫히고 \"Twitch Connected\"가 표시됩니다\n\n### YouTube Live\n\n1. https://console.cloud.google.com 에서 인증 정보 생성\n2. YouTube Data API v3 활성화\n3. OAuth Client ID 생성 (유형: 웹 애플리케이션)\n4. Twitch와 동일한 리디렉트 URI 등록\n5. EsperantAI에서: **플랫폼 이벤트** 패널 → **YouTube Live**\n6. Client ID를 붙여넣고 **Connect** 클릭\n\n### Kick\n\n1. https://kick.com/settings/developer 에서 앱 생성\n2. 리디렉트 URI 등록\n3. EsperantAI에서: **플랫폼 이벤트** 패널 → **Kick**\n4. Client ID를 붙여넣고 **Connect** 클릭\n5. Kick은 OAuth 2.1 with PKCE를 사용합니다 (더 안전)\n\n### StreamElements (멀티플랫폼 브릿지)\n\n이미 StreamElements 계정이 있다면 하나의 토큰으로 Twitch + YouTube + Facebook을 통합할 수 있습니다:\n\n1. https://streamelements.com/dashboard/account/channels 에 접속\n2. JWT Token 복사\n3. EsperantAI에서: **플랫폼 이벤트** 패널 → **StreamElements**\n4. JWT를 붙여넣고 **Connect** 클릭\n\n---\n\n## 이벤트 + 제스처 콤보 (고급)\n\nEsperantAI의 핵심 기능: **플랫폼 이벤트**와 **사용자의 제스처**를 확인으로 결합합니다.\n\n### 예시: 도네이션에 엄지 척으로 감사 표현\n\n1. **이벤트 트리거** 패널 → \"💰 도네이션\" 행\n2. ✅ 활성화\n3. 씬: `Thank_You_Scene`\n4. 필수 제스처: `👍 엄지 척`\n\n**라이브 흐름**:\n- 도네이션이 들어옴 → EsperantAI에 \"제스처 대기 중...\" 표시\n- 5초 이내에 👍을 취함\n- 취하면 → `Thank_You_Scene`으로 전환 + 설정된 다른 동작 실행\n- 취하지 않으면 → 자동으로 취소\n\n### 필수 제스처 없음 (자동 트리거)\n\n\"필수 제스처\"를 `— 없음 —`으로 그대로 두면 이벤트가 즉시 동작을 트리거합니다.\n\n유용한 경우:\n- 레이드가 들어올 때 자동으로 축하 씬으로 전환\n- 누군가 구독할 때 자동으로 오버레이 표시\n\n---\n\n## 감도 및 데드존\n\n### 감도\n\n임계값은 제스처가 트리거되려면 얼마나 크게 해야 하는지를 제어합니다:\n\n- **Yaw**: 머리를 옆으로 얼마나 돌리는지 (기본값: 0.15 rad ≈ 8.6°)\n- **Pitch 위/아래**: 수직 기울기\n- **Roll**: 측면 기울기\n\n값을 올리면 더 과장된 제스처가 필요합니다. 내리면 더 민감해집니다.\n\n### 데드존 (피로도 방지)\n\n거의 중앙을 보고 있을 때 (yaw < 0.05, pitch < 0.05, roll < 0.08) **아무것도 트리거되지 않습니다**. 이를 통해 미세한 움직임이 트리거를 활성화하는 것을 방지하고 자연스럽게 움직일 수 있습니다.\n\n### 안정 프레임\n\n`안정 프레임` = 트리거되기 전에 제스처를 연속해서 몇 프레임 동안 유지해야 하는지. 기본값: 5프레임 (약 150ms / 30fps).\n\n트리거가 너무 쉽게 발동하면 값을 올리고, 더 빠른 반응이 필요하면 내리세요.\n\n### 쿨다운\n\n`쿨다운 (ms)` = 씬 전환 사이의 최소 시간. 기본값: 500ms.\n\n빠르게 흔들렸을 때 전환이 \"떨리는\" 것을 방지합니다.\n\n---\n\n## 키보드 단축키\n\n| 키 | 동작 |\n|---|---|\n| `Space` | 감지 일시정지 / 재개 |\n| `C` | 수동으로 센터 씬으로 이동 |\n| `R` | 소프트웨어에서 씬 목록 새로고침 |\n| `Esc` | 연결 해제 |\n\n---\n\n## 트리거 기록\n\n**고급 → 트리거 기록** 패널에 최근 50개의 트리거 동작이 표시됩니다:\n\n- ✓ 초록 = 성공\n- ✗ 빨강 = 실패\n- · 회색 = 대기 중\n\nDevTools를 열지 않고도 어떤 트리거가 발동했는지 확인할 수 있어 편리합니다.\n\n**CSV 내보내기**: 기록을 다운로드하여 오프라인으로 분석.\n\n**지우기**: 기록 삭제 (다른 항목에는 영향 없음).\n\n---\n\n## 언어 변경\n\nEsperantAI는 운영 체제의 언어를 자동으로 감지합니다. 수동으로 변경하려면:\n\n- 우측 상단: 언어 드롭다운\n- 원하는 언어를 선택\n- UI가 즉시 업데이트됩니다\n\n사용 가능한 언어:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n\n전체 13개 언어가 완전히 번역되어 있습니다 (각 323개 키).\n\n---\n\n## 라이선스 관리\n\n**고급 → 라이선스** 패널:\n\n- **상태 확인**: 유효 / 무효\n- **연결된 고객 이메일 확인**\n- **마지막 온라인 검증 확인**\n- **이 기기에서 비활성화**: PC를 변경하기 전이나 슬롯을 확보할 때 사용 (총 3개)\n\n### 환불\n\nEsperantAI가 기대에 미치지 못한다면, 구매일로부터 **14일 이내**에 전액 환불을 요청할 수 있습니다. 라이선스 키와 함께 support@edugame.digital으로 이메일을 보내주세요.\n\n---\n\n## 문제 해결\n\n### 라이선스 키를 붙여넣었는데도 \"활성화 필요\"가 계속 표시됨\n\n- 키를 완전히 복사했는지 확인 (하이픈으로 구분된 4자리 5그룹)\n- 인터넷 연결 확인 (첫 활성화에는 온라인 검증이 필요)\n- 이미 3대에서 활성화한 경우, 먼저 한 대를 비활성화\n- 계속되면 support@edugame.digital으로 연락\n\n### 얼굴이 보이는데도 \"얼굴 검색 중...\"이 계속됨\n\n- 조명 개선: 얼굴이 밝게 조명되어야 합니다\n- 카메라에 가까이 이동 (40-80cm가 최적)\n- GPU를 사용하는 다른 탭 닫기 (Chrome은 탭이 너무 많으면 GPU를 제한할 수 있음)\n- Chrome의 메모리 절약 기능이 활성화된 경우 이 탭에서 비활성화\n\n### 드롭다운에 씬이 나타나지 않음\n\n- 스트리밍 소프트웨어에 연결되어 있는지 확인 (초록색 배지 \"Connected\")\n- `R` 키를 눌러 씬 목록 새로고침\n- 여전히 비어있으면 연결을 끊고 다시 연결\n\n### 제스처를 하지 않았는데 씬 전환이 트리거됨\n\n- **감도** 패널에서 yaw / pitch / roll 임계값 올리기\n- `안정 프레임`을 5에서 8-10으로 올리기\n- 데드존이 설정되어 있는지 확인 (yaw 0.05, pitch 0.05, roll 0.08)\n- 화면에 다른 사람이 없는지 확인 (다중 얼굴로 불안정해질 수 있음)\n\n### 감지 지연\n\n- 무거운 앱 (게임, 영상 편집) 닫기\n- 내장 그래픽이 아닌 전용 GPU를 사용하고 있는지 확인 (있는 경우)\n- 카메라 해상도가 4K인 경우 1080p로 낮추기 (감지에는 1080p가 최적)\n\n### EsperantAI에 \"씬 변경됨\"이라고 표시되는데 OBS가 반응하지 않음\n\n- 드롭다운의 씬 이름이 OBS의 것과 정확히 일치하는지 확인 (대소문자 구분)\n- 씬이 다른 씬 컬렉션에 있지 않은지 확인\n- **트리거 기록** 패널 확인 — ✗ 빨강이 표시되어 있으면 구체적인 오류가 있습니다\n\n### \"OBS에 연결할 수 없음 — 수동으로 연결하세요\" 오류\n\n- OBS가 열려 있는지 확인\n- OBS에서 WebSocket이 활성화되어 있는지 확인\n- OBS에서 비밀번호를 설정한 경우, 정확히 일치해야 합니다\n- 일부 백신 소프트웨어가 포트 4455를 차단 — 예외 추가\n\n---\n\n## 개인정보\n\n### EsperantAI가 하지 않는 것\n\n- ❌ 영상을 어떤 서버에도 전송하지 않습니다\n- ❌ 영상이나 캡처를 저장하지 않습니다\n- ❌ 생체 정보를 원격으로 수집하지 않습니다\n- ❌ 데이터를 광고주나 제3자와 공유하지 않습니다\n\n### 처리하는 내용\n\n- ✅ 브라우저 내 로컬 얼굴 감지 (Human.js + WebGL)\n- ✅ OBS / Streamlabs / vMix로의 로컬 연결 (루프백 127.0.0.1)\n- ✅ 정기적인 라이선스 키 검증 (7일마다)\n- ✅ Twitch/YouTube/Kick을 연결한 경우: sessionStorage에 OAuth 토큰 저장 (브라우저를 닫으면 삭제됨)\n\n자세한 내용은 `docs/PRIVACY.html`을 참조하세요.\n\n---\n\n## 고객 지원\n\n- 📧 이메일: **support@edugame.digital**\n- 🌐 웹: https://esperantai.com\n- 📚 기술 문서: https://github.com/salazarjoelo/EsperantAI\n\n응답 시간:\n- 일반 문의: 24-72시간\n- 기술 버그: 1-3 영업일\n\n---\n\n*최종 업데이트: 2026-05-14. 버전: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'fr-FR': { name: 'Français', flag: '🇫🇷', content: "# EsperantAI — Manuel utilisateur\n\n> **Gestes sincères.** Contrôlez votre logiciel de streaming avec votre visage et vos mains. Pas de Stream Deck. Pas de matériel supplémentaire.\n\n**Version** : 3.0 · **Langue** : Français (traductions disponibles dans 12 autres langues)\n\n---\n\n## Table des matières\n\n1. [Qu'est-ce qu'EsperantAI ?](#quest-ce-quesperantai-)\n2. [Configuration minimale](#configuration-minimale)\n3. [Achat et activation](#achat-et-activation)\n4. [Première utilisation](#première-utilisation)\n5. [Connecter votre logiciel de streaming](#connecter-votre-logiciel-de-streaming)\n6. [Configurer les gestes et les scènes](#configurer-les-gestes-et-les-scènes)\n7. [Catégories de gestes](#catégories-de-gestes)\n8. [Connecter les plateformes de streaming](#connecter-les-plateformes-de-streaming)\n9. [Combinaisons Événement + Geste (Avancé)](#combinaisons-événement--geste-avancé)\n10. [Sensibilité et zone morte](#sensibilité-et-zone-morte)\n11. [Raccourcis clavier](#raccourcis-clavier)\n12. [Historique des déclencheurs](#historique-des-déclencheurs)\n13. [Changer la langue](#changer-la-langue)\n14. [Gérer votre licence](#gérer-votre-licence)\n15. [Dépannage](#dépannage)\n16. [Confidentialité](#confidentialité)\n17. [Support](#support)\n\n---\n\n## Qu'est-ce qu'EsperantAI ?\n\nEsperantAI est une **application web** qui utilise l'intelligence artificielle pour détecter vos expressions faciales et vos gestes des mains en temps réel, et les traduit en commandes pour votre logiciel de streaming. Compatible avec :\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (bêta)\n\nEt reçoit des événements de plateformes telles que :\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements** (pont multiplateforme)\n\n### Pourquoi « gestes sincères » ?\n\nLes expressions faciales de base et la rotation de la tête sont **universelles dans toutes les cultures humaines** (Paul Ekman, 1972). Elles ne mentent pas, elles ne varient pas selon la géographie. EsperantAI les appelle des gestes « 🌐 Universels » et les distingue des gestes « ⚠️ Culturels » (signes de la main), dont la signification peut varier selon les pays.\n\nC'est vous qui décidez quels gestes utiliser en fonction de votre audience.\n\n---\n\n## Configuration minimale\n\n### Matériel\n\n- **N'importe quelle webcam USB** (recommandation : 1080p ou supérieur)\n- **CPU** : tout processeur 4 cœurs ou plus des 5 dernières années\n- **RAM** : 8 Go minimum. 16 Go recommandés si vous streamez simultanément.\n- **GPU** : n'importe quel GPU avec support WebGL (même les GPU intégrés récents fonctionnent)\n\n### Logiciel\n\n- **OS** : Windows 10/11, macOS 12+ ou Linux avec noyau récent\n- **Navigateur** : Chrome 90+, Edge 90+ ou Firefox 100+\n- **Logiciel de streaming** (au moins un) : OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Internet\n\n- Requis pour **activer votre licence** et tous les **7 jours** pour la revalidation\n- Fonctionne **jusqu'à 7 jours hors ligne** (période de grâce)\n\n---\n\n## Achat et activation\n\n1. Rendez-vous sur **https://esperantai.com**\n2. Cliquez sur **« Buy License »**\n3. Effectuez le paiement via LemonSqueezy (carte, PayPal, etc.)\n4. Vous recevrez un e-mail contenant :\n   - Votre **clé de licence** (format : `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Un lien pour utiliser EsperantAI\n5. Ouvrez EsperantAI dans votre navigateur\n6. L'écran d'activation apparaîtra. Collez votre clé de licence\n7. Cliquez sur **« Activate License »**\n8. C'est fait ! 🎉\n\n### Combien d'appareils ?\n\nUne licence peut être activée sur **jusqu'à 3 appareils**. Pour transférer votre licence vers un autre appareil :\n\n1. Sur l'ancien appareil : panneau **Advanced** → **License** → **Deactivate on this device**\n2. Sur le nouvel appareil : activez normalement\n\n---\n\n## Première utilisation\n\n### Étape 1 : Autoriser l'accès à la caméra\n\nLorsque vous ouvrez EsperantAI pour la première fois, votre navigateur vous demandera l'autorisation d'accéder à la caméra. **Acceptez**.\n\n> Important : EsperantAI n'envoie jamais votre vidéo vers un serveur. Le traitement est 100 % local sur votre ordinateur.\n\n### Étape 2 : Sélectionner la caméra\n\nSi vous disposez de plusieurs caméras, choisissez celle à utiliser dans le menu déroulant.\n\n### Étape 3 : Vérifier la détection\n\nVous verrez votre visage dans le panneau de gauche. Lorsqu'EsperantAI détecte votre visage, les indicateurs Yaw / Pitch / Roll commenceront à afficher des valeurs.\n\n### Étape 4 : Assistant de calibrage (Pro+)\n\nSi vous possédez une licence Pro ou Pro+, l'**Assistant de calibrage** se lance automatiquement lors de la première utilisation. Il mesure votre amplitude naturelle de mouvement et définit une sensibilité optimale. Vous pouvez le relancer à tout moment via le bouton **Recalibrate**.\n\n---\n\n## Connecter votre logiciel de streaming\n\n### OBS Studio\n\n1. Dans OBS : **Tools → WebSocket Server Settings**\n2. Activez le WebSocket. Notez le mot de passe si vous en avez défini un.\n3. Dans EsperantAI : panneau **Connection**\n4. Logiciel de streaming : **OBS Studio**\n5. URL WebSocket : `ws://127.0.0.1:4455` (par défaut)\n6. Mot de passe : celui que vous avez défini dans OBS\n7. Cliquez sur **Connect**\n\n### Streamlabs Desktop\n\n1. Dans Streamlabs : **Settings → Remote Control**\n2. Activez le Remote Control\n3. Notez l'API Token\n4. Dans EsperantAI : Logiciel de streaming : **Streamlabs Desktop**\n5. API Token : collez-le\n6. Port : `59650` (par défaut)\n7. Cliquez sur **Connect**\n\n### vMix\n\n1. Dans vMix : **Settings → Web Controller**\n2. Activez le Web Controller. Port par défaut : 8088.\n3. Dans EsperantAI : Logiciel de streaming : **vMix**\n4. Hôte : `127.0.0.1`\n5. Port : `8088`\n6. Cliquez sur **Connect**\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5+ nécessite l'installation manuelle du plugin obs-websocket\n2. Téléchargez `obs-websocket` depuis le [forum OBS](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/)\n3. Copiez-le dans le dossier des plugins de PRISM\n4. Redémarrez PRISM\n5. Activez le WebSocket dans **Tools → WebSocket Server Settings**\n6. Dans EsperantAI : Logiciel de streaming : **PRISM Live Studio** (fonctionne comme OBS)\n\n### XSplit Broadcaster (bêta)\n\n1. Installez l'extension « Remote xjs » dans XSplit (Settings → Extensions)\n2. Activez Remote dans les préférences\n3. Dans EsperantAI : Logiciel de streaming : **XSplit**\n4. URL du proxy Remote xjs : `ws://127.0.0.1:5555/xjs` (par défaut)\n5. Cliquez sur **Connect**\n\n> XSplit est en **bêta**. Certaines fonctionnalités avancées peuvent être limitées.\n\n---\n\n## Configurer les gestes et les scènes\n\nUne fois connecté, les scènes réelles de votre logiciel apparaîtront automatiquement dans les listes déroulantes du panneau **Triggers**.\n\n### Mappage de base\n\n1. Pour chaque geste (par ex., « Look Left »), choisissez une scène dans la liste déroulante\n2. Lorsque vous effectuez ce geste et le maintenez stable pendant ~150 ms, EsperantAI basculera vers cette scène dans votre logiciel de streaming\n3. Le changement est automatique et quasi instantané\n\n### Multi-action (Pro+)\n\nAvec une licence Pro ou Pro+, un seul geste peut déclencher **plusieurs actions** simultanément :\n- Changer de scène + jouer un son + afficher un overlay + envoyer un message dans le chat\n\n### Activer / désactiver les catégories\n\nChaque catégorie possède sa propre case à cocher « Enable » :\n\n- 🧠 **Rotation de la tête** (universel — activé par défaut)\n- 📏 **Distance du visage** (se rapprocher/s'éloigner)\n- 👁️ **Regard** (bouger uniquement les yeux)\n- 😀 **Émotions** (sourire, surprise, colère, neutre)\n- 👁️‍🗨️ **Double clin d'œil**\n- ✋ **Gestes de la main** (culturel — désactivé par défaut)\n\nDésactivez les catégories dont vous n'avez pas besoin pour économiser les ressources CPU.\n\n---\n\n## Catégories de gestes\n\n### 🌐 Universels (même signification dans toutes les cultures)\n\n| Geste | Axe | Comment l'activer |\n|---|---|---|\n| Centre | — | Regarder droit devant, visage stable |\n| Regarder à gauche | yaw négatif | Tourner la tête vers la gauche |\n| Regarder à droite | yaw positif | Tourner la tête vers la droite |\n| Regarder en haut | pitch négatif | Lever le visage |\n| Regarder en bas | pitch positif | Baisser le visage |\n| Inclinaison à gauche | roll négatif | Incliner la tête vers l'épaule gauche |\n| Inclinaison à droite | roll positif | Incliner la tête vers l'épaule droite |\n| Se rapprocher | distance | Rapprocher le visage de la caméra |\n| S'éloigner | distance | Éloigner le visage de la caméra |\n| Direction du regard | regard | Bouger uniquement les yeux (tête centrée) |\n| Sourire | émotion=heureux | Sourire clairement |\n| Surpris | émutation=surprise | Avoir l'air surpris |\n| En colère | émotion=colère | Avoir l'air en colère |\n| Neutre | émotion=neutre | Visage détendu |\n| Double clin d'œil | clin | Fermer les deux yeux deux fois rapidement (< 700 ms) |\n\n### ⚠️ Culturels (la signification varie selon les pays)\n\n| Geste | Signification occidentale | Précaution dans d'autres cultures |\n|---|---|---|\n| 👍 Pouce levé | Approbation | Moyen-Orient / Asie de l'Ouest : peut être offensant |\n| ✌️ Paix | Paix / victoire | Royaume-Uni / Irlande / Australie (paume vers l'intérieur) : insulte |\n| 🤘 Cornes de rock | Rock/metal | Italie (paume vers le bas) : « cornuto » (insulte) |\n| 👌 OK | OK / parfait | Brésil / Turquie / Allemagne : peut être offensant |\n| ✊ Poing fermé | Variable selon le contexte politique | — |\n| 🖐️ Paume ouverte | « Stop » ou salutation | Grèce (mountza vers quelqu'un) : insulte grave |\n| ☝️ Montrer du doigt | Indiquer | Asie : montrer du doigt est impoli |\n\nEsperantAI marque chaque geste avec son badge correspondant dans l'interface. Choisissez lesquels utiliser en fonction de votre audience mondiale.\n\n### 🙏 Gassho (合掌)\n\nUn geste spécial : pressez les deux paumes l'une contre l'autre devant votre poitrine (comme une prière ou une salutation). Courant dans les cultures d'Asie de l'Est comme signe de respect ou de gratitude. Détecté avec une grande fiabilité grâce à 6 vérifications de points de repère.\n\n---\n\n## Connecter les plateformes de streaming\n\nPour qu'EsperantAI reçoive des événements (dons, abonnements, raids), connectez les plateformes sur lesquelles vous streamez.\n\n### Twitch\n\n1. Créez un Client ID sur https://dev.twitch.tv/console\n2. Enregistrez l'URI de redirection : `https://esperantai.com/oauth-callback.html` (ou votre URL locale)\n3. Dans EsperantAI : panneau **Platform Events** → **Twitch EventSub**\n4. Collez votre Client ID\n5. Cliquez sur **Connect**\n6. Une fenêtre d'autorisation Twitch s'ouvrira. Acceptez les permissions.\n7. La fenêtre se fermera et vous verrez « Twitch Connected »\n\n### YouTube Live\n\n1. Créez des identifiants sur https://console.cloud.google.com\n2. Activez YouTube Data API v3\n3. Créez un OAuth Client ID (type : Web Application)\n4. Enregistrez la même URI de redirection que pour Twitch\n5. Dans EsperantAI : panneau **Platform Events** → **YouTube Live**\n6. Collez votre Client ID et cliquez sur **Connect**\n\n### Kick\n\n1. Créez une application sur https://kick.com/settings/developer\n2. Enregistrez l'URI de redirection\n3. Dans EsperantAI : panneau **Platform Events** → **Kick**\n4. Collez votre Client ID et cliquez sur **Connect**\n5. Kick utilise OAuth 2.1 avec PKCE (plus sécurisé)\n\n### StreamElements (pont multiplateforme)\n\nSi vous avez déjà un compte StreamElements, vous pouvez unifier Twitch + YouTube + Facebook avec un seul jeton :\n\n1. Allez sur https://streamelements.com/dashboard/account/channels\n2. Copiez votre JWT Token\n3. Dans EsperantAI : panneau **Platform Events** → **StreamElements**\n4. Collez le JWT et cliquez sur **Connect**\n\n---\n\n## Combinaisons Événement + Geste (Avancé)\n\nVoici la magie d'EsperantAI : combiner des **événements de plateforme** avec **vos gestes** comme confirmation.\n\n### Exemple : remercier les donateurs avec un pouce levé\n\n1. Panneau **Event Triggers** → ligne « 💰 Donation »\n2. ✅ Activez\n3. Scène : `Thank_You_Scene`\n4. Geste requis : `👍 Thumbs up`\n\n**Déroulement en direct** :\n- Un don arrive → EsperantAI affiche « Waiting for gesture... »\n- Vous avez 5 secondes pour faire 👍\n- Si vous le faites → bascule vers `Thank_You_Scene` + exécute les autres actions configurées\n- Si vous ne le faites pas → l'événement est automatiquement ignoré\n\n### Sans geste requis (déclenchement automatique)\n\nSi vous laissez « Required gesture » sur `— none —`, l'événement déclenche l'action immédiatement.\n\nUtile pour :\n- Basculer automatiquement vers la scène de célébration lors d'un raid\n- Afficher automatiquement un overlay lorsqu'un viewer s'abonne\n\n---\n\n## Sensibilité et zone morte\n\n### Sensibilité\n\nLes seuils déterminent l'amplitude nécessaire d'un geste pour le déclencher :\n\n- **Yaw** : de combien tourner la tête sur le côté (par défaut : 0,15 rad ≈ 8,6°)\n- **Pitch haut/bas** : inclinaison verticale\n- **Roll** : inclinaison latérale\n\nAugmentez les valeurs pour des gestes plus exagérés. Diminuez pour plus de sensibilité.\n\n### Zone morte (anti-fatigue)\n\nSi vous êtes presque centré (yaw < 0,05, pitch < 0,05, roll < 0,08), **RIEN ne se déclenche**. Cela vous permet de bouger naturellement sans que des micro-mouvements n'activent des déclencheurs.\n\n### Images stables\n\n`Stable frames` = nombre d'images consécutives pendant lesquelles le geste doit être maintenu avant le déclenchement. Par défaut : 5 images (~150 ms à 30 fps).\n\nAugmentez si les déclencheurs s'activent trop facilement. Diminuez pour une réponse plus rapide.\n\n### Temps de recharge\n\n`Cooldown (ms)` = temps minimum entre les changements de scène. Par défaut : 500 ms.\n\nEmpêche le commutateur d'être « instable » si vous oscillez rapidement.\n\n---\n\n## Raccourcis clavier\n\n| Touche | Action |\n|---|---|\n| `Espace` | Mettre en pause / Reprendre la détection |\n| `C` | Basculer manuellement vers la scène CENTER |\n| `R` | Recharger la liste des scènes depuis le logiciel |\n| `Échap` | Se déconnecter |\n\n---\n\n## Historique des déclencheurs\n\nLe panneau **Advanced → Trigger History** affiche les 50 dernières actions déclenchées :\n\n- ✓ vert = réussi\n- ✗ rouge = échoué\n- · gris = en attente\n\nUtile pour vérifier ce qui a été déclenché sans ouvrir les DevTools.\n\n**Export CSV** : téléchargez l'historique pour une analyse hors ligne.\n\n**Clear** : effacer l'historique (n'affecte rien d'autre).\n\n---\n\n## Changer la langue\n\nEsperantAI détecte automatiquement la langue de votre système d'exploitation. Pour la modifier manuellement :\n\n- Coin supérieur droit : menu déroulant des langues\n- Sélectionnez la langue de votre choix\n- L'interface se met à jour immédiatement\n\nLangues disponibles :\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n\nLes 13 langues sont entièrement traduites (323 clés chacune).\n\n---\n\n## Gérer votre licence\n\nPanneau **Advanced → License** :\n\n- **Voir le statut** : Valide / Invalide\n- **Voir l'e-mail du client associé**\n- **Voir la dernière validation en ligne**\n- **Deactivate on this device** : à utiliser avant de changer de PC ou pour libérer un emplacement (sur les 3 disponibles)\n\n### Remboursement\n\nSi EsperantAI ne répond pas à vos attentes, vous disposez de **14 jours** à compter de l'achat pour demander un remboursement intégral. Envoyez un e-mail à support@edugame.digital avec votre clé de licence.\n\n---\n\n## Dépannage\n\n### « Activation required » persiste après avoir collé ma clé de licence\n\n- Vérifiez que vous avez copié la clé complète (5 groupes de 4 caractères séparés par des tirets)\n- Vérifiez votre connexion Internet (l'activation nécessite une validation en ligne la première fois)\n- Si vous avez déjà activé sur 3 appareils, désactivez-en un d'abord\n- Contactez support@edugame.digital si le problème persiste\n\n### « Searching for face... » persiste bien que mon visage soit visible\n\n- Améliorez l'éclairage : votre visage doit être bien éclairé\n- Rapprochez-vous de la caméra (40 à 80 cm est optimal)\n- Fermez les autres onglets utilisant le GPU (Chrome peut limiter le GPU si trop d'onglets sont ouverts)\n- Si le Memory Saver de Chrome est actif, désactivez-le pour cet onglet\n\n### Les scènes n'apparaissent pas dans les listes déroulantes\n\n- Vérifiez que vous êtes connecté au logiciel de streaming (badge vert « Connected »)\n- Appuyez sur `R` pour recharger la liste des scènes\n- Si toujours vide, déconnectez puis reconnectez-vous\n\n### Les changements de scène se déclenchent sans que je fasse de gestes\n\n- Augmentez le seuil de yaw / pitch / roll dans le panneau **Sensitivity**\n- Augmentez `Stable frames` de 5 à 8-10\n- Assurez-vous que la zone morte est configurée (yaw 0,05, pitch 0,05, roll 0,08)\n- Vérifiez que personne d'autre n'est dans le cadre (plusieurs visages peuvent causer de l'instabilité)\n\n### Latence de détection\n\n- Fermez les applications gourmandes (jeux, montage vidéo)\n- Vérifiez que vous utilisez le GPU dédié si vous en avez un (et non le GPU intégré)\n- Réduisez la résolution de la caméra si elle est en 4K (1080p est optimal pour la détection)\n\n### OBS ne réagit pas alors qu'EsperantAI indique « Scene changed »\n\n- Vérifiez que le nom de la scène dans la liste déroulante correspond EXACTEMENT à celui dans OBS (sensible à la casse)\n- Vérifiez que la scène ne se trouve pas dans une autre Collection de scènes\n- Consultez le panneau **Trigger History** — s'il affiche ✗ rouge, il y a une erreur spécifique\n\n### Erreur « OBS unreachable — Connect manually »\n\n- Vérifiez qu'OBS est ouvert\n- Vérifiez que le WebSocket est activé dans OBS\n- Si vous avez défini un mot de passe dans OBS, il doit correspondre exactement\n- Certains antivirus bloquent le port 4455 — ajoutez une exception\n\n---\n\n## Confidentialité\n\n### Ce qu'EsperantAI NE fait PAS\n\n- ❌ N'envoie PAS votre vidéo vers un serveur\n- ❌ Ne stocke PAS votre vidéo ou des captures\n- ❌ Ne collecte PAS d'informations biométriques à distance\n- ❌ Ne partage PAS de données avec des annonceurs ou des tiers\n\n### Ce qu'IL traite\n\n- ✅ Détection faciale locale dans votre navigateur (Human.js + WebGL)\n- ✅ Connexions locales à votre OBS / Streamlabs / vMix (loopback 127.0.0.1)\n- ✅ Validation périodique de la clé de licence (tous les 7 jours)\n- ✅ Si vous connectez Twitch/YouTube/Kick : jetons OAuth dans sessionStorage (supprimés à la fermeture du navigateur)\n\nDétails complets dans `docs/PRIVACY.html`.\n\n---\n\n## Support\n\n- 📧 E-mail : **support@edugame.digital**\n- 🌐 Web : https://esperantai.com\n- 📚 Documentation technique : https://github.com/salazarjoelo/EsperantAI\n\nDélais de réponse :\n- Questions générales : 24 à 72 heures\n- Bugs techniques : 1 à 3 jours ouvrés\n\n---\n\n*Dernière mise à jour : 2026-05-14. Version : 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'de-DE': { name: 'Deutsch', flag: '🇩🇪', content: "# EsperantAI — Benutzerhandbuch\n\n> **Ehrliche Gesten.** Steuern Sie Ihre Streaming-Software mit Gesicht und Händen. Kein Stream Deck. Keine zusätzliche Hardware.\n\n**Version**: 3.0 · **Sprache**: Deutsch (Übersetzungen in 12 weiteren Sprachen verfügbar)\n\n---\n\n## Inhaltsverzeichnis\n\n1. [Was ist EsperantAI?](#was-ist-esperantai)\n2. [Mindestanforderungen](#mindestanforderungen)\n3. [Kauf und Aktivierung](#kauf-und-aktivierung)\n4. [Erste Schritte](#erste-schritte)\n5. [Streaming-Software verbinden](#streaming-software-verbinden)\n6. [Gesten und Szenen konfigurieren](#gesten-und-szenen-konfigurieren)\n7. [Gestenkategorien](#gestenkategorien)\n8. [Streaming-Plattformen verbinden](#streaming-plattformen-verbinden)\n9. [Event + Geste Kombinationen (Fortgeschritten)](#event--geste-kombinationen-fortgeschritten)\n10. [Empfindlichkeit und Totzone](#empfindlichkeit-und-totzone)\n11. [Tastaturkürzel](#tastaturkürzel)\n12. [Trigger-Verlauf](#trigger-verlauf)\n13. [Sprache ändern](#sprache-ändern)\n14. [Lizenz verwalten](#lizenz-verwalten)\n15. [Fehlerbehebung](#fehlerbehebung)\n16. [Datenschutz](#datenschutz)\n17. [Support](#support)\n\n---\n\n## Was ist EsperantAI?\n\nEsperantAI ist eine **Webanwendung**, die künstliche Intelligenz einsetzt, um Ihre Gesichtsausdrücke und Handgesten in Echtzeit zu erkennen und in Befehle für Ihre Streaming-Software umzusetzt. Kompatibel mit:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (Beta)\n\nUnd empfängt Events von Plattformen wie:\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements** (plattformübergreifende Brücke)\n\n### Warum „ehrliche Gesten\"?\n\nGrundlegende Gesichtsausdrücke und Kopfdrehungen sind **in allen menschlichen Kulturen universell** (Paul Ekman, 1972). Sie lügen nicht, sie variieren nicht je nach geografischer Herkunft. EsperantAI nennt diese „🌐 Universelle\" Gesten und unterscheidet sie von „⚠️ Kulturellen\" Gesten (Handzeichen), deren Bedeutung je nach Land variieren kann.\n\nSie entscheiden, welche Gesten Sie basierend auf Ihrem Publikum verwenden möchten.\n\n---\n\n## Mindestanforderungen\n\n### Hardware\n\n- **Beliebige USB-Webcam** (Empfehlung: 1080p oder höher)\n- **CPU**: jeder Prozessor mit 4+ Kernen aus den letzten 5 Jahren\n- **RAM**: 8 GB Minimum. 16 GB empfohlen, wenn Sie gleichzeitig streamen.\n- **GPU**: jede mit WebGL-Unterstützung (selbst moderne integrierte GPUs funktionieren)\n\n### Software\n\n- **Betriebssystem**: Windows 10/11, macOS 12+ oder Linux mit aktuellem Kernel\n- **Browser**: Chrome 90+, Edge 90+ oder Firefox 100+\n- **Streaming-Software** (mindestens eine): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Internet\n\n- Erforderlich zur **Aktivierung Ihrer Lizenz** und alle **7 Tage** zur Revalidierung\n- Funktioniert **bis zu 7 Tage offline** (Karenzzeit)\n\n---\n\n## Kauf und Aktivierung\n\n1. Besuchen Sie **https://esperantai.com**\n2. Klicken Sie auf **„Buy License\"**\n3. Schließen Sie die Zahlung über LemonSqueezy ab (Karte, PayPal usw.)\n4. Sie erhalten eine E-Mail mit:\n   - Ihrem **Lizenzschlüssel** (Format: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Einem Link zur Nutzung von EsperantAI\n5. Öffnen Sie EsperantAI in Ihrem Browser\n6. Der Aktivierungsbildschirm erscheint. Fügen Sie Ihren Lizenzschlüssel ein\n7. Klicken Sie auf **„Activate License\"**\n8. Fertig! 🎉\n\n### Wie viele Geräte?\n\nEine Lizenz kann auf **bis zu 3 Geräten** aktiviert werden. So übertragen Sie Ihre Lizenz auf ein anderes Gerät:\n\n1. Auf dem alten Gerät: Panel **Advanced** → **License** → **Deactivate on this device**\n2. Auf dem neuen Gerät: normal aktivieren\n\n---\n\n## Erste Schritte\n\n### Schritt 1: Kamerazugriff erlauben\n\nWenn Sie EsperantAI zum ersten Mal öffnen, fragt Ihr Browser um die Erlaubnis zur Kameranutzung. **Erlauben Sie den Zugriff**.\n\n> Wichtig: EsperantAI sendet Ihr Videobild niemals an einen Server. Die Verarbeitung erfolgt zu 100 % lokal auf Ihrem Computer.\n\n### Schritt 2: Kamera auswählen\n\nWenn Sie mehr als eine Kamera haben, wählen Sie im Dropdown-Menü die gewünschte Kamera aus.\n\n### Schritt 3: Erkennung überprüfen\n\nSie sehen Ihr Gesicht im linken Panel. Sobald EsperantAI Ihr Gesicht erkennt, beginnen die Yaw-/Pitch-/Roll-Anzeigen, Werte anzuzeigen.\n\n### Schritt 4: Kalibrierungsassistent (Pro+)\n\nWenn Sie über eine Pro- oder Pro+-Lizenz verfügen, startet der **Kalibrierungsassistent** automatisch bei der ersten Verwendung. Er misst Ihren natürlichen Bewegungsradius und legt die optimale Empfindlichkeit fest. Sie können ihn jederzeit über die Schaltfläche **Recalibrate** erneut starten.\n\n---\n\n## Streaming-Software verbinden\n\n### OBS Studio\n\n1. In OBS: **Tools → WebSocket Server Settings**\n2. Aktivieren Sie WebSocket. Notieren Sie sich das Passwort, falls Sie eines vergeben haben.\n3. In EsperantAI: Panel **Connection**\n4. Streaming-Software: **OBS Studio**\n5. WebSocket-URL: `ws://127.0.0.1:4455` (Standard)\n6. Passwort: das in OBS vergebene Passwort\n7. Klicken Sie auf **Connect**\n\n### Streamlabs Desktop\n\n1. In Streamlabs: **Settings → Remote Control**\n2. Aktivieren Sie Remote Control\n3. Notieren Sie sich den API Token\n4. In EsperantAI: Streaming-Software: **Streamlabs Desktop**\n5. API Token: einfügen\n6. Port: `59650` (Standard)\n7. Klicken Sie auf **Connect**\n\n### vMix\n\n1. In vMix: **Settings → Web Controller**\n2. Aktivieren Sie den Web Controller. Standard-Port: 8088.\n3. In EsperantAI: Streaming-Software: **vMix**\n4. Host: `127.0.0.1`\n5. Port: `8088`\n6. Klicken Sie auf **Connect**\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5+ erfordert die manuelle Installation des obs-websocket-Plugins\n2. Laden Sie `obs-websocket` aus dem [OBS-Forum](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/) herunter\n3. Kopieren Sie es in den Plugin-Ordner von PRISM\n4. Starten Sie PRISM neu\n5. Aktivieren Sie WebSocket unter **Tools → WebSocket Server Settings**\n6. In EsperantAI: Streaming-Software: **PRISM Live Studio** (funktioniert wie OBS)\n\n### XSplit Broadcaster (Beta)\n\n1. Installieren Sie die Erweiterung „Remote xjs\" in XSplit (Settings → Extensions)\n2. Aktivieren Sie Remote in den Einstellungen\n3. In EsperantAI: Streaming-Software: **XSplit**\n4. Remote-xjs-Proxy-URL: `ws://127.0.0.1:5555/xjs` (Standard)\n5. Klicken Sie auf **Connect**\n\n> XSplit befindet sich in der **Beta-Phase**. Erweiterte Funktionen können eingeschränkt sein.\n\n---\n\n## Gesten und Szenen konfigurieren\n\nSobald die Verbindung hergestellt ist, werden die tatsächlichen Szenen Ihrer Software automatisch in den Dropdown-Menüs des Panels **Triggers** angezeigt.\n\n### Grundlegende Zuordnung\n\n1. Wählen Sie für jede Geste (z. B. „Look Left\") eine Szene aus dem Dropdown-Menü\n2. Wenn Sie die Geste ausführen und etwa 150 ms stabil halten, wechselt EsperantAI zu dieser Szene in Ihrer Streaming-Software\n3. Der Wechsel erfolgt automatisch und nahezu augenblicklich\n\n### Mehrfachaktion (Pro+)\n\nMit einer Pro- oder Pro+-Lizenz kann eine einzige Geste **mehrere Aktionen** gleichzeitig auslösen:\n- Szene wechseln + Ton abspielen + Overlay einblenden + Chat-Nachricht senden\n\n### Kategorien aktivieren / deaktivieren\n\nJede Kategorie hat ein eigenes Kontrollkästchen „Enable\":\n\n- 🧠 **Kopfdrehung** (universell — standardmäßig aktiviert)\n- 📏 **Gesichtsdistanz** (näher/weiter bewegen)\n- 👁️ **Blickrichtung** (nur die Augen bewegen)\n- 😀 **Emotionen** (Lächeln, Überraschung, Wut, neutral)\n- 👁️‍🗨️ **Doppelblinzeln**\n- ✋ **Handgesten** (kulturell — standardmäßig deaktiviert)\n\nDeaktivieren Sie Kategorien, die Sie nicht benötigen, um CPU-Ressourcen zu sparen.\n\n---\n\n## Gestenkategorien\n\n### 🌐 Universell (gleiche Bedeutung in jeder Kultur)\n\n| Geste | Achse | Wie aktivieren |\n|---|---|---|\n| Mitte | — | Geradeaus schauen, Gesicht stabil |\n| Nach links schauen | negativer Yaw | Kopf nach links drehen |\n| Nach rechts schauen | positiver Yaw | Kopf nach rechts drehen |\n| Nach oben schauen | negativer Pitch | Gesicht heben |\n| Nach unten schauen | positiver Pitch | Gesicht senken |\n| Nach links neigen | negativer Roll | Kopf zur linken Schulter neigen |\n| Nach rechts neigen | positiver Roll | Kopf zur rechten Schulter neigen |\n| Näherkommen | Distanz | Gesicht näher an die Kamera bewegen |\n| Entfernen | Distanz | Gesicht von der Kamera weg bewegen |\n| Blickrichtung | Blick | Nur die Augen bewegen (Kopf zentriert) |\n| Lächeln | Emotion=glücklich | Deutlich lächeln |\n| Überrascht | Emotion=überrascht | Überrascht schauen |\n| Wütend | Emotion=wütend | Wütend schauen |\n| Neutral | Emotion=neutral | Entspanntes Gesicht |\n| Doppelblinzeln | Blinzeln | Beide Augen zweimal schnell schließen (< 700 ms) |\n\n### ⚠️ Kulturell (Bedeutung variiert je nach Land)\n\n| Geste | Westliche Bedeutung | Vorsicht in anderen Kulturen |\n|---|---|---|\n| 👍 Daumen hoch | Zustimmung | Naher Osten / Westasien: kann beleidigend sein |\n| ✌️ Friedenszeichen | Frieden / Sieg | UK / Irland / Australien (Handfläche nach innen): Beleidigung |\n| 🤘 Metalhörner | Rock/Metal | Italien (Handfläche nach unten): „Cornuto\" (Beleidigung) |\n| 👌 OK | OK / perfekt | Brasilien / Türkei / Deutschland: kann beleidigend sein |\n| ✊ Geschlossene Faust | Variiert je nach politischem Kontext | — |\n| 🖐️ Offene Handfläche | „Stopp\" oder Begrüßung | Griechenland (Mountza auf jemanden gerichtet): schwere Beleidigung |\n| ☝️ Zeigen | Hinweisen | Asien: Mit dem Finger zu deuten ist unhöflich |\n\nEsperantAI markiert jede Geste in der Benutzeroberfläche mit dem entsprechenden Badge. Wählen Sie basierend auf Ihrem weltweiten Publikum, welche Sie verwenden möchten.\n\n### 🙏 Gassho (合掌)\n\nEine besondere Geste: pressen Sie beide Handflächen vor Ihrer Brust zusammen (wie bei einem Gebet oder einer Verbeugung). In ostasiatischen Kulturen verbreitet als Zeichen des Respekts oder der Dankbarkeit. Wird mit hoher Zuverlässigkeit anhand von 6 Landmark-Prüfungen erkannt.\n\n---\n\n## Streaming-Plattformen verbinden\n\nDamit EsperantAI Events empfangen kann (Spenden, Abos, Raids), verbinden Sie die Plattformen, auf denen Sie streamen.\n\n### Twitch\n\n1. Erstellen Sie eine Client ID auf https://dev.twitch.tv/console\n2. Registrieren Sie die Redirect-URI: `https://esperantai.com/oauth-callback.html` (oder Ihre lokale URL)\n3. In EsperantAI: Panel **Platform Events** → **Twitch EventSub**\n4. Fügen Sie Ihre Client ID ein\n5. Klicken Sie auf **Connect**\n6. Ein Twitch-Autorisierungsfenster wird geöffnet. Akzeptieren Sie die Berechtigungen.\n7. Das Fenster schließt sich und Sie sehen „Twitch Connected\"\n\n### YouTube Live\n\n1. Erstellen Sie Anmeldeinformationen auf https://console.cloud.google.com\n2. Aktivieren Sie die YouTube Data API v3\n3. Erstellen Sie eine OAuth Client ID (Typ: Web Application)\n4. Registrieren Sie dieselbe Redirect-URI wie bei Twitch\n5. In EsperantAI: Panel **Platform Events** → **YouTube Live**\n6. Fügen Sie Ihre Client ID ein und klicken Sie auf **Connect**\n\n### Kick\n\n1. Erstellen Sie eine App auf https://kick.com/settings/developer\n2. Registrieren Sie die Redirect-URI\n3. In EsperantAI: Panel **Platform Events** → **Kick**\n4. Fügen Sie Ihre Client ID ein und klicken Sie auf **Connect**\n5. Kick verwendet OAuth 2.1 mit PKCE (sicherer)\n\n### StreamElements (plattformübergreifende Brücke)\n\nWenn Sie bereits ein StreamElements-Konto haben, können Sie Twitch + YouTube + Facebook mit einem einzigen Token vereinen:\n\n1. Gehen Sie zu https://streamelements.com/dashboard/account/channels\n2. Kopieren Sie Ihr JWT Token\n3. In EsperantAI: Panel **Platform Events** → **StreamElements**\n4. Fügen Sie das JWT ein und klicken Sie auf **Connect**\n\n---\n\n## Event + Geste Kombinationen (Fortgeschritten)\n\nDas ist die Magie von EsperantAI: **Plattform-Events** mit **Ihren Gesten** als Bestätigung kombinieren.\n\n### Beispiel: Spenden mit Daumen hoch danken\n\n1. Panel **Event Triggers** → Zeile „💰 Donation\"\n2. ✅ Aktivieren\n3. Szene: `Thank_You_Scene`\n4. Erforderliche Geste: `👍 Thumbs up`\n\n**Ablauf live**:\n- Eine Spende geht ein → EsperantAI zeigt „Waiting for gesture...\"\n- Sie haben 5 Sekunden Zeit, 👍 zu zeigen\n- Wenn Sie es tun → Wechsel zu `Thank_You_Scene` + Ausführung aller weiteren konfigurierten Aktionen\n- Wenn nicht → wird automatisch verworfen\n\n### Ohne erforderliche Geste (automatischer Trigger)\n\nWenn Sie „Required gesture\" auf `— none —` belassen, löst das Event die Aktion sofort aus.\n\nNützlich für:\n- Automatischen Wechsel zur Feierszene bei eintreffenden Raids\n- Automatisches Einblenden eines Overlays, wenn jemand ein Abo abschließt\n\n---\n\n## Empfindlichkeit und Totzone\n\n### Empfindlichkeit\n\nSchwellenwerte steuern, wie ausgeprägt eine Geste sein muss, um auszulösen:\n\n- **Yaw**: wie weit der Kopf zur Seite gedreht wird (Standard: 0,15 rad ≈ 8,6°)\n- **Pitch auf/ab**: vertikale Neigung\n- **Roll**: seitliche Neigung\n\nErhöhen Sie die Werte für ausdrucksstärkere Gesten. Verringern Sie sie für höhere Empfindlichkeit.\n\n### Totzone (Anti-Ermüdung)\n\nWenn Sie fast zentriert sind (Yaw < 0,05, Pitch < 0,05, Roll < 0,08), wird **NICHTS ausgelöst**. So können Sie sich natürlich bewegen, ohne dass Mikrobewegungen Trigger aktivieren.\n\n### Stabile Frames\n\n`Stable frames` = wie viele aufeinanderfolgende Frames die Geste gehalten werden muss, bevor sie auslöst. Standard: 5 Frames (~150 ms bei 30 fps).\n\nErhöhen, wenn Trigger zu leicht auslösen. Verringern für schnellere Reaktion.\n\n### Abklingzeit\n\n`Cooldown (ms)` = Mindestzeit zwischen Szenenwechseln. Standard: 500 ms.\n\nVerhindert, dass der Szenenwechsler „zappelt\", wenn Sie schnell hin- und herwechseln.\n\n---\n\n## Tastaturkürzel\n\n| Taste | Aktion |\n|---|---|\n| `Leertaste` | Erkennung pausieren / fortsetzen |\n| `C` | Manuell zur CENTER-Szene wechseln |\n| `R` | Szenenliste aus der Software neu laden |\n| `Esc` | Verbindung trennen |\n\n---\n\n## Trigger-Verlauf\n\nDas Panel **Advanced → Trigger History** zeigt die letzten 50 ausgelösten Aktionen:\n\n- ✓ grün = erfolgreich\n- ✗ rot = fehlgeschlagen\n- · grau = ausstehend\n\nNützlich, um nachzuvollziehen, was ausgelöst wurde, ohne die DevTools zu öffnen.\n\n**Export CSV**: Verlauf für Offline-Analyse herunterladen.\n\n**Clear**: Verlauf löschen (hat keine Auswirkungen auf andere Einstellungen).\n\n---\n\n## Sprache ändern\n\nEsperantAI erkennt automatisch die Sprache Ihres Betriebssystems. So ändern Sie sie manuell:\n\n- Obere rechte Ecke: Sprach-Dropdown\n- Wählen Sie Ihre bevorzugte Sprache\n- Die Benutzeroberfläche wird sofort aktualisiert\n\nVerfügbare Sprachen:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n\nAlle 13 Sprachen sind vollständig übersetzt (323 Schlüssel je Sprache).\n\n---\n\n## Lizenz verwalten\n\nPanel **Advanced → License**:\n\n- **Status anzeigen**: Gültig / Ungültig\n- **Zugehörige Kunden-E-Mail anzeigen**\n- **Letzte Online-Validierung anzeigen**\n- **Deactivate on this device**: verwenden Sie dies vor einem PC-Wechsel oder um einen Platz freizugeben (von den 3 verfügbaren)\n\n### Erstattung\n\n\n\n---\n\n## Fehlerbehebung\n\n### „Activation required\" bleibt bestehen, nachdem ich meinen Lizenzschlüssel eingefügt habe\n\n- Überprüfen Sie, ob Sie den vollständigen Schlüssel kopiert haben (5 Gruppen zu je 4 Zeichen, getrennt durch Bindestriche)\n- Überprüfen Sie Ihre Internetverbindung (die Aktivierung erfordert beim ersten Mal eine Online-Validierung)\n- Wenn Sie bereits auf 3 Geräten aktiviert haben, deaktivieren Sie zuerst eines\n- Kontaktieren Sie support@edugame.digital, falls das Problem weiterhin besteht\n\n### „Searching for face...\" bleibt bestehen, obwohl mein Gesicht sichtbar ist\n\n- Verbessern Sie die Beleuchtung: Ihr Gesicht sollte gut ausgeleuchtet sein\n- Nähern Sie sich der Kamera (40–80 cm sind optimal)\n- Schließen Sie andere Tabs, die die GPU nutzen (Chrome kann die GPU begrenzen, wenn zu viele Tabs geöffnet sind)\n- Wenn Chromes Memory Saver aktiv ist, deaktivieren Sie ihn für diesen Tab\n\n### Szenen erscheinen nicht in den Dropdown-Menüs\n\n- Überprüfen Sie, ob die Verbindung zur Streaming-Software besteht (grünes Badge „Connected\")\n- Drücken Sie `R`, um die Szenenliste neu zu laden\n- Wenn weiterhin leer, Verbindung trennen und erneut herstellen\n\n### Szenenwechsel werden ausgelöst, ohne dass ich Gesten mache\n\n- Erhöhen Sie den Yaw-/Pitch-/Roll-Schwellenwert im Panel **Sensitivity**\n- Erhöhen Sie `Stable frames` von 5 auf 8–10\n- Stellen Sie sicher, dass die Totzone konfiguriert ist (Yaw 0,05, Pitch 0,05, Roll 0,08)\n- Prüfen Sie, ob keine andere Person im Bild ist (mehrere Gesichter können Instabilität verursachen)\n\n### Erkennungsverzögerung\n\n- Schließen Sie ressourcenintensive Anwendungen (Spiele, Videoschnitt)\n- Überprüfen Sie, ob Sie die dedizierte GPU verwenden, falls vorhanden (nicht die integrierte)\n- Reduzieren Sie die Kameraauflösung, falls sie 4K beträgt (1080p ist optimal für die Erkennung)\n\n### OBS reagiert nicht, obwohl EsperantAI „Scene changed\" anzeigt\n\n- Überprüfen Sie, ob der Szenenname im Dropdown exakt mit dem in OBS übereinstimmt (Groß-/Kleinschreibung beachten)\n- Stellen Sie sicher, dass die Szene nicht in einer anderen Szenensammlung liegt\n- Prüfen Sie das Panel **Trigger History** — wenn ✗ rot angezeigt wird, liegt ein spezifischer Fehler vor\n\n### Fehler „OBS unreachable — Connect manually\"\n\n- Überprüfen Sie, ob OBS geöffnet ist\n- Überprüfen Sie, ob WebSocket in OBS aktiviert ist\n- Falls Sie in OBS ein Passwort vergeben haben, muss es exakt übereinstimmen\n- Manche Antivirenprogramme blockieren Port 4455 — fügen Sie eine Ausnahme hinzu\n\n---\n\n## Datenschutz\n\n### Was EsperantAI NICHT tut\n\n- ❌ Sendet Ihr Videobild NICHT an einen Server\n- ❌ Speichert Ihr Video oder Aufnahmen NICHT\n- ❌ Erhebt KEINE biometrischen Informationen remote\n- ❌ Teilt KEINE Daten mit Werbetreibenden oder Dritten\n\n### Was ES verarbeitet\n\n- ✅ Lokale Gesichtserkennung in Ihrem Browser (Human.js + WebGL)\n- ✅ Lokale Verbindungen zu OBS / Streamlabs / vMix (Loopback 127.0.0.1)\n- ✅ Periodische Lizenzschlüssel-Validierung (alle 7 Tage)\n- ✅ Wenn Sie Twitch/YouTube/Kick verbinden: OAuth-Token im sessionStorage (werden beim Schließen des Browsers gelöscht)\n\nVollständige Details in `docs/PRIVACY.html`.\n\n---\n\n## Support\n\n- 📧 E-Mail: **support@edugame.digital**\n- 🌐 Web: https://esperantai.com\n- 📚 Technische Dokumentation: https://github.com/salazarjoelo/EsperantAI\n\nReaktionszeiten:\n- Allgemeine Fragen: 24–72 Stunden\n- Technische Fehler: 1–3 Werktage\n- Erstattungsanfragen: 1–2 Werktage\n\n---\n\n*Letzte Aktualisierung: 2026-05-14. Version: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'it-IT': { name: 'Italiano', flag: '🇮🇹', content: "# EsperantAI — Manuale utente\n\n> **Gesti onesti.** Controlla il tuo software di streaming con il viso e le mani. Niente Stream Deck. Niente hardware extra.\n\n**Versione**: 3.0 · **Lingua**: Italiano (traduzioni disponibili in altre 12 lingue)\n\n---\n\n## Indice\n\n1. [Cos'è EsperantAI?](#cosè-esperantai)\n2. [Requisiti minimi](#requisiti-minimi)\n3. [Acquisto e attivazione](#acquisto-e-attivazione)\n4. [Primo utilizzo](#primo-utilizzo)\n5. [Connetti il tuo software di streaming](#connetti-il-tuo-software-di-streaming)\n6. [Configura gesti e scene](#configura-gesti-e-scene)\n7. [Categorie di gesti](#categorie-di-gesti)\n8. [Connetti le piattaforme di streaming](#connetti-le-piattaforme-di-streaming)\n9. [Combo evento + gesto (Avanzato)](#combo-evento--gesto-avanzato)\n10. [Sensibilità e zona morta](#sensibilità-e-zona-morta)\n11. [Scorciatoie da tastiera](#scorciatoie-da-tastiera)\n12. [Cronologia trigger](#cronologia-trigger)\n13. [Cambia lingua](#cambia-lingua)\n14. [Gestisci la tua licenza](#gestisci-la-tua-licenza)\n15. [Risoluzione dei problemi](#risoluzione-dei-problemi)\n16. [Privacy](#privacy)\n17. [Supporto](#supporto)\n\n---\n\n## Cos'è EsperantAI?\n\nEsperantAI è un'**app web** che usa l'intelligenza artificiale per rilevare in tempo reale i gesti del tuo viso e delle tue mani, e li traduce in comandi per il tuo software di streaming. Funziona con:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (beta)\n\nE riceve eventi da piattaforme come:\n\n- **Twitch**\n- **YouTube Live**\n- **Kick**\n- **Trovo**\n- **StreamElements** (ponte multi-piattaforma)\n\n### Perché «gesti onesti»?\n\nLe espressioni facciali di base e la rotazione della testa sono **universali in tutte le culture umane** (Paul Ekman, 1972). Non mentono, non variano per geografia. EsperantAI chiama questi gesti «🌐 Universali» e li distingue dai gesti «⚠️ Culturali» (segni con le mani), il cui significato può variare a seconda del Paese.\n\nSei tu a decidere quali gesti usare in base al tuo pubblico.\n\n---\n\n## Requisiti minimi\n\n### Hardware\n\n- **Qualsiasi webcam USB** (consigliata: 1080p o superiore)\n- **CPU**: qualsiasi processore a 4+ core degli ultimi 5 anni\n- **RAM**: 8 GB minimi. 16 GB consigliati se fai streaming contemporaneamente.\n- **GPU**: qualsiasi con supporto WebGL (funzionano anche le GPU integrate moderne)\n\n### Software\n\n- **OS**: Windows 10/11, macOS 12+ o Linux con kernel recente\n- **Browser**: Chrome 90+, Edge 90+ o Firefox 100+\n- **Software di streaming** (almeno uno): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Internet\n\n- Necessario per **attivare la licenza** e ogni **7 giorni** per la rivalidazione\n- Funziona **fino a 7 giorni offline** (periodo di grazia)\n\n---\n\n## Acquisto e attivazione\n\n1. Visita **https://esperantai.com**\n2. Clicca **«Buy License»**\n3. Completa il pagamento tramite LemonSqueezy (carta, PayPal, ecc.)\n4. Riceverai un'email con:\n   - La tua **chiave di licenza** (formato: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Il link per usare EsperantAI\n5. Apri EsperantAI nel browser\n6. Apparirà la schermata di attivazione. Incolla la tua chiave di licenza\n7. Clicca **«Activate License»**\n8. Fatto! 🎉\n\n### Quanti dispositivi?\n\nUna licenza può essere attivata su **fino a 3 dispositivi**. Per spostare la licenza su un altro dispositivo:\n\n1. Sul vecchio dispositivo: pannello **Advanced** → **License** → **Deactivate on this device**\n2. Sul nuovo dispositivo: attiva normalmente\n\n---\n\n## Primo utilizzo\n\n### Passo 1: Consenti l'accesso alla fotocamera\n\nQuando apri EsperantAI per la prima volta, il browser ti chiederà il permesso di usare la fotocamera. **Accettalo**.\n\n> Importante: EsperantAI non invia mai il tuo video a nessun server. L'elaborazione avviene al 100% in locale sul tuo computer.\n\n### Passo 2: Seleziona la fotocamera\n\nSe hai più di una fotocamera, scegli quale usare dal menu a tendina.\n\n### Passo 3: Verifica il rilevamento\n\nVedrai il tuo viso nel pannello di sinistra. Quando EsperantAI rileva il tuo viso, gli indicatori Yaw / Pitch / Roll inizieranno a mostrare dei valori.\n\n### Passo 4: Procedura guidata di calibrazione (Pro+)\n\nSe hai una licenza Pro o Pro+, la **Procedura guidata di calibrazione** si avvia automaticamente al primo utilizzo. Misura il tuo range naturale di movimento e imposta la sensibilità ottimale. Puoi riavviarla in qualsiasi momento con il pulsante **Recalibrate**.\n\n---\n\n## Connetti il tuo software di streaming\n\n### OBS Studio\n\n1. In OBS: **Tools → WebSocket Server Settings**\n2. Abilita WebSocket. Annota la password se ne hai impostata una.\n3. In EsperantAI: pannello **Connection**\n4. Software di streaming: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (predefinito)\n6. Password: quella impostata in OBS\n7. Clicca **Connect**\n\n### Streamlabs Desktop\n\n1. In Streamlabs: **Settings → Remote Control**\n2. Abilita Remote Control\n3. Annota l'API Token\n4. In EsperantAI: software di streaming: **Streamlabs Desktop**\n5. API Token: incollalo\n6. Porta: `59650` (predefinita)\n7. Clicca **Connect**\n\n### vMix\n\n1. In vMix: **Settings → Web Controller**\n2. Abilita Web Controller. Porta predefinita: 8088.\n3. In EsperantAI: software di streaming: **vMix**\n4. Host: `127.0.0.1`\n5. Porta: `8088`\n6. Clicca **Connect**\n\n### PRISM Live Studio\n\n1. PRISM Live Studio v4.0.5+ richiede l'installazione manuale del plugin obs-websocket\n2. Scarica `obs-websocket` dal [forum di OBS](https://obsproject.com/forum/resources/obs-websocket-remote-control-of-obs-studio-made-easy.466/)\n3. Copialo nella cartella plugin di PRISM\n4. Riavvia PRISM\n5. Abilita WebSocket in **Tools → WebSocket Server Settings**\n6. In EsperantAI: software di streaming: **PRISM Live Studio** (funziona come OBS)\n\n### XSplit Broadcaster (beta)\n\n1. Installa l'estensione «Remote xjs» in XSplit (Settings → Extensions)\n2. Abilita Remote nelle preferenze\n3. In EsperantAI: software di streaming: **XSplit**\n4. Remote xjs Proxy URL: `ws://127.0.0.1:5555/xjs` (predefinito)\n5. Clicca **Connect**\n\n> XSplit è in **beta**. Le funzionalità avanzate potrebbero essere limitate.\n\n---\n\n## Configura gesti e scene\n\nUna volta connesso, le scene effettive del tuo software appariranno automaticamente nei menu a tendina del pannello **Triggers**.\n\n### Mappatura base\n\n1. Per ogni gesto (es. «Look Left»), scegli una scena dal menu a tendina\n2. Quando fai quel gesto e lo mantieni stabile per ~150 ms, EsperantAI cambierà la scena nel tuo software di streaming\n3. Il cambio è automatico e quasi istantaneo\n\n### Multi-azione (Pro+)\n\nCon una licenza Pro o Pro+, un singolo gesto può attivare **più azioni** contemporaneamente:\n- Cambiare scena + riprodurre un suono + mostrare un overlay + inviare un messaggio in chat\n\n### Abilita / disabilita categorie\n\nOgni categoria ha la sua casella di spunta «Enable»:\n\n- 🧠 **Rotazione della testa** (universale — abilitata per impostazione predefinita)\n- 📏 **Distanza del viso** (avvicinarsi/allontanarsi)\n- 👁️ **Sguardo** (muovere solo gli occhi)\n- 😀 **Emozioni** (sorriso, sorpresa, rabbia, neutro)\n- 👁️‍🗨️ **Doppio battito di ciglia**\n- ✋ **Gesti con le mani** (culturali — disabilitati per impostazione predefinita)\n\nDisabilita le categorie che non ti servono per risparmiare CPU.\n\n---\n\n## Categorie di gesti\n\n### 🌐 Universali (stesso significato in ogni cultura)\n\n| Gesto | Asse | Come attivarlo |\n|---|---|---|\n| Centro | — | Guardare dritto, viso stabile |\n| Guarda a sinistra | yaw negativo | Girare la testa a sinistra |\n| Guarda a destra | yaw positivo | Girare la testa a destra |\n| Guarda in su | pitch negativo | Alzare il viso |\n| Guarda in giù | pitch positivo | Abbassare il viso |\n| Inclina a sinistra | roll negativo | Inclinare la testa verso la spalla sinistra |\n| Inclina a destra | roll pos
