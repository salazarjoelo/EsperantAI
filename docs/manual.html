 **متقدم ← سجل المشغّلات** آخر 50 إجراءً مُنشَطاً:\n\n- ✓ أخضر = ناجح\n- ✗ أحمر = فاشل\n- · رمادي = قيد الانتظار\n\nمفيد لمراجعة ما نشّط المشغّلات دون فتح DevTools.\n\n**تصدير CSV**: تنزيل السجل للتحليل دون اتصال.\n\n**مسح**: حذف السجل (لا يؤثر على شيء آخر).\n\n---\n\n## تغيير اللغة\n\nيكتشف EsperantAI تلقائياً لغة نظام التشغيل لديك. لتغييرها يدوياً:\n\n- في الزاوية العلوية اليمنى: القائمة المنسدلة للغات\n- اختر لغتك المفضلة\n- تتحدّث الواجهة فوراً\n\nاللغات المتاحة:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\nاللغات الخمس عشرة مترجمة في ملفات الواجهة الحالية.\n\n---\n\n## إدارة الترخيص\n\nلوحة **متقدم ← الترخيص**:\n\n- **عرض الحالة**: صالح / غير صالح\n- **عرض البريد الإلكتروني للعميل المرتبط**\n- **عرض آخر تحقق عبر الإنترنت**\n- **إلغاء التفعيل على هذا الجهاز**: استخدمها قبل تغيير الحاسوب أو لتحرير خانة (من الخانات الثلاث المتاحة)\n\n---\n\n## استكشاف الأخطاء وإصلاحها\n\n### «التفعيل مطلوب» تستمر بعد لصق مفتاح الترخيص\n\n- تحقّق من أنك نسخت المفتاح كاملاً (5 مجموعات من 4 أحرف مفصولة بشرطات)\n- تحقّق من اتصالك بالإنترنت (يتطلب التفعيل تحققاً عبر الإنترنت في المرة الأولى)\n- إذا فعّلت الترخيص على 3 أجهزة بالفعل، عطّل واحداً أولاً\n- تواصل مع soporte@edugame.digital إذا استمرت المشكلة\n\n### «جارٍ البحث عن وجه...» تستمر رغم أن وجهي مرئي\n\n- حسّن الإضاءة: يجب أن يكون وجهك مضاءً جيداً\n- اقترب من الكاميرا (40-80 سم هو النطاق الأمثل)\n- أغلق علامات التبويب الأخرى التي تستخدم GPU (قد يقيّد Chrome الـ GPU إذا كانت هناك علامات كثيرة مفتوحة)\n- إذا كان Memory Saver في Chrome مفعّلاً، عطّله لعلامة التبويب هذه\n\n### المشاهد لا تظهر في القوائم المنسدلة\n\n- تحقّق من أنك متصل ببرنامج البث (شارة خضراء «متصل»)\n- اضغط `R` لإعادة تحميل قائمة المشاهد\n- إذا بقيت فارغة، اقطع الاتصال وأعد الاتصال\n- في vMix، تأكد من أن Web Controller مفعّل ويمكن الوصول إليه من `http://127.0.0.1:8088/api/`\n- في PRISM، تأكد من أن إضافة obs-websocket مثبّتة ومفعّلة\n- في XSplit، تأكد من أن جسر XJS المحلي يعمل\n\n### تبدّل المشاهد يتم بدون تنفيذ إيماءات\n\n- زيّد عتبة yaw / pitch / roll في لوحة **الحساسية**\n- زيّد `الإطارات المستقرة` من 5 إلى 8-10\n- تأكّد من تهيئة المنطقة الميتة (yaw 0.05، pitch 0.05، roll 0.08)\n- تحقّق من عدم وجود شخص آخر في الإطار (الوجوه المتعددة قد تسبب عدم استقرار)\n\n### تأخير في الكشف\n\n- أغلق التطبيقات الثقيلة (الألعاب، تحرير الفيديو)\n- تحقّق من استخدام GPU المخصص إذا كان متاحاً (وليس المدمج)\n- خفّض دقة الكاميرا إذا كانت 4K (1080p هي الأمثل للكشف)\n\n### OBS لا يستجيب رغم أن EsperantAI يعرض «تم تغيير المشهد»\n\n- تحقّق من أن اسم المشهد في القائمة المنسدلة يطابق تماماً الاسم في OBS (حساس لحالة الأحرف)\n- تحقّق من أن المشهد ليس ضمن مجموعة مشاهد أخرى\n- تحقّق من لوحة **سجل المشغّلات** — إذا عُرض ✗ أحمر، فهناك خطأ محدد\n\n### خطأ «OBS غير متاح — اتصل يدوياً»\n\n- تحقّق من أن OBS مفتوح\n- تحقّق من أن WebSocket مفعّل في OBS\n- إذا عيّنت كلمة مرور في OBS، يجب أن تطابق تماماً\n- بعض برامج مكافحة الفيروسات تحظر المنفذ 4455 — أضف استثناءً\n\n### Twitch أو YouTube لا يتصلان\n\n- تأكد من أن redirect URI في لوحة المنصة يطابق تماماً عنوان `oauth-callback.html`\n- اسمح بالنوافذ المنبثقة للنطاق الذي تستخدم عليه EsperantAI\n- في Twitch، استخدم Client ID فقط؛ لا تلصق Client Secret\n- في YouTube، تأكد من تفعيل YouTube Data API v3 ومن وجود بث مباشر نشط\n\n### Kick لا يعرض كل الأحداث\n\nKick في وضع بيتا / محدود داخل المتصفح. أحداث Kick الكاملة تُستقبل رسمياً عبر webhooks؛ استخدم StreamElements أو backend خاصاً إذا كنت تحتاج اشتراكات أو هدايا أو غارات موثوقة.\n\n---\n\n## الخصوصية\n\n### ما لا يفعله EsperantAI\n\n- ❌ لا يرسل الفيديو الخاص بك إلى أي خادم\n- ❌ لا يحفظ الفيديو أو اللقطات الخاصة بك\n- ❌ لا يجمع معلومات بيومترية عن بُعد\n- ❌ لا يشارك البيانات مع المعلنين أو أطراف ثالثة\n\n### ما يعالجه\n\n- ✅ كشف الوجوه محلياً في متصفحك (Human.js + WebGL)\n- ✅ اتصالات محلية بـ OBS / Streamlabs / vMix / PRISM / XSplit (loopback `127.0.0.1`)\n- ✅ تحقق دوري من مفتاح الترخيص (كل 7 أيام)\n- ✅ إذا ربطت Twitch/YouTube/Kick/StreamElements: رموز المنصة في التخزين المحلي أو تخزين الجلسة في المتصفح\n\nالتفاصيل الكاملة في `docs/PRIVACY.html`.\n\n---\n\n## الدعم الفني\n\n- 📧 البريد الإلكتروني: **soporte@edugame.digital**\n- 🌐 الموقع: https://edugame.digital\n- 📚 التوثيق التقني: https://github.com/salazarjoelo/EsperantAI\n\nأوقات الاستجابة:\n- الاستفسارات العامة: 24-72 ساعة\n- الأخطاء التقنية: 1-3 أيام عمل\n\n---\n\n*آخر تحديث: 2026-05-20. الإصدار: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n\n</div>\n" },
  'pl-PL': { name: 'Polski', flag: '🇵🇱', content: "# EsperantAI — Instrukcja użytkownika\n\n> **Szczere gesty.** Steruj swoim oprogramowaniem do streamingu za pomocą twarzy i rąk, bez dodatkowego dedykowanego sprzętu.\n\n**Wersja**: 3.0 · **Język**: Polski (łącznie dostępnych jest 15 języków)\n\n**Walidacja techniczna**: sprawdzono z oficjalną dokumentacją dostępną na dzień **20 maja 2026** dla OBS Studio, Streamlabs Desktop, vMix, PRISM Live Studio, XSplit, Twitch, YouTube Live, Kick, Trovo i StreamElements. Szczegóły: [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md).\n\n---\n\n## Spis treści\n\n1. [Czym jest EsperantAI?](#czym-jest-esperantai)\n2. [Wymagania minimalne](#wymagania-minimalne)\n3. [Zakup i aktywacja](#zakup-i-aktywacja)\n4. [Pierwsze uruchomienie](#pierwsze-uruchomienie)\n5. [Połącz swoje oprogramowanie do streamingu](#połącz-swoje-oprogramowanie-do-streamingu)\n6. [Konfiguracja gestów i scen](#konfiguracja-gestów-i-scen)\n7. [Kategorie gestów](#kategorie-gestów)\n8. [Połącz platformy streamingowe](#połącz-platformy-streamingowe)\n9. [Kombinacje: zdarzenie + gest (Zaawansowane)](#kombinacje-zdarzenie--gest-zaawansowane)\n10. [Czułość i martwa strefa](#czułość-i-martwa-strefa)\n11. [Skróty klawiszowe](#skróty-klawiszowe)\n12. [Historia wyzwalaczy](#historia-wyzwalaczy)\n13. [Zmiana języka](#zmiana-języka)\n14. [Zarządzanie licencją](#zarządzanie-licencją)\n15. [Rozwiązywanie problemów](#rozwiązywanie-problemów)\n16. [Prywatność](#prywatność)\n17. [Pomoc techniczna](#pomoc-techniczna)\n\n---\n\n## Czym jest EsperantAI?\n\nEsperantAI to **aplikacja webowa**, która wykorzystuje sztuczną inteligencję do wykrywania w czasie rzeczywistym gestów twarzy i rąk oraz przekształcania ich w komendy dla twojego oprogramowania do streamingu. Obraz z kamery jest przetwarzany lokalnie w twojej przeglądarce.\n\n![Lokalny przepływ EsperantAI](assets/manual/01-esperantai-flow.svg)\n\nDziała z tymi programami do transmisji:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (beta)\n\nMoże też odbierać zdarzenia z platform i łączyć je z twoimi gestami:\n\n- **Twitch**: bezpośrednia obsługa przez EventSub WebSocket.\n- **YouTube Live**: bezpośrednia obsługa przez YouTube Data API v3; wymaga aktywnej transmisji na żywo i dostępnego limitu/kwoty API.\n- **Kick**: status beta/ograniczony w przeglądarce. Pełne zdarzenia Kick wymagają oficjalnego backendu z webhookami albo mostu.\n- **StreamElements**: most wieloplatformowy używający tokena/JWT twojego konta.\n- **Trovo**: adapter techniczny istnieje w kodzie, ale publiczny panel połączenia nie jest jeszcze widoczny w obecnym interfejsie.\n\n### Dlaczego „szczere gesty\"?\n\nPodstawowe wyrażenia twarzy i rotacja głowy są **uniwersalne we wszystkich kulturach ludzkich** (Paul Ekman, 1972). Nie kłamią, nie różnią się w zależności od kręgu geograficznego. EsperantAI nazywa te gesty „🌐 Uniwersalne\" i odróżnia je od gestów „⚠️ Kulturowych\" (znaki wykonywane rękami), których znaczenie może się różnić w zależności od kraju.\n\nTo ty decydujesz, których gestów używać, dostosowując się do swojej widowni.\n\n---\n\n## Wymagania minimalne\n\n### Sprzęt\n\n- **Dowolna kamera USB** (zalecana: 1080p lub wyższa)\n- **CPU**: dowolny 4-rdzeniowy procesor z ostatnich 5 lat\n- **RAM**: minimum 8 GB. Zalecane 16 GB przy jednoczesnym streamowaniu.\n- **GPU**: dowolny układ graficzny z obsługą WebGL (działają nawet nowoczesne układy zintegrowane)\n\n### Oprogramowanie\n\n- **OS**: Windows 10/11, macOS 12+ lub Linux z aktualnym jądrem\n- **Przeglądarka**: Chrome 90+, Edge 90+ lub Firefox 100+\n- **Oprogramowanie do streamingu** (przynajmniej jedno): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Internet\n\n- Wymagany do **aktywacji licencji** i co **7 dni** do ponownej walidacji\n- Działa **do 7 dni offline** (okres karencji)\n\n---\n\n## Zakup i aktywacja\n\n1. Wejdź na **https://edugame.digital**\n2. Kliknij **„Kup licencję”**\n3. Opłać zamówienie przez LemonSqueezy (karta, PayPal itp.)\n4. Otrzymasz e-mail z:\n   - Twoim **kluczem licencyjnym** (format: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Linkiem do korzystania z EsperantAI\n5. Otwórz EsperantAI w przeglądarce\n6. Pojawi się ekran aktywacji. Wklej swój klucz licencyjny\n7. Kliknij **„Aktywuj licencję”**\n8. Gotowe! 🎉\n\n### Ile urządzeń?\n\nJedna licencja może być aktywowana na **maksymalnie 3 urządzeniach**. Aby przenieść licencję na inne urządzenie:\n\n1. Na starym urządzeniu: panel **Zaawansowane** → **Licencja** → **Dezaktywuj na tym urządzeniu**\n2. Na nowym urządzeniu: aktywuj normalnie\n\n---\n\n## Pierwsze uruchomienie\n\n### Krok 1: Zezwól na dostęp do kamery\n\nGdy otworzysz EsperantAI po raz pierwszy, przeglądarka poprosi o zgodę na używanie kamery. **Zezwól**.\n\n> Ważne: EsperantAI nigdy nie wysyła twojego obrazu wideo na żaden serwer. Przetwarzanie odbywa się w 100% lokalnie na twoim komputerze.\n\n### Krok 2: Wybierz kamerę\n\nJeśli masz więcej niż jedną kamerę, wybierz, której użyć, z listy rozwijanej.\n\n### Krok 3: Sprawdź wykrywanie\n\nZobaczysz swoją twarz na lewym panelu. Gdy EsperantAI wykryje twoją twarz, wskaźniki Yaw / Pitch / Roll zaczną pokazywać wartości.\n\n### Krok 4: Kreator kalibracji (Pro+)\n\nJeśli masz licencję Pro lub Pro+, **Kreator kalibracji** uruchamia się automatycznie przy pierwszym użyciu. Mierzy twój naturalny zakres ruchu i ustawia optymalną czułość. Możesz uruchomić go ponownie w dowolnym momencie przyciskiem **Kalibruj ponownie**.\n\n---\n\n## Połącz swoje oprogramowanie do streamingu\n\n![Matryca połączeń oprogramowania do streamingu](assets/manual/02-software-setup.svg)\n\nWszystkie połączenia w tej sekcji są lokalne: EsperantAI komunikuje się z programem do transmisji działającym na tym samym komputerze przez `127.0.0.1`.\n\n### OBS Studio\n\n1. W OBS: **Tools → WebSocket Server Settings**\n2. Włącz serwer WebSocket. OBS Studio 28+ ma już wbudowany obs-websocket.\n3. W EsperantAI: panel **Połączenie**\n4. Oprogramowanie do streamingu: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (domyślne)\n6. Hasło: to, które ustawiłeś w OBS, jeśli włączyłeś hasło\n7. Kliknij **Połącz**\n\n### Streamlabs Desktop\n\n1. W Streamlabs: **Settings → Remote Control**\n2. Włącz Remote Control\n3. Zapisz API Token\n4. W EsperantAI: oprogramowanie do streamingu: **Streamlabs Desktop**\n5. API Token: wklej go\n6. Port: `59650` (domyślny)\n7. Kliknij **Połącz**\n\n### vMix\n\n1. W vMix: **Settings → Web Controller**\n2. Włącz Web Controller. Domyślny port: 8088.\n3. W EsperantAI: oprogramowanie do streamingu: **vMix**\n4. Host: `127.0.0.1`\n5. Port: `8088`\n6. Kliknij **Połącz**\n\n> Uwaga: obecny adapter EsperantAI używa lokalnego API HTTP vMix. Jeśli zabezpieczysz Web Controller regułami sieciowymi albo danymi logowania nieobsługiwanymi przez przeglądarkę, połączenie może się nie udać.\n\n### PRISM Live Studio\n\n1. Użyj **PRISM Live Studio v4.0.5+**.\n2. Ręcznie zainstaluj wtyczkę `obs-websocket` zgodną z OBS/PRISM.\n3. Skopiuj ją do folderu wtyczek PRISM zgodnie z oficjalną instrukcją PRISM dla wtyczek OBS.\n4. Uruchom ponownie PRISM\n5. Włącz WebSocket w **Tools → WebSocket Server Settings**\n6. W EsperantAI: oprogramowanie do streamingu: **PRISM Live Studio** (działa tak samo jak OBS)\n\n> Ważna różnica: OBS 28+ ma już wbudowany obs-websocket. PRISM wymaga ręcznej instalacji wtyczki.\n\n### XSplit Broadcaster (beta)\n\n1. Zainstaluj albo włącz lokalny most zgodny z **XSplit XJS / Remote xjs**.\n2. Sprawdź, czy most wystawia lokalny adres WebSocket.\n3. W EsperantAI: oprogramowanie do streamingu: **XSplit**\n4. Remote xjs Proxy URL: `ws://127.0.0.1:5555/xjs` (domyślne)\n5. Kliknij **Połącz**\n\n> XSplit jest w trybie **beta/zaawansowanym**. Zgodność zależy od zainstalowanego lokalnego mostu XJS; funkcje zaawansowane mogą być ograniczone.\n\n---\n\n## Konfiguracja gestów i scen\n\nPo połączeniu sceny twojego oprogramowania pojawią się automatycznie na listach rozwijanych w panelu **Wyzwalacze**.\n\n### Podstawowe mapowanie\n\n1. Dla każdego gestu (np. „Spójrz w lewo\") wybierz scenę z listy rozwijanej\n2. Gdy wykonasz ten gest i utrzymasz go stabilnie przez ~150 ms, EsperantAI przełączy scenę w twoim oprogramowaniu do streamingu\n3. Zmiana jest automatyczna i niemal natychmiastowa\n\n### Wiele akcji (Pro+)\n\nZ licencją Pro lub Pro+ jeden gest może uruchomić **wiele akcji** jednocześnie:\n- Przełączyć scenę + odtworzyć dźwięk + wyświetlić nakładkę + wysłać wiadomość na czacie\n\n### Włącz / wyłącz kategorie\n\nKażda kategoria ma własne pole wyboru „Włącz\":\n\n- 🧠 **Rotacja głowy** (uniwersalna — włączona domyślnie)\n- 📏 **Odległość twarzy** (zbliżenie/oddalenie)\n- 👁️ **Kierunek wzroku** (ruch samymi oczami)\n- 😀 **Emocje** (uśmiech, zdziwienie, złość, neutralna)\n- 👁️‍🗨️ **Podwójne mrugnięcie**\n- ✋ **Gesty rąk** (kulturowe — wyłączone domyślnie)\n\nWyłącz kategorie, których nie potrzebujesz, aby oszczędzić CPU.\n\n---\n\n## Kategorie gestów\n\n### 🌐 Uniwersalne (to samo znaczenie w każdej kulturze)\n\n| Gest | Oś | Jak aktywować |\n|---|---|---|\n| Centrum | — | Patrzeć prosto, twarz stabilna |\n| Spojrzenie w lewo | ujemny yaw | Obrócić głowę w lewo |\n| Spojrzenie w prawo | dodatni yaw | Obrócić głowę w prawo |\n| Spojrzenie w górę | ujemny pitch | Podnieść twarz |\n| Spojrzenie w dół | dodatni pitch | Opuścić twarz |\n| Przechył w lewo | ujemny roll | Przechylić głowę w stronę lewego ramienia |\n| Przechył w prawo | dodatni roll | Przechylić głowę w stronę prawego ramienia |\n| Zbliżenie | odległość | Zbliżyć twarz do kamery |\n| Oddalenie | odległość | Oddalić twarz od kamery |\n| Kierunek wzroku | wzrok | Poruszać tylko oczami (głowa wycentrowana) |\n| Uśmiech | emocja=happy | Wyraźnie się uśmiechnąć |\n| Zdziwienie | emocja=surprise | Wyrazić zdziwienie |\n| Złość | emocja=angry | Wyrazić złość |\n| Neutralna | emocja=neutral | Zrelaksowana twarz |\n| Podwójne mrugnięcie | mrugnięcie | Szybko zamknąć obie oczy dwukrotnie (< 700 ms) |\n\n### ⚠️ Kulturowe (znaczenie zależy od kraju)\n\n| Gest | Znaczenie na Zachodzie | Uwaga w innych kulturach |\n|---|---|---|\n| 👍 Kciuk w górę | Zgoda, aprobata | Bliski Wschód / Azja Zachodnia: może być obraźliwy |\n| ✌️ Znak pokoju | Pokój / zwycięstwo | UK / Irlandia / Australia (dłoń do wewnątrz): obelga |\n| 🤘 Znak rocka | Rock, metal | Włochy (dłoń w dół): „cornuto\" (obelga) |\n| 👌 OK | OK / idealnie | Brazylia / Turcja / Niemcy: może być obraźliwy. **Uwaga: w Polsce gest OK (👌) budzi kontrowersje i może być odebrany negatywnie — zaleca się ostrożność przy używaniu tego gestu przed polską widownią.** |\n| ✊ Zaciśnięta pięść | Zależy od kontekstu politycznego | — |\n| 🖐️ Otwarta dłoń | „Stop\" lub powitanie | Grecja (mountza w czyjąś stronę): silna obelga |\n| ☝️ Wskazywanie | Wskazać coś | Azja: wskazywanie palcem jest niegrzeczne |\n\nEsperantAI oznacza każdy gest odpowiednim symbolem w interfejsie. Wybieraj, których używać, kierując się swoją globalną widownią.\n\n### 🙏 Gassho (合掌)\n\nSpecjalny gest: dłonie złączone razem przed klatką piersiową (jak do modlitwy lub ukłonu powitalnego). Powszechny w kulturach Azji Wschodniej jako znak szacunku lub wdzięczności. Wykrywany z wysoką niezawodnością przy użyciu 6 punktów kontrolnych.\n\n---\n\n## Połącz platformy streamingowe\n\nAby EsperantAI odbierał zdarzenia (donacje, subskrypcje, raidy, nowych obserwujących albo Super Chaty), połącz platformy, na których streamujesz.\n\n![Stan zdarzeń według platformy](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. Utwórz Client ID na https://dev.twitch.tv/console\n2. Zarejestruj redirect URI: `https://edugame.digital/oauth-callback.html` (lub swój lokalny URL)\n3. W EsperantAI: panel **Zdarzenia platform** → **Twitch EventSub**\n4. Wklej swój Client ID\n5. Kliknij **Połącz**\n6. Otworzy się okno autoryzacji Twitch. Zaakceptuj uprawnienia.\n7. Okno się zamknie i zobaczysz „Twitch połączony\"\n\nEsperantAI używa EventSub WebSocket. Nie wklejaj żadnego Client Secret w przeglądarce.\n\n### YouTube Live\n\n1. Utwórz poświadczenia na https://console.cloud.google.com\n2. Włącz YouTube Data API v3\n3. Utwórz OAuth Client ID (typ: Web Application)\n4. Zarejestruj ten sam redirect URI co dla Twitcha\n5. W EsperantAI: panel **Zdarzenia platform** → **YouTube Live**\n6. Wklej swój Client ID i kliknij **Połącz**\n\nWymagania YouTube: musisz mieć aktywną transmisję na żywo z dostępnym czatem, a projekt Google Cloud musi mieć wystarczający limit/kwotę API do odpytywania czatu.\n\n### Kick\n\n1. Utwórz aplikację w portalu deweloperskim Kick.\n2. Zarejestruj redirect URI\n3. W EsperantAI: panel **Zdarzenia platform** → **Kick**\n4. Wklej swój Client ID i kliknij **Połącz**\n5. Kick używa OAuth 2.1 z PKCE.\n\nObecny stan Kick: **beta/ograniczony**. Oficjalna dokumentacja Kick używa webhooków dla pełnych zdarzeń. W przeglądarce EsperantAI może wykryć tylko ograniczoną część aktywności; do subskrypcji, prezentów, raidów albo niezawodnych zdarzeń Kick użyj mostu takiego jak StreamElements albo własnego backendu z webhookiem.\n\n### StreamElements (most wieloplatformowy)\n\nJeśli masz już konto StreamElements, możesz użyć go jako mostu dla alertów z wielu platform:\n\n1. Przejdź na https://streamelements.com/dashboard/account/channels\n2. Skopiuj swój JWT Token\n3. W EsperantAI: panel **Zdarzenia platform** → **StreamElements**\n4. Wklej JWT i kliknij **Połącz**\n\nNie udostępniaj tego tokena. Traktuj go jak hasło do swojego konta StreamElements.\n\n### Trovo\n\nEsperantAI zawiera w kodzie adapter techniczny dla Trovo, oparty na OAuth i usłudze czatu WebSocket Trovo. Obecny publiczny interfejs nie wystawia jeszcze panelu połączenia Trovo, dlatego nie jest to dokumentowane jako zwykły przepływ użytkownika. Jeśli potrzebujesz Trovo teraz, użyj zgodnego mostu albo poczekaj na aktywację panelu Trovo.\n\n---\n\n## Kombinacje: zdarzenie + gest (Zaawansowane)\n\nTo jest magia EsperantAI: łączenie **zdarzeń platformy** z **twoimi gestami** jako potwierdzeniem.\n\n![Przepływ zdarzenia plus gest](assets/manual/04-event-gesture-combo.svg)\n\n### Przykład: podziękowanie za donację gestem kciuka w górę\n\n1. Panel **Wyzwalacze zdarzeń** → wiersz „💰 Donacja\"\n2. ✅ Włącz\n3. Scena: `Scena_Podziekowanie`\n4. Wymagany gest: `👍 Kciuk w górę`\n\n**Przebieg na żywo**:\n- Nadchodzi donacja → EsperantAI wyświetla „Oczekiwanie na gest...\"\n- Masz 5 sekund na wykonanie 👍\n- Jeśli wykonasz → przełącza na `Scena_Podziekowanie` + uruchamia inne skonfigurowane akcje\n- Jeśli nie → zdarzenie jest automatycznie odrzucane\n\n### Bez wymaganego gestu (automatyczny wyzwalacz)\n\nJeśli zostawisz „Wymagany gest\" jako `— brak —`, zdarzenie uruchomi akcję natychmiast.\n\nPrzydatne do:\n- Automatycznego przełączania na scenę celebracji, gdy nadchodzi rajd\n- Automatycznego wyświetlania nakładki, gdy ktoś zasubskrybuje\n\n---\n\n## Czułość i martwa strefa\n\n### Czułość\n\nProgi kontrolują, jak wyraźny musi być gest, aby uruchomić wyzwalacz:\n\n- **Yaw**: jak mocno obrócić głowę w bok (domyślnie: 0,15 rad ≈ 8,6°)\n- **Pitch w górę/w dół**: pionowe pochylenie\n- **Roll**: boczne pochylenie\n\nZwiększ wartości dla bardziej wyrazistych gestów. Zmniejsz dla większej czułości.\n\n### Martwa strefa (ochrona przed zmęczeniem)\n\nJeśli jesteś niemal wycentrowany (yaw < 0,05, pitch < 0,05, roll < 0,08), **NIC się nie uruchamia**. Dzięki temu możesz poruszać się naturalnie, nie aktywując wyzwalaczy mikroruchami.\n\n### Stabilne klatki\n\n`Stabilne klatki` = ile kolejnych klatek gest musi być utrzymywany przed uruchomieniem. Domyślnie: 5 klatek (~150 ms przy 30 fps).\n\nZwiększ, jeśli wyzwalacze aktywują się zbyt łatwo. Zmniejsz dla szybszej reakcji.\n\n### Odnowienie\n\n`Czas odnowienia (ms)` = minimalny czas między zmianami scen. Domyślnie: 500 ms.\n\nZapobiega „nerwowemu\" przełączaniu, gdy szybko oscylujesz między gestami.\n\n---\n\n## Skróty klawiszowe\n\n| Klawisz | Akcja |\n|---|---|\n| `Spacja` | Wstrzymaj / Wznów wykrywanie |\n| `C` | Ręczne przejście do sceny CENTER |\n| `R` | Przeładuj listę scen z oprogramowania |\n| `Esc` | Rozłącz |\n\n---\n\n## Historia wyzwalaczy\n\nPanel **Zaawansowane → Historia wyzwalaczy** pokazuje ostatnie 50 uruchomionych akcji:\n\n- ✓ zielony = udana\n- ✗ czerwony = nieudana\n- · szary = oczekująca\n\nPrzydatne do sprawdzania, co uruchomiło wyzwalacze, bez otwierania DevTools.\n\n**Eksport CSV**: pobierz historię do analizy offline.\n\n**Wyczyść**: usuń historię (nie wpływa na nic innego).\n\n---\n\n## Zmiana języka\n\nEsperantAI automatycznie wykrywa język twojego systemu operacyjnego. Aby zmienić go ręcznie:\n\n- W prawym górnym rogu: lista rozwijana języków\n- Wybierz preferowany język\n- Interfejs zaktualizuje się natychmiast\n\nDostępne języki:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिन्दी\n- 🇮🇩 Bahasa Indonesia\n\nWszystkie 15 języków zostało przetłumaczonych w obecnych plikach interfejsu.\n\n---\n\n## Zarządzanie licencją\n\nPanel **Zaawansowane → Licencja**:\n\n- **Wyświetl status**: Ważna / Nieważna\n- **Wyświetl powiązany e-mail klienta**\n- **Wyświetl ostatnią walidację online**\n- **Dezaktywuj na tym urządzeniu**: użyj przed zmianą komputera albo aby zwolnić jedno miejsce (z 3 dostępnych)\n\n---\n\n## Rozwiązywanie problemów\n\n### „Wymagana aktywacja\" nie znika po wklejeniu klucza licencyjnego\n\n- Sprawdź, czy skopiowałeś kompletny klucz (5 grup po 4 znaki oddzielone myślnikami)\n- Sprawdź połączenie z internetem (aktywacja wymaga weryfikacji online przy pierwszym uruchomieniu)\n- Jeśli aktywowałeś już na 3 urządzeniach, najpierw dezaktywuj jedno z nich\n- Skontaktuj się z soporte@edugame.digital, jeśli problem utrzymuje się\n\n### „Szukanie twarzy...\" nie znika, mimo że twarz jest widoczna\n\n- Popraw oświetlenie: twoja twarz powinna być dobrze oświetlona\n- Zbliż się do kamery (optymalnie 40–80 cm)\n- Zamknij inne karty używające GPU (Chrome może ograniczać GPU, gdy jest ich zbyt wiele)\n- Jeśli w Chrome aktywne jest Oszczędzanie pamięci, wyłącz je dla tej karty\n\n### Sceny nie pojawiają się na listach rozwijanych\n\n- Sprawdź, czy jesteś połączony z oprogramowaniem do streamingu (zielony znacznik „Połączono\")\n- Naciśnij `R`, aby przeładować listę scen\n- Jeśli nadal pusto, rozłącz i połącz ponownie\n- W vMix potwierdź, że Web Controller jest włączony i dostępny pod `http://127.0.0.1:8088/api/`\n- W PRISM potwierdź, że wtyczka obs-websocket jest zainstalowana i włączona\n- W XSplit potwierdź, że lokalny most XJS działa\n\n### Zmiany scen uruchamiają się bez wykonywania gestów\n\n- Zwiększ próg yaw / pitch / roll w panelu **Czułość**\n- Zwiększ `Stabilne klatki` z 5 do 8–10\n- Upewnij się, że martwa strefa jest skonfigurowana (yaw 0,05, pitch 0,05, roll 0,08)\n- Sprawdź, czy w kadrze nie ma innej osoby (wiele twarzy może powodować niestabilność)\n\n### Opóźnienie wykrywania\n\n- Zamknij obciążające aplikacje (gry, montaż wideo)\n- Sprawdź, czy używasz dedykowanego GPU, jeśli go posiadasz (nie zintegrowanego)\n- Zmniejsz rozdzielczość kamery, jeśli jest 4K (1080p jest optymalne do wykrywania)\n\n### OBS nie reaguje, mimo że EsperantAI pokazuje „Scena zmieniona\"\n\n- Sprawdź, czy nazwa sceny na liście rozwijanej DOKŁADNIE odpowiada tej w OBS (wielkość liter ma znaczenie)\n- Sprawdź, czy scena nie znajduje się w innej kolekcji scen\n- Sprawdź panel **Historia wyzwalaczy** — jeśli wyświetla ✗ czerwony, oznacza to konkretny błąd\n\n### Błąd „OBS nieosiągalny — Połącz ręcznie\"\n\n- Sprawdź, czy OBS jest otwarty\n- Sprawdź, czy WebSocket jest włączony w OBS\n- Jeśli ustawiłeś hasło w OBS, musi ono dokładnie pasować\n- Niektóre programy antywirusowe blokują port 4455 — dodaj wyjątek\n\n### Twitch albo YouTube nie łączą się\n\n- Sprawdź, czy redirect URI w konsoli platformy dokładnie odpowiada adresowi URL `oauth-callback.html`\n- Zezwól na wyskakujące okna dla domeny, w której używasz EsperantAI\n- W Twitch używaj tylko Client ID; nie wklejaj Client Secret\n- W YouTube potwierdź, że YouTube Data API v3 jest włączone i że masz aktywną transmisję na żywo\n\n### Kick nie pokazuje wszystkich zdarzeń\n\nKick działa w przeglądarce w trybie beta/ograniczonym. Pełne zdarzenia Kick są oficjalnie odbierane przez webhooki; użyj StreamElements albo własnego backendu, jeśli potrzebujesz niezawodnych subskrypcji, prezentów lub raidów.\n\n---\n\n## Prywatność\n\n### Czego EsperantAI NIE robi\n\n- ❌ NIE wysyła twojego wideo na żaden serwer\n- ❌ NIE zapisuje twojego wideo ani zrzutów\n- ❌ NIE zbiera danych biometrycznych zdalnie\n- ❌ NIE udostępnia danych reklamodawcom ani stronom trzecim\n\n### Co PRZETWARZA\n\n- ✅ Lokalne wykrywanie twarzy w twojej przeglądarce (Human.js + WebGL)\n- ✅ Lokalne połączenia z OBS / Streamlabs / vMix / PRISM / XSplit (loopback `127.0.0.1`)\n- ✅ Okresowa walidacja klucza licencyjnego (co 7 dni)\n- ✅ Jeśli połączysz Twitch/YouTube/Kick/StreamElements: tokeny platform w lokalnej lub sesyjnej pamięci przeglądarki\n\nSzczegóły w `docs/PRIVACY.html`.\n\n---\n\n## Pomoc techniczna\n\n- 📧 E-mail: **soporte@edugame.digital**\n- 🌐 Web: https://edugame.digital\n- 📚 Dokumentacja techniczna: https://github.com/salazarjoelo/EsperantAI\n\nCzas odpowiedzi:\n- Pytania ogólne: 24–72 godziny\n- Błędy techniczne: 1–3 dni robocze\n\n---\n\n*Ostatnia aktualizacja: 2026-05-20. Wersja: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'hi-IN': { name: 'हिंदी', flag: '🇮🇳', content: "# EsperantAI — उपयोगकर्ता मैनुअल\n\n> **ईमानदार इशारे।** अपने चेहरे और हाथों से अपने स्ट्रीमिंग सॉफ़्टवेयर को नियंत्रित करें, बिना किसी अलग समर्पित हार्डवेयर के।\n\n**संस्करण**: 3.0 · **भाषा**: हिंदी (14 अन्य भाषाओं में भी अनुवाद उपलब्ध)\n\n**तकनीकी सत्यापन**: OBS Studio, Streamlabs Desktop, vMix, PRISM Live Studio, XSplit, Twitch, YouTube Live, Kick, Trovo और StreamElements के लिए **20 मई 2026** तक उपलब्ध आधिकारिक दस्तावेज़ों के विरुद्ध समीक्षा की गई। विवरण: [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md)।\n\n---\n\n## विषय सूची\n\n1. [EsperantAI क्या है?](#esperantai-क्या-है)\n2. [न्यूनतम आवश्यकताएँ](#न्यूनतम-आवश्यकताएँ)\n3. [खरीद और सक्रियण](#खरीद-और-सक्रियण)\n4. [पहला उपयोग](#पहला-उपयोग)\n5. [अपना स्ट्रीमिंग सॉफ़्टवेयर कनेक्ट करें](#अपना-स्ट्रीमिंग-सॉफ़्टवेयर-कनेक्ट-करें)\n6. [इशारे और दृश्य कॉन्फ़िगर करें](#इशारे-और-दृश्य-कॉन्फ़िगर-करें)\n7. [इशारों की श्रेणियाँ](#इशारों-की-श्रेणियाँ)\n8. [स्ट्रीमिंग प्लेटफ़ॉर्म कनेक्ट करें](#स्ट्रीमिंग-प्लेटफ़ॉर्म-कनेक्ट-करें)\n9. [इवेंट + इशारा संयोजन (उन्नत)](#इवेंट--इशारा-संयोजन-उन्नत)\n10. [संवेदनशीलता और डेड ज़ोन](#संवेदनशीलता-और-डेड-ज़ोन)\n11. [कीबोर्ड शॉर्टकट](#कीबोर्ड-शॉर्टकट)\n12. [ट्रिगर इतिहास](#ट्रिगर-इतिहास)\n13. [भाषा बदलें](#भाषा-बदलें)\n14. [अपने लाइसेंस का प्रबंधन करें](#अपने-लाइसेंस-का-प्रबंधन-करें)\n15. [समस्या निवारण](#समस्या-निवारण)\n16. [गोपनीयता](#गोपनीयता)\n17. [सहायता](#सहायता)\n\n---\n\n## EsperantAI क्या है?\n\nEsperantAI एक **वेब ऐप** है जो कृत्रिम बुद्धिमत्ता का उपयोग करके आपके चेहरे और हाथों के इशारों को वास्तविक समय में पहचानता है, और उन्हें आपके स्ट्रीमिंग सॉफ़्टवेयर के लिए कमांड में बदलता है। आपके कैमरे का वीडियो स्थानीय रूप से आपके ब्राउज़र में ही संसाधित होता है।\n\n![EsperantAI का स्थानीय प्रवाह](assets/manual/01-esperantai-flow.svg)\n\nयह इन प्रसारण कार्यक्रमों के साथ काम करता है:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (beta/advanced)\n\nयह प्लेटफ़ॉर्म इवेंट भी प्राप्त कर सकता है और उन्हें आपके इशारों के साथ जोड़ सकता है:\n\n- **Twitch**: EventSub WebSocket के माध्यम से सीधा समर्थन।\n- **YouTube Live**: YouTube Data API v3 के माध्यम से सीधा समर्थन; active live और उपलब्ध quota आवश्यक हैं।\n- **Kick**: ब्राउज़र में beta/limited समर्थन। पूरे Kick इवेंट के लिए आधिकारिक backend/webhooks या bridge चाहिए।\n- **StreamElements**: आपके खाते के token/JWT के साथ मल्टी-प्लेटफ़ॉर्म bridge।\n- **Trovo**: कोड में technical adapter मौजूद है, लेकिन public UI connection panel अभी expose नहीं है।\n\n### \"ईमानदार इशारे\" क्यों?\n\nमूल चेहरे के भाव और सिर का घूमना **सभी मानव संस्कृतियों में सार्वभौमिक** है (पॉल एकमैन, 1972)। वे झूठ नहीं बोलते, वे भूगोल के अनुसार नहीं बदलते। EsperantAI इन्हें \"🌐 सार्वभौमिक\" इशारे कहता है और उन्हें \"⚠️ सांस्कृतिक\" इशारों (हाथ के संकेत) से अलग करता है, जिनका अर्थ देश के अनुसार भिन्न हो सकता है।\n\nआप अपने दर्शकों के आधार पर कौन से इशारे उपयोग करने हैं, यह तय करें।\n\n---\n\n## न्यूनतम आवश्यकताएँ\n\n### हार्डवेयर\n\n- **कोई भी USB वेबकैम** (अनुशंसित: 1080p या उच्चतर)\n- **CPU**: पिछले 5 वर्षों का कोई भी 4+ कोर प्रोसेसर\n- **RAM**: 8 GB न्यूनतम। यदि आप एक साथ स्ट्रीमिंग कर रहे हैं तो 16 GB अनुशंसित।\n- **GPU**: WebGL समर्थन वाला कोई भी (आधुनिक एकीकृत GPU भी काम करते हैं)\n\n### सॉफ़्टवेयर\n\n- **OS**: Windows 10/11, macOS 12+, या हालिया कर्नेल वाला Linux\n- **ब्राउज़र**: Chrome 90+, Edge 90+, या Firefox 100+\n- **स्ट्रीमिंग सॉफ़्टवेयर** (कम से कम एक): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### इंटरनेट\n\n- अपनी **लाइसेंस सक्रिय करने** के लिए आवश्यक और हर **7 दिन** पुनः सत्यापन के लिए\n- **7 दिनों तक ऑफ़लाइन** काम करता है (ग्रेस पीरियड)\n\n---\n\n## खरीद और सक्रियण\n\n1. **https://edugame.digital** पर जाएँ\n2. **\"लाइसेंस खरीदें\"** पर क्लिक करें\n3. LemonSqueezy के माध्यम से भुगतान पूर्ण करें (कार्ड, PayPal, आदि)\n4. आपको ईमेल प्राप्त होगा जिसमें:\n   - आपकी **लाइसेंस कुंजी** (प्रारूप: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - EsperantAI उपयोग करने का लिंक\n5. अपने ब्राउज़र में EsperantAI खोलें\n6. सक्रियण स्क्रीन दिखाई देगी। अपनी लाइसेंस कुंजी पेस्ट करें\n7. **\"लाइसेंस सक्रिय करें\"** पर क्लिक करें\n8. हो गया! 🎉\n\n### कितने उपकरण?\n\nएक लाइसेंस **3 उपकरणों तक** सक्रिय किया जा सकता है। अपना लाइसेंस दूसरे उपकरण पर ले जाने के लिए:\n\n1. पुराने उपकरण पर: **उन्नत** पैनल → **लाइसेंस** → **इस उपकरण पर निष्क्रिय करें**\n2. नए उपकरण पर: सामान्य रूप से सक्रिय करें\n\n---\n\n## पहला उपयोग\n\n### चरण 1: कैमरा एक्सेस की अनुमति दें\n\nजब आप पहली बार EsperantAI खोलते हैं, तो आपका ब्राउज़र कैमरा अनुमति माँगेगा। **स्वीकार करें**।\n\n> महत्वपूर्ण: EsperantAI आपका वीडियो किसी भी सर्वर पर नहीं भेजता। प्रसंस्करण आपके कंप्यूटर पर 100% स्थानीय है।\n\n### चरण 2: कैमरा चुनें\n\nयदि आपके पास एक से अधिक कैमरे हैं, तो कैमरा ड्रॉपडाउन से कौन सा उपयोग करना है चुनें।\n\n### चरण 3: पहचान सत्यापित करें\n\nआप बाएँ पैनल में अपना चेहरा देखेंगे। जब EsperantAI आपका चेहरा पहचान लेगा, Yaw / Pitch / Roll संकेतक मान दिखाना शुरू कर देंगे।\n\n### चरण 4: कैलिब्रेशन विज़ार्ड (Pro+)\n\nयदि आपके पास Pro या Pro+ लाइसेंस है, तो **कैलिब्रेशन विज़ार्ड** पहले उपयोग पर स्वचालित रूप से शुरू होता है। यह आपकी प्राकृतिक गति की सीमा को मापता है और इष्टतम संवेदनशीलता सेट करता है। आप इसे कभी भी **रीकैलिब्रेट** बटन से फिर से चला सकते हैं।\n\n---\n\n## अपना स्ट्रीमिंग सॉफ़्टवेयर कनेक्ट करें\n\n![स्ट्रीमिंग सॉफ़्टवेयर कनेक्शन मैट्रिक्स](assets/manual/02-software-setup.svg)\n\nइस सेक्शन के सभी कनेक्शन local हैं: EsperantAI उसी कंप्यूटर पर चल रहे प्रसारण कार्यक्रम से `127.0.0.1` के माध्यम से बात करता है।\n\n### OBS Studio\n\n1. OBS में: **Tools → WebSocket Server Settings**\n2. WebSocket सर्वर सक्षम करें। OBS Studio 28+ में obs-websocket पहले से शामिल है।\n3. EsperantAI में: **कनेक्शन** पैनल\n4. स्ट्रीमिंग सॉफ़्टवेयर: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (डिफ़ॉल्ट)\n6. पासवर्ड: यदि आपने OBS में पासवर्ड सक्रिय किया है, तो वही पासवर्ड\n7. **कनेक्ट** पर क्लिक करें\n\n### Streamlabs Desktop\n\n1. Streamlabs में: **Settings → Remote Control**\n2. local Remote Control सक्षम करें\n3. Remote Control स्क्रीन से **API Token** कॉपी करें\n4. EsperantAI में: स्ट्रीमिंग सॉफ़्टवेयर: **Streamlabs Desktop**\n5. API Token: पेस्ट करें\n6. पोर्ट: `59650` (डिफ़ॉल्ट)\n7. **कनेक्ट** पर क्लिक करें\n\n### vMix\n\n1. vMix में: **Settings → Web Controller**\n2. Web Controller सक्षम करें। डिफ़ॉल्ट पोर्ट: 8088।\n3. EsperantAI में: स्ट्रीमिंग सॉफ़्टवेयर: **vMix**\n4. होस्ट: `127.0.0.1`\n5. पोर्ट: `8088`\n6. **कनेक्ट** पर क्लिक करें\n\n> नोट: EsperantAI का मौजूदा vMix adapter local HTTP API का उपयोग करता है। यदि आपने Web Controller को network rules या browser-incompatible credentials से सुरक्षित किया है, तो connection fail हो सकता है।\n\n### PRISM Live Studio\n\n1. **PRISM Live Studio v4.0.5+** का उपयोग करें।\n2. OBS/PRISM के साथ compatible `obs-websocket` plugin मैन्युअल रूप से install करें।\n3. PRISM की official OBS plugin guide के अनुसार plugin को PRISM plugins folder में कॉपी करें।\n4. PRISM पुनः आरंभ करें\n5. **Tools → WebSocket Server Settings** में WebSocket सक्षम करें\n6. EsperantAI में: स्ट्रीमिंग सॉफ़्टवेयर: **PRISM Live Studio** (OBS की तरह काम करता है)\n\n> महत्वपूर्ण अंतर: OBS 28+ में obs-websocket पहले से शामिल है। PRISM में plugin manual रूप से install करना पड़ता है।\n\n### XSplit Broadcaster (beta/advanced)\n\n1. **XSplit XJS / Remote xjs** के साथ compatible कोई local bridge install या enable करें।\n2. जाँचें कि bridge एक local WebSocket URL expose कर रहा है।\n3. EsperantAI में: स्ट्रीमिंग सॉफ़्टवेयर: **XSplit**\n4. Remote xjs Proxy URL: `ws://127.0.0.1:5555/xjs` (डिफ़ॉल्ट)\n5. **कनेक्ट** पर क्लिक करें\n\n> XSplit **beta/advanced** स्थिति में है। Compatibility installed local XJS bridge पर निर्भर करती है; advanced features सीमित हो सकते हैं।\n\n---\n\n## इशारे और दृश्य कॉन्फ़िगर करें\n\nकनेक्ट होने के बाद, आपके सॉफ़्टवेयर के वास्तविक दृश्य स्वचालित रूप से **ट्रिगर** पैनल ड्रॉपडाउन में दिखाई देंगे।\n\n### मूल मैपिंग\n\n1. प्रत्येक इशारे के लिए (उदा., \"बाईं ओर देखें\"), ड्रॉपडाउन से एक दृश्य चुनें\n2. जब आप वह इशारा करते हैं और लगभग 150ms तक स्थिर रखते हैं, तो EsperantAI आपके स्ट्रीमिंग सॉफ़्टवेयर में उस दृश्य पर स्विच करेगा\n3. परिवर्तन स्वचालित और लगभग तात्कालिक है\n\n### मल्टी-एक्शन (Pro+)\n\nPro या Pro+ लाइसेंस के साथ, एक इशारा **कई कार्यों** को एक साथ ट्रिगर कर सकता है:\n- दृश्य बदलें + ध्वनि चलाएँ + ओवरले दिखाएँ + चैट संदेश भेजें\n\n### श्रेणियाँ सक्षम / अक्षम करें\n\nप्रत्येक श्रेणी का अपना \"सक्षम\" चेकबॉक्स है:\n\n- 🧠 **सिर का घूमना** (सार्वभौमिक — डिफ़ॉल्ट रूप से सक्षम)\n- 📏 **चेहरे की दूरी** (करीब/दूर जाएँ)\n- 👁️ **दृष्टि** (केवल आँखें घुमाएँ)\n- 😀 **भावनाएँ** (मुस्कान, आश्चर्य, गुस्सा, तटस्थ)\n- 👁️‍🗨️ **दोहरी पलक झपकी**\n- ✋ **हाथ के इशारे** (सांस्कृतिक — डिफ़ॉल्ट रूप से अक्षम)\n\nCPU बचाने के लिए अनावश्यक श्रेणियाँ अक्षम करें।\n\n---\n\n## इशारों की श्रेणियाँ\n\n### 🌐 सार्वभौमिक (किसी भी संस्कृति में समान अर्थ)\n\n| इशारा | अक्ष | सक्रिय करने का तरीका |\n|---|---|---|\n| केंद्र | — | सीधे सामने देखना, चेहरा स्थिर |\n| बाईं ओर देखें | नकारात्मक yaw | सिर बाईं ओर घुमाएँ |\n| दाईं ओर देखें | सकारात्मक yaw | सिर दाईं ओर घुमाएँ |\n| ऊपर देखें | नकारात्मक pitch | चेहरा ऊपर उठाएँ |\n| नीचे देखें | सकारात्मक pitch | चेहरा नीचे करें |\n| बाईं ओर झुकें | नकारात्मक roll | सिर बाएँ कंधे की ओर झुकाएँ |\n| दाईं ओर झुकें | सकारात्मक roll | सिर दाएँ कंधे की ओर झुकाएँ |\n| करीब आएँ | दूरी | कैमरे के करीब आएँ |\n| दूर जाएँ | दूरी | कैमरे से दूर जाएँ |\n| दृष्टि | दृष्टि | केवल आँखें घुमाएँ (सिर केंद्रित) |\n| मुस्कुरा रहे हैं | भावना=खुशी | स्पष्ट रूप से मुस्कुराएँ |\n| आश्चर्यित | भावना=आश्चर्य | आश्चर्यित दिखें |\n| गुस्सा | भावना=गुस्सा | गुस्से में दिखें |\n| तटस्थ | भावना=तटस्थ | विश्रामित चेहरा |\n| दोहरी पलक झपकी | पलक झपकी | दोनों आँखें जल्दी दो बार बंद करें (< 700ms) |\n\n### ⚠️ सांस्कृतिक (अर्थ देश के अनुसार भिन्न)\n\n| इशारा | पश्चिमी अर्थ | अन्य संस्कृतियों में सावधानी |\n|---|---|---|\n| 👍 अंगूठा ऊपर | स्वीकृति | मध्य पूर्व / पश्चिम एशिया: आपत्तिजनक हो सकता है |\n| ✌️ शांति | शांति / विजय | यूके / आयरलैंड / ऑस्ट्रेलिया (हथेली अंदर): अपमान |\n| 🤘 रॉक साइन | रॉक / मेटल | इटली (हथेली नीचे): \"कोर्नुटो\" (अपमान) |\n| 👌 ओके | ओके / परिपूर्ण | ब्राज़ील / तुर्की / जर्मनी: आपत्तिजनक हो सकता है |\n| ✊ बंद मुट्ठी | राजनीतिक संदर्भ पर निर्भर | — |\n| 🖐️ खुली हथेली | \"रुको\" या अभिवादन | ग्रीस (किसी की ओर माउंट्ज़ा): गंभीर अपमान |\n| ☝️ इशारा करना | संकेत | एशिया: उंगली से इशारा करना अभद्र है |\n\nEsperantAI UI में प्रत्येक इशारे को उसके संबंधित बैज के साथ चिह्नित करता है। अपने वैश्विक दर्शकों के आधार पर कौन से उपयोग करने हैं चुनें।\n\n### 🙏 गश्शो (合掌)\n\nएक विशेष इशारा: अपनी छाती के सामने दोनों हथेलियाँ एक साथ दबाएँ (प्रार्थना या अभिवादन झुकाव की तरह)। पूर्वी एशियाई संस्कृतियों में सम्मान या कृतज्ञता के संकेत के रूप में सामान्य। 6 लैंडमार्क जाँचों के साथ उच्च विश्वसनीयता से पहचाना जाता है।\n\n---\n\n## स्ट्रीमिंग प्लेटफ़ॉर्म कनेक्ट करें\n\nEsperantAI को इवेंट (दान, सब्सक्रिप्शन, raids, follows या Super Chats) प्राप्त करने के लिए, उन प्लेटफ़ॉर्म को कनेक्ट करें जहाँ आप स्ट्रीम करते हैं।\n\n![प्लेटफ़ॉर्म इवेंट स्थिति](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. https://dev.twitch.tv/console पर Client ID बनाएँ\n2. रीडायरेक्ट URI पंजीकृत करें: `https://edugame.digital/oauth-callback.html` (या अपना स्थानीय URL)\n3. EsperantAI में: **प्लेटफ़ॉर्म इवेंट** पैनल → **Twitch EventSub**\n4. अपना Client ID पेस्ट करें\n5. **कनेक्ट** पर क्लिक करें\n6. Twitch प्राधिकरण विंडो खुलेगी। अनुमतियाँ स्वीकार करें।\n7. विंडो बंद हो जाएगी और आपको \"Twitch कनेक्टेड\" दिखाई देगा\n\nEsperantAI EventSub WebSocket का उपयोग करता है। ब्राउज़र में कोई Client Secret paste न करें।\n\n### YouTube Live\n\n1. https://console.cloud.google.com पर क्रेडेंशियल बनाएँ\n2. YouTube Data API v3 सक्षम करें\n3. OAuth Client ID बनाएँ (प्रकार: वेब एप्लिकेशन)\n4. Twitch के समान रीडायरेक्ट URI पंजीकृत करें\n5. EsperantAI में: **प्लेटफ़ॉर्म इवेंट** पैनल → **YouTube Live**\n6. अपना Client ID पेस्ट करें और **कनेक्ट** पर क्लिक करें\n\nYouTube की आवश्यकताएँ: आपके पास chat उपलब्ध active live broadcast होना चाहिए, और आपके Google Cloud project में chat query करने के लिए पर्याप्त quota होना चाहिए।\n\n### Kick\n\n1. Kick developer portal में application बनाएँ\n2. रीडायरेक्ट URI पंजीकृत करें\n3. EsperantAI में: **प्लेटफ़ॉर्म इवेंट** पैनल → **Kick**\n4. अपना Client ID पेस्ट करें और **कनेक्ट** पर क्लिक करें\n5. Kick OAuth 2.1 with PKCE का उपयोग करता है।\n\nमौजूदा स्थिति: **beta/limited**। Kick की official documentation पूरे events के लिए webhooks का उपयोग करती है। ब्राउज़र में EsperantAI activity का सीमित हिस्सा ही detect कर सकता है; reliable Kick subscriptions, gifts, raids या events के लिए StreamElements जैसा bridge या backend/webhook उपयोग करें।\n\n### StreamElements (मल्टी-प्लेटफ़ॉर्म ब्रिज)\n\nयदि आपके पास पहले से StreamElements खाता है, तो आप इसे कई platforms की alerts के लिए bridge की तरह उपयोग कर सकते हैं:\n\n1. https://streamelements.com/dashboard/account/channels पर जाएँ\n2. अपना JWT Token कॉपी करें\n3. EsperantAI में: **प्लेटफ़ॉर्म इवेंट** पैनल → **StreamElements**\n4. JWT पेस्ट करें और **कनेक्ट** पर क्लिक करें\n\nइस token को private रखें। इसे अपने StreamElements खाते के password जैसा मानें।\n\n### Trovo\n\nEsperantAI के code में Trovo के लिए OAuth और Trovo WebSocket chat service पर आधारित technical adapter मौजूद है। मौजूदा public UI में Trovo connection panel अभी expose नहीं है, इसलिए इसे सामान्य user flow की तरह document नहीं किया गया है। अगर आपको अभी Trovo चाहिए, तो compatible bridge उपयोग करें या Trovo panel के active होने की प्रतीक्षा करें।\n\n---\n\n## इवेंट + इशारा संयोजन (उन्नत)\n\nयह EsperantAI का जादू है: **प्लेटफ़ॉर्म इवेंट** को पुष्टि के रूप में **आपके इशारों** के साथ संयोजित करना।\n\n![इवेंट और इशारा प्रवाह](assets/manual/04-event-gesture-combo.svg)\n\n### उदाहरण: अंगूठा ऊपर के साथ दान का धन्यवाद करें\n\n1. **इवेंट ट्रिगर** पैनल → \"💰 दान\" पंक्ति\n2. ✅ सक्षम करें\n3. दृश्य: `थैंक्यू_सीन`\n4. आवश्यक इशारा: `👍 अंगूठा ऊपर`\n\n**लाइव प्रवाह**:\n- एक दान आता है → EsperantAI \"इशारे की प्रतीक्षा...\" दिखाता है\n- आपके पास 👍 करने के लिए 5 सेकंड हैं\n- यदि आप करते हैं → `थैंक्यू_सीन` पर स्विच करता है + कोई अन्य कॉन्फ़िगर की गई कार्रवाई चलाता है\n- यदि नहीं → स्वचालित रूप से खारिज हो जाता है\n\n### कोई आवश्यक इशारा नहीं (स्वतः-ट्रिगर)\n\nयदि आप \"आवश्यक इशारा\" को `— कोई नहीं —` के रूप में छोड़ते हैं, तो इवेंट तुरंत कार्रवाई ट्रिगर करता है।\n\nउपयोगी:\n- जब रेड आते हैं तो स्वचालित रूप से उत्सव दृश्य पर स्विच करने के लिए\n- जब कोई सब्सक्राइब करता है तो स्वचालित रूप से ओवरले दिखाने के लिए\n\n---\n\n## संवेदनशीलता और डेड ज़ोन\n\n### संवेदनशीलता\n\nथ्रेसहोल्ड नियंत्रित करते हैं कि ट्रिगर होने के लिए इशारा कितना बड़ा होना चाहिए:\n\n- **Yaw**: सिर को कितना किनारे की ओर घुमाना है (डिफ़ॉल्ट: 0.15 rad ≈ 8.6°)\n- **Pitch ऊपर/नीचे**: लंबवत झुकाव\n- **Roll**: पार्श्व झुकाव\n\nअधिक स्पष्ट इशारों के लिए मान बढ़ाएँ। अधिक संवेदनशीलता के लिए कम करें।\n\n### डेड ज़ोन (थकान रोकथाम)\n\nयदि आप लगभग केंद्रित हैं (yaw < 0.05, pitch < 0.05, roll < 0.08), तो **कुछ भी ट्रिगर नहीं होता**। यह आपको स्वाभाविक रूप से चलने की अनुमति देता है बिना माइक्रो-मूवमेंट ट्रिगर को सक्रिय किए।\n\n### स्थिर फ़्रेम\n\n`स्थिर फ़्रेम` = ट्रिगर होने से पहले इशारे को कितने लगातार फ़्रेम तक पकड़ना है। डिफ़ॉल्ट: 5 फ़्रेम (~150ms 30fps पर)।\n\nयदि ट्रिगर बहुत आसानी से सक्रिय हो रहे हैं तो बढ़ाएँ। तेज़ प्रतिक्रिया के लिए कम करें।\n\n### कूलडाउन\n\n`कूलडाउन (ms)` = दृश्य परिवर्तनों के बीच न्यूनतम समय। डिफ़ॉल्ट: 500ms।\n\nयदि आप जल्दी-जल्दी दिशा बदलते हैं तो स्विचर के \"झटकेदार\" होने से रोकता है।\n\n---\n\n## कीबोर्ड शॉर्टकट\n\n| कुंजी | कार्रवाई |\n|---|---|\n| `Space` | पहचान रोकें / फिर से शुरू करें |\n| `C` | मैन्युअल रूप से CENTRE दृश्य पर जाएँ |\n| `R` | सॉफ़्टवेयर से दृश्य सूची पुनः लोड करें |\n| `Esc` | डिसकनेक्ट करें |\n\n---\n\n## ट्रिगर इतिहास\n\n**उन्नत → ट्रिगर इतिहास** पैनल अंतिम 50 ट्रिगर की गई कार्रवाइयाँ दिखाता है:\n\n- ✓ हरा = सफल\n- ✗ लाल = विफल\n- · सलेटी = लंबित\n\nDevTools खोले बिना क्या ट्रिगर हुआ जाँचने के लिए उपयोगी।\n\n**CSV निर्यात**: ऑफ़लाइन विश्लेषण के लिए इतिहास डाउनलोड करें।\n\n**साफ़ करें**: इतिहास मिटाएँ (किसी अन्य चीज़ को प्रभावित नहीं करता)।\n\n---\n\n## भाषा बदलें\n\nEsperantAI स्वचालित रूप से आपके ऑपरेटिंग सिस्टम की भाषा का पता लगाता है। मैन्युअल रूप से बदलने के लिए:\n\n- ऊपरी दाएँ कोने: भाषा ड्रॉपडाउन\n- अपनी पसंदीदा भाषा चुनें\n- UI तुरंत अपडेट होता है\n\nउपलब्ध भाषाएँ:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिंदी\n- 🇮🇩 Bahasa Indonesia\n\nसभी 15 भाषाएँ मौजूदा interface files में अनुवादित हैं।\n\n---\n\n## अपने लाइसेंस का प्रबंधन करें\n\n**उन्नत → लाइसेंस** पैनल:\n\n- **स्थिति देखें**: मान्य / अमान्य\n- **संबंधित ग्राहक ईमेल देखें**\n- **अंतिम ऑनलाइन सत्यापन देखें**\n- **इस उपकरण पर निष्क्रिय करें**: PC बदलने से पहले या एक स्लॉट खाली करने के लिए उपयोग करें (3 उपलब्ध में से)\n\n---\n\n## समस्या निवारण\n\n### \"सक्रियण आवश्यक\" लाइसेंस कुंजी पेस्ट करने के बाद भी बना रहता है\n\n- सत्यापित करें कि आपने पूरी कुंजी कॉपी की है (4 अक्षरों के 5 समूह डैश से अलग)\n- अपना इंटरनेट कनेक्शन जाँचें (पहली बार सक्रियण के लिए ऑनलाइन सत्यापन आवश्यक है)\n- यदि आपने पहले ही 3 उपकरणों पर सक्रिय किया है, तो पहले एक को निष्क्रिय करें\n- यदि समस्या बनी रहती है तो soporte@edugame.digital से संपर्क करें\n\n### \"चेहरा खोज रहा है...\" तब भी बना रहता है जब मेरा चेहरा दिखाई दे रहा है\n\n- प्रकाश सुधारें: आपका चेहरा अच्छी तरह से रोशनी में होना चाहिए\n- कैमरे के करीब जाएँ (40-80 cm इष्टतम है)\n- GPU का उपयोग करने वाले अन्य टैब बंद करें (बहुत सारे टैब होने पर Chrome GPU को सीमित कर सकता है)\n- यदि Chrome का मेमोरी सेवर सक्रिय है, तो इस टैब के लिए अक्षम करें\n\n### दृश्य ड्रॉपडाउन में दिखाई नहीं देते\n\n- सत्यापित करें कि आप स्ट्रीमिंग सॉफ़्टवेयर से कनेक्ट हैं (हरा बैज \"कनेक्टेड\")\n- दृश्य सूची पुनः लोड करने के लिए `R` दबाएँ\n- यदि अभी भी खाली है, तो डिसकनेक्ट करें और फिर से कनेक्ट करें\n- vMix में पुष्टि करें कि Web Controller enabled है और `http://127.0.0.1:8088/api/` से reachable है\n- PRISM में पुष्टि करें कि obs-websocket plugin installed और enabled है\n- XSplit में पुष्टि करें कि local XJS bridge चल रहा है\n\n### मैं इशारे किए बिना दृश्य परिवर्तन ट्रिगर होते हैं\n\n- **संवेदनशीलता** पैनल में yaw / pitch / roll थ्रेसहोल्ड बढ़ाएँ\n- `स्थिर फ़्रेम` को 5 से 8-10 तक बढ़ाएँ\n- सुनिश्चित करें कि डेड ज़ोन कॉन्फ़िगर किया गया है (yaw 0.05, pitch 0.05, roll 0.08)\n- जाँचें कि फ़्रेम में कोई और नहीं है (कई चेहरे अस्थिरता का कारण बन सकते हैं)\n\n### पहचान में देरी\n\n- भारी ऐप्स बंद करें (गेम, वीडियो एडिटिंग)\n- यदि आपके पास समर्पित GPU है तो सत्यापित करें कि आप उसका उपयोग कर रहे हैं (एकीकृत नहीं)\n- यदि कैमरा 4K है तो रिज़ॉल्यूशन कम करें (पहचान के लिए 1080p इष्टतम है)\n\n### OBS प्रतिक्रिया नहीं करता जबकि EsperantAI \"दृश्य बदला\" कहता है\n\n- सत्यापित करें कि ड्रॉपडाउन में दृश्य का नाम OBS में बिल्कुल मेल खाता है (केस-सेंसिटिव)\n- सत्यापित करें कि दृश्य किसी अन्य Scene Collection में नहीं है\n- **ट्रिगर इतिहास** पैनल जाँचें — यदि यह ✗ लाल दिखाता है, तो एक विशिष्ट त्रुटि है\n\n### त्रुटि \"OBS पहुँच योग्य नहीं — मैन्युअल रूप से कनेक्ट करें\"\n\n- सत्यापित करें कि OBS खुला है\n- सत्यापित करें कि OBS में WebSocket सक्षम है\n- यदि आपने OBS में पासवर्ड सेट किया है, तो यह बिल्कुल मेल खाना चाहिए\n- कुछ एंटीवायरस पोर्ट 4455 को ब्लॉक करते हैं — अपवाद जोड़ें\n\n### Twitch या YouTube कनेक्ट नहीं हो रहे\n\n- पुष्टि करें कि platform console में redirect URI ठीक उसी `oauth-callback.html` URL से match करती है\n- जिस domain पर आप EsperantAI चला रहे हैं, उसके लिए pop-up windows allow करें\n- Twitch में केवल Client ID उपयोग करें; Client Secret paste न करें\n- YouTube में पुष्टि करें कि YouTube Data API v3 enabled है और active live मौजूद है\n\n### Kick सभी events नहीं दिखाता\n\nKick ब्राउज़र में beta/limited mode में है। Kick के पूरे events official रूप से webhooks से मिलते हैं; reliable subscriptions, gifts या raids के लिए StreamElements या अपना backend उपयोग करें।\n\n---\n\n## गोपनीयता\n\n### EsperantAI जो नहीं करता\n\n- ❌ आपका वीडियो किसी भी सर्वर पर नहीं भेजता\n- ❌ आपका वीडियो या कैप्चर संग्रहीत नहीं करता\n- ❌ दूरस्थ रूप से बायोमेट्रिक जानकारी एकत्र नहीं करता\n- ❌ विज्ञापनदाताओं या तृतीय पक्षों के साथ डेटा साझा नहीं करता\n\n### जो यह प्रसंस्करित करता है\n\n- ✅ आपके ब्राउज़र में स्थानीय चेहरा पहचान (Human.js + WebGL)\n- ✅ OBS / Streamlabs / vMix / PRISM / XSplit के लिए local कनेक्शन (loopback `127.0.0.1`)\n- ✅ आवधिक लाइसेंस कुंजी सत्यापन (हर 7 दिन)\n- ✅ यदि आप Twitch/YouTube/Kick/StreamElements कनेक्ट करते हैं: browser के local या session storage में platform tokens\n\nपूर्ण विवरण `docs/PRIVACY.html` में।\n\n---\n\n## सहायता\n\n- 📧 ईमेल: **soporte@edugame.digital**\n- 🌐 वेब: https://edugame.digital\n- 📚 तकनीकी दस्तावेज़: https://github.com/salazarjoelo/EsperantAI\n\nप्रतिक्रिया समय:\n- सामान्य प्रश्न: 24-72 घंटे\n- तकनीकी त्रुटियाँ: 1-3 कार्य दिवस\n\n---\n\n*अंतिम अपडेट: 2026-05-20। संस्करण: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" },
  'id-ID': { name: 'Bahasa Indonesia', flag: '🇮🇩', content: "# EsperantAI — Panduan Pengguna\n\n> **Gestur jujur.** Kontrol software streaming Anda dengan wajah dan tangan, tanpa perangkat keras khusus tambahan.\n\n**Versi**: 3.0 · **Bahasa**: Bahasa Indonesia (terjemahan tersedia dalam 14 bahasa lainnya)\n\n**Validasi teknis**: ditinjau terhadap dokumentasi resmi yang tersedia pada **20 Mei 2026** untuk OBS Studio, Streamlabs Desktop, vMix, PRISM Live Studio, XSplit, Twitch, YouTube Live, Kick, Trovo, dan StreamElements. Detail: [`docs/MANUAL_PLATFORM_AUDIT_2026-05.md`](MANUAL_PLATFORM_AUDIT_2026-05.md).\n\n---\n\n## Daftar Isi\n\n1. [Apa itu EsperantAI?](#apa-itu-esperantai)\n2. [Persyaratan Minimum](#persyaratan-minimum)\n3. [Pembelian & Aktivasi](#pembelian--aktivasi)\n4. [Penggunaan Pertama](#penggunaan-pertama)\n5. [Hubungkan Software Streaming Anda](#hubungkan-software-streaming-anda)\n6. [Konfigurasi Gestur & Scene](#konfigurasi-gestur--scene)\n7. [Kategori Gestur](#kategori-gestur)\n8. [Hubungkan Platform Streaming](#hubungkan-platform-streaming)\n9. [Kombinasi Event + Gestur (Lanjutan)](#kombinasi-event--gestur-lanjutan)\n10. [Sensitivitas & Dead Zone](#sensitivitas--dead-zone)\n11. [Pintasan Keyboard](#pintasan-keyboard)\n12. [Riwayat Trigger](#riwayat-trigger)\n13. [Ganti Bahasa](#ganti-bahasa)\n14. [Kelola Lisensi Anda](#kelola-lisensi-anda)\n15. [Pemecahan Masalah](#pemecahan-masalah)\n16. [Privasi](#privasi)\n17. [Dukungan](#dukungan)\n\n---\n\n## Apa itu EsperantAI?\n\nEsperantAI adalah **aplikasi web** yang menggunakan kecerdasan buatan untuk mendeteksi gestur wajah dan tangan Anda secara real-time, lalu menerjemahkannya menjadi perintah untuk software streaming Anda. Video kamera diproses secara lokal di browser Anda.\n\n![Alur lokal EsperantAI](assets/manual/01-esperantai-flow.svg)\n\nBekerja dengan software streaming berikut:\n\n- **OBS Studio** 28+\n- **Streamlabs Desktop**\n- **vMix**\n- **PRISM Live Studio**\n- **XSplit Broadcaster** (beta)\n\nEsperantAI juga dapat menerima event platform dan menggabungkannya dengan gestur Anda:\n\n- **Twitch**: dukungan langsung melalui EventSub WebSocket.\n- **YouTube Live**: dukungan langsung melalui YouTube Data API v3; memerlukan siaran live aktif dan quota API tersedia.\n- **Kick**: dukungan browser masih beta/terbatas. Event Kick lengkap memerlukan backend/webhook resmi atau bridge.\n- **StreamElements**: bridge multi-platform dengan token/JWT akun Anda.\n- **Trovo**: adapter teknis ada di kode, tetapi panel koneksi publik belum tersedia di antarmuka saat ini.\n\n### Mengapa \"gestur jujur\"?\n\nEkspresi wajah dasar dan rotasi kepala **bersifat universal di semua budaya manusia** (Paul Ekman, 1972). Mereka tidak berbohong, tidak bervariasi berdasarkan geografi. EsperantAI menyebutnya gestur \"🌐 Universal\" dan membedakannya dari gestur \"⚠️ Kultural\" (isyarat tangan), yang maknanya dapat bervariasi berdasarkan negara.\n\nAnda memutuskan gestur mana yang akan digunakan berdasarkan audiens Anda.\n\n---\n\n## Persyaratan Minimum\n\n### Hardware\n\n- **Webcam USB apa pun** (disarankan: 1080p atau lebih tinggi)\n- **CPU**: prosesor 4+ core dari 5 tahun terakhir\n- **RAM**: 8 GB minimum. 16 GB disarankan jika streaming secara bersamaan.\n- **GPU**: apa pun dengan dukungan WebGL (bahkan GPU terintegrasi modern bekerja)\n\n### Software\n\n- **OS**: Windows 10/11, macOS 12+, atau Linux dengan kernel terbaru\n- **Browser**: Chrome 90+, Edge 90+, atau Firefox 100+\n- **Software streaming** (setidaknya satu): OBS Studio 28+, Streamlabs Desktop, vMix, PRISM, XSplit\n\n### Internet\n\n- Diperlukan untuk **mengaktivasi lisensi** dan setiap **7 hari** untuk validasi ulang\n- Bekerja **hingga 7 hari offline** (masa tenggang)\n\n---\n\n## Pembelian & Aktivasi\n\n1. Kunjungi **https://edugame.digital**\n2. Klik **\"Beli Lisensi\"**\n3. Selesaikan pembayaran melalui LemonSqueezy (kartu, PayPal, dll.)\n4. Anda akan menerima email berisi:\n   - **Kunci lisensi** Anda (format: `XXXX-XXXX-XXXX-XXXX-XXXX`)\n   - Tautan untuk menggunakan EsperantAI\n5. Buka EsperantAI di browser Anda\n6. Layar aktivasi akan muncul. Tempel kunci lisensi Anda\n7. Klik **\"Aktivasi Lisensi\"**\n8. Selesai! 🎉\n\n### Berapa banyak perangkat?\n\nSatu lisensi dapat diaktivasi di **hingga 3 perangkat**. Untuk memindahkan lisensi ke perangkat lain:\n\n1. Di perangkat lama: panel **Lanjutan** → **Lisensi** → **Nonaktifkan di perangkat ini**\n2. Di perangkat baru: aktivasi secara normal\n\n---\n\n## Penggunaan Pertama\n\n### Langkah 1: Izinkan akses kamera\n\nSaat Anda membuka EsperantAI untuk pertama kali, browser akan meminta izin kamera. **Terima**.\n\n> Penting: EsperantAI tidak pernah mengirim video Anda ke server mana pun. Pemrosesan 100% lokal di komputer Anda.\n\n### Langkah 2: Pilih kamera\n\nJika Anda memiliki lebih dari satu kamera, pilih mana yang akan digunakan dari dropdown kamera.\n\n### Langkah 3: Verifikasi deteksi\n\nAnda akan melihat wajah Anda di panel kiri. Saat EsperantAI mendeteksi wajah Anda, indikator Yaw / Pitch / Roll akan mulai menampilkan nilai.\n\n### Langkah 4: Wizard Kalibrasi (Pro+)\n\nJika Anda memiliki lisensi Pro atau Pro+, **Wizard Kalibrasi** diluncurkan secara otomatis saat pertama kali digunakan. Wizard mengukur rentang gerakan alami Anda dan mengatur sensitivitas optimal. Anda dapat menjalankannya kembali kapan saja dari tombol **Kalibrasi Ulang**.\n\n---\n\n## Hubungkan Software Streaming Anda\n\n![Matriks koneksi software streaming](assets/manual/02-software-setup.svg)\n\nSemua koneksi di bagian ini bersifat lokal: EsperantAI berkomunikasi dengan software streaming yang berjalan di komputer yang sama melalui `127.0.0.1`.\n\n### OBS Studio\n\n1. Di OBS: **Tools → WebSocket Server Settings**\n2. Aktifkan server WebSocket. OBS Studio 28+ sudah menyertakan obs-websocket.\n3. Di EsperantAI: panel **Koneksi**\n4. Software streaming: **OBS Studio**\n5. WebSocket URL: `ws://127.0.0.1:4455` (default)\n6. Password: yang Anda atur di OBS, jika Anda mengaktifkan password\n7. Klik **Hubungkan**\n\n### Streamlabs Desktop\n\n1. Di Streamlabs: **Settings → Remote Control**\n2. Aktifkan Remote Control lokal\n3. Salin **API Token** dari layar Remote Control\n4. Di EsperantAI: Software streaming: **Streamlabs Desktop**\n5. API Token: tempel\n6. Port: `59650` (default)\n7. Klik **Hubungkan**\n\n### vMix\n\n1. Di vMix: **Settings → Web Controller**\n2. Aktifkan Web Controller. Port default: 8088.\n3. Di EsperantAI: Software streaming: **vMix**\n4. Host: `127.0.0.1`\n5. Port: `8088`\n6. Klik **Hubungkan**\n\n> Catatan: adapter vMix EsperantAI saat ini menggunakan API HTTP lokal vMix. Jika Web Controller dilindungi aturan jaringan atau kredensial yang tidak kompatibel dengan browser, koneksi dapat gagal.\n\n### PRISM Live Studio\n\n1. Gunakan **PRISM Live Studio v4.0.5+**.\n2. Instal plugin `obs-websocket` yang kompatibel dengan OBS/PRISM secara manual.\n3. Salin plugin ke folder plugin PRISM sesuai panduan resmi PRISM untuk plugin OBS.\n4. Mulai ulang PRISM\n5. Aktifkan WebSocket di **Tools → WebSocket Server Settings**\n6. Di EsperantAI: Software streaming: **PRISM Live Studio** (bekerja sama seperti OBS)\n\n> Perbedaan penting: OBS 28+ sudah menyertakan obs-websocket. PRISM memerlukan plugin yang diinstal manual.\n\n### XSplit Broadcaster (beta)\n\n1. Instal atau aktifkan bridge lokal yang kompatibel dengan **XSplit XJS / Remote xjs**.\n2. Pastikan bridge tersebut mengekspos URL WebSocket lokal.\n3. Di EsperantAI: Software streaming: **XSplit**\n4. Remote xjs Proxy URL: `ws://127.0.0.1:5555/xjs` (default)\n5. Klik **Hubungkan**\n\n> XSplit berada dalam mode **beta/lanjutan**. Kompatibilitas bergantung pada bridge XJS lokal yang terpasang; fitur lanjutan mungkin terbatas.\n\n---\n\n## Konfigurasi Gestur & Scene\n\nSetelah terhubung, scene aktual dari software Anda akan muncul secara otomatis di dropdown panel **Trigger**.\n\n### Pemetaan dasar\n\n1. Untuk setiap gestur (mis., \"Lihat Kiri\"), pilih scene dari dropdown\n2. Saat Anda membuat gestur tersebut dan menahannya stabil selama ~150ms, EsperantAI akan beralih ke scene tersebut di software streaming Anda\n3. Perubahan bersifat otomatis dan hampir instan\n\n### Multi-aksi (Pro+)\n\nDengan lisensi Pro atau Pro+, satu gestur dapat memicu **beberapa aksi** secara bersamaan:\n- Ganti scene + putar suara + tampilkan overlay + kirim pesan chat\n\n### Aktifkan / nonaktifkan kategori\n\nSetiap kategori memiliki checkbox \"Aktifkan\" sendiri:\n\n- 🧠 **Rotasi kepala** (universal — diaktifkan secara default)\n- 📏 **Jarak wajah** (mendekat/menjauh)\n- 👁️ **Pandangan** (gerakkan hanya mata)\n- 😀 **Emosi** (tersenyum, terkejut, marah, netral)\n- 👁️‍🗨️ **Kedipan ganda**\n- ✋ **Gestur tangan** (kultural — dinonaktifkan secara default)\n\nNonaktifkan kategori yang tidak Anda butuhkan untuk menghemat CPU.\n\n---\n\n## Kategori Gestur\n\n### 🌐 Universal (makna sama di semua budaya)\n\n| Gestur | Sumbu | Cara mengaktifkan |\n|---|---|---|\n| Tengah | — | Melihat ke depan, wajah stabil |\n| Lihat Kiri | yaw negatif | Putar kepala ke kiri Anda |\n| Lihat Kanan | yaw positif | Putar kepala ke kanan Anda |\n| Lihat Atas | pitch negatif | Angkat wajah |\n| Lihat Bawah | pitch positif | Turunkan wajah |\n| Miring Kiri | roll negatif | Miringkan kepala ke bahu kiri |\n| Miring Kanan | roll positif | Miringkan kepala ke bahu kanan |\n| Mendekat | jarak | Mendekat ke kamera |\n| Menjauh | jarak | Menjauh dari kamera |\n| Pandangan | pandangan | Gerakkan hanya mata (kepala di tengah) |\n| Tersenyum | emosi=senang | Tersenyum dengan jelas |\n| Terkejut | emosi=terkejut | Tunjukkan keterkejutan |\n| Marah | emosi=marah | Tunjukkan kemarahan |\n| Netral | emosi=netral | Wajah rileks |\n| Kedipan ganda | kedipan | Tutup kedua mata dua kali dengan cepat (< 700ms) |\n\n### ⚠️ Kultural (makna bervariasi berdasarkan negara)\n\n| Gestur | Makna Barat | Perhatian di budaya lain |\n|---|---|---|\n| 👍 Jempol ke atas | Persetujuan | Timur Tengah / Asia Barat: bisa menyinggung |\n| ✌️ Damai | Damai / kemenangan | Inggris / Irlandia / Australia (telapak menghadap dalam): hinaan |\n| 🤘 Tanda rock | Rock / metal | Italia (telapak menghadap bawah): \"cornuto\" (hinaan) |\n| 👌 OK | OK / sempurna | Brasil / Turki / Jerman: bisa menyinggung |\n| ✊ Kepalan tertutup | Bervariasi berdasarkan konteks politik | — |\n| 🖐️ Telapak terbuka | \"Berhenti\" atau sapaan | Yunani (mountza ke arah seseorang): hinaan keras |\n| ☝️ Menunjuk | Menunjukkan | Asia: menunjuk dengan jari dianggap tidak sopan |\n\nEsperantAI menandai setiap gestur dengan lencana yang sesuai di UI. Pilih mana yang akan digunakan berdasarkan audiens global Anda.\n\n### 🙏 Gassho (合掌)\n\nGestur khusus: tekan kedua telapak tangan bersama di depan dada (seperti doa atau bow sapaan). Umum di budaya Asia Timur sebagai tanda hormat atau rasa terima kasih. Terdeteksi dengan keandalan tinggi menggunakan 6 pemeriksaan landmark.\n\n---\n\n## Hubungkan Platform Streaming\n\nAgar EsperantAI menerima event (donasi, langganan, raid, follow, atau Super Chat), hubungkan platform tempat Anda streaming.\n\n![Status event per platform](assets/manual/03-platform-events.svg)\n\n### Twitch\n\n1. Buat Client ID di https://dev.twitch.tv/console\n2. Daftarkan redirect URI: `https://edugame.digital/oauth-callback.html` (atau URL lokal Anda)\n3. Di EsperantAI: panel **Event Platform** → **Twitch EventSub**\n4. Tempel Client ID Anda\n5. Klik **Hubungkan**\n6. Jendela otorisasi Twitch akan terbuka. Terima izinnya.\n7. Jendela akan tertutup dan Anda akan melihat \"Twitch Terhubung\"\n\nEsperantAI menggunakan EventSub WebSocket. Jangan pernah menempelkan Client Secret di browser.\n\n### YouTube Live\n\n1. Buat kredensial di https://console.cloud.google.com\n2. Aktifkan YouTube Data API v3\n3. Buat OAuth Client ID (tipe: Aplikasi Web)\n4. Daftarkan redirect URI yang sama dengan Twitch\n5. Di EsperantAI: panel **Event Platform** → **YouTube Live**\n6. Tempel Client ID Anda dan klik **Hubungkan**\n\nPersyaratan YouTube: Anda harus memiliki siaran live aktif dengan chat tersedia, dan project Google Cloud harus memiliki quota API yang cukup untuk membaca chat.\n\n### Kick\n\n1. Buat aplikasi di portal developer Kick.\n2. Daftarkan redirect URI\n3. Di EsperantAI: panel **Event Platform** → **Kick**\n4. Tempel Client ID Anda dan klik **Hubungkan**\n5. Kick menggunakan OAuth 2.1 dengan PKCE.\n\nStatus saat ini: **beta/terbatas**. Dokumentasi resmi Kick menggunakan webhooks untuk event lengkap. Di browser, EsperantAI hanya dapat mendeteksi sebagian aktivitas; untuk langganan, gift, raid, atau event Kick yang andal, gunakan bridge seperti StreamElements atau backend/webhook.\n\n### StreamElements (bridge multi-platform)\n\nJika Anda sudah memiliki akun StreamElements, Anda dapat menggunakannya sebagai bridge untuk alert dari beberapa platform:\n\n1. Buka https://streamelements.com/dashboard/account/channels\n2. Salin JWT Token Anda\n3. Di EsperantAI: panel **Event Platform** → **StreamElements**\n4. Tempel JWT dan klik **Hubungkan**\n\nJaga token ini tetap privat. Perlakukan seperti password akun StreamElements Anda.\n\n### Trovo\n\nEsperantAI menyertakan adapter teknis untuk Trovo di kode, berbasis OAuth dan layanan chat WebSocket Trovo. Antarmuka publik saat ini belum menampilkan panel koneksi Trovo, sehingga belum didokumentasikan sebagai alur pengguna normal. Jika Anda membutuhkan Trovo sekarang, gunakan bridge yang kompatibel atau tunggu sampai panel Trovo diaktifkan.\n\n---\n\n## Kombinasi Event + Gestur (Lanjutan)\n\nIni adalah keajaiban EsperantAI: menggabungkan **event platform** dengan **gestur Anda** sebagai konfirmasi.\n\n![Alur event plus gestur](assets/manual/04-event-gesture-combo.svg)\n\n### Contoh: berterima kasih untuk donasi dengan jempol ke atas\n\n1. Panel **Trigger Event** → baris \"💰 Donasi\"\n2. ✅ Aktifkan\n3. Scene: `Scene_Terima_Kasih`\n4. Gestur yang diperlukan: `👍 Jempol ke atas`\n\n**Alur langsung**:\n- Donasi masuk → EsperantAI menampilkan \"Menunggu gestur...\"\n- Anda memiliki 5 detik untuk melakukan 👍\n- Jika Anda melakukannya → beralih ke `Scene_Terima_Kasih` + menjalankan aksi lain yang dikonfigurasi\n- Jika tidak → otomatis diabaikan\n\n### Tanpa gestur yang diperlukan (trigger otomatis)\n\nJika Anda membiarkan \"Gestur yang diperlukan\" sebagai `— tidak ada —`, event langsung memicu aksi.\n\nBerguna untuk:\n- Otomatis beralih ke scene perayaan saat raid masuk\n- Otomatis menampilkan overlay saat seseorang berlangganan\n\n---\n\n## Sensitivitas & Dead Zone\n\n### Sensitivitas\n\nThreshold mengontrol seberapa besar gestur harus dilakukan untuk memicu:\n\n- **Yaw**: seberapa jauh memutar kepala ke samping (default: 0.15 rad ≈ 8.6°)\n- **Pitch atas/bawah**: kemiringan vertikal\n- **Roll**: kemiringan lateral\n\nNaikkan nilai untuk gestur yang lebih mencolok. Turunkan untuk sensitivitas lebih tinggi.\n\n### Dead zone (anti-kelelahan)\n\nJika Anda hampir di tengah (yaw < 0.05, pitch < 0.05, roll < 0.08), **TIDAK ADA yang terpicu**. Ini memungkinkan Anda bergerak secara alami tanpa mikro-pergerakan mengaktifkan trigger.\n\n### Frame stabil\n\n`Frame stabil` = berapa banyak frame berturut-turut gestur harus ditahan sebelum dipicu. Default: 5 frame (~150ms pada 30fps).\n\nNaikkan jika trigger terlalu mudah aktif. Turunkan untuk respons lebih cepat.\n\n### Cooldown\n\n`Cooldown (ms)` = waktu minimum antara perubahan scene. Default: 500ms.\n\nMencegah switcher menjadi \"goyah\" jika Anda berosilasi dengan cepat.\n\n---\n\n## Pintasan Keyboard\n\n| Tombol | Aksi |\n|---|---|\n| `Spasi` | Jeda / Lanjutkan deteksi |\n| `C` | Langsung lompat ke scene TENGAH |\n| `R` | Muat ulang daftar scene dari software |\n| `Esc` | Putuskan koneksi |\n\n---\n\n## Riwayat Trigger\n\nPanel **Lanjutan → Riwayat Trigger** menampilkan 50 aksi terakhir yang dipicu:\n\n- ✓ hijau = berhasil\n- ✗ merah = gagal\n- · abu-abu = tertunda\n\nBerguna untuk mengaudit apa yang terpicu tanpa membuka DevTools.\n\n**Ekspor CSV**: unduh riwayat untuk analisis offline.\n\n**Bersihkan**: hapus riwayat (tidak memengaruhi hal lain).\n\n---\n\n## Ganti Bahasa\n\nEsperantAI secara otomatis mendeteksi bahasa sistem operasi Anda. Untuk mengubahnya secara manual:\n\n- Sudut kanan atas: dropdown bahasa\n- Pilih bahasa yang Anda inginkan\n- UI akan segera diperbarui\n\nBahasa yang tersedia:\n- 🇺🇸 English\n- 🇪🇸 Español (España)\n- 🇲🇽 Español (México)\n- 🇧🇷 Português (Brasil)\n- 🇫🇷 Français\n- 🇩🇪 Deutsch\n- 🇯🇵 日本語\n- 🇷🇺 Русский\n- 🇨🇳 中文\n- 🇮🇹 Italiano\n- 🇵🇱 Polski\n- 🇸🇦 العربية (RTL)\n- 🇰🇷 한국어\n- 🇮🇳 हिंदी\n- 🇮🇩 Bahasa Indonesia\n\nSemua 15 bahasa diterjemahkan dalam file antarmuka saat ini.\n\n---\n\n## Kelola Lisensi Anda\n\nPanel **Lanjutan → Lisensi**:\n\n- **Lihat status**: Valid / Tidak Valid\n- **Lihat email pelanggan terkait**\n- **Lihat validasi online terakhir**\n- **Nonaktifkan di perangkat ini**: gunakan sebelum mengganti PC atau untuk membebaskan slot (dari 3 yang tersedia)\n\n## Pemecahan Masalah\n\n### \"Aktivasi diperlukan\" tetap muncul setelah menempelkan kunci lisensi\n\n- Verifikasi bahwa Anda menyalin kunci lengkap (5 kelompok 4 karakter dipisahkan tanda hubung)\n- Periksa koneksi internet Anda (aktivasi memerlukan validasi online saat pertama kali)\n- Jika Anda sudah mengaktivasi di 3 perangkat, nonaktifkan satu terlebih dahulu\n- Hubungi soporte@edugame.digital jika masalah berlanjut\n\n### \"Mencari wajah...\" tetap muncul meskipun wajah saya terlihat\n\n- Perbaiki pencahayaan: wajah Anda harus terlilangi dengan baik\n- Mendekat ke kamera (40-80 cm optimal)\n- Tutup tab lain yang menggunakan GPU (Chrome dapat membatasi GPU jika terlalu banyak tab terbuka)\n- Jika Memory Saver Chrome aktif, nonaktifkan untuk tab ini\n\n### Scene tidak muncul di dropdown\n\n- Verifikasi bahwa Anda terhubung ke software streaming (lencana hijau \"Terhubung\")\n- Tekan `R` untuk memuat ulang daftar scene\n- Jika masih kosong, putuskan koneksi dan hubungkan kembali\n- Di vMix, pastikan Web Controller aktif dan dapat diakses dari `http://127.0.0.1:8088/api/`\n- Di PRISM, pastikan plugin obs-websocket sudah terinstal dan aktif\n- Di XSplit, pastikan bridge XJS lokal sedang berjalan\n\n### Perubahan scene terpicu tanpa saya membuat gestur\n\n- Naikkan threshold yaw / pitch / roll di panel **Sensitivitas**\n- Naikkan `Frame stabil` dari 5 ke 8-10\n- Pastikan dead zone dikonfigurasi (yaw 0.05, pitch 0.05, roll 0.08)\n- Periksa bahwa tidak ada orang lain dalam frame (multi-wajah dapat menyebabkan ketidakstabilan)\n\n### Keterlambatan deteksi\n\n- Tutup aplikasi berat (game, editing video)\n- Verifikasi bahwa Anda menggunakan GPU dedicated jika memilikinya (bukan terintegrasi)\n- Kurangi resolusi kamera jika 4K (1080p optimal untuk deteksi)\n\n### OBS tidak bereaksi meskipun EsperantAI mengatakan \"Scene berubah\"\n\n- Verifikasi bahwa nama scene di dropdown sama PERSIS dengan yang ada di OBS (case-sensitive)\n- Verifikasi bahwa scene tidak ada di Koleksi Scene lain\n- Periksa panel **Riwayat Trigger** — jika menunjukkan ✗ merah, ada kesalahan spesifik\n\n### Error \"OBS tidak terjangkau — Hubungkan secara manual\"\n\n- Verifikasi bahwa OBS terbuka\n- Verifikasi bahwa WebSocket diaktifkan di OBS\n- Jika Anda mengatur password di OBS, harus cocok persis\n- Beberapa antivirus memblokir port 4455 — tambahkan pengecualian\n\n### Twitch atau YouTube tidak terhubung\n\n- Pastikan redirect URI di console platform sama persis dengan URL `oauth-callback.html`\n- Izinkan pop-up untuk domain tempat Anda menjalankan EsperantAI\n- Di Twitch, gunakan hanya Client ID; jangan tempel Client Secret\n- Di YouTube, pastikan YouTube Data API v3 aktif dan ada siaran live aktif\n\n### Kick tidak menampilkan semua event\n\nKick berada dalam mode beta/terbatas di browser. Event Kick lengkap secara resmi diterima melalui webhooks; gunakan StreamElements atau backend sendiri jika Anda membutuhkan langganan, gift, atau raid yang andal.\n\n---\n\n## Privasi\n\n### Apa yang TIDAK dilakukan EsperantAI\n\n- ❌ TIDAK mengirim video Anda ke server mana pun\n- ❌ TIDAK menyimpan video atau tangkapan Anda\n- ❌ TIDAK mengumpulkan informasi biometrik secara remote\n- ❌ TIDAK berbagi data dengan pengiklan atau pihak ketiga\n\n### Apa yang DIPROSES\n\n- ✅ Deteksi wajah lokal di browser Anda (Human.js + WebGL)\n- ✅ Koneksi lokal ke OBS / Streamlabs / vMix / PRISM / XSplit (loopback `127.0.0.1`)\n- ✅ Validasi kunci lisensi berkala (setiap 7 hari)\n- ✅ Jika Anda menghubungkan Twitch/YouTube/Kick/StreamElements: token platform di penyimpanan lokal atau sesi browser\n\nDetail lengkap di `docs/PRIVACY.html`.\n\n---\n\n## Dukungan\n\n- 📧 Email: **soporte@edugame.digital**\n- 🌐 Web: https://edugame.digital\n- 📚 Dokumentasi teknis: https://github.com/salazarjoelo/EsperantAI\n\nWaktu respons:\n- Pertanyaan umum: 24-72 jam\n- Bug teknis: 1-3 hari kerja\n\n---\n\n*Terakhir diperbarui: 2026-05-20. Versi: 3.0.*\n*© 2026 EdugameDigital — Joel Salazar Ramírez. EsperantAI™.*\n" }
};

const LOCALE_ORDER = ['en-US','es-MX','es-ES','pt-BR','ja-JP','zh-CN','ko-KR','fr-FR','de-DE','it-IT','ru-RU','ar-SA','pl-PL','hi-IN','id-ID'];

let currentLocale = 'en-US';
let currentHeadings = [];

// Init
(function init() {
  // Theme
  const saved = localStorage.getItem('manual-theme');
  if (saved === 'dark') applyTheme('dark');
  else applyTheme('light');

  // Language
  const savedLang = localStorage.getItem('manual-lang');
  const browserLang = navigator.language || navigator.userLanguage;
  let bestMatch = 'en-US';
  if (savedLang && MANUALS[savedLang]) bestMatch = savedLang;
  else {
    for (const loc of LOCALE_ORDER) {
      if (browserLang.startsWith(loc.split('-')[0]) && MANUALS[loc]) { bestMatch = loc; break; }
    }
  }
  currentLocale = bestMatch;

  // Populate language dropdown
  const select = document.getElementById('langSelect');
  for (const loc of LOCALE_ORDER) {
    const m = MANUALS[loc];
    const opt = document.createElement('option');
    opt.value = loc;
    opt.textContent = m.flag + ' ' + m.name;
    if (loc === currentLocale) opt.selected = true;
    select.appendChild(opt);
  }

  select.addEventListener('change', function() {
    currentLocale = this.value;
    localStorage.setItem('manual-lang', currentLocale);
    render();
  });

  // Theme toggle
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);

  // Search
  document.getElementById('searchInput').addEventListener('input', function() {
    renderTOC(this.value.trim().toLowerCase());
  });

  // Scroll to top
  document.getElementById('scrollTopBtn').addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Hamburger
  document.getElementById('hamburgerBtn').addEventListener('click', toggleSidebar);
  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

  // Download
  document.getElementById('downloadBtn').addEventListener('click', downloadMarkdown);

  // Scroll spy
  window.addEventListener('scroll', onScroll);

  render();
})();

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIconSun').style.display = theme === 'dark' ? 'none' : 'block';
  document.getElementById('themeIconMoon').style.display = theme === 'dark' ? 'block' : 'none';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('manual-theme', next);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function downloadMarkdown() {
  const m = MANUALS[currentLocale];
  const blob = new Blob([m.content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'EsperantAI_Manual_' + currentLocale + '.md';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function render() {
  const m = MANUALS[currentLocale];
  const isRTL = currentLocale === 'ar-SA';
  document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
  document.documentElement.lang = currentLocale;
  document.title = 'EsperantAI — ' + m.name + ' Manual';

  // Strip <div dir="rtl"> wrapper from Arabic content for rendering
  let mdContent = m.content;
  mdContent = mdContent.replace(/^<div dir="rtl">\n?/i, '').replace(/\n?<\/div>$/i, '');

  // Render markdown
  const htmlContent = marked.parse(mdContent);
  document.getElementById('content').innerHTML = htmlContent;

  // Add IDs to headings using GitHub-style slugs.
  // Fix 2026-05-18: antes usaba "section-N", ahora slugify del texto.
  //
  // Bug adicional descubierto: en ja-JP, zh-CN, ko-KR, ar-SA los headings
  // están traducidos pero los anchors del índice numerado del MD quedaron
  // en INGLÉS (#what-is-esperantai apuntando a un heading que dice
  // "EsperantAIとは？"). Solución: agregar un secondary anchor invisible
  // con el slug en inglés (mapeado por POSICIÓN — todos los manuales
  // tienen el mismo orden de secciones).
  const container = document.getElementById('content');
  const headings = container.querySelectorAll('h2, h3');
  const usedSlugs = new Map();

  // Compute English slugs from MANUALS['en-US'] once, by position
  const englishSlugs = (() => {
    if (!MANUALS['en-US']) return [];
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = marked.parse(MANUALS['en-US'].content);
    return Array.from(tempDiv.querySelectorAll('h2, h3')).map(h => slugify(h.textContent));
  })();

  currentHeadings = [];
  headings.forEach((h, i) => {
    const slug = slugify(h.textContent);
    const count = usedSlugs.get(slug) || 0;
    usedSlugs.set(slug, count + 1);
    const id = count === 0 ? slug : slug + '-' + count;
    h.id = id;

    // Secondary anchor for EN-aliased links (only if different from primary)
    const enSlug = englishSlugs[i];
    if (enSlug && enSlug !== id) {
      const anchor = document.createElement('span');
      anchor.id = enSlug;
      anchor.className = 'heading-alias-anchor';
      h.parentNode.insertBefore(anchor, h);
    }

    currentHeadings.push({ el: h, id: id, text: h.textContent, level: h.tagName });
  });

  // Smooth scroll para los links del TOC del body (los del MD source)
  // El browser por defecto los lleva con jump abrupto; smooth es mejor UX
  container.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', function(e) {
      const targetId = decodeURIComponent(this.getAttribute('href').slice(1));
      const target = document.getElementById(targetId);
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        history.replaceState(null, '', '#' + targetId);
      }
    });
  });

  renderTOC('');
  onScroll();
}

/**
 * GitHub-style slugify (matches the anchors generated in the markdown source):
 *   - lowercase
 *   - strip punctuation including +, &, *, /
 *   - each whitespace → one hyphen (preserves doubles where punctuation was
 *     removed, ej: "evento + gesto" → "evento--gesto" para coincidir con MD)
 *   - preserves unicode letters (acentos, devanagari, kanji, etc.)
 *   - trims leading/trailing hyphens
 *   - NO collapses multiple hyphens (GitHub no lo hace)
 */
function slugify(text) {
  return text
    .toLowerCase()
    .trim()
    .replace(/[?¿!¡:,;.()«»"'`""''#—–+&*/\\=<>|@$%^]/g, '')
    .replace(/\s/g, '-')
    .replace(/^-+|-+$/g, '');
}

function renderTOC(filter) {
  const nav = document.getElementById('tocNav');
  nav.innerHTML = '';

  let filtered = currentHeadings;
  if (filter) {
    filtered = currentHeadings.filter(h => h.text.toLowerCase().includes(filter));
  }

  if (filtered.length === 0 && filter) {
    nav.innerHTML = '<div class="sidebar-search-empty">No matching sections</div>';
    return;
  }

  for (const h of filtered) {
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.text;
    a.className = 'sidebar-link' + (h.level === 'H3' ? ' h3' : '');
    a.setAttribute('data-section', h.id);
    a.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.getElementById(h.id);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      closeSidebar();
    });
    nav.appendChild(a);
  }
}

function onScroll() {
  // Scroll to top button
  const btn = document.getElementById('scrollTopBtn');
  if (window.scrollY > 400) btn.classList.add('visible');
  else btn.classList.remove('visible');

  // Active section highlighting
  if (currentHeadings.length === 0) return;

  let activeId = currentHeadings[0].id;
  const scrollTop = window.scrollY;
  const headerH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--header-height'));

  for (let i = currentHeadings.length - 1; i >= 0; i--) {
    const h = currentHeadings[i];
    if (h.el.getBoundingClientRect().top <= headerH + 40) {
      activeId = h.id;
      break;
    }
  }

  document.querySelectorAll('.sidebar-link').forEach(link => {
    if (link.getAttribute('data-section') === activeId) link.classList.add('active');
    else link.classList.remove('active');
  });
}
</script>
